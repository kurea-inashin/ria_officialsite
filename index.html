<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>COLOR RESONANCE SHOOTING</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Press Start 2P', cursive; overflow: hidden; }
        .hidden { display: none; }
        #menu { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        h1 { font-size: 30px; margin-bottom: 50px; text-shadow: 0 0 20px #fff; }
        
        .mode-select { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .mode-btn { width: 300px; padding: 20px; border: 4px solid; background: #000; color: #fff; cursor: pointer; position: relative; font-family: inherit; font-size: 12px; transition: 0.2s; }
        .mode-btn:hover:not(.locked) { transform: scale(1.05); background: rgba(255,255,255,0.1); }
        .mode-btn.locked { opacity: 0.2; cursor: not-allowed; border-color: #444 !important; }

        /* カラー定義 */
        .red { border-color: #ff0000; color: #ff0000; }     /* 京葉色 */
        .blue { border-color: #0088ff; color: #0088ff; }    /* 京浜東北色 */
        .yellow { border-color: #ffff00; color: #ffff00; }  /* 総武色 */
        .green { border-color: #00ff00; color: #00ff00; }   /* 埼京色 */
        .orange { border-color: #ff8800; color: #ff8800; }  /* 中央色（隠し） */

        .status { position: absolute; bottom: 5px; right: 10px; font-size: 8px; }
        #game-container { position: relative; width: 800px; height: 600px; margin: 0 auto; }
        canvas { background: #050505; border: 4px solid #333; display: block; }
        
        .hud { position: absolute; top: 10px; left: 10px; font-size: 10px; line-height: 2; pointer-events: none; }
        .hp-outer { width: 200px; height: 15px; border: 2px solid #fff; background: #222; }
        #hp-inner { width: 100%; height: 100%; background: #0f0; transition: 0.1s; }
    </style>
</head>
<body>

<div id="menu">
    <h1>SHOOTING 2026</h1>
    <div class="mode-select">
        <button class="mode-btn red" onclick="start('red')">RED MODE<br><span>(EASY)</span><div class="status" id="st-red">NEW</div></button>
        <button class="mode-btn blue" onclick="start('blue')">BLUE MODE<br><span>(NORMAL)</span><div class="status" id="st-blue">NEW</div></button>
        <button class="mode-btn yellow" onclick="start('yellow')">YELLOW MODE<br><span>(HARD)</span><div class="status" id="st-yellow">NEW</div></button>
        <button class="mode-btn green" onclick="start('green')">GREEN MODE<br><span>(EXPERT)</span><div class="status" id="st-green">NEW</div></button>
    </div>
    <div style="margin-top: 40px;">
        <button id="special-btn" class="mode-btn orange locked" onclick="start('orange')">ULTRA ORANGE<br><span>(HIDDEN STAGE)</span></button>
    </div>
</div>

<div id="game" class="hidden">
    <div id="game-container">
        <div class="hud">
            SCORE: <span id="ui-score">0</span> / TARGET: <span id="ui-target">0</span><br>
            HP: <div class="hp-outer"><div id="hp-inner"></div></div>
        </div>
        <canvas id="cv" width="800" height="600"></canvas>
    </div>
</div>

<script>
const cv = document.getElementById("cv");
const ctx = cv.getContext("2d");

// セーブデータ
let save = JSON.parse(localStorage.getItem("shooting_2026_personal")) || { red:0, blue:0, yellow:0, green:0, orange:0 };
function updateMenu() {
    const modes = ['red','blue','yellow','green','orange'];
    modes.forEach(m => {
        const el = document.getElementById("st-"+m);
        if(el) el.innerText = save[m] ? "CLEARED" : "NEW";
    });
    // 全モードクリアでオレンジ解禁
    if(save.red && save.blue && save.yellow && save.green) {
        document.getElementById("special-btn").classList.remove("locked");
    }
}

let p = { x:400, y:500 }, bullets = [], enemies = [], eb = [], hp = 100, score = 0, target = 0, playing = false, currentMode = "";

function start(mode) {
    if(mode === 'orange' && !(save.red && save.blue && save.yellow && save.green)) return;
    currentMode = mode; playing = true; hp = 100; score = 0;
    bullets = []; enemies = []; eb = [];
    target = mode === 'orange' ? 10000 : 3000;
    document.getElementById("ui-target").innerText = target;
    document.getElementById("menu").classList.add("hidden");
    document.getElementById("game").classList.remove("hidden");
    loop();
}

cv.addEventListener("mousemove", e => {
    let r = cv.getBoundingClientRect();
    p.x = e.clientX - r.left; p.y = e.clientY - r.top;
});
cv.addEventListener("mousedown", () => {
    if(!playing) return;
    bullets.push({x:p.x, y:p.y-10, vx:0, vy:-10});
    if(currentMode === 'orange') {
        bullets.push({x:p.x, y:p.y-10, vx:-2, vy:-10});
        bullets.push({x:p.x, y:p.y-10, vx:2, vy:-10});
    }
});

function update() {
    bullets.forEach((b, i) => { b.x += b.vx; b.y += b.vy; if(b.y < -20) bullets.splice(i,1); });
    
    // 敵スポーン
    let spawnRate = {red:0.02, blue:0.04, yellow:0.06, green:0.08, orange:0.12}[currentMode];
    if(Math.random() < spawnRate) {
        enemies.push({ x:Math.random()*760+20, y:-30, hp:currentMode==='orange'?5:2, v:currentMode==='orange'?6:3 });
    }

    enemies.forEach((e, i) => {
        e.y += e.v;
        // 敵の弾
        if(Math.random() < (currentMode === 'orange' ? 0.05 : 0.01)) {
            eb.push({x:e.x, y:e.y, v:5});
        }
        // 自機への当たり判定
        if(Math.hypot(e.x-p.x, e.y-p.y) < 20) {
            hp -= 10; enemies.splice(i,1);
            if(hp <= 0) endGame(false);
        }
        // 弾への当たり判定
        bullets.forEach((b, bi) => {
            if(Math.hypot(e.x-b.x, e.y-b.y) < 20) {
                e.hp--; bullets.splice(bi,1);
                if(e.hp <= 0) { score += 100; enemies.splice(i,1); }
            }
        });
        if(e.y > 650) enemies.splice(i,1);
    });

    eb.forEach((b, i) => {
        b.y += b.v;
        if(Math.hypot(b.x-p.x, b.y-p.y) < 15) { hp -= 5; eb.splice(i,1); if(hp <= 0) endGame(false); }
        if(b.y > 650) eb.splice(i,1);
    });

    document.getElementById("hp-inner").style.width = hp + "%";
    document.getElementById("ui-score").innerText = score;
    if(score >= target) endGame(true);
}

function draw() {
    ctx.clearRect(0,0,800,600);
    // プレイヤー
    ctx.fillStyle = "#fff";
    ctx.beginPath(); ctx.moveTo(p.x, p.y-12); ctx.lineTo(p.x-12, p.y+12); ctx.lineTo(p.x+12, p.y+12); ctx.fill();
    // 弾
    ctx.fillStyle = "#0ff"; bullets.forEach(b => ctx.fillRect(b.x-2, b.y-8, 4, 10));
    // 敵
    ctx.fillStyle = {red:'#f00', blue:'#08f', yellow:'#ff0', green:'#0f0', orange:'#f80'}[currentMode];
    enemies.forEach(e => { ctx.fillRect(e.x-15, e.y-15, 30, 30); ctx.strokeStyle="#fff"; ctx.strokeRect(e.x-15, e.y-15, 30, 30); });
    // 敵弾
    ctx.fillStyle = "#f0f"; eb.forEach(b => { ctx.beginPath(); ctx.arc(b.x, b.y, 5, 0, Math.PI*2); ctx.fill(); });
}

function endGame(win) {
    playing = false;
    if(win) {
        save[currentMode] = 1;
        localStorage.setItem("shooting_2026_personal", JSON.stringify(save));
        alert("CLEAR!");
    } else {
        alert("GAME OVER");
    }
    document.getElementById("menu").classList.remove("hidden");
    document.getElementById("game").classList.add("hidden");
    updateMenu();
}

function loop() { if(playing) { update(); draw(); requestAnimationFrame(loop); } }
updateMenu();
</script>
</body>
</html>
