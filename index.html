<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Minami Project 2026: Burst Finale</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+JP:wght@700;900&display=swap');
        
        body { margin: 0; background: #000; color: #fff; font-family: 'Press Start 2P', cursive; overflow: hidden; user-select: none; }
        canvas { display: block; }

        /* HUD */
        #hud { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; }
        #score-val { font-size: 20px; text-shadow: 0 0 10px #00ffff; margin-bottom: 10px; }
        .bar-label { font-size: 8px; margin-top: 8px; color: #aaa; }
        .bar-container { width: 200px; height: 12px; background: rgba(255,255,255,0.1); border: 2px solid #fff; border-radius: 6px; overflow: hidden; margin-bottom: 5px; }
        #hp-fill { height: 100%; background: linear-gradient(90deg, #ff0055, #00ffaa); width: 100%; transition: width 0.3s; }
        #gauge-fill { height: 100%; background: #00ccff; width: 0%; }
        #bomb-stock { color: #ffff00; font-size: 12px; }

        /* Menu System */
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,15,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 20; backdrop-filter: blur(8px); }
        .panel { display: none; flex-direction: column; align-items: center; width: 90%; max-height: 80vh; overflow-y: auto; }
        .active { display: flex; }
        .nav-btn { padding: 12px 24px; border: 2px solid #fff; background: rgba(255,255,255,0.1); color: #fff; cursor: pointer; font-family: 'Press Start 2P'; font-size: 10px; margin: 8px; transition: 0.2s; text-align: center; }
        .nav-btn:hover { background: #fff; color: #000; box-shadow: 0 0 15px #fff; }
        .nav-btn.equipped { border-color: #0f0; color: #0f0; background: rgba(0,255,0,0.1); }

        /* Grids */
        .mode-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 700px; }
        .mode-btn { width: 120px; padding: 10px; border: 2px solid #333; background: #000; color: #444; cursor: pointer; text-align: center; font-size: 9px; }
        .mode-btn.unlocked { border-color: var(--c); color: var(--c); }
        .mode-btn.unlocked:hover { background: var(--c); color: #000; }
        
        /* 警告メッセージアニメーション */
        @keyframes shake {
            0% { transform: translate(-50%, -50%) translateX(0); }
            25% { transform: translate(-50%, -50%) translateX(-10px); }
            50% { transform: translate(-50%, -50%) translateX(10px); }
            75% { transform: translate(-50%, -50%) translateX(-10px); }
            100% { transform: translate(-50%, -50%) translateX(0); }
        }
        .error-shake { animation: shake 0.2s ease-in-out 3; }

        #msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 24px; opacity: 0; pointer-events: none; z-index: 100; text-align: center; white-space: nowrap; }

        #copyright { position: absolute; bottom: 10px; width: 100%; text-align: center; font-size: 8px; color: #555; pointer-events: none; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="hud" style="display:none;">
        <div id="score-val">SCORE: 000000</div>
        <div class="bar-label">ARMOR (HP)</div>
        <div class="bar-container"><div id="hp-fill"></div></div>
        <div class="bar-label">BURST GAUGE</div>
        <div class="bar-container"><div id="gauge-fill"></div></div>
        <div id="bomb-stock">BOMBS: </div>
        <div id="gold-val" style="color:#ffd700; font-size:12px; margin-top:5px;">GOLD: 0</div>
    </div>

    <div id="overlay">
        <h1 style="font-size:24px; margin-bottom:30px; text-shadow: 0 0 20px #0088ff;">MINAMI PROJECT 2026</h1>
        
        <div id="main-nav">
            <button class="nav-btn" onclick="openPanel('stage-select')">SELECT MISSION</button>
            <button class="nav-btn" onclick="openPanel('shop')">SKINS & TECH SHOP</button>
        </div>

        <div id="stage-select" class="panel">
            <h2 style="color:#00ffff; font-size:14px;">SELECT DESTINATION</h2>
            <div class="mode-grid" id="grid"></div>
            <button class="nav-btn" style="margin-top:20px;" onclick="backToTitle()">BACK</button>
        </div>

        <div id="shop" class="panel">
            <h2 id="shop-gold" style="color:#ffd700; font-size:16px;"></h2>
            <div class="shop-grid" id="shop-items">
                <button id="btn-KY" class="nav-btn" style="color:#ff4444;" onclick="buySkin('KY-RED', '#ff0000', 'SPEEDER', 1500)">KY-RED (1500G)</button>
                <button id="btn-KT" class="nav-btn" style="color:#4444ff;" onclick="buySkin('KT-BLUE', '#0088ff', 'TWIN', 1500)">KT-BLUE (1500G)</button>
                <button id="btn-SB" class="nav-btn" style="color:#ffff44;" onclick="buySkin('SB-YELLOW', '#ffff00', 'HEAVY', 1500)">SB-YELLOW (1500G)</button>
                <button id="btn-SK" class="nav-btn" style="color:#44ff44;" onclick="buySkin('SK-GREEN', '#00ff44', 'SPEEDER', 1500)">SK-GREEN (1500G)</button>
                <button id="btn-CO" class="nav-btn" style="color:#ff8800; display:none;" onclick="buySkin('CENTRAL-ORE', '#ff6600', 'ULTIMATE', 10000)">CENTRAL-ORE (10000G)</button>
                
                <button id="btn-WIDE" class="nav-btn" onclick="buyWeapon('WIDE', 5000)">WIDE SHOT (5000G)</button>
                <button id="btn-STAB" class="nav-btn" onclick="buyItem('stabilizer', 3000)">STABILIZER (3000G)</button>
            </div>
            <button class="nav-btn" style="margin-top:20px;" onclick="backToTitle()">BACK</button>
        </div>
    </div>

    <div id="msg"></div>
    <div id="copyright">© 2026 MINAMI PROJECT - BURST FINALE EXTENDED</div>
    <canvas id="game"></canvas>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;

        let gameActive = false, score = 0, hp = 100, frame = 0, burstGauge = 0;
        let bullets = [], eBullets = [], enemies = [], particles = [], bombActive = 0;
        let player = { x: canvas.width/2, y: canvas.height/2, radius: 15 };
        let isDown = false, currentMode = null;

        const NORMAL_STAGES = ['SB', 'KT', 'SK', 'KY', 'PK', 'JB', 'S1', 'S2', 'S3'];
        
        // データの読み込み
        let userData = JSON.parse(localStorage.getItem('minami_2026_final')) || {
            gold: 0, atk: 2, bombs: 2, 
            unlocked: [...NORMAL_STAGES], cleared: [], 
            skin: '#ffffff', shipType: 'STANDARD', weapon: 'NORMAL',
            inventory: { WIDE: false, LASER: false, stabilizer: false }
        };

        const STAGES = {
            'SB': { name: 'ST=SB', color: '#ccaa00', diff: 1, bossHp: 500, score1: 5000 },
            'KT': { name: 'ST=KT', color: '#0088cc', diff: 1.2, bossHp: 700, score1: 7000 },
            'SK': { name: 'ST=SK', color: '#008844', diff: 1.5, bossHp: 900, score1: 8000 },
            'KY': { name: 'ST=KY', color: '#aa0022', diff: 2.0, bossHp: 1200, score1: 10000 },
            'PK': { name: 'ST=PK', color: '#cc5588', diff: 2.2, bossHp: 1400, score1: 12000 },
            'JB': { name: 'ST=JB', color: '#006666', diff: 2.5, bossHp: 1600, score1: 15000 },
            'S1': { name: 'ST=S1', color: '#6600cc', diff: 3.0, bossHp: 2000, score1: 18000 },
            'S2': { name: 'ST=S2', color: '#cc00cc', diff: 3.5, bossHp: 2500, score1: 20000 },
            'S3': { name: 'ST=S3', color: '#00cccc', diff: 4.0, bossHp: 3000, score1: 25000 },
            'CO': { name: 'ST=CO', color: '#ff6600', diff: 50, bossHp: 100000, score1: 50000, secret: true }
        };

        function save() { localStorage.setItem('minami_2026_final', JSON.stringify(userData)); }

        // メッセージ表示 (コイン不足含む)
        function showMessage(text, color, isError = false) {
            const m = document.getElementById('msg');
            m.innerText = text;
            m.style.color = color;
            m.style.opacity = 1;
            m.classList.remove('error-shake');
            
            if(isError) {
                m.classList.add('error-shake');
            }

            setTimeout(() => { m.style.opacity = 0; }, 1500);
        }

        function openPanel(id) {
            document.getElementById('main-nav').style.display = 'none';
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'shop') updateShopUI();
            if(id === 'stage-select') renderStages();
        }

        function updateShopUI() {
            document.getElementById('shop-gold').innerText = `TOTAL GOLD: ${userData.gold}`;
            if(userData.cleared.length >= 9) document.getElementById('btn-CO').style.display = 'block';
            
            // 装備中表示のリセット
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('equipped'));
            
            // 現在の装備をハイライト
            if(userData.skin === '#ff0000') document.getElementById('btn-KY').classList.add('equipped');
            if(userData.skin === '#0088ff') document.getElementById('btn-KT').classList.add('equipped');
            if(userData.skin === '#ffff00') document.getElementById('btn-SB').classList.add('equipped');
            if(userData.skin === '#00ff44') document.getElementById('btn-SK').classList.add('equipped');
            if(userData.skin === '#ff6600') document.getElementById('btn-CO').classList.add('equipped');
            if(userData.weapon === 'WIDE') document.getElementById('btn-WIDE').classList.add('equipped');
            if(userData.inventory.stabilizer) document.getElementById('btn-STAB').classList.add('equipped');
        }

        function backToTitle() {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.getElementById('main-nav').style.display = 'flex';
        }

        function buySkin(name, color, shape, cost) {
            if(userData.gold >= cost) {
                userData.gold -= cost;
                userData.skin = color;
                userData.shipType = shape;
                save();
                updateShopUI();
                showMessage(`EQUIPPED: ${name}`, color);
            } else {
                showMessage("NOT ENOUGH GOLD!", "#ff0000", true);
            }
        }

        function buyWeapon(w, cost) {
            if(userData.gold >= cost) {
                userData.gold -= cost;
                userData.weapon = w;
                userData.inventory[w] = true;
                save();
                updateShopUI();
                showMessage(`${w} SHOT READY!`, "#00ffff");
            } else {
                showMessage("NOT ENOUGH GOLD!", "#ff0000", true);
            }
        }

        function buyItem(item, cost) {
            if(userData.gold >= cost) {
                userData.gold -= cost;
                userData.inventory[item] = true;
                save();
                updateShopUI();
                showMessage(`${item.toUpperCase()} ACTIVE!`, "#00ff00");
            } else {
                showMessage("NOT ENOUGH GOLD!", "#ff0000", true);
            }
        }

        function renderStages() {
            const grid = document.getElementById('grid'); grid.innerHTML = '';
            if(NORMAL_STAGES.every(id => userData.cleared.includes(id)) && !userData.unlocked.includes('CO')) {
                userData.unlocked.push('CO');
            }
            Object.keys(STAGES).forEach(id => {
                if(STAGES[id].secret && !userData.unlocked.includes(id)) return;
                const btn = document.createElement('div');
                btn.className = `mode-btn unlocked ${userData.cleared.includes(id) ? 'cleared' : ''}`;
                btn.style.setProperty('--c', STAGES[id].color);
                btn.innerHTML = id === 'CO' ? "<b>CENTRAL ORE</b>" : STAGES[id].name;
                btn.onclick = () => startGame(id);
                grid.appendChild(btn);
            });
        }

        function startGame(id) {
            currentMode = { ...STAGES[id], id: id };
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('hud').style.display = 'block';
            gameActive = true; score = 0; hp = 100; burstGauge = 0;
            enemies = []; bullets = []; eBullets = []; particles = [];
            loop();
        }

        function drawPlayer() {
            ctx.save();
            ctx.translate(player.x, player.y);
            ctx.fillStyle = userData.skin;
            ctx.shadowBlur = 15; ctx.shadowColor = userData.skin;
            ctx.beginPath();
            
            switch(userData.shipType) {
                case 'SPEEDER':
                    ctx.moveTo(0, -22); ctx.lineTo(12, 18); ctx.lineTo(0, 10); ctx.lineTo(-12, 18);
                    break;
                case 'HEAVY':
                    ctx.moveTo(-18, -10); ctx.lineTo(18, -10); ctx.lineTo(22, 18); ctx.lineTo(-22, 18);
                    break;
                case 'TWIN':
                    ctx.fillRect(-20, -15, 8, 30); ctx.fillRect(12, -15, 8, 30); ctx.fillRect(-10, 5, 20, 5);
                    break;
                case 'ULTIMATE':
                    ctx.arc(0, 0, 20, 0, Math.PI*2); ctx.moveTo(-25, 10); ctx.lineTo(0, -35); ctx.lineTo(25, 10);
                    break;
                default:
                    ctx.moveTo(0, -20); ctx.lineTo(15, 15); ctx.lineTo(-15, 15);
            }
            ctx.closePath(); ctx.fill();
            ctx.restore();
        }

        function update() {
            frame++;
            if(isDown && frame % 6 === 0) {
                if(userData.weapon === 'WIDE') {
                    bullets.push({x: player.x, y: player.y, vx: -3, vy: -12});
                    bullets.push({x: player.x, y: player.y, vx: 0, vy: -15});
                    bullets.push({x: player.x, y: player.y, vx: 3, vy: -12});
                } else {
                    bullets.push({x: player.x, y: player.y, vx: 0, vy: -15});
                }
            }

            if(frame % 40 === 0) {
                enemies.push({ x: Math.random()*canvas.width, y: -50, hp: 10 * currentMode.diff, size: 30, vy: 3 });
            }

            if(score >= currentMode.score1 && !enemies.some(e => e.isBoss)) {
                enemies.push({ x: canvas.width/2, y: -100, hp: currentMode.bossHp, size: 100, vy: 1, isBoss: true });
            }

            bullets.forEach((b, i) => {
                b.x += b.vx; b.y += b.vy;
                enemies.forEach((e, ei) => {
                    if(Math.hypot(b.x-e.x, b.y-e.y) < e.size) {
                        e.hp -= userData.atk; bullets.splice(i, 1);
                        if(e.hp <= 0) {
                            userData.gold += e.isBoss ? 5000 : 20;
                            if(e.isBoss) {
                                if(!userData.cleared.includes(currentMode.id)) userData.cleared.push(currentMode.id);
                                save(); alert("MISSION CLEAR!"); location.reload();
                            }
                            enemies.splice(ei, 1);
                            score += 100;
                        }
                    }
                });
            });

            enemies.forEach(e => {
                e.y += e.vy; if(e.isBoss && e.y > 150) e.vy = 0;
                if(Math.random() < 0.05 * currentMode.diff) eBullets.push({x: e.x, y: e.y, vy: 5});
            });

            eBullets.forEach((eb, i) => {
                eb.y += eb.vy;
                if(Math.hypot(eb.x-player.x, eb.y-player.y) < 15) {
                    hp -= 10; eBullets.splice(i, 1);
                    if(hp <= 0) { alert("GAME OVER"); location.reload(); }
                }
            });

            document.getElementById('hp-fill').style.width = hp + "%";
            document.getElementById('gold-val').innerText = `GOLD: ${userData.gold}`;
            document.getElementById('score-val').innerText = `SCORE: ${score.toString().padStart(6, '0')}`;
        }

        function draw() {
            ctx.fillStyle = "rgba(0,0,20,0.3)"; ctx.fillRect(0,0,canvas.width, canvas.height);
            drawPlayer();
            ctx.fillStyle = "#0ff"; bullets.forEach(b => ctx.fillRect(b.x-2, b.y, 4, 10));
            ctx.fillStyle = "#f00"; eBullets.forEach(eb => ctx.beginPath() || ctx.arc(eb.x, eb.y, 5, 0, 7) || ctx.fill());
            enemies.forEach(e => {
                ctx.strokeStyle = currentMode.color; ctx.lineWidth = 3;
                ctx.strokeRect(e.x-e.size/2, e.y-e.size/2, e.size, e.size);
            });
        }

        function loop() { if(!gameActive) return; update(); draw(); requestAnimationFrame(loop); }

        window.onmousemove = e => { player.x = e.clientX; player.y = e.clientY; };
        window.onmousedown = () => isDown = true;
        window.onmouseup = () => isDown = false;

    </script>
</body>
</html>
