<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Minami Project 2026: STーKY Style</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+JP:wght@700&display=swap');
        body { margin: 0; background: #000810; color: #e0e0e0; font-family: 'Press Start 2P', cursive; overflow: hidden; }
        canvas { display: block; }
        #hud { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; }
        .hud-label { font-size: 8px; color: #507080; margin-bottom: 5px; }
        #score-val { font-size: 24px; color: #fff; margin-bottom: 15px; }
        #hp-bar { width: 200px; height: 8px; background: #1a2026; border: 1px solid #334; }
        #hp-fill { height: 100%; background: #40a0ff; width: 100%; }
        #menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,8,16,0.98); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 20; }
        .mode-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .mode-btn { width: 180px; padding: 15px; border: 1px solid #334; background: #0a1018; cursor: pointer; text-align: center; position: relative; }
        .m-stars { color: #ccaa00; font-size: 8px; }
        /* 路線カラー指定 */
        .SB { border-top: 4px solid #ccaa00; } 
        .KT { border-top: 4px solid #0088cc; } 
        .SK { border-top: 4px solid #008844; } 
        .KY { border-top: 4px solid #aa0022; } 
        .PK { border-top: 4px solid #cc5588; }
        .JB { border-top: 4px solid #006666; }
        .CO { grid-column: span 3; border: 2px solid #cc6600; color: #cc6600; display: none; } 
        .copy-right { margin-top: 40px; font-size: 8px; color: #334; }
    </style>
</head>
<body>
    <div id="hud">
        <div class="hud-label">SCORE</div><div id="score-val">000000</div>
        <div class="hud-label">LIFE</div><div id="hp-bar"><div id="hp-fill"></div></div>
    </div>
    <div id="menu">
        <h1 style="font-size:18px; margin-bottom:20px;">MINAMI PROJECT 2026</h1>
        <div class="mode-grid" id="grid">
            <div id="btn-SB" class="mode-btn SB" onclick="start('SB')">STーSB<br><span class="m-stars">★☆☆☆☆</span></div>
            <div id="btn-KT" class="mode-btn KT" onclick="start('KT')">STーKT<br><span class="m-stars">★☆☆☆☆</span></div>
            <div id="btn-SK" class="mode-btn SK" onclick="start('SK')">STーSK<br><span class="m-stars">★★☆☆☆</span></div>
            <div id="btn-KY" class="mode-btn KY" onclick="start('KY')">STーKY<br><span class="m-stars">★★★☆☆</span></div>
            <div id="btn-PK" class="mode-btn PK" onclick="start('PK')">STーPK<br><span class="m-stars">★★★☆☆</span></div>
            <div id="btn-JB" class="mode-btn JB" onclick="start('JB')">STーJB<br><span class="m-stars">★★★★☆</span></div>
            <div id="btn-HA" class="mode-btn" style="display:none" onclick="start('HA')">STーHA<br><span class="m-stars">★★★★★</span></div>
            <div id="btn-HB" class="mode-btn" style="display:none" onclick="start('HB')">STーHB<br><span class="m-stars">★★★★★★</span></div>
            <div id="btn-HC" class="mode-btn" style="display:none" onclick="start('HC')">STーHC<br><span class="m-stars">★★★★★★★</span></div>
            <div id="btn-CO" class="mode-btn CO" onclick="start('CO')">ULTIMATE: STーCO<br><span class="m-stars">★★★★★★★★★★</span></div>
        </div>
        <div class="copy-right">© minami ALL RIGHT RECEIVED (Minami Project 2026)</div>
    </div>
    <canvas id="game"></canvas>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;

        let gameActive = false, score = 0, hp = 100, frame = 0;
        let bullets = [], eBullets = [], enemies = [], ripples = [];
        let player = { x: canvas.width/2, y: canvas.height/2 };
        let currentMode = null;

        const config = {
            SB: { type: 'stop', color: '#ccaa00', spawn: 0.05, hp: 1, target: 3000 },
            KT: { type: 'fast', color: '#0088cc', spawn: 0.1, hp: 2, target: 5000 },
            SK: { type: 'shield', color: '#008844', spawn: 0.08, hp: 4, target: 7000 },
            KY: { type: 'wind', color: '#aa0022', spawn: 0.12, hp: 3, target: 8000 },
            PK: { type: 'normal', color: '#cc5588', spawn: 0.12, hp: 3, target: 8000 },
            JB: { type: 'normal', color: '#006666', spawn: 0.15, hp: 5, target: 10000 },
            HA: { type: 'mix', color: '#fff', spawn: 0.2, hp: 10, target: 20000 },
            HB: { type: 'mix', color: '#fff', spawn: 0.25, hp: 15, target: 25000 },
            HC: { type: 'mix', color: '#fff', spawn: 0.3, hp: 20, target: 30000 },
            CO: { type: 'rush', color: '#cc6600', spawn: 0.8, hp: 50, target: 150000 }
        };

        function init() {
            const cl = JSON.parse(localStorage.getItem('minami_cleared') || '[]');
            cl.forEach(id => { if(document.getElementById(`btn-${id}`)) document.getElementById(`btn-${id}`).style.background = '#1a2a3a'; });
            if(['SB','KT','SK','KY','PK','JB'].every(s => cl.includes(s))) {
                ['btn-HA','btn-HB','btn-HC'].forEach(id => document.getElementById(id).style.display = 'block');
            }
            if(['SB','KT','SK','KY','PK','JB','HA','HB','HC'].every(s => cl.includes(s))) {
                document.getElementById('btn-CO').style.display = 'block';
            }
        }

        function start(id) {
            currentMode = { ...config[id], id: id };
            score = 0; hp = 100; frame = 0; enemies = []; bullets = []; eBullets = [];
            document.getElementById('menu').style.display = 'none';
            gameActive = true; loop();
        }

        window.addEventListener('mousemove', e => { player.x = e.clientX; player.y = e.clientY; });
        let isDown = false; window.addEventListener('mousedown', () => isDown = true); window.addEventListener('mouseup', () => isDown = false);

        function update() {
            frame++;
            if(isDown && frame % 4 === 0) bullets.push({x: player.x, y: player.y-10, vy: -15});
            bullets.forEach((b, i) => { b.y += b.vy; if(b.y < -20) bullets.splice(i, 1); });

            if(Math.random() < currentMode.spawn) {
                enemies.push({ x: Math.random()*canvas.width, y: -30, hp: currentMode.hp, vx: (Math.random()-0.5)*4 });
            }

            enemies.forEach((e, i) => {
                if(currentMode.type === 'stop') { if(frame % 60 < 30) e.y += 6; else if(frame % 60 === 30) eBullets.push({x: e.x, y: e.y, vy: 8, vx: 0}); }
                else if(currentMode.type === 'fast') { e.y += 2; e.x += e.vx * 3; if(e.x < 0 || e.x > canvas.width) e.vx *= -1; if(frame % 20 === 0) eBullets.push({x: e.x, y: e.y, vy: 5, vx: 0}); }
                else if(currentMode.type === 'wind') { e.y += 3; if(frame % 40 === 0) eBullets.push({x: e.x, y: e.y, vy: 4, vx: Math.sin(frame/10)*4, special: 'sway'}); }
                else if(currentMode.type === 'rush') { e.y += (Math.sin(frame/20)+1.5) * 4; if(frame % 15 === 0) eBullets.push({x: e.x, y: e.y, vy: 6, vx: (Math.random()-0.5)*6}); }
                else { e.y += 4; if(Math.random() < 0.02) eBullets.push({x: e.x, y: e.y, vy: 6, vx: 0}); }

                bullets.forEach((b, bi) => {
                    if(Math.hypot(e.x-b.x, e.y-b.y) < 25) { e.hp--; bullets.splice(bi, 1); if(e.hp <= 0) { score += 100; enemies.splice(i, 1); if(score >= currentMode.target) finish(true); } }
                });
                if(e.y > canvas.height + 30) enemies.splice(i, 1);
            });

            eBullets.forEach((eb, i) => {
                eb.y += eb.vy; eb.x += eb.vx;
                if(eb.special === 'sway') eb.vx = Math.sin(eb.y/50)*5;
                if(Math.hypot(eb.x-player.x, eb.y-player.y) < 12) { hp -= 10; eBullets.splice(i,1); ripples.push({x: player.x, y: player.y, r: 5, a: 1}); if(hp <= 0) finish(false); }
                if(eb.y > canvas.height) eBullets.splice(i, 1);
            });

            ripples.forEach((r, i) => { r.r += 2; r.a -= 0.05; if(r.a <= 0) ripples.splice(i, 1); });
            document.getElementById('hp-fill').style.width = hp + "%";
            document.getElementById('score-val').innerText = score.toString().padStart(6, '0');
        }

        function draw() {
            ctx.fillStyle = "#000810"; ctx.fillRect(0,0,canvas.width, canvas.height);
            // 自機：雨粒
            ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.moveTo(player.x, player.y-12);
            ctx.bezierCurveTo(player.x+8, player.y+4, player.x+8, player.y+12, player.x, player.y+12);
            ctx.bezierCurveTo(player.x-8, player.y+12, player.x-8, player.y+4, player.x, player.y-12); ctx.fill();
            ripples.forEach(r => { ctx.strokeStyle = `rgba(64,160,255,${r.a})`; ctx.beginPath(); ctx.arc(r.x, r.y, r.r, 0, Math.PI*2); ctx.stroke(); });
            ctx.fillStyle = "#fff"; bullets.forEach(b => ctx.fillRect(b.x-2, b.y, 4, 10));
            ctx.fillStyle = "#ff44aa"; eBullets.forEach(eb => { ctx.beginPath(); ctx.arc(eb.x, eb.y, 5, 0, Math.PI*2); ctx.fill(); });
            ctx.strokeStyle = currentMode.color; ctx.lineWidth = 3;
            enemies.forEach(e => { ctx.strokeRect(e.x-15, e.y-15, 30, 30); if(currentMode.type === 'shield') { ctx.beginPath(); ctx.arc(e.x, e.y, 25, 0, Math.PI*2); ctx.stroke(); } });
        }

        function finish(isClear) {
            gameActive = false;
            if(isClear) {
                let cl = JSON.parse(localStorage.getItem('minami_cleared') || '[]');
                cl.push(currentMode.id);
                localStorage.setItem('minami_cleared', JSON.stringify([...new Set(cl)]));
                alert("MISSION COMPLETE");
            } else { alert("GAME OVER"); }
            location.reload();
        }

        function loop() { if(!gameActive) return; update(); draw(); requestAnimationFrame(loop); }
        init();
    </script>
</body>
</html>
