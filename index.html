<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Minami Project 2026: Official 10-Stage</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { margin: 0; background: #000; color: #fff; font-family: 'Press Start 2P', cursive; overflow: hidden; }
        canvas { display: block; }

        /* HUD: スコアとHP表示 */
        #hud { position: absolute; top: 10px; left: 10px; z-index: 10; pointer-events: none; }
        .stat-label { font-size: 10px; color: #00dfff; margin-bottom: 5px; }
        #score-val { font-size: 20px; margin-bottom: 15px; }
        #hp-bar { width: 200px; height: 12px; border: 2px solid #fff; background: #333; position: relative; }
        #hp-fill { height: 100%; background: #00ff00; width: 100%; transition: width 0.2s; }

        /* メニュー画面 */
        #menu { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 20; 
        }
        .mode-list { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; max-width: 700px; }
        .mode-btn { 
            padding: 15px; border: 2px solid #fff; cursor: pointer; text-align: center; font-size: 9px; 
            transition: 0.3s; position: relative; min-width: 150px;
        }
        .mode-btn:hover:not(.locked) { background: #fff; color: #000; }
        .locked { opacity: 0.2; cursor: not-allowed; border-color: #444; color: #444; }
        
        /* 指定色クラス */
        .sobu { border-color: #ffd400; color: #ffd400; }
        .keihin { border-color: #00b2e5; color: #00b2e5; }
        .saikyo { border-color: #00a651; color: #00a651; }
        .keiyo { border-color: #da0442; color: #da0442; }
        .pink { border-color: #ff69b4; color: #ff69b4; }
        .joban { border-color: #008080; color: #008080; }
        
        .hidden-mode { border-color: #fff; color: #fff; display: none; }
        .chuo-oni { border-color: #f39700; color: #f39700; grid-column: span 3; display: none; font-size: 12px; }
        
        .clear-mark { position: absolute; top: -10px; right: -5px; font-size: 12px; color: #00ff00; }
        .copy-right { margin-top: 40px; font-size: 8px; color: #555; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div id="hud">
        <div class="stat-label">SCORE</div><div id="score-val">000000</div>
        <div class="stat-label">LIFE GAUGE</div><div id="hp-bar"><div id="hp-fill"></div></div>
    </div>

    <div id="menu">
        <h1 style="font-size: 22px; margin-bottom: 25px; letter-spacing: 5px;">STATION SELECT</h1>
        <div class="mode-list">
            <div id="btn-st1" class="mode-btn sobu" onclick="start('st1')">SOBU</div>
            <div id="btn-st2" class="mode-btn keihin" onclick="start('st2')">KEIHIN</div>
            <div id="btn-st3" class="mode-btn saikyo" onclick="start('st3')">SAIKYO</div>
            <div id="btn-st4" class="mode-btn keiyo" onclick="start('st4')">KEIYO</div>
            <div id="btn-st5" class="mode-btn pink" onclick="start('st5')">PINK</div>
            <div id="btn-st6" class="mode-btn joban" onclick="start('st6')">JOBAN</div>
            
            <div id="btn-h1" class="mode-btn hidden-mode" onclick="start('h1')">HIDDEN A</div>
            <div id="btn-h2" class="mode-btn hidden-mode" onclick="start('h2')">HIDDEN B</div>
            <div id="btn-h3" class="mode-btn hidden-mode" onclick="start('h3')">HIDDEN C</div>

            <div id="btn-chuo" class="mode-btn chuo-oni" onclick="start('chuo')">ULTIMATE: CHUO (ORANGE)</div>
        </div>
        <div class="copy-right">©︎minami ALL RIGHT RECEIVED / Minami Project 2026</div>
    </div>

    <canvas id="game"></canvas>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;

        let gameActive = false, score = 0, hp = 100, frame = 0;
        let bullets = [], eBullets = [], enemies = [];
        let currentMode = null;
        let player = { x: canvas.width/2, y: canvas.height/2 };

        const config = {
            st1: { color: '#ffd400', spawn: 0.08, hp: 1, target: 2000 },
            st2: { color: '#00b2e5', spawn: 0.1, hp: 2, target: 3000 },
            st3: { color: '#00a651', spawn: 0.12, hp: 3, target: 4000 },
            st4: { color: '#da0442', spawn: 0.15, hp: 4, target: 5000 },
            st5: { color: '#ff69b4', spawn: 0.15, hp: 4, target: 5000 },
            st6: { color: '#008080', spawn: 0.18, hp: 5, target: 6000 },
            h1: { color: '#ffffff', spawn: 0.3, hp: 12, target: 12000 },
            h2: { color: '#ffffff', spawn: 0.4, hp: 15, target: 15000 },
            h3: { color: '#ffffff', spawn: 0.5, hp: 20, target: 20000 },
            chuo: { color: '#f39700', spawn: 1.2, hp: 150, target: 200000 } // 超鬼
        };

        function init() {
            const cleared = JSON.parse(localStorage.getItem('minami_cleared') || '[]');
            cleared.forEach(id => {
                const btn = document.getElementById(`btn-${id}`);
                if(btn) btn.innerHTML += '<span class="clear-mark">CLEAR</span>';
            });

            // 隠し3ステージ解禁 (初期6つクリア)
            const initialSet = ['st1','st2','st3','st4','st5','st6'];
            if(initialSet.every(s => cleared.includes(s))) {
                ['h1','h2','h3'].forEach(id => document.getElementById(`btn-${id}`).style.display = 'block');
            }

            // 超鬼解禁 (全9ステージクリア)
            if([...initialSet, 'h1','h2','h3'].every(s => cleared.includes(s))) {
                document.getElementById('btn-chuo').style.display = 'block';
            }
        }

        function start(id) {
            currentMode = { ...config[id], id: id };
            score = 0; hp = 100; frame = 0; bullets = []; eBullets = []; enemies = [];
            document.getElementById('menu').style.display = 'none';
            gameActive = true;
            loop();
        }

        window.addEventListener('mousemove', e => { player.x = e.clientX; player.y = e.clientY; });
        let isDown = false; window.addEventListener('mousedown', () => isDown = true); window.addEventListener('mouseup', () => isDown = false);

        function update() {
            frame++;
            if(isDown && frame % 5 === 0) bullets.push({x: player.x, y: player.y-10, vy: -15});
            
            for(let i=bullets.length-1; i>=0; i--) {
                bullets[i].y += bullets[i].vy;
                if(bullets[i].y < 0) bullets.splice(i,1);
            }

            if(Math.random() < currentMode.spawn) enemies.push({x: Math.random()*canvas.width, y: -20, hp: currentMode.hp});

            for(let i=enemies.length-1; i>=0; i--) {
                let e = enemies[i]; e.y += 4;
                if(Math.random() < 0.03) eBullets.push({x: e.x, y: e.y, vy: 6});
                bullets.forEach((b, bi) => {
                    if(Math.hypot(e.x-b.x, e.y-b.y) < 20) {
                        e.hp--; bullets.splice(bi, 1);
                        if(e.hp <= 0) { score += 100; enemies.splice(i,1); if(score >= currentMode.target) finish(true); }
                    }
                });
                if(e.y > canvas.height) enemies.splice(i,1);
            }

            for(let i=eBullets.length-1; i>=0; i--) {
                let eb = eBullets[i]; eb.y += eb.vy;
                if(Math.hypot(eb.x-player.x, eb.y-player.y) < 12) { hp -= 10; eBullets.splice(i,1); if(hp <= 0) finish(false); }
                else if(eb.y > canvas.height) eBullets.splice(i,1);
            }

            document.getElementById('hp-fill').style.width = hp + "%";
            document.getElementById('score-val').innerText = score.toString().padStart(6, '0');
        }

        function draw() {
            ctx.fillStyle = "rgba(0,0,0,0.3)"; ctx.fillRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(player.x, player.y, 10, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#00dfff"; bullets.forEach(b => ctx.fillRect(b.x-2, b.y, 4, 12));
            ctx.fillStyle = "#ff00ff"; eBullets.forEach(eb => { ctx.beginPath(); ctx.arc(eb.x, eb.y, 5, 0, Math.PI*2); ctx.fill(); });
            ctx.strokeStyle = currentMode.color; ctx.lineWidth = 3;
            enemies.forEach(e => ctx.strokeRect(e.x-15, e.y-15, 30, 30));
        }

        function finish(isClear) {
            gameActive = false;
            if(isClear) {
                let cleared = JSON.parse(localStorage.getItem('minami_cleared') || '[]');
                cleared.push(currentMode.id);
                localStorage.setItem('minami_cleared', JSON.stringify([...new Set(cleared)]));
                alert("MISSION COMPLETE!");
            } else { alert("GAME OVER"); }
            location.reload();
        }

        function loop() { if(!gameActive) return; update(); draw(); requestAnimationFrame(loop); }
        init();
    </script>
</body>
</html>
