<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Minami Project 2026</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+JP:wght@400;700&display=swap');
        body { margin: 0; background: #000810; color: #fff; font-family: 'Noto Sans JP', sans-serif; overflow: hidden; }
        canvas { display: block; }

        /* UI Layers */
        .layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,5,10,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 20; backdrop-filter: blur(10px); }
        .hidden { display: none !important; }

        /* ハイライト付きボタン */
        .mode-btn { 
            width: 220px; padding: 15px; margin: 10px; background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.3s; text-align: center;
        }
        .mode-btn:hover { background: rgba(255,255,255,0.2); border-color: #fff; transform: scale(1.05); box-shadow: 0 0 15px #fff; }

        /* 路線カラー */
        .SB { border-left: 8px solid #f1ca00; } .KT { border-left: 8px solid #00a4e4; }
        .SK { border-left: 8px solid #00ac4a; } .KY { border-left: 8px solid #e50012; }
        .CO { border: 2px solid #f39700; color: #f39700; }

        /* HUD */
        #hud { position: absolute; top: 20px; left: 20px; z-index: 10; display: none; }
        .bar { width: 200px; height: 8px; background: rgba(255,255,255,0.2); margin: 5px 0; }
        #hp-fill { height: 100%; background: #fff; width: 100%; transition: 0.1s; }
    </style>
</head>
<body>

<div id="hud">
    <div style="font-family:'Press Start 2P'; font-size:12px;">HP</div>
    <div class="bar"><div id="hp-fill"></div></div>
    <div id="score-text">SCORE: 0</div>
    <div id="coin-text" style="color:#f1ca00;">COINS: 0</div>
</div>

<div id="layer-home" class="layer">
    <h1 style="font-family:'Press Start 2P';">MINAMI PROJECT 2026</h1>
    <div class="mode-btn" onclick="showLayer('layer-stage')">STAGE SELECT (全15区間)</div>
    <div class="mode-btn" onclick="showLayer('layer-shop')">SHOP (装備強化)</div>
</div>

<div id="layer-stage" class="layer hidden">
    <h2 style="font-family:'Press Start 2P';">SELECT SECTOR</h2>
    <div id="stage-list" style="display:grid; grid-template-columns: repeat(4, 1fr); gap:10px; max-height:70vh; overflow-y:auto; padding:20px;"></div>
    <div class="mode-btn" onclick="showLayer('layer-home')">BACK</div>
</div>

<div id="layer-shop" class="layer hidden">
    <h2 style="font-family:'Press Start 2P';">SHOP</h2>
    <div id="coin-shop-display" style="color:#f1ca00; margin-bottom:20px;"></div>
    <div class="mode-btn" onclick="buyItem('atk')">攻撃力アップ (500C)</div>
    <div class="mode-btn" onclick="buyItem('hp')">最大HPアップ (500C)</div>
    <div class="mode-btn" onclick="showLayer('layer-home')">BACK</div>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth; canvas.height = window.innerHeight;

let state = { score: 0, hp: 100, maxHp: 100, coins: 0, atk: 1, cleared: [] };
let gameActive = false, phase = 'mob'; // mob -> mid -> boss
let player = { x: 0, y: 0 }, bullets = [], enemies = [], eBullets = [], frame = 0;
let currentStage = null, enemyCount = 0;

// セーブデータ復元
const saved = localStorage.getItem('minami_v3');
if(saved) Object.assign(state, JSON.parse(saved));

function showLayer(id) {
    document.querySelectorAll('.layer').forEach(l => l.classList.add('hidden'));
    if(id) document.getElementById(id).classList.remove('hidden');
    if(id === 'layer-stage') renderStages();
    if(id === 'layer-shop') document.getElementById('coin-shop-display').innerText = `所持コイン: ${state.coins}`;
}

function renderStages() {
    const list = document.getElementById('stage-list');
    list.innerHTML = '';
    const routes = [
        {id:'SB', name:'総武', class:'SB'}, {id:'KT', name:'京浜', class:'KT'},
        {id:'SK', name:'埼京', class:'SK'}, {id:'KY', name:'京葉', class:'KY'}
    ];
    // 各路線3ステージ = 12ステージ + 中央線3ステージ
    routes.forEach(r => {
        for(let i=1; i<=3; i++){
            const sid = `ST=${r.id}-0${i}`;
            const btn = document.createElement('div');
            btn.className = `mode-btn ${r.class}`;
            btn.innerHTML = `<small>${sid}</small><br>${r.name} 0${i}`;
            btn.onclick = () => startGame(sid, r.class);
            list.appendChild(btn);
        }
    });
    // 中央線解放条件
    if(state.cleared.length >= 12) {
        for(let i=1; i<=3; i++){
            const sid = `ST=CO-0${i}`;
            const btn = document.createElement('div'); btn.className = 'mode-btn CO';
            btn.innerHTML = `<small>${sid}</small><br>中央 0${i}`;
            btn.onclick = () => startGame(sid, 'CO');
            list.appendChild(btn);
        }
    }
}

function buyItem(type) {
    if(state.coins >= 500) {
        state.coins -= 500;
        if(type === 'atk') state.atk += 0.5;
        if(type === 'hp') state.maxHp += 20;
        localStorage.setItem('minami_v3', JSON.stringify(state));
        showLayer('layer-shop');
        alert("強化完了！");
    } else { alert("コインが足りません"); }
}

function startGame(id, type) {
    currentStage = {id, type};
    gameActive = true; phase = 'mob'; enemyCount = 0; frame = 0;
    state.hp = state.maxHp; bullets = []; enemies = []; eBullets = [];
    showLayer(null);
    document.getElementById('hud').style.display = 'block';
    loop();
}

window.addEventListener('mousemove', e => { player.x = e.clientX; player.y = e.clientY; });
window.addEventListener('mousedown', () => { if(gameActive) bullets.push({x: player.x, y: player.y-20, p: true}); });

function loop() {
    if(!gameActive) return;
    frame++;
    ctx.fillStyle = 'rgba(0,10,20,0.3)'; ctx.fillRect(0,0,canvas.width,canvas.height);

    // フェーズ管理
    if(phase === 'mob' && frame % 60 === 0) {
        enemies.push({x: Math.random()*canvas.width, y: -50, hp: 2, type: 'mob'});
        enemyCount++;
        if(enemyCount > 10) phase = 'mid';
    } else if(phase === 'mid' && enemies.length === 0) {
        enemies.push({x: canvas.width/2, y: -100, hp: 50, type: 'mid'});
        phase = 'mid_fighting';
    } else if(phase === 'mid_fighting' && enemies.length === 0) {
        phase = 'boss';
        enemies.push({x: canvas.width/2, y: -150, hp: 200, type: 'boss'});
    }

    // プレイヤー(雫)
    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(player.x, player.y, 10, 0, Math.PI*2); ctx.fill();

    // 弾丸
    bullets.forEach((b, i) => {
        b.y -= 10;
        ctx.fillStyle = '#0ff'; ctx.fillRect(b.x-2, b.y, 4, 10);
        enemies.forEach(e => {
            if(Math.hypot(b.x-e.x, b.y-e.y) < 30) {
                e.hp -= state.atk; bullets.splice(i, 1);
            }
        });
    });

    // 敵
    enemies.forEach((e, i) => {
        if(e.type === 'mob') e.y += 3;
        else { 
            if(e.y < 150) e.y += 1;
            e.x += Math.sin(frame/30)*5;
            if(frame % 40 === 0) eBullets.push({x: e.x, y: e.y, vx: (player.x-e.x)/50, vy: 5});
        }
        ctx.strokeStyle = '#fff'; ctx.strokeRect(e.x-20, e.y-20, 40, 40);
        if(e.hp <= 0) {
            if(e.type === 'boss') { gameActive = false; win(); }
            enemies.splice(i, 1); state.score += 100; state.coins += 10;
        }
    });

    // 敵弾
    eBullets.forEach((eb, i) => {
        eb.x += eb.vx; eb.y += eb.vy;
        ctx.fillStyle = '#f00'; ctx.beginPath(); ctx.arc(eb.x, eb.y, 5, 0, Math.PI*2); ctx.fill();
        if(Math.hypot(eb.x-player.x, eb.y-player.y) < 15) {
            state.hp -= 10; eBullets.splice(i, 1);
            if(state.hp <= 0) { gameActive = false; alert("GAME OVER"); location.reload(); }
        }
    });

    document.getElementById('hp-fill').style.width = (state.hp/state.maxHp*100) + "%";
    document.getElementById('score-text').innerText = `SCORE: ${state.score}`;
    document.getElementById('coin-text').innerText = `COINS: ${state.coins}`;
    requestAnimationFrame(loop);
}

function win() {
    alert("STAGE CLEAR!");
    if(!state.cleared.includes(currentStage.id)) state.cleared.push(currentStage.id);
    localStorage.setItem('minami_v3', JSON.stringify(state));
    location.reload();
}
</script>
</body>
</html>
