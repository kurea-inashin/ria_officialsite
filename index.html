<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>MINAMI PROJECT 2026</title>
    <style>
        /* デザイン再現：黒背景とネオンカラーのUI */
        body { background-color: #000; color: #fff; font-family: 'Courier New', monospace; margin: 0; text-align: center; }
        .container { width: 950px; margin: 0 auto; padding: 20px; }
        h1 { font-size: 32px; letter-spacing: 8px; margin: 40px 0; }
        
        /* ステージカード（画像3枚目のスタイル） */
        .stage-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 50px; }
        .stage-card { border: 2px solid #444; padding: 25px; cursor: pointer; position: relative; background: rgba(255,255,255,0.03); transition: 0.2s; }
        .stage-card:hover { background: rgba(255,255,255,0.1); }
        .complete-badge { background: #00a4e4; color: #fff; font-size: 10px; padding: 2px 6px; position: absolute; bottom: 8px; right: 8px; }

        /* ショップカード（画像1枚目のスタイル） */
        .shop-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .item-card { border: 1px solid #666; padding: 15px; cursor: pointer; background: #111; }
        .item-card.equipped { border: 2px solid #00ac4a; background: rgba(0, 172, 74, 0.15); }

        /* 路線別カラー設定 */
        .sobu { border-color: #f1ca00; color: #f1ca00; }
        .keihin { border-color: #00a4e4; color: #00a4e4; }
        .saikyo { border-color: #00ac4a; color: #00ac4a; }
        .keiyo { border-color: #e50012; color: #e50012; }
        .chuo { border-color: #f39700; color: #f39700; box-shadow: 0 0 10px #f39700; }

        /* ゲーム画面とUI */
        canvas { background: #000; border: 1px solid #333; display: none; margin: 20px auto; cursor: none; }
        #hud { display: none; justify-content: space-around; font-size: 18px; margin-top: 10px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="main-menu">
    <h1>MINAMI PROJECT 2026</h1>
    <p>COINS: <span id="coin-val">0</span></p>

    <div class="container">
        <h2>SELECT STAGE</h2>
        <div id="stage-list" class="stage-grid"></div>

        <h2>SHOP & SKINS</h2>
        <div id="skin-list" class="shop-grid"></div>

        <h2>EQUIPMENT</h2>
        <div class="shop-grid">
            <div class="item-card" onclick="buyItem('heal', 30)">回復リペア (30C)</div>
            <div class="item-card" onclick="buyItem('atk', 100)">攻撃力UP (100C)</div>
        </div>
    </div>
</div>

<div id="hud">
    <span>HP: <span id="hp-val">100</span></span>
    <span>BOSS HP: <span id="boss-hp">0</span></span>
    <span>SCORE: <span id="score-val">0</span></span>
</div>
<canvas id="gameCanvas" width="800" height="600"></canvas>

<script>
    // --- 1. データと保存機能 ---
    let saveData = JSON.parse(localStorage.getItem('minami_save_v2')) || {
        coins: 0,
        cleared: [],
        currentSkin: '雫(Default)',
        ownedSkins: ['雫(Default)'],
        atk: 1
    };

    function save() {
        localStorage.setItem('minami_save_v2', JSON.stringify(saveData));
        updateUI();
    }

    // --- 2. ステージ・スキン定義 ---
    const STAGES = [
        { id: "ST=SB", color: "#f1ca00", class: "sobu" },
        { id: "ST=KT", color: "#00a4e4", class: "keihin" },
        { id: "ST=SK", color: "#00ac4a", class: "saikyo" },
        { id: "ST=KY", color: "#e50012", class: "keiyo" },
        { id: "ST=PK", color: "#ff69b4", class: "keiyo" },
        { id: "ST=JB", color: "#008080", class: "keihin" },
        { id: "ST=HM", color: "#9370db", class: "saikyo" },
        { id: "ST=KS", color: "#ffffff", class: "sobu" },
        { id: "ST=TY", color: "#00bfff", class: "keihin" },
        { id: "EX-FRONT", color: "#e50012", class: "keiyo", extra: true },
        { id: "EX-BACK", color: "#e50012", class: "keiyo", extra: true },
        { id: "TRUE-FINAL", color: "#f39700", class: "chuo", extra: true }
    ];

    const SKINS = [
        { name: "雫(Default)", price: 0 },
        { name: "星(KiraKira)", price: 500 },
        { name: "円(Shield)", price: 800 },
        { name: "電車(Express)", price: 3000 }
    ];

    // --- 3. メニュー描画 ---
    function updateUI() {
        document.getElementById('coin-val').innerText = saveData.coins;

        // ステージ生成
        const stageList = document.getElementById('stage-list');
        stageList.innerHTML = '';
        const normalCleared = STAGES.filter(s => !s.extra).every(s => saveData.cleared.includes(s.id));
        const exCleared = saveData.cleared.includes("EX-FRONT") && saveData.cleared.includes("EX-BACK");

        STAGES.forEach(s => {
            let locked = false;
            if (s.extra && !normalCleared) locked = true;
            if (s.id === "TRUE-FINAL" && !exCleared) locked = true;

            if (!locked) {
                const card = document.createElement('div');
                card.className = `stage-card ${s.class}`;
                card.innerHTML = `<strong>${s.id}</strong>`;
                if (saveData.cleared.includes(s.id)) card.innerHTML += `<div class="complete-badge">COMPLETE</div>`;
                card.onclick = () => initGame(s);
                stageList.appendChild(card);
            }
        });

        // スキン生成
        const skinList = document.getElementById('skin-list');
        skinList.innerHTML = '';
        SKINS.forEach(s => {
            const owned = saveData.ownedSkins.includes(s.name);
            const card = document.createElement('div');
            card.className = `item-card ${saveData.currentSkin === s.name ? 'equipped' : ''}`;
            card.innerHTML = `${s.name}<br>${owned ? 'EQUIPPED' : s.price + ' C'}`;
            card.onclick = () => {
                if (owned) { saveData.currentSkin = s.name; save(); }
                else if (saveData.coins >= s.price) { saveData.coins -= s.price; saveData.ownedSkins.push(s.name); save(); }
            };
            skinList.appendChild(card);
        });
    }

    function buyItem(type, price) {
        if (saveData.coins >= price) {
            saveData.coins -= price;
            if (type === 'atk') saveData.atk += 1;
            alert(type === 'atk' ? "攻撃力が上がりました！" : "HPを回復しました！");
            save();
        } else {
            alert("コインが足りません！");
        }
    }

    // --- 4. ゲームエンジン (3フェーズ・ボス戦) ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let gActive = false, player = { x: 400, y: 550, hp: 100 }, boss = { x: 400, y: -100, hp: 0, max: 0, phase: 1 }, bullets = [], enemies = [], currentStage = null;

    function initGame(stage) {
        currentStage = stage;
        gActive = true;
        player.hp = 100;
        bullets = []; enemies = [];
        boss.hp = stage.id === "TRUE-FINAL" ? 5000 : 1000;
        boss.max = boss.hp;
        boss.y = -100;
        boss.phase = 1;
        document.getElementById('main-menu').style.display = 'none';
        document.getElementById('hud').style.display = 'flex';
        canvas.style.display = 'block';
        requestAnimationFrame(loop);
    }

    window.addEventListener('mousemove', e => {
        const rect = canvas.getBoundingClientRect();
        player.x = e.clientX - rect.left;
        player.y = e.clientY - rect.top;
    });

    canvas.addEventListener('mousedown', () => { if(gActive) bullets.push({x: player.x, y: player.y - 15}); });

    function loop() {
        if (!gActive) return;
        ctx.fillStyle = "#000"; ctx.fillRect(0, 0, 800, 600);

        // ボス移動とフェーズ管理
        if (boss.y < 120) boss.y += 2;
        const hpRate = boss.hp / boss.max;
        if (hpRate < 0.7) boss.phase = 2;
        if (hpRate < 0.3) boss.phase = 3;

        ctx.fillStyle = currentStage.color; ctx.fillRect(boss.x - 60, boss.y - 30, 120, 60);

        // ボス攻撃
        if (Date.now() % (boss.phase === 3 ? 300 : 600) < 20) {
            enemies.push({x: boss.x, y: boss.y, vx: (Math.random()-0.5)*10, vy: 5});
            if(boss.phase >= 2) enemies.push({x: boss.x, y: boss.y, vx: (Math.random()-0.5)*15, vy: 3});
        }

        // プレイヤーショット
        bullets.forEach((b, i) => {
            b.y -= 12; ctx.fillStyle = "#0ff"; ctx.fillRect(b.x-2, b.y, 4, 12);
            if (b.x > boss.x-60 && b.x < boss.x+60 && b.y < boss.y+30) {
                boss.hp -= (10 * saveData.atk); bullets.splice(i, 1);
                if (boss.hp <= 0) win();
            }
        });

        // 敵弾と当たり判定
        enemies.forEach((e, i) => {
            e.x += e.vx; e.y += e.vy;
            ctx.fillStyle = "#f00"; ctx.beginPath(); ctx.arc(e.x, e.y, 6, 0, Math.PI*2); ctx.fill();
            if (Math.hypot(e.x - player.x, e.y - player.y) < 15) {
                player.hp -= 10; enemies.splice(i, 1);
                if (player.hp <= 0) fail();
            }
            if (e.y > 600) enemies.splice(i, 1);
        });

        // 自機描画 (雫)
        ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.moveTo(player.x, player.y-15); ctx.lineTo(player.x-10, player.y+10); ctx.lineTo(player.x+10, player.y+10); ctx.fill();

        document.getElementById('hp-val').innerText = player.hp;
        document.getElementById('boss-hp').innerText = Math.max(0, boss.hp);
        requestAnimationFrame(loop);
    }

    function win() {
        gActive = false; alert("MISSION COMPLETE!");
        saveData.coins += 200;
        if (!saveData.cleared.includes(currentStage.id)) saveData.cleared.push(currentStage.id);
        exit();
    }

    function fail() { gActive = false; alert("GAME OVER..."); exit(); }

    function exit() {
        save();
        document.getElementById('main-menu').style.display = 'block';
        document.getElementById('hud').style.display = 'none';
        canvas.style.display = 'none';
    }

    updateUI();
</script>
</body>
</html>
