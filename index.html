<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Minami Project 2026: Metal Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+JP:wght@300;700&display=swap');
        
        body { margin: 0; background: #000810; color: #e0e0e0; font-family: 'Press Start 2P', cursive; overflow: hidden; user-select: none; }
        canvas { display: block; }

        /* HUD */
        #hud { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; }
        #score-val { font-size: 20px; color: #fff; text-shadow: 0 0 10px #0088ff; }
        #hp-bar { width: 200px; height: 12px; background: rgba(255,255,255,0.1); border: 2px solid #fff; margin-top: 10px; border-radius: 6px; overflow: hidden; }
        #hp-fill { height: 100%; background: linear-gradient(90deg, #f00, #0f0); width: 100%; transition: width 0.3s; }
        #coin-display { color: #ffd700; font-size: 14px; margin-top: 5px; }

        /* Menu System */
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,8,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 20; }
        .panel { display: none; flex-direction: column; align-items: center; width: 90%; max-height: 85vh; overflow-y: auto; }
        .active { display: flex; }

        h1 { font-size: 20px; color: #fff; margin-bottom: 30px; letter-spacing: 2px; text-align: center; border-bottom: 2px solid #0088ff; padding-bottom: 10px; }
        .main-nav { display: flex; gap: 15px; margin-bottom: 40px; }
        .nav-btn { padding: 12px 20px; border: 2px solid #fff; background: none; color: #fff; cursor: pointer; font-family: 'Press Start 2P'; font-size: 9px; transition: 0.3s; }
        .nav-btn:hover { background: #fff; color: #000; box-shadow: 0 0 15px #fff; }

        /* Stage Select */
        .mode-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .mode-btn { width: 130px; padding: 12px; border: 2px solid #333; background: #050505; color: #444; cursor: pointer; text-align: center; position: relative; }
        .mode-btn.unlocked { border-color: var(--c); color: var(--c); }
        .mode-btn.unlocked:hover { background: var(--c); color: #000; box-shadow: 0 0 20px var(--c); transform: translateY(-3px); }
        .mode-btn.cleared::after { content: '[OK]'; position: absolute; top: 2px; right: 2px; color: #0f0; font-size: 8px; }

        /* Shop */
        .shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 600px; }
        .shop-item { padding: 15px; border: 1px solid #555; background: rgba(255,255,255,0.05); cursor: pointer; font-size: 8px; line-height: 1.5; text-align: center; }
        .shop-item:hover { background: rgba(255,255,255,0.15); border-color: #fff; }

        .status-msg { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 24px; pointer-events: none; opacity: 0; transition: 0.5s; color: #fff; z-index: 5; text-shadow: 0 0 10px #f00; }
    </style>
</head>
<body>

    <div id="hud">
        <div id="score-val">SCORE: 000000</div>
        <div id="hp-bar"><div id="hp-fill"></div></div>
        <div id="coin-display">COINS: 0</div>
    </div>

    <div id="overlay">
        <h1>MINAMI PROJECT 2026</h1>
        <div class="main-nav" id="main-nav">
            <button class="nav-btn" onclick="openPanel('stage-select')">STAGE SELECT</button>
            <button class="nav-btn" onclick="openPanel('shop')">SHOP</button>
            <button class="nav-btn" onclick="openPanel('how-to')">HOW TO PLAY</button>
        </div>

        <div id="stage-select" class="panel">
            <div class="mode-grid" id="grid"></div>
            <button class="nav-btn" style="margin-top:30px;" onclick="backToMain()">BACK</button>
        </div>

        <div id="shop" class="panel">
            <div id="shop-coins" style="color:#ffd700; margin-bottom:20px;"></div>
            <div class="shop-grid">
                <div class="shop-item" onclick="buyItem('atk')">ATK POWER UP (500C)<br>弾の威力が増加</div>
                <div class="shop-item" onclick="buyItem('heal')">RECOVERY (200C)<br>HPを最大まで回復</div>
                <div class="shop-item" onclick="buyItem('aura_blue')">CYAN AURA (2000C)<br>環境耐性:風を無効化</div>
            </div>
            <button class="nav-btn" style="margin-top:30px;" onclick="backToMain()">BACK</button>
        </div>

        <div id="how-to" class="panel">
            <div style="font-family:'Noto Sans JP'; color:#aaa; font-size:13px; line-height:1.6; max-width:500px; background:rgba(255,255,255,0.05); padding:20px;">
                マウス移動で機体を操作、左クリックで射撃します。<br>
                各エリアには特殊な「環境ギミック」が存在します。<br>
                通常9ステージを制覇し、隠された深淵へ挑んでください。
            </div>
            <button class="nav-btn" style="margin-top:30px;" onclick="backToMain()">BACK</button>
        </div>
    </div>

    <div id="msg" class="status-msg"></div>
    <canvas id="game"></canvas>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;

        let gameActive = false, score = 0, hp = 100, frame = 0, phase = 1, phaseKills = 0;
        let bullets = [], eBullets = [], enemies = [];
        let player = { x: canvas.width/2, y: canvas.height/2 };
        let currentMode = null;

        const NORMAL_STAGES = ['SB', 'KT', 'SK', 'KY', 'PK', 'JB', 'S1', 'S2', 'S3'];
        let userData = JSON.parse(localStorage.getItem('minami_save_v3')) || {
            coins: 0, atkLevel: 1, unlocked: [...NORMAL_STAGES], cleared: [], aura: 'none'
        };

        const STAGES = {
            'SB': { name: 'ST=SB', color: '#ccaa00', diff: 1, bossHp: 200 },
            'KT': { name: 'ST=KT', color: '#0088cc', diff: 1.2, bossHp: 250 },
            'SK': { name: 'ST=SK', color: '#008844', diff: 1.5, bossHp: 300, gimmick: 'fog' },
            'KY': { name: 'ST=KY', color: '#aa0022', diff: 2, bossHp: 400, gimmick: 'wind' },
            'PK': { name: 'ST=PK', color: '#cc5588', diff: 2.2, bossHp: 450 },
            'JB': { name: 'ST=JB', color: '#006666', diff: 2.5, bossHp: 500 },
            'S1': { name: 'ST=S1', color: '#6600cc', diff: 2.8, bossHp: 600 },
            'S2': { name: 'ST=S2', color: '#cc00cc', diff: 3.2, bossHp: 700 },
            'S3': { name: 'ST=S3', color: '#00cccc', diff: 3.5, bossHp: 800, gimmick: 'gravity' },
            'HA': { name: 'ST=HA', color: '#CD7F32', diff: 5, bossHp: 1500, secret: true },
            'HB': { name: 'ST=HB', color: '#C0C0C0', diff: 7, bossHp: 2500, secret: true },
            'HC': { name: 'ST=HC', color: '#FFD700', diff: 9, bossHp: 4000, secret: true },
            'UA': { name: 'ST=UA', color: '#444', diff: 12, bossHp: 6000, secret: true },
            'UB': { name: 'ST=UB', color: '#fff', diff: 15, bossHp: 8000, secret: true },
            'CO': { name: 'ST=CO', color: '#cc6600', diff: 25, bossHp: 20000, secret: true }
        };

        function save() { localStorage.setItem('minami_save_v3', JSON.stringify(userData)); }

        function openPanel(id) {
            document.getElementById('main-nav').style.display = 'none';
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'stage-select') renderStages();
            if(id === 'shop') document.getElementById('shop-coins').innerText = `COINS: ${userData.coins}`;
        }

        function backToMain() {
            document.getElementById('main-nav').style.display = 'flex';
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        }

        function renderStages() {
            const grid = document.getElementById('grid'); grid.innerHTML = '';
            const allNormal = NORMAL_STAGES.every(id => userData.cleared.includes(id));
            if(allNormal) ['HA','HB','HC'].forEach(id => !userData.unlocked.includes(id) && userData.unlocked.push(id));
            const allSecret1 = ['HA','HB','HC'].every(id => userData.cleared.includes(id));
            if(allSecret1) ['UA','UB','CO'].forEach(id => !userData.unlocked.includes(id) && userData.unlocked.push(id));

            Object.keys(STAGES).forEach(id => {
                if(STAGES[id].secret && !userData.unlocked.includes(id)) return;
                const btn = document.createElement('div');
                btn.className = `mode-btn unlocked ${userData.cleared.includes(id) ? 'cleared' : ''}`;
                btn.style.setProperty('--c', STAGES[id].color);
                btn.innerHTML = `<div>${STAGES[id].name}</div>`;
                btn.onclick = () => startGame(id);
                grid.appendChild(btn);
            });
        }

        function buyItem(type) {
            if(type === 'atk' && userData.coins >= 500) { userData.coins -= 500; userData.atkLevel += 0.5; }
            if(type === 'heal' && userData.coins >= 200) { userData.coins -= 200; hp = 100; }
            if(type === 'aura_blue' && userData.coins >= 2000) { userData.coins -= 2000; userData.aura = 'cyan'; }
            save(); openPanel('shop');
        }

        function startGame(id) {
            currentMode = { ...STAGES[id], id: id };
            document.getElementById('overlay').style.display = 'none';
            gameActive = true; score = 0; hp = 100; phase = 1; phaseKills = 0;
            enemies = []; bullets = []; eBullets = [];
            showMsg("PHASE 1"); loop();
        }

        function showMsg(t) {
            const m = document.getElementById('msg');
            m.innerText = t; m.style.opacity = 1;
            setTimeout(() => m.style.opacity = 0, 2000);
        }

        function spawnBossBullet(e, type) {
            if(type === 'spiral') {
                const angle = frame * 0.2;
                eBullets.push({ x: e.x, y: e.y, vx: Math.cos(angle)*5, vy: Math.sin(angle)*5, size: 6 });
            } else if(type === 'circle') {
                for(let i=0; i<12; i++) {
                    const angle = (Math.PI*2/12) * i;
                    eBullets.push({ x: e.x, y: e.y, vx: Math.cos(angle)*4, vy: Math.sin(angle)*4, size: 8 });
                }
            } else if(type === 'burst') {
                eBullets.push({ x: e.x, y: e.y, vx: (Math.random()-0.5)*10, vy: 6, isBurst: true, size: 10 });
            }
        }

        function update() {
            frame++;
            // Gimmicks
            if(currentMode.gimmick === 'wind' && userData.aura !== 'cyan') player.x += Math.sin(frame/20)*12;
            if(currentMode.gimmick === 'gravity') player.y += 2;

            if(isDown && frame % 4 === 0) bullets.push({ x: player.x, y: player.y - 20, p: userData.atkLevel });

            // Enemy Logic
            if(!enemies.some(e => e.isBoss) && frame % 40 === 0 && phaseKills < 20) {
                enemies.push({ x: Math.random()*canvas.width, y: -50, hp: 5*currentMode.diff, maxHp: 5*currentMode.diff, size: 25, vy: 3 });
            }

            if(phase < 3 && phaseKills >= 20) {
                phase++; phaseKills = 0; showMsg("PHASE " + phase);
            } else if(phase === 3 && phaseKills >= 20 && !enemies.some(e => e.isBoss)) {
                enemies.push({ x: canvas.width/2, y: -100, hp: currentMode.bossHp, maxHp: currentMode.bossHp, size: 100, vy: 1, isBoss: true });
                showMsg("BOSS BATTLE");
            }

            // Bullet Movement
            bullets.forEach((b, i) => {
                b.y -= 15;
                enemies.forEach((e, ei) => {
                    if(Math.hypot(b.x-e.x, b.y-e.y) < e.size) {
                        e.hp -= b.p; score += 20; bullets.splice(i, 1);
                        if(e.hp <= 0) {
                            if(e.isBoss) finish(true);
                            else { phaseKills++; enemies.splice(ei, 1); score += 500; userData.coins += 20; }
                        }
                    }
                });
            });

            enemies.forEach(e => {
                e.y += e.vy; if(e.isBoss && e.y > 150) e.vy = 0;
                if(e.isBoss) {
                    if(frame % 60 === 0) spawnBossBullet(e, 'circle');
                    if(frame % 5 === 0) spawnBossBullet(e, 'spiral');
                    if(frame % 100 === 0) spawnBossBullet(e, 'burst');
                } else if(Math.random() < 0.03) {
                    eBullets.push({ x: e.x, y: e.y, vx: 0, vy: 6, size: 5 });
                }
            });

            eBullets.forEach((eb, i) => {
                eb.x += eb.vx || 0; eb.y += eb.vy;
                if(eb.isBurst && eb.y > player.y - 100) {
                    for(let j=0; j<8; j++) eBullets.push({x: eb.x, y: eb.y, vx: (Math.random()-0.5)*8, vy: (Math.random()-0.5)*8, size: 4});
                    eBullets.splice(i, 1);
                }
                if(Math.hypot(eb.x-player.x, eb.y-player.y) < 15) {
                    hp -= 10; eBullets.splice(i, 1); if(hp <= 0) finish(false);
                }
                if(eb.y > canvas.height || eb.y < -100) eBullets.splice(i, 1);
            });

            document.getElementById('hp-fill').style.width = hp + "%";
            document.getElementById('score-val').innerText = `SCORE: ${score.toString().padStart(6, '0')}`;
        }

        function draw() {
            ctx.fillStyle = "rgba(0, 8, 16, 0.5)"; ctx.fillRect(0,0,canvas.width, canvas.height);
            
            // Fog Gimmick
            if(currentMode.gimmick === 'fog' && frame % 10 < 5) return;

            // Player
            if(userData.aura === 'cyan') {
                ctx.strokeStyle = "cyan"; ctx.lineWidth = 3; ctx.beginPath();
                ctx.arc(player.x, player.y, 25+Math.sin(frame/5)*5, 0, 7); ctx.stroke();
            }
            ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(player.x, player.y, 12, 0, 7); ctx.fill();

            // Entities
            enemies.forEach(e => {
                ctx.strokeStyle = e.isBoss ? "#f00" : currentMode.color; ctx.lineWidth = 4;
                ctx.strokeRect(e.x-e.size/2, e.y-e.size/2, e.size, e.size);
                if(e.isBoss) {
                    ctx.fillStyle = "#300"; ctx.fillRect(e.x-50, e.y-70, 100, 8);
                    ctx.fillStyle = "#f00"; ctx.fillRect(e.x-50, e.y-70, 100*(e.hp/e.maxHp), 8);
                }
            });

            ctx.fillStyle = "#0ff"; bullets.forEach(b => ctx.fillRect(b.x-3, b.y, 6, 15));
            eBullets.forEach(eb => {
                ctx.fillStyle = eb.isBurst ? "#ff0" : "#f0f";
                ctx.beginPath(); ctx.arc(eb.x, eb.y, eb.size, 0, 7); ctx.fill();
            });
        }

        function finish(clear) {
            gameActive = false;
            if(clear) {
                userData.coins += 1000;
                if(!userData.cleared.includes(currentMode.id)) userData.cleared.push(currentMode.id);
                alert("MISSION COMPLETE\nScore: " + score);
            } else { alert("MISSION FAILED"); }
            save(); location.reload();
        }

        function loop() { if(!gameActive) return; update(); draw(); requestAnimationFrame(loop); }

        let isDown = false;
        window.onmousedown = () => isDown = true; window.onmouseup = () => isDown = false;
        window.onmousemove = e => { player.x = e.clientX; player.y = e.clientY; };
        renderStages();
    </script>
</body>
</html>
