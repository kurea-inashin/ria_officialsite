<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>MINAMI SHOOTING 2026 - EYE CARE EDITION</title>
    <style>
        /* 目に優しいダークネイビー基調 */
        body { background: #001220; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #game-container { position: relative; width: 800px; height: 600px; border: 3px solid #1a3a5a; background: #000b14; box-shadow: 0 0 30px rgba(0, 212, 255, 0.2); cursor: none; }
        
        /* HUD - 彩度を落とした目に優しい色 */
        #hud { position: absolute; top: 10px; left: 10px; background: rgba(0, 20, 40, 0.8); padding: 12px; border-left: 5px solid #00aaff; z-index: 50; pointer-events: none; }
        .bar { width: 120px; height: 10px; background: #222; border-radius: 5px; overflow: hidden; margin-top: 5px; }
        #hp-fill { width: 100%; height: 100%; background: #4a90e2; transition: 0.3s; }

        /* アイテムスロット */
        #item-hud { position: absolute; bottom: 15px; right: 15px; display: flex; gap: 10px; z-index: 50; }
        .item-slot { width: 55px; height: 55px; background: rgba(20, 40, 60, 0.9); border: 2px solid #00aaff; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; pointer-events: auto; }
        .item-slot:hover { background: #00aaff; color: #000; }

        /* オーバーレイ */
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 10, 20, 0.96); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; cursor: default; }
        .active { display: flex; }

        /* ボタン - 眩しすぎない青 */
        .btn { padding: 14px 35px; margin: 8px; background: #162e44; border: 1px solid #00aaff; color: #a0d8ff; cursor: pointer; border-radius: 25px; font-weight: bold; width: 260px; transition: 0.2s; }
        .btn:hover { background: #00aaff; color: #000; box-shadow: 0 0 15px rgba(0, 170, 255, 0.5); }

        /* ステージ選択 */
        .stage-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 15px; }
        .s-btn { padding: 12px; border: 1px solid; border-radius: 10px; cursor: pointer; background: rgba(0,0,0,0.4); min-width: 140px; }
        .star-box { color: #ccac00; font-size: 13px; margin-top: 4px; }
    </style>
</head>
<body>

<div id="game-container" id="gameArea">
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    
    <div id="hud">
        SCORE: <span id="s-val">0</span><br>
        HP: <div class="bar"><div id="hp-fill"></div></div>
        COIN: 🪙 <span id="c-val">0</span>
    </div>

    <div id="item-hud">
        <div class="item-slot" onclick="useHeal()">
            <span style="font-size: 20px;">🧪</span>
            <span style="font-size: 10px;">x<span id="h-count">0</span></span>
        </div>
    </div>

    <div id="m-screen" class="overlay active">
        <h1 style="color: #00aaff;">MINAMI SHOOTING 2026</h1>
        <button class="btn" onclick="openStages()">MISSION START (★難易度)</button>
        <button class="btn" onclick="openShop()">ITEM SHOP (スキン・道具)</button>
        <button class="btn" onclick="openDesc()">HOW TO PLAY</button>
    </div>

    <div id="st-screen" class="overlay">
        <h2>SELECT AREA</h2>
        <div class="stage-grid" id="st-list"></div>
        <button class="btn" onclick="back()">BACK</button>
    </div>

    <div id="sh-screen" class="overlay">
        <h2>SHOP</h2>
        <p>COIN: <span id="sh-c">0</span></p>
        <button class="btn" onclick="buy('wide', 500)">WIDE SHOT (500🪙)</button>
        <button class="btn" onclick="buy('heal', 200)">REPAIR KIT (200🪙)</button>
        <button class="btn" onclick="buy('skin-orange', 800)">ORANGE SKIN (800🪙)</button>
        <button class="btn" onclick="back()">BACK</button>
    </div>

    <div id="de-screen" class="overlay">
        <h2>HOW TO PLAY</h2>
        <p>【操作】マウスで自機を動かすだけ！<br>（自動で弾を発射するのら）</p>
        <p>【回復】右下の薬瓶をクリック！</p>
        <button class="btn" onclick="back()">BACK</button>
    </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let game = {
    state: 'menu', score: 0, hp: 100, coins: 500,
    cleared: [], 
    stage: null, 
    inv: { weapon: 'normal', heals: 1, skin: '#00aaff' },
    p: { x: 400, y: 550 },
    bullets: [], enemies: [], eb: [], frame: 0
};

// マウス移動イベント
window.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    game.p.x = e.clientX - rect.left;
    game.p.y = e.clientY - rect.top;
});

function openStages() {
    toggle('st-screen');
    const list = document.getElementById('st-list');
    list.innerHTML = '';
    // 1-9
    for(let i=1; i<=9; i++){
        const c = i<4 ? "#d32f2f" : i<7 ? "#388e3c" : "#1976d2";
        createBtn(`ST=KY 0${i}`, c, i, list);
    }
}

function createBtn(id, c, stars, container) {
    const b = document.createElement('div');
    b.className = 's-btn';
    b.style.borderColor = c; b.style.color = c;
    b.innerHTML = `<div>${id}</div><div class="star-box">${"★".repeat(stars)}</div>`;
    b.onclick = () => { game.stage = {id, color: c}; game.state = 'play'; toggle(''); };
    container.appendChild(b);
}

function openShop() { toggle('sh-screen'); document.getElementById('sh-c').innerText = game.coins; }
function openDesc() { toggle('de-screen'); }
function back() { toggle('m-screen'); }
function toggle(id) { 
    document.querySelectorAll('.overlay').forEach(e => e.classList.remove('active')); 
    if(id) document.getElementById(id).classList.add('active'); 
}

function buy(t, p) {
    if(game.coins >= p) {
        game.coins -= p;
        if(t==='wide') game.inv.weapon = 'wide';
        if(t==='heal') game.inv.heals++;
        if(t==='skin-orange') game.inv.skin = '#ef6c00'; // 目に優しいオレンジ
        updateUI(); openShop();
    }
}

function useHeal() {
    if(game.inv.heals > 0 && game.hp < 100) {
        game.inv.heals--; game.hp = Math.min(100, game.hp + 50); updateUI();
    }
}

function update() {
    if(game.state !== 'play') return;
    
    // オート連射
    if(game.frame % 8 === 0) {
        game.bullets.push({x: game.p.x, y: game.p.y, vx: 0, vy: -12});
        if(game.inv.weapon === 'wide') {
            game.bullets.push({x: game.p.x, y: game.p.y, vx: -3, vy: -10});
            game.bullets.push({x: game.p.x, y: game.p.y, vx: 3, vy: -10});
        }
    }

    if(game.frame % 30 === 0) game.enemies.push({x: Math.random()*760+20, y: -20, hp: 3});

    game.bullets.forEach((b, i) => { b.y += b.vy; b.x += b.vx; if(b.y < -20) game.bullets.splice(i, 1); });
    game.enemies.forEach((e, i) => {
        e.y += 2.5;
        if(game.frame % 60 === 0) game.eb.push({x: e.x, y: e.y, vy: 4.5});
        game.bullets.forEach((b, bi) => {
            if(Math.hypot(e.x-b.x, e.y-b.y) < 22) {
                e.hp--; game.bullets.splice(bi, 1);
                if(e.hp <= 0) { game.score += 100; game.coins += 5; game.enemies.splice(i, 1); }
            }
        });
    });

    game.eb.forEach((eb, i) => {
        eb.y += eb.vy;
        if(Math.hypot(eb.x-game.p.x, eb.y-game.p.y) < 15) {
            game.hp -= 15; game.eb.splice(i, 1);
            if(game.hp <= 0) { game.state = 'menu'; back(); }
        }
    });
    updateUI();
}

function draw() {
    ctx.fillStyle = '#000b14'; ctx.fillRect(0,0,800,600);
    if(game.state !== 'play') return;

    // 自機
    ctx.fillStyle = game.inv.skin;
    ctx.beginPath(); ctx.arc(game.p.x, game.p.y, 15, 0, Math.PI*2); ctx.fill();

    // 弾 (目に優しい水色)
    ctx.fillStyle = "#81d4fa";
    game.bullets.forEach(b => ctx.fillRect(b.x-2, b.y-10, 4, 15));

    // 敵 (各路線の彩度を落とした色)
    ctx.fillStyle = game.stage.color;
    game.enemies.forEach(e => {
        ctx.beginPath(); ctx.moveTo(e.x, e.y+15); ctx.lineTo(e.x-15, e.y-15); ctx.lineTo(e.x+15, e.y-15); ctx.fill();
    });

    // 敵弾 (マイルドなピンク)
    ctx.fillStyle = "#ff8a80";
    game.eb.forEach(eb => { ctx.beginPath(); ctx.arc(eb.x, eb.y, 5, 0, Math.PI*2); ctx.fill(); });
}

function updateUI() {
    document.getElementById('s-val').innerText = game.score;
    document.getElementById('c-val').innerText = game.coins;
    document.getElementById('h-count').innerText = game.inv.heals;
    document.getElementById('hp-fill').style.width = game.hp + "%";
}

function loop() { update(); draw(); game.frame++; requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
