<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>MINAMI SHOOTING GAME PROJECT 2026</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@700&display=swap');
body { margin:0; overflow:hidden; background:#050a10; font-family:'Shippori Mincho', serif; color:#fff; user-select:none; }
canvas { display:block; }

#ui-layer { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; padding:20px; box-sizing:border-box; }
.stat { font-size:1.2rem; text-shadow:0 0 10px #00dfff; margin-bottom:5px; }
#hp-bar-bg { width:200px; height:10px; background:rgba(255,255,255,0.2); border-radius:5px; overflow:hidden; }
#hp-bar-fill { width:100%; height:100%; background:#00dfff; transition:width 0.3s; }

#overlay { position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:100; pointer-events:all; }
button { font-family:'Shippori Mincho', serif; font-size:1rem; padding:10px 20px; margin:10px; cursor:pointer; background:#00dfff; border:none; border-radius:5px; color:#000; transition:0.2s; }
button:hover { transform:scale(1.1); }

.color-btn { width:50px; height:50px; border-radius:50%; border:2px solid #fff; cursor:pointer; transition:transform 0.2s; }
.color-btn:hover { transform:scale(1.2); }
</style>
</head>
<body>

<div id="overlay">
    <h1>MINAMI SHOOTER 2026</h1>
    <p>ホーム画面</p>
    <button onclick="showStageSelect()">ステージセレクト</button>
    <button onclick="showShop()">ショップ</button>
    <button onclick="showHowToPlay()">プレイ方法</button>
</div>

<div id="ui-layer">
    <div class="stat">SCORE: <span id="score">0</span></div>
    <div class="stat">COMBO: <span id="combo">0</span></div>
    <div class="stat">COINS: <span id="coins">0</span></div>
    <div id="hp-bar-bg"><div id="hp-bar-fill"></div></div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let gameActive = false;
let score = 0;
let combo = 0;
let hp = 100;
let coins = 0;
let difficulty = 1;
let stageIndex = 0;
let playerColor = "#00dfff";
let chargeTime = 0;
let phase = 1;

const player = { x:canvas.width/2, y:canvas.height-100, size:25, power:1, skin:"triangle", aura:null };
const bullets = [];
const enemies = [];
const particles = [];
const items = []; // フィールド上のアイテム
const stages = [
    { name:"ステージ1", hidden:false },
    { name:"ステージ2", hidden:false },
    { name:"ステージ3", hidden:false },
    { name:"隠しステージA", hidden:true },
    { name:"隠しステージB", hidden:true },
];

function showStageSelect() {
    document.getElementById('overlay').innerHTML = `<h2>ステージセレクト</h2>` +
        stages.map((s,i)=>`<button onclick="startStage(${i})">${s.name}</button>`).join('');
}

function showShop() {
    document.getElementById('overlay').innerHTML = `<h2>ショップ</h2>
        <p>所持コイン: ${coins}</p>
        <button onclick="buyItem('power')">攻撃力アップ (100C)</button>
        <button onclick="buyItem('heal')">回復アイテム (50C)</button>
        <button onclick="buyItem('special')">必殺技アイテム (200C)</button>
        <button onclick="backToHome()">戻る</button>`;
}

function showHowToPlay() {
    document.getElementById('overlay').innerHTML = `<h2>プレイ方法</h2>
        <p>[移動] マウス</p>
        <p>[攻撃] 左クリック</p>
        <p>[溜め撃ち] 長押し</p>
        <p>[スコア] 敵を倒すと上昇、コンボで増加</p>
        <button onclick="backToHome()">戻る</button>`;
}

function backToHome() {
    location.reload();
}

function buyItem(type) {
    if(type==="power" && coins>=100){player.power+=1; coins-=100;}
    else if(type==="heal" && coins>=50){hp=Math.min(100,hp+30); coins-=50;}
    else if(type==="special" && coins>=200){alert("必殺技準備OK"); coins-=200;}
    showShop();
}

function startStage(index) {
    stageIndex = index;
    document.getElementById('overlay').style.display = 'none';
    gameActive = true;
    phase = 1;
    loop();
}

window.addEventListener('mousemove',(e)=>{player.x=e.clientX; player.y=e.clientY;});
let isMouseDown=false;
window.addEventListener('mousedown',()=>isMouseDown=true);
window.addEventListener('mouseup',()=>{
    if(!gameActive) return;
    fireBullet(chargeTime>30);
    isMouseDown=false;
    chargeTime=0;
});

function fireBullet(isBig){
    bullets.push({ x:player.x, y:player.y, size:isBig?40:10, speed:isBig?15:10, power:player.power*(isBig?3:1), color:isBig? "#fff":playerColor });
}

class Enemy{
    constructor(){
        this.x=Math.random()*canvas.width;
        this.y=-50;
        this.hp=Math.ceil(Math.random()*(difficulty/2+1));
        this.size=20+(this.hp*10);
        this.speed=(1+Math.random()*2)*(1+difficulty*0.1);
        this.text=["嘘","闇","雑","偽","影"][Math.floor(Math.random()*5)];
        this.isBoss=false;
        // ボスの場合
        if(phase===3 && Math.random()<0.3){this.isBoss=true; this.hp*=5; this.size*=2; this.text="BOSS";}
    }
    draw(){
        ctx.fillStyle=`rgba(255,255,255,${0.3+(this.hp*0.1)})`;
        ctx.font=`bold ${this.size}px 'Shippori Mincho'`;
        ctx.fillText(this.text,this.x,this.y);
    }
}

function update(){
    if(!gameActive) return;

    difficulty = 1 + Math.floor(score/5000);
    if(isMouseDown) chargeTime++;

    bullets.forEach((b,i)=>{b.y-=b.speed;if(b.y<-50) bullets.splice(i,1);});
    if(Math.random() < 0.02 + (difficulty*0.005)) enemies.push(new Enemy());

    enemies.forEach((e,ei)=>{
        e.y+=e.speed;
        const d=Math.hypot(e.x-player.x,e.y-player.y);
        if(d<40){hp-=10;enemies.splice(ei,1);combo=0;if(hp<=0) gameOver();}
        bullets.forEach((b,bi)=>{
            const bd=Math.hypot(e.x-b.x,e.y-b.y);
            if(bd<e.size){
                e.hp-=b.power;
                if(!b.isBig) bullets.splice(bi,1);
                if(e.hp<=0){
                    createParticles(e.x,e.y,b.color);
                    enemies.splice(ei,1);
                    score+=100*(1+Math.floor(combo/10));
                    combo++;
                    coins+=10;
                }
            }
        });
        if(e.y>canvas.height){enemies.splice(ei,1); combo=0;}
    });

    document.getElementById('score').innerText=score;
    document.getElementById('combo').innerText=combo;
    document.getElementById('hp-bar-fill').style.width=hp+"%";
    document.getElementById('coins').innerText=coins;
}

function createParticles(x,y,color){
    for(let i=0;i<10;i++){
        particles.push({x,y,color,vx:(Math.random()-0.5)*15,vy:(Math.random()-0.5)*15,life:1.0});
    }
}

function draw(){
    ctx.fillStyle="rgba(5,10,16,0.4)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.strokeStyle="rgba(255,255,255,0.03)";
    for(let i=0;i<3;i++){
        let x=Math.random()*canvas.width;
        ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,canvas.height); ctx.stroke();
    }

    if(isMouseDown && chargeTime>5){
        ctx.strokeStyle=playerColor;
        ctx.beginPath();
        ctx.arc(player.x,player.y,Math.min(chargeTime,40),0,Math.PI*2);
        ctx.stroke();
    }

    ctx.shadowBlur=15; ctx.shadowColor=playerColor;
    ctx.fillStyle=playerColor;
    ctx.beginPath();
    ctx.moveTo(player.x,player.y-20);
    ctx.lineTo(player.x-15,player.y+15);
    ctx.lineTo(player.x+15,player.y+15);
    ctx.fill();
    ctx.shadowBlur=0;

    bullets.forEach(b=>{ctx.fillStyle=b.color;ctx.beginPath();ctx.arc(b.x,b.y,b.size/2,0,Math.PI*2);ctx.fill();});
    enemies.forEach(e=>e.draw());
    particles.forEach((p,i)=>{ctx.fillStyle=p.color; ctx.globalAlpha=p.life; ctx.fillRect(p.x,p.y,3,3); p.x+=p.vx; p.y+=p.vy; p.life-=0.03; if(p.life<=0) particles.splice(i,1);});
    ctx.globalAlpha=1;
}

function gameOver(){
    gameActive=false;
    alert(`GAME OVER\nFINAL SCORE: ${score}`);
    location.reload();
}

function loop(){ update(); draw(); if(gameActive) requestAnimationFrame(loop); }

window.addEventListener('resize',()=>{canvas.width=window.innerWidth; canvas.height=window.innerHeight;});
</script>
</body>
</html>
