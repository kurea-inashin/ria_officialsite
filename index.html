<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>MINAMI PROJECT 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    background:#000;
    color:white;
    font-family:'Press Start 2P', monospace;
    overflow:hidden;
}

.hidden{ display:none; }

.center{
    text-align:center;
}

/* タイトル */
h1{
    margin-top:40px;
    letter-spacing:6px;
    font-size:28px;
}

/* 説明パネル */
.info-box{
    width:600px;
    margin:30px auto;
    padding:20px;
    background:rgba(255,255,255,0.05);
    border-radius:15px;
    text-align:left;
    line-height:1.8em;
}

/* グリッド */
.grid{
    display:grid;
    grid-template-columns:repeat(3, 260px);
    gap:25px;
    justify-content:center;
    margin-top:40px;
}

.stage{
    padding:25px;
    border-radius:15px;
    border:3px solid;
    background:#000;
    cursor:pointer;
    transition:0.3s;
    text-align:center;
}

.stage:hover{
    transform:scale(1.05);
    box-shadow:0 0 20px currentColor;
}

.stage span{
    display:block;
    margin-top:15px;
    font-size:12px;
}

.yellow{ color:#ffd400; border-color:#ffd400; }
.blue{ color:#00c8ff; border-color:#00c8ff; }
.green{ color:#00ff8c; border-color:#00ff8c; }
.red{ color:#ff0044; border-color:#ff0044; }
.pink{ color:#ff66aa; border-color:#ff66aa; }
.cyan{ color:#00ffff; border-color:#00ffff; }
.purple{ color:#c000ff; border-color:#c000ff; }
.gray{ color:#888; border-color:#888; }

hr{
    margin:60px auto;
    width:70%;
    border:1px solid #222;
}

.footer{
    margin:40px 0;
    font-size:12px;
    color:#444;
    text-align:center;
}

/* ゲーム画面 */
#gameCanvas{
    background:#000;
    display:block;
    margin:0 auto;
}

.backBtn{
    position:absolute;
    top:20px;
    left:20px;
    padding:10px 20px;
    border:2px solid white;
    background:none;
    color:white;
    cursor:pointer;
    font-family:'Press Start 2P';
}
.backBtn:hover{
    box-shadow:0 0 10px white;
}
</style>
</head>

<body>

<!-- ===== メニュー ===== -->
<div id="menu">

<h1 class="center">MINAMI PROJECT 2026</h1>

<div class="info-box">
【操作方法】<br>
・マウス移動：霊（白機）を操る<br>
・左クリック：想い（弾）を放つ<br>
・敵に当たると終了
</div>

<div class="grid">
<div class="stage yellow" onclick="startGame(1)">ST-SB<span>★★★★★</span></div>
<div class="stage blue" onclick="startGame(2)">ST-KT<span>★★★★★</span></div>
<div class="stage green" onclick="startGame(3)">ST-SK<span>★★★★★</span></div>

<div class="stage red" onclick="startGame(4)">ST-KY<span>★★★★★</span></div>
<div class="stage pink" onclick="startGame(5)">ST-PK<span>★★★★★</span></div>
<div class="stage cyan" onclick="startGame(6)">ST-JB<span>★★★★★</span></div>

<div class="stage purple" onclick="startGame(7)">ST-HM<span>★★★★★</span></div>
<div class="stage gray" onclick="startGame(8)">ST-KS<span>★★★★★</span></div>
<div class="stage blue" onclick="startGame(9)">ST-TY<span>★★★★★</span></div>
</div>

<hr>
<div class="footer">
©MINAMI PROJECT 2026 / Chromatic Resonance
</div>

</div>


<!-- ===== ゲーム画面 ===== -->
<div id="game" class="hidden">
<button class="backBtn" onclick="backToMenu()">BACK</button>
<canvas id="gameCanvas" width="800" height="600"></canvas>
</div>


<script>
let canvas = document.getElementById("gameCanvas");
let ctx = canvas.getContext("2d");

let player = { x:400, y:500, size:8 };
let bullets = [];
let enemies = [];
let gameOver = false;
let stageLevel = 1;

function startGame(level){
    stageLevel = level;
    document.getElementById("menu").classList.add("hidden");
    document.getElementById("game").classList.remove("hidden");

    bullets = [];
    enemies = [];
    gameOver = false;

    spawnEnemy();
    requestAnimationFrame(gameLoop);
}

function backToMenu(){
    document.getElementById("menu").classList.remove("hidden");
    document.getElementById("game").classList.add("hidden");
}

canvas.addEventListener("mousemove", e=>{
    let rect = canvas.getBoundingClientRect();
    player.x = e.clientX - rect.left;
    player.y = e.clientY - rect.top;
});

canvas.addEventListener("click", ()=>{
    bullets.push({x:player.x, y:player.y});
});

function spawnEnemy(){
    enemies.push({
        x:Math.random()*760+20,
        y:-20,
        speed:2 + stageLevel*0.5
    });
}

function update(){
    bullets.forEach(b=> b.y -= 6);
    enemies.forEach(e=> e.y += e.speed);

    enemies.forEach(e=>{
        if(Math.hypot(e.x-player.x, e.y-player.y) < 15){
            gameOver = true;
        }
    });

    enemies = enemies.filter(e=> e.y < 650);

    if(Math.random() < 0.02*stageLevel){
        spawnEnemy();
    }
}

function draw(){
    ctx.clearRect(0,0,800,600);

    // プレイヤー
    ctx.fillStyle="white";
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.size, 0, Math.PI*2);
    ctx.fill();

    // 弾
    bullets.forEach(b=>{
        ctx.fillRect(b.x-2,b.y-8,4,8);
    });

    // 敵
    ctx.fillStyle="red";
    enemies.forEach(e=>{
        ctx.beginPath();
        ctx.arc(e.x,e.y,10,0,Math.PI*2);
        ctx.fill();
    });

    if(gameOver){
        ctx.fillStyle="white";
        ctx.font="20px 'Press Start 2P'";
        ctx.fillText("GAME OVER",250,300);
    }
}

function gameLoop(){
    if(!gameOver){
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }else{
        draw();
    }
}
</script>

</body>
</html>
