<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>MINAMI SHOOTING PROJECT 2026</title>
    <style>
        body { background: #000814; color: #fff; font-family: 'Helvetica', sans-serif; margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #game-container { position: relative; width: 800px; height: 600px; border: 4px solid #003366; background: #000; box-shadow: 0 0 40px #00d4ff; }
        canvas { display: block; cursor: crosshair; }

        /* UI部 */
        #hud { position: absolute; top: 10px; left: 10px; background: rgba(0, 20, 40, 0.7); padding: 10px; border-radius: 5px; z-index: 10; pointer-events: none; }
        .bar { width: 120px; height: 12px; background: #333; border-radius: 6px; overflow: hidden; }
        #hp-fill { width: 100%; height: 100%; background: #ff416c; transition: 0.2s; }

        /* オーバーレイ */
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 10, 30, 0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; }
        .active { display: flex; }

        /* ボタン */
        .btn { padding: 15px 40px; margin: 10px; background: #003366; border: 2px solid #00d4ff; color: #fff; cursor: pointer; border-radius: 30px; font-weight: bold; transition: 0.3s; width: 250px; }
        .btn:hover { background: #00d4ff; color: #000; box-shadow: 0 0 20px #00d4ff; }

        /* ステージグリッド */
        .stage-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px; }
        .s-btn { padding: 10px; border: 2px solid; border-radius: 8px; cursor: pointer; font-size: 12px; transition: 0.2s; background: rgba(0,0,0,0.5); }
        .s-btn:hover { transform: scale(1.1); background: #fff; color: #000; }

        .desc { max-width: 500px; line-height: 1.6; color: #00d4ff; }
        footer { position: absolute; bottom: 5px; font-size: 10px; color: #336699; }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    
    <div id="hud">
        SCORE: <span id="s-val">0</span><br>
        HP: <div class="bar"><div id="hp-fill"></div></div>
        COIN: 🪙 <span id="c-val">0</span>
    </div>

    <div id="m-screen" class="overlay active">
        <h1 style="color: #00d4ff; text-shadow: 0 0 20px #00d4ff;">MINAMI SHOOTING 2026</h1>
        <button class="btn" onclick="openStages()">GAME PLAY (出撃)</button>
        <button class="btn" onclick="openShop()">ITEM SHOP (購買)</button>
        <button class="btn" onclick="openDesc()">HOW TO PLAY (説明)</button>
        <footer>© 2026 MINAMI SHOOTING GAME PROJECT.</footer>
    </div>

    <div id="st-screen" class="overlay">
        <h2>SELECT AREA</h2>
        <div class="stage-grid" id="st-list"></div>
        <button class="btn" onclick="back()">BACK</button>
    </div>

    <div id="sh-screen" class="overlay">
        <h2>ITEM SHOP</h2>
        <p>COIN: <span id="sh-c">0</span></p>
        <button class="btn" onclick="buy('wide', 500)">WIDE SHOT (500🪙)</button>
        <button class="btn" onclick="buy('heal', 200)">REPAIR KIT (200🪙)</button>
        <button class="btn" onclick="buy('skin', 1000)">ORANGE SKIN (1000🪙)</button>
        <button class="btn" onclick="back()">BACK</button>
    </div>

    <div id="de-screen" class="overlay">
        <h2>HOW TO PLAY</h2>
        <div class="desc">
            <p>【移動】矢印キー または WASD<br>【攻撃】スペースキー または 左クリック</p>
            <p>敵を倒してコインを稼ぎ、ショップで強化せよ！<br>全9ステージクリアで隠しエリアが解禁されるのら。</p>
        </div>
        <button class="btn" onclick="back()">BACK</button>
    </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let game = {
    state: 'menu', score: 0, hp: 100, coins: 100,
    unlocked: 9, cleared: [], 
    stage: null, 
    inv: { weapon: 'normal', heals: 0 },
    p: { x: 400, y: 550, color: "#00d4ff", speed: 6 },
    bullets: [], enemies: [], eb: [], keys: {}, frame: 0
};

const ST_COLORS = { 1: "#ff0000", 4: "#00ff00", 7: "#00aaff", EX: "#ffd700", UN: "rainbow" };

// 画面遷移
function openStages() {
    toggle('st-screen');
    const list = document.getElementById('st-list');
    list.innerHTML = '';
    for(let i=1; i<=9; i++){
        const c = i<4 ? ST_COLORS[1] : i<7 ? ST_COLORS[4] : ST_COLORS[7];
        createBtn(`ST=KY 0${i}`, c, list);
    }
    if(game.cleared.length >= 9) createBtn("ST=KY EX-01", ST_COLORS.EX, list);
    if(game.cleared.length >= 12) createBtn("ST=KY UNKNOWN", ST_COLORS.UN, list);
}
function createBtn(id, c, container) {
    const b = document.createElement('div');
    b.className = 's-btn'; b.innerText = id;
    b.style.borderColor = c === "rainbow" ? "#fff" : c;
    b.style.color = c === "rainbow" ? "#fff" : c;
    b.onclick = () => start(id, c);
    container.appendChild(b);
}
function openShop() { toggle('sh-screen'); document.getElementById('sh-c').innerText = game.coins; }
function openDesc() { toggle('de-screen'); }
function back() { toggle('m-screen'); }
function toggle(id) { document.querySelectorAll('.overlay').forEach(e => e.classList.remove('active')); document.getElementById(id).classList.add('active'); }

// ショップ
function buy(t, p) {
    if(game.coins >= p) {
        game.coins -= p;
        if(t==='wide') game.inv.weapon = 'wide';
        if(t==='heal') game.inv.heals++;
        if(t==='skin') game.p.color = "#ff8c00";
        alert("購入完了！"); openShop();
    } else alert("コイン不足！");
}

// ゲーム開始
function start(id, c) {
    game.stage = { id, color: c };
    game.state = 'play';
    game.hp = 100; game.score = 0;
    game.bullets = []; game.enemies = []; game.eb = [];
    document.querySelectorAll('.overlay').forEach(e => e.classList.remove('active'));
}

function update() {
    if(game.state !== 'play') return;
    
    // 自機移動
    if(game.keys['ArrowLeft'] || game.keys['a']) game.p.x -= game.p.speed;
    if(game.keys['ArrowRight'] || game.keys['d']) game.p.x += game.p.speed;
    if(game.keys['ArrowUp'] || game.keys['w']) game.p.y -= game.p.speed;
    if(game.keys['ArrowDown'] || game.keys['s']) game.p.y += game.p.speed;
    game.p.x = Math.max(20, Math.min(780, game.p.x));
    game.p.y = Math.max(20, Math.min(580, game.p.y));

    // 射撃
    if(game.frame % 10 === 0) {
        game.bullets.push({x: game.p.x, y: game.p.y, vx: 0, vy: -10});
        if(game.inv.weapon === 'wide') {
            game.bullets.push({x: game.p.x, y: game.p.y, vx: -3, vy: -9});
            game.bullets.push({x: game.p.x, y: game.p.y, vx: 3, vy: -9});
        }
    }

    // 敵生成（徐々に激化）
    if(game.frame % 30 === 0) {
        game.enemies.push({x: Math.random()*760+20, y: -20, hp: 3, type: Math.random() > 0.8 ? 'fast' : 'norm'});
    }

    // 更新
    game.bullets.forEach((b, i) => {
        b.x += b.vx; b.y += b.vy;
        if(b.y < 0) game.bullets.splice(i, 1);
    });

    game.enemies.forEach((e, i) => {
        e.y += e.type === 'fast' ? 6 : 2;
        // 敵の弾
        if(game.frame % 50 === 0) game.eb.push({x: e.x, y: e.y, vy: 4});
        
        // 当たり判定
        game.bullets.forEach((b, bi) => {
            if(Math.hypot(e.x-b.x, e.y-b.y) < 20) {
                e.hp--; game.bullets.splice(bi, 1);
                if(e.hp <= 0) {
                    game.score += 100; game.coins += 5;
                    game.enemies.splice(i, 1);
                }
            }
        });
        if(e.y > 600) game.enemies.splice(i, 1);
    });

    game.eb.forEach((eb, i) => {
        eb.y += eb.vy;
        if(Math.hypot(eb.x-game.p.x, eb.y-game.p.y) < 15) {
            game.hp -= 10; game.eb.splice(i, 1);
            if(game.hp <= 0) { alert("MISSION FAILED"); game.state = 'menu'; back(); }
        }
    });

    if(game.score >= 2000) { 
        alert("STAGE CLEAR!"); 
        if(!game.cleared.includes(game.stage.id)) game.cleared.push(game.stage.id);
        game.state = 'menu'; back(); 
    }

    document.getElementById('s-val').innerText = game.score;
    document.getElementById('c-val').innerText = game.coins;
    document.getElementById('hp-fill').style.width = game.hp + "%";
}

function draw() {
    ctx.fillStyle = '#000814'; ctx.fillRect(0,0,800,600);
    if(game.state !== 'play') return;

    const c = game.stage.color === 'rainbow' ? `hsl(${game.frame%360},100%,50%)` : game.stage.color;
    
    // 自機
    ctx.shadowBlur = 15; ctx.shadowColor = game.p.color;
    ctx.fillStyle = game.p.color;
    ctx.fillRect(game.p.x-15, game.p.y-15, 30, 30);

    // 弾
    ctx.fillStyle = "#fff";
    game.bullets.forEach(b => ctx.fillRect(b.x-2, b.y-10, 4, 15));

    // 敵
    ctx.shadowColor = c; ctx.fillStyle = c;
    game.enemies.forEach(e => {
        ctx.fillRect(e.x-15, e.y-15, 30, 30);
        if(e.type === 'fast') { ctx.strokeStyle = "#fff"; ctx.strokeRect(e.x-18, e.y-18, 36, 36); }
    });

    // 敵弾
    ctx.fillStyle = "#ff416c";
    game.eb.forEach(eb => { ctx.beginPath(); ctx.arc(eb.x, eb.y, 6, 0, Math.PI*2); ctx.fill(); });
    ctx.shadowBlur = 0;
}

window.addEventListener('keydown', e => game.keys[e.key] = true);
window.addEventListener('keyup', e => game.keys[e.key] = false);

function loop() { update(); draw(); game.frame++; requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
