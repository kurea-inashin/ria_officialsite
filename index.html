<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Minami Project 2026: Overdrive Final</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+JP:wght@300&display=swap');
body { margin:0; background:#000510; color:#fff; font-family:'Press Start 2P',cursive; overflow:hidden; user-select:none; }
#bg-canvas, #game-canvas { position:fixed; top:0; left:0; width:100vw; height:100vh; }
#bg-canvas { z-index:1; }
#game-canvas { z-index:5; pointer-events:none; }
#menu { position:relative; width:100%; height:100vh; background:rgba(0,10,30,0.85); display:flex; flex-direction:column; align-items:center; z-index:10; overflow-y:auto; backdrop-filter:blur(12px); }
#hud { position:fixed; top:20px; left:20px; z-index:100; visibility:hidden; pointer-events:none; }
#score-display { font-size:14px; margin-bottom:5px; text-shadow:0 0 10px #00d4ff; }
#hp-container { width:200px; height:12px; border:2px solid #fff; background:rgba(0,0,0,0.5); }
#hp-bar { height:100%; background:#00ffcc; width:100%; transition:0.1s; }
h1 { font-size:18px; margin:40px 0; color:#00d4ff; text-shadow:0 0 20px #00d4ff; }
.section-title { font-size:10px; margin:25px 0 10px; color:#446688; border-bottom:1px solid #1a334d; width:85%; text-align:center; }
.grid { display:grid; grid-template-columns:repeat(3, 1fr); gap:10px; width:95%; max-width:650px; margin-bottom:30px; }
.btn { background:rgba(255,255,255,0.05); border:1px solid #2a4a6a; padding:12px 5px; cursor:pointer; text-align:center; border-radius:4px; font-size:8px; color:#fff; }
.btn:hover { background:rgba(255,255,255,0.15); border-color:#fff; }
.equipped { border-color:#00ffcc!important; box-shadow:0 0 10px #00ffcc; }
#coin-info { color:#ffd700; margin-bottom:10px; font-size:14px; }
.copy { font-size:7px; color:rgba(255,255,255,0.3); margin:30px 0; }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<canvas id="game-canvas"></canvas>

<div id="hud">
    <div id="score-display">SCORE: <span id="s-val">0</span></div>
    <div id="hp-container"><div id="hp-bar"></div></div>
</div>

<div id="menu">
    <h1>MINAMI PROJECT 2026</h1>
    <div id="coin-info">COINS: <span id="c-val">0</span></div>
    <div class="section-title">SELECT STAGE</div>
    <div id="stage-grid" class="grid"></div>
    <div class="section-title">SHOP</div>
    <div id="shop-grid" class="grid">
        <div id="shop-Default" class="btn" onclick="buy('skin','Default',0)">Standard</div>
        <div id="shop-Star" class="btn" onclick="buy('skin','Star',1000)">Star (1k)</div>
        <div id="shop-Train" class="btn" onclick="buy('skin','Train',3000)">Train (3k)</div>
        <div id="shop-Heal" class="btn" onclick="buy('item','Heal',5000)">Repair (5k)</div>
        <div id="shop-Burst" class="btn" onclick="buy('item','Burst',10000)">Burst (10k)</div>
    </div>
    <div class="copy">© 2026 MINAMI ALL RIGHTS RESERVED.</div>
</div>

<script>
const bg=document.getElementById('bg-canvas'), bctx=bg.getContext('2d');
const cvs=document.getElementById('game-canvas'), ctx=cvs.getContext('2d');
let w, h; 
function resize() {
    w=cvs.width=bg.width=window.innerWidth;
    h=cvs.height=bg.height=window.innerHeight;
}
window.onresize=resize; resize();

// 背景描画（軽量版）
let t=0;
function drawBg(){
    bctx.fillStyle='#000510'; bctx.fillRect(0,0,w,h); t+=0.01;
    bctx.strokeStyle='rgba(0,100,255,0.1)';
    for(let i=0;i<5;i++){
        bctx.beginPath();
        for(let x=0;x<w;x+=30){ bctx.lineTo(x, h*0.5+Math.sin(x*0.005+t+i)*50); }
        bctx.stroke();
    }
    requestAnimationFrame(drawBg);
}
drawBg();

// セーブデータ（あなたの指定形式）
let save=JSON.parse(localStorage.getItem('minami_final_stable')||'{"coins":0,"owned":["Default"],"skin":"Default","items":[],"cleared":[],"perfect":[]}');

const modes={
    'ST=SB':{c:'#ffff00',d:1,g:'warp'}, 'ST=KT':{c:'#0088ff',d:1.2,g:'dash'}, 'ST=SK':{c:'#00ff44',d:1.5,g:'shield'},
    'ST=KY':{c:'#ff0044',d:1.8,g:'wind'}, 'ST=PK':{c:'#ff0044',d:2.2,g:'dash'}, 'ST=JB':{c:'#00ff44',d:2.6,g:'shield'},
    'ST=HM':{c:'#0088ff',d:3,g:'warp'}, 'ST=KS':{c:'#ffff00',d:3.5,g:'wind'}, 'ST=TY':{c:'#0088ff',d:4,g:'dash'},
    'ST=HA':{c:'#ffff00',d:6,g:'mix'}, 'ST=HB':{c:'#00ff44',d:8,g:'mix'}, 'ST=HC':{c:'#ff0044',d:12,g:'mix'},
    'ST=CO':{c:'#ff6600',d:30,g:'rush'}
};

function updateUI(){
    const grid=document.getElementById('stage-grid'), main=['ST=SB','ST=KT','ST=SK','ST=KY','ST=PK','ST=JB','ST=HM','ST=KS','ST=TY'], hide=['ST=HA','ST=HB','ST=HC'];
    grid.innerHTML=''; const allM=main.every(s=>save.cleared.includes(s)), allP=[...main,...hide].every(s=>save.perfect.includes(s));
    Object.keys(modes).forEach(id=>{
        if(hide.includes(id)&&!allM) return; if(id==='ST=CO'&&!allP) return;
        const b=document.createElement('div'); b.className='btn'; b.style.color=b.style.borderColor=modes[id].c;
        b.innerHTML=id+(save.perfect.includes(id)?'<br>PERFECT':save.cleared.includes(id)?'<br>CLEARED':'');
        b.onclick=()=>startGame(id); grid.appendChild(b);
    });
    document.getElementById('c-val').innerText=save.coins;
    document.querySelectorAll('.btn').forEach(el=>el.classList.remove('equipped'));
    const sEl=document.getElementById('shop-'+save.skin); if(sEl) sEl.classList.add('equipped');
    save.items.forEach(i=>{ const iEl=document.getElementById('shop-'+i); if(iEl) iEl.classList.add('equipped'); });
}

let active=false, player, bullets=[], enemies=[], enemyBullets=[], coins=[], current, frame=0, score=0, firing=false;

// ゲーム開始処理（ここでフラグをリセット）
function startGame(id){
    current=id; active=true; score=0; frame=0; bullets=[]; enemies=[]; enemyBullets=[]; coins=[]; firing=false;
    player={ x:w/2, y:h-100, hp:100, inv:0 };
    document.getElementById('menu').style.display='none';
    document.getElementById('hud').style.visibility='visible';
    requestAnimationFrame(loop);
}

// 入力イベント（document全体で取得し、ゲーム中のみ有効化）
window.addEventListener('mousedown', (e)=> { if(active) firing=true; });
window.addEventListener('mouseup', ()=> { firing=false; });
window.addEventListener('mousemove', (e)=> { if(active) { player.x=e.clientX; player.y=e.clientY; } });
window.addEventListener('keydown', (e)=> { if(active && e.code==='Space' && save.items.includes('Burst')) { enemyBullets=[]; score+=500; } });

function loop(){
    if(!active) return;
    frame++; ctx.clearRect(0,0,w,h);

    // 回復・無敵時間
    if(save.items.includes('Heal') && frame%120===0) player.hp=Math.min(100, player.hp+1);
    if(player.inv > 0) player.inv--;

    // 自機弾の生成と移動
    if(firing && frame%7===0) bullets.push({x:player.x, y:player.y-20});
    bullets.forEach((b,bi)=>{
        b.y-=15; ctx.fillStyle='#00ffff'; ctx.fillRect(b.x-2, b.y, 4, 12);
        if(b.y < 0) bullets.splice(bi,1);
        enemies.forEach((e,ei)=>{
            if(Math.hypot(b.x-e.x, b.y-e.y)<30){
                e.hp--; bullets.splice(bi,1);
                if(e.hp<=0){
                    enemies.splice(ei,1); score+=100;
                    for(let i=0;i<2;i++) coins.push({x:e.x, y:e.y, vx:(Math.random()-0.5)*10, vy:(Math.random()-0.5)*10});
                }
            }
        });
    });

    // 敵機生成（路線のギミックを注入）
    if(Math.random() < 0.02 * modes[current].d) enemies.push({x:Math.random()*w, y:-50, hp:3*modes[current].d, g:modes[current].g});
    enemies.forEach((e,ei)=>{
        if(e.g==='warp'&&frame%80===0){ e.x=Math.random()*w; e.y+=40; }
        else if(e.g==='dash') e.y+=8;
        else if(e.g==='wind') { e.x+=Math.sin(frame*0.1)*8; e.y+=3; }
        else if(e.g==='rush') { e.y+=12; e.x+=(Math.random()-0.5)*15; }
        else e.y+=3;

        ctx.strokeStyle=modes[current].c; ctx.lineWidth=3; ctx.strokeRect(e.x-15, e.y-15, 30, 30);
        if(frame%90===0) enemyBullets.push({x:e.x, y:e.y+20, vy:5 + modes[current].d});
        if(Math.hypot(e.x-player.x, e.y-player.y)<30 && player.inv<=0){ player.hp-=20; player.inv=60; }
        if(e.y>h+50) enemies.splice(ei,1);
    });

    // 敵弾
    enemyBullets.forEach((eb,ebi)=>{
        eb.y+=eb.vy; ctx.fillStyle='#ff3333'; ctx.beginPath(); ctx.arc(eb.x, eb.y, 6, 0, 7); ctx.fill();
        if(Math.hypot(eb.x-player.x, eb.y-player.y)<15 && player.inv<=0){ player.hp-=10; player.inv=60; enemyBullets.splice(ebi,1); }
        if(eb.y>h) enemyBullets.splice(ebi,1);
    });

    // コイン（磁石ギミック）
    coins.forEach((c,ci)=>{
        let d=Math.hypot(player.x-c.x, player.y-c.y);
        if(d<200){ c.vx+=(player.x-c.x)/d*0.8; c.vy+=(player.y-c.y)/d*0.8; }
        c.x+=c.vx; c.y+=c.vy; c.vx*=0.95; c.vy*=0.95;
        ctx.fillStyle='#ffd700'; ctx.beginPath(); ctx.arc(c.x, c.y, 4, 0, 7); ctx.fill();
        if(d<25){ save.coins+=20; coins.splice(ci,1); }
    });

    // 自機（スキン反映）
    ctx.save(); ctx.translate(player.x, player.y);
    if(player.inv%4 < 2){
        ctx.fillStyle='#fff';
        if(save.skin==='Star'){ for(let i=0;i<5;i++){ctx.rotate(Math.PI*2/5);ctx.lineTo(0,-15);ctx.rotate(Math.PI*2/10);ctx.lineTo(0,-7);} ctx.fill(); }
        else if(save.skin==='Train'){ ctx.fillRect(-12,-15,24,30); ctx.fillStyle='#000'; ctx.fillRect(-12,2,24,3); }
        else { ctx.beginPath(); ctx.moveTo(0,-18); ctx.lineTo(15,12); ctx.lineTo(-15,12); ctx.fill(); }
    }
    ctx.restore();

    document.getElementById('s-val').innerText=score;
    document.getElementById('hp-bar').style.width=player.hp+'%';
    if(score >= modes[current].d*3000) end(true);
    if(player.hp <= 0) end(false);
    if(active) requestAnimationFrame(loop);
}

function end(win){
    active=false;
    if(win){
        if(!save.cleared.includes(current)) save.cleared.push(current);
        if(player.hp>=100) save.perfect.push(current);
    }
    localStorage.setItem('minami_final_stable', JSON.stringify(save));
    updateUI(); document.getElementById('menu').style.display='flex'; document.getElementById('hud').style.visibility='hidden';
}

function buy(type,name,price){
    if(!save.owned.includes(name)){
        if(save.coins>=price){ save.coins-=price; save.owned.push(name); }
        else return;
    }
    if(type==='skin') save.skin=name; if(type==='item') save.items.push(name);
    localStorage.setItem('minami_final_stable', JSON.stringify(save)); updateUI();
}
updateUI();
</script>
</body>
</html>
