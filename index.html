<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Minami Project 2026: Metal Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+JP:wght@300;700&display=swap');
        
        body { margin: 0; background: #000810; color: #e0e0e0; font-family: 'Press Start 2P', cursive; overflow: hidden; }
        canvas { display: block; }

        /* HUD */
        #hud { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; }
        #score-val { font-size: 20px; color: #fff; text-shadow: 0 0 10px #0088ff; }
        #hp-bar { width: 200px; height: 10px; background: rgba(255,255,255,0.1); border: 1px solid #fff; margin-top: 10px; }
        #hp-fill { height: 100%; background: #00ff00; width: 100%; transition: width 0.3s; }
        #coin-display { color: #ffd700; font-size: 14px; margin-top: 5px; }

        /* オーバーレイ（メニュー） */
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,8,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 20; }
        .panel { display: none; flex-direction: column; align-items: center; width: 90%; max-height: 85vh; overflow-y: auto; }
        .active { display: flex; }

        h1 { font-size: 22px; color: #fff; margin-bottom: 30px; letter-spacing: 4px; text-align: center; }
        .main-nav { display: flex; gap: 15px; margin-bottom: 40px; }
        .nav-btn { padding: 12px 20px; border: 2px solid #fff; background: none; color: #fff; cursor: pointer; font-family: 'Press Start 2P'; font-size: 9px; transition: 0.3s; }
        .nav-btn:hover { background: #fff; color: #000; box-shadow: 0 0 15px #fff; }

        /* ステージセレクト */
        .mode-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .mode-btn { width: 130px; padding: 12px; border: 2px solid #333; background: #050505; color: #444; cursor: pointer; text-align: center; position: relative; }
        .mode-btn.unlocked { border-color: var(--c); color: var(--c); }
        .mode-btn.unlocked:hover { background: var(--c); color: #000; box-shadow: 0 0 20px var(--c); transform: scale(1.05); }
        .mode-btn.cleared::after { content: '✔'; position: absolute; top: 2px; right: 5px; color: #0f0; font-size: 10px; }

        /* ショップ */
        .shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 600px; }
        .shop-item { padding: 15px; border: 1px solid #555; background: rgba(255,255,255,0.05); cursor: pointer; font-size: 8px; line-height: 1.5; }
        .shop-item:hover { background: rgba(255,255,255,0.15); border-color: #fff; }

        #guide-text { font-family: 'Noto Sans JP'; font-size: 13px; line-height: 1.8; color: #aaa; text-align: left; max-width: 600px; background: rgba(255,255,255,0.05); padding: 20px; }
        
        .status-msg { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 24px; pointer-events: none; opacity: 0; transition: 0.5s; color: #fff; z-index: 5; text-shadow: 0 0 10px #00f; }
    </style>
</head>
<body>

    <div id="hud">
        <div id="score-val">SCORE: 000000</div>
        <div id="hp-bar"><div id="hp-fill"></div></div>
        <div id="coin-display">COINS: 0</div>
    </div>

    <div id="overlay">
        <h1>MINAMI PROJECT 2026</h1>
        
        <div class="main-nav" id="main-nav">
            <button class="nav-btn" onclick="openPanel('stage-select')">STAGE SELECT</button>
            <button class="nav-btn" onclick="openPanel('shop')">SHOP</button>
            <button class="nav-btn" onclick="openPanel('how-to')">HOW TO PLAY</button>
        </div>

        <div id="stage-select" class="panel">
            <div class="mode-grid" id="grid"></div>
            <button class="nav-btn" style="margin-top:30px;" onclick="backToMain()">BACK</button>
        </div>

        <div id="shop" class="panel">
            <div id="shop-coins" style="color:#ffd700; margin-bottom:20px; font-size: 14px;"></div>
            <div class="shop-grid">
                <div class="shop-item" onclick="buyItem('atk')">ATK POWER UP (500C)<br>現在の攻撃力を強化</div>
                <div class="shop-item" onclick="buyItem('heal')">HP RECOVERY (200C)<br>機体のダメージを全快</div>
                <div class="shop-item" onclick="buyItem('aura_blue')">CYAN AURA (2000C)<br>風の影響を無効化する</div>
            </div>
            <button class="nav-btn" style="margin-top:30px;" onclick="backToMain()">BACK</button>
        </div>

        <div id="how-to" class="panel">
            <div id="guide-text">
                <h3>■ プレイガイド</h3>
                ・マウス：自機の移動 / 左クリック：ショット<br>
                ・各ステージは3つのフェーズで構成。Phase 3の最後にボスが登場します。<br>
                ・通常ステージ(SB~S3)をすべてクリアすると隠しステージが解放されます。<br>
                ・スコアは敵撃破やボスへのダメージで加算されます。
            </div>
            <button class="nav-btn" style="margin-top:30px;" onclick="backToMain()">BACK</button>
        </div>
    </div>

    <div id="msg" class="status-msg"></div>
    <canvas id="game"></canvas>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;

        let gameActive = false, score = 0, hp = 100, frame = 0, phase = 1, phaseKills = 0;
        let bullets = [], eBullets = [], enemies = [], ripples = [];
        let player = { x: canvas.width/2, y: canvas.height/2 };
        let currentMode = null;

        // --- セーブデータ (初期開放設定) ---
        const NORMAL_STAGES = ['SB', 'KT', 'SK', 'KY', 'PK', 'JB', 'S1', 'S2', 'S3'];
        let userData = JSON.parse(localStorage.getItem('minami_save_v2')) || {
            coins: 0,
            atkLevel: 1,
            unlocked: [...NORMAL_STAGES], // 最初から通常9ステージを開放
            cleared: [],
            aura: 'none'
        };

        const save = () => localStorage.setItem('minami_save_v2', JSON.stringify(userData));

        const STAGES = {
            'SB': { name: 'ST=SB', color: '#ccaa00', stars: '★', diff: 1, bossHp: 100 },
            'KT': { name: 'ST=KT', color: '#0088cc', stars: '★', diff: 1.2, bossHp: 120 },
            'SK': { name: 'ST=SK', color: '#008844', stars: '★★', diff: 1.5, bossHp: 150 },
            'KY': { name: 'ST=KY', color: '#aa0022', stars: '★★★', diff: 2, bossHp: 200 },
            'PK': { name: 'ST=PK', color: '#cc5588', stars: '★★★', diff: 2.2, bossHp: 220 },
            'JB': { name: 'ST=JB', color: '#006666', stars: '★★★★', diff: 2.5, bossHp: 250 },
            'S1': { name: 'ST=S1', color: '#6600cc', stars: '★★★★', diff: 2.8, bossHp: 300 },
            'S2': { name: 'ST=S2', color: '#cc00cc', stars: '★★★★★', diff: 3.2, bossHp: 350 },
            'S3': { name: 'ST=S3', color: '#00cccc', stars: '★★★★★', diff: 3.5, bossHp: 400 },
            // 隠し（表）
            'HA': { name: 'ST=HA', color: '#CD7F32', stars: '★★★★★★', diff: 5, bossHp: 800, secret: true },
            'HB': { name: 'ST=HB', color: '#C0C0C0', stars: '★★★★★★★', diff: 7, bossHp: 1200, secret: true },
            'HC': { name: 'ST=HC', color: '#FFD700', stars: '★★★★★★★★', diff: 9, bossHp: 2000, secret: true },
            // 隠し（真・裏）
            'UA': { name: 'ST=UA', color: '#444', stars: '★★★★★★★★★', diff: 12, bossHp: 3000, secret: true },
            'UB': { name: 'ST=UB', color: '#fff', stars: '★★★★★★★★★', diff: 15, bossHp: 4000, secret: true },
            'CO': { name: 'ST=CO', color: '#cc6600', stars: '★★★★★★★★★★', diff: 20, bossHp: 9999, secret: true }
        };

        function openPanel(id) {
            document.getElementById('main-nav').style.display = 'none';
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'stage-select') renderStages();
            if(id === 'shop') document.getElementById('shop-coins').innerText = `BALANCE: ${userData.coins} C`;
        }

        function backToMain() {
            document.getElementById('main-nav').style.display = 'flex';
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        }

        function renderStages() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            
            // 隠しステージの解禁チェック
            const allNormalCleared = NORMAL_STAGES.every(id => userData.cleared.includes(id));
            if(allNormalCleared) {
                ['HA','HB','HC'].forEach(id => { if(!userData.unlocked.includes(id)) userData.unlocked.push(id); });
            }
            const allHiddenCleared = ['HA','HB','HC'].every(id => userData.cleared.includes(id));
            if(allHiddenCleared) {
                ['UA','UB','CO'].forEach(id => { if(!userData.unlocked.includes(id)) userData.unlocked.push(id); });
            }

            Object.keys(STAGES).forEach(id => {
                const s = STAGES[id];
                const isUnlocked = userData.unlocked.includes(id);
                if(s.secret && !isUnlocked) return; // 未解禁の隠しステージは表示すらしない

                const btn = document.createElement('div');
                btn.className = `mode-btn unlocked ${userData.cleared.includes(id) ? 'cleared' : ''}`;
                btn.style.setProperty('--c', s.color);
                btn.innerHTML = `<div>${s.name}</div><div style="font-size:7px;">${s.stars}</div>`;
                btn.onclick = () => startGame(id);
                grid.appendChild(btn);
            });
        }

        function buyItem(type) {
            if(type === 'atk' && userData.coins >= 500) { userData.coins -= 500; userData.atkLevel += 0.5; }
            if(type === 'heal' && userData.coins >= 200) { userData.coins -= 200; hp = 100; }
            if(type === 'aura_blue' && userData.coins >= 2000) { userData.coins -= 2000; userData.aura = 'cyan'; }
            save(); openPanel('shop');
        }

        function startGame(id) {
            currentMode = { ...STAGES[id], id: id };
            document.getElementById('overlay').style.display = 'none';
            gameActive = true; score = 0; hp = 100; phase = 1; phaseKills = 0;
            enemies = []; bullets = []; eBullets = [];
            showMsg("PHASE 1"); loop();
        }

        function showMsg(t) {
            const m = document.getElementById('msg');
            m.innerText = t; m.style.opacity = 1;
            setTimeout(() => m.style.opacity = 0, 2000);
        }

        function update() {
            frame++;
            // ギミック：KY（京葉線）は風が発生。オーラ装備で無効化
            if(currentMode.id === 'KY' && userData.aura !== 'cyan') player.x += Math.sin(frame/15)*10;

            if(isDown && frame % 5 === 0) bullets.push({ x: player.x, y: player.y - 15, p: userData.atkLevel });

            // 敵生成
            if(!enemies.some(e => e.isBoss) && frame % (Math.max(10, 50 - currentMode.diff * 5)) === 0) {
                if(phaseKills < 15) {
                    enemies.push({ x: Math.random()*canvas.width, y: -30, hp: 2*currentMode.diff, maxHp: 2*currentMode.diff, size: 20, vy: 3 });
                }
            }

            // フェーズ管理
            if(phase < 3 && phaseKills >= 15) {
                phase++; phaseKills = 0; showMsg("PHASE " + phase);
            } else if(phase === 3 && phaseKills >= 15 && !enemies.some(e => e.isBoss)) {
                enemies.push({ x: canvas.width/2, y: -100, hp: currentMode.bossHp, maxHp: currentMode.bossHp, size: 80, vy: 1, isBoss: true });
                showMsg("BOSS APPROACHING");
            }

            // 弾・当たり判定
            bullets.forEach((b, i) => {
                b.y -= 12;
                enemies.forEach((e, ei) => {
                    if(Math.hypot(b.x-e.x, b.y-e.y) < e.size) {
                        e.hp -= b.p; score += 10; // ダメージで加点
                        bullets.splice(i, 1);
                        if(e.hp <= 0) {
                            score += e.isBoss ? 5000 : 100; // 撃破ボーナス
                            userData.coins += e.isBoss ? 500 : 10;
                            if(e.isBoss) finish(true);
                            else { phaseKills++; enemies.splice(ei, 1); }
                        }
                    }
                });
                if(b.y < -20) bullets.splice(i,1);
            });

            enemies.forEach(e => {
                e.y += e.vy;
                if(e.isBoss && e.y > 150) e.vy = 0;
                if(Math.random() < 0.03 * currentMode.diff) eBullets.push({ x: e.x, y: e.y, vy: 5 + currentMode.diff });
            });

            eBullets.forEach((eb, i) => {
                eb.y += eb.vy;
                if(Math.hypot(eb.x-player.x, eb.y-player.y) < 15) {
                    hp -= 10; eBullets.splice(i, 1);
                    if(hp <= 0) finish(false);
                }
                if(eb.y > canvas.height) eBullets.splice(i,1);
            });

            document.getElementById('hp-fill').style.width = hp + "%";
            document.getElementById('score-val').innerText = `SCORE: ${score.toString().padStart(6, '0')}`;
        }

        function draw() {
            ctx.fillStyle = "rgba(0, 5, 10, 0.4)"; ctx.fillRect(0,0,canvas.width, canvas.height);
            
            // オーラ描画
            if(userData.aura === 'cyan') {
                ctx.strokeStyle = "cyan"; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.arc(player.x, player.y, 25+Math.sin(frame/5)*5, 0, 7); ctx.stroke();
            }

            // 自機
            ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(player.x, player.y, 10, 0, 7); ctx.fill();
            
            // 敵
            enemies.forEach(e => {
                ctx.strokeStyle = e.isBoss ? "#f00" : currentMode.color; ctx.lineWidth = 3;
                ctx.strokeRect(e.x-e.size/2, e.y-e.size/2, e.size, e.size);
                if(e.isBoss) {
                    ctx.fillStyle = "#300"; ctx.fillRect(e.x-40, e.y-60, 80, 6);
                    ctx.fillStyle = "#f00"; ctx.fillRect(e.x-40, e.y-60, 80*(e.hp/e.maxHp), 6);
                }
            });

            ctx.fillStyle = "#0ff"; bullets.forEach(b => ctx.fillRect(b.x-2, b.y, 4, 12));
            ctx.fillStyle = "#f0f"; eBullets.forEach(eb => { ctx.beginPath(); ctx.arc(eb.x, eb.y, 5, 0, 7); ctx.fill(); });
        }

        function finish(clear) {
            gameActive = false;
            if(clear) {
                const bonus = hp * 10; // HPボーナス
                score += bonus;
                alert(`RESONANCE SUCCESS!\nScore: ${score}\nHP Bonus: ${bonus}`);
                if(!userData.cleared.includes(currentMode.id)) userData.cleared.push(currentMode.id);
            } else { alert("RESONANCE FAILED..."); }
            save(); location.reload();
        }

        function loop() { if(!gameActive) return; update(); draw(); requestAnimationFrame(loop); }

        let isDown = false;
        window.onmousedown = () => isDown = true; window.onmouseup = () => isDown = false;
        window.onmousemove = e => { player.x = e.clientX; player.y = e.clientY; };

        renderStages();
    </script>
</body>
</html>
