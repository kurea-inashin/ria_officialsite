<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Minami Project 2026: Burst Finale</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+JP:wght@700;900&display=swap');
        
        body { margin: 0; background: #000; color: #fff; font-family: 'Press Start 2P', cursive; overflow: hidden; user-select: none; }
        canvas { display: block; }

        /* HUD: ステータス表示 */
        #hud { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; }
        #score-val { font-size: 24px; text-shadow: 0 0 10px #00ffff; margin-bottom: 10px; }
        .bar-label { font-size: 8px; margin-top: 10px; color: #aaa; }
        .bar-container { width: 250px; height: 14px; background: rgba(255,255,255,0.1); border: 2px solid #fff; border-radius: 7px; overflow: hidden; margin-bottom: 5px; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        #hp-fill { height: 100%; background: linear-gradient(90deg, #ff0055, #00ffaa); width: 100%; transition: width 0.3s; }
        #gauge-fill { height: 100%; background: #00ccff; width: 0%; transition: width 0.1s; }
        #bomb-stock { color: #ffff00; font-size: 14px; text-shadow: 0 0 5px #ffaa00; }

        /* オーバーレイ・メニュー */
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,15,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 20; backdrop-filter: blur(8px); }
        .panel { display: none; flex-direction: column; align-items: center; width: 95%; max-height: 90vh; overflow-y: auto; }
        .active { display: flex; }
        .nav-btn { padding: 12px 24px; border: 3px solid #fff; background: rgba(255,255,255,0.1); color: #fff; cursor: pointer; font-family: 'Press Start 2P'; font-size: 10px; margin: 8px; transition: 0.2s; }
        .nav-btn:hover { background: #fff; color: #000; transform: scale(1.05); box-shadow: 0 0 20px #fff; }

        /* ミッション選択画面 */
        .stage-container { display: flex; gap: 30px; width: 90%; justify-content: center; align-items: flex-start; margin-top: 20px; }
        .mode-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .mode-btn { width: 120px; padding: 10px; border: 2px solid #333; background: #000; color: #444; cursor: pointer; text-align: center; font-size: 8px; transition: 0.2s; position: relative; }
        .mode-btn.unlocked { border-color: var(--c); color: var(--c); }
        .mode-btn.selected { background: var(--c); color: #000 !important; box-shadow: 0 0 15px var(--c); }
        .mode-btn.cleared::after { content: '✔'; position: absolute; top: 2px; right: 2px; color: #0f0; font-size: 10px; }
        .diff-stars { font-size: 7px; color: #ff0; display: block; margin-top: 4px; }
        
        #stage-detail { width: 400px; background: rgba(255,255,255,0.05); padding: 25px; border: 1px solid #444; border-radius: 10px; font-family: 'Noto Sans JP'; min-height: 250px; display: flex; flex-direction: column; }
        .detail-title { font-size: 18px; border-bottom: 2px solid #fff; padding-bottom: 8px; margin-bottom: 12px; font-family: 'Press Start 2P'; }
        .detail-desc { font-size: 13px; color: #ccc; line-height: 1.8; flex-grow: 1; }

        /* 特殊演出 */
        .status-msg { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 36px; opacity: 0; transition: 0.4s; pointer-events: none; z-index: 50; text-align: center; font-weight: 900; }
        #ending { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; flex-direction: column; align-items: center; justify-content: center; text-align: center; font-family: 'Noto Sans JP'; padding: 40px; }

        #copyright { position: absolute; bottom: 15px; font-size: 10px; color: #555; font-family: 'Noto Sans JP'; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="hud">
        <div id="score-val">SCORE: 000000</div>
        <div class="bar-label">ARMOR</div>
        <div class="bar-container"><div id="hp-fill"></div></div>
        <div class="bar-label">BURST GAUGE</div>
        <div class="bar-container"><div id="gauge-fill"></div></div>
        <div id="bomb-stock">BOMBS: </div>
        <div id="gold-val" style="color:#ffd700; font-size:12px; margin-top:5px;">GOLD: 0</div>
    </div>

    <div id="overlay">
        <h1 style="font-size:24px; margin-bottom:20px; text-shadow: 0 0 20px #0088ff;">MINAMI PROJECT 2026</h1>
        
        <div id="main-nav">
            <button class="nav-btn" onclick="openPanel('stage-select')">SELECT MISSION</button>
            <button class="nav-btn" onclick="openPanel('garage')">GARAGE</button>
            <button class="nav-btn" onclick="openPanel('shop')">TECH SHOP</button>
        </div>

        <div id="stage-select" class="panel">
            <div class="stage-container">
                <div class="mode-grid" id="grid"></div>
                <div id="stage-detail">
                    <div class="detail-title" id="det-name">READY?</div>
                    <div class="detail-desc" id="det-desc">左のリストからミッションを選択してください。各路線には独自の戦場ギミックが存在します。</div>
                    <button class="nav-btn" id="start-btn" style="display:none; margin-top:20px; width:100%; border-color:#0f0;" onclick="executeMission()">LAUNCH MISSION</button>
                </div>
            </div>
            <button class="nav-btn" style="margin-top:20px;" onclick="backToMain()">BACK</button>
        </div>

        <div id="garage" class="panel">
            <h2>GARAGE</h2>
            <p style="font-size:10px; color:#aaa;">機体カラーを選択</p>
            <div style="display:flex; gap:10px;">
                <button class="nav-btn" style="border-color:#fff" onclick="setSkin('#fff')">WHITE</button>
                <button class="nav-btn" style="border-color:#0f0" onclick="setSkin('#0f0')">GREEN</button>
                <button class="nav-btn" style="border-color:#0ff" onclick="setSkin('#0ff')">CYAN</button>
                <button class="nav-btn" style="border-color:#ff0" onclick="setSkin('#ff0')">YELLOW</button>
            </div>
            <button class="nav-btn" style="margin-top:40px;" onclick="backToMain()">BACK</button>
        </div>

        <div id="shop" class="panel">
            <h2>TECH SHOP</h2>
            <div id="shop-gold" style="color:#ffd700; font-size:20px; margin-bottom:20px;"></div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; width:500px;">
                <button class="nav-btn" onclick="buy('atk', 1000)">ATK UP (1000G)</button>
                <button class="nav-btn" onclick="buy('heal', 500)">REPAIR (500G)</button>
                <button class="nav-btn" onclick="buy('anti_vibrate', 2000)">STABILIZER (2000G)</button>
                <button class="nav-btn" onclick="buy('anti_fog', 2000)">HEATER (2000G)</button>
            </div>
            <p style="font-size:9px; color:#ff4444; margin-top:20px;">※購入した強化はリロード（ゲーム終了）で消失します</p>
            <button class="nav-btn" style="margin-top:10px;" onclick="backToMain()">BACK</button>
        </div>

        <div id="copyright">© 2026 Minami Rail-Shooting Project. All Rights Reserved.</div>
    </div>

    <div id="ending">
        <h2 style="font-size:40px; color:#ff6600;">MISSION ACCOMPLISHED</h2>
        <p id="end-text" style="font-size:18px; line-height:2.5; max-width:800px; color:#ccc;"></p>
        <button class="nav-btn" onclick="location.reload()">REBOOT SYSTEM</button>
    </div>

    <div id="msg" class="status-msg"></div>
    <canvas id="game"></canvas>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;

        let gameActive = false, score = 0, hp = 100, frame = 0, phase = 1, burstGauge = 0;
        let bullets = [], eBullets = [], enemies = [], particles = [], bombActive = 0;
        let player = { x: canvas.width/2, y: canvas.height/2 };
        let selectedId = null, currentMode = null;
        let isDown = false;

        // セッション限りの強化（リロードで消える）
        let sessionData = { atk: 2, items: [] };

        // 永続保存データ
        const NORMAL_STAGES = ['SB', 'KT', 'SK', 'KY', 'PK', 'JB', 'S1', 'S2', 'S3'];
        let userData = JSON.parse(localStorage.getItem('minami_2026_final')) || {
            gold: 0, bombs: 1, unlocked: [...NORMAL_STAGES], cleared: [], skin: '#fff'
        };

        const STAGES = {
            'SB': { name: 'ST=SB', color: '#ccaa00', stars: 1, diff: 1.0, bossHp: 500, gimmick: 'vibrate', desc: "【総武線】黄色の戦域。機体が激しく揺れる「振動」が発生。ショップのSTABILIZERで無効化可能。" },
            'KT': { name: 'ST=KT', color: '#0088cc', stars: 1, diff: 1.2, bossHp: 700, desc: "【京浜東北線】青の戦域。標準的な難易度。敵機のスピードがやや速いため、的確な射撃が求められる。" },
            'SK': { name: 'ST=SK', color: '#008844', stars: 2, diff: 1.5, bossHp: 900, gimmick: 'fog', desc: "【埼京線】緑の戦域。視界を遮る「霧」が発生。描画が不安定になるため、HEATER装備での対策を推奨。" },
            'KY': { name: 'ST=KY', color: '#aa0022', stars: 2, diff: 2.0, bossHp: 1200, gimmick: 'wind', desc: "【京葉線】赤の戦域。海沿いの強風により、自機が常に横方向へ流される。絶え間ない位置修正が必要。" },
            'PK': { name: 'ST=PK', color: '#cc5588', stars: 3, diff: 2.2, bossHp: 1400, gimmick: 'reverse', desc: "【ピンク】特殊戦域。操作系が「反転」する異常空間。マウスの動きと逆方向に機体が動く難所。" },
            'JB': { name: 'ST=JB', color: '#006666', stars: 3, diff: 2.5, bossHp: 1600, desc: "【常磐線】エメラルドの戦域。敵の耐久力が向上している。ショップでATK UPを購入して挑め。" },
            'S1': { name: 'ST=S1', color: '#6600cc', stars: 4, diff: 3.0, bossHp: 2000, desc: "【半蔵門線】紫の戦域。敵の弾幕密度が上昇。ボム（右クリック）を出し惜しみせずに進め。" },
            'S2': { name: 'ST=S2', color: '#cc00cc', stars: 4, diff: 3.5, bossHp: 2500, gimmick: 'poison', desc: "【新宿線】マゼンタの戦域。汚染物質により、時間経過で装甲(HP)が徐々に減少する。短期決戦が必須。" },
            'S3': { name: 'ST=S3', color: '#00cccc', stars: 5, diff: 4.0, bossHp: 3000, gimmick: 'gravity', desc: "【東西線】スカイブルーの戦域。強力な重力により自機が常に下方へ引っ張られる。操作難易度が高い。" },
            'HA': { name: 'ST=HA', color: '#CD7F32', stars: 8, diff: 6, secret: true, desc: "【隠し：銅】全モードクリアで解禁される高難度。敵弾が容赦なく降り注ぐ。" },
            'HB': { name: 'ST=HB', color: '#C0C0C0', stars: 12, diff: 10, secret: true, desc: "【隠し：銀】さらに苛烈な攻撃。ここからはショップの強化なしでは突破困難。" },
            'HC': { name: 'ST=HC', color: '#FFD700', stars: 18, diff: 15, secret: true, desc: "【隠し：金】黄金の弾幕。もはや回避は不可能に近い。最強の攻撃力で敵をねじ伏せろ。" },
            'UA': { name: 'ST=UA', color: '#444', stars: 25, diff: 25, secret: true, desc: "【超鬼：黒】絶望の深淵。敵機が見えにくい。純粋な技量が試される。" },
            'UB': { name: 'ST=UB', color: '#fff', stars: 40, diff: 40, secret: true, desc: "【超鬼：白】極限の弾幕。画面全体が白に染まる。南プロジェクトの最終試練の一つ。" },
            'CO': { name: 'ST=CO', color: '#ff6600', stars: 99, diff: 80, secret: true, ultimate: true, desc: "【中央線】オレンジの超新星。全ステージ完全制覇者のみが到達できる伝説の終着駅。グッドラック。" }
        };

        function save() { localStorage.setItem('minami_2026_final', JSON.stringify(userData)); }

        function selectStage(id) {
            selectedId = id;
            const s = STAGES[id];
            const detName = document.getElementById('det-name');
            detName.innerText = s.name;
            detName.style.color = s.color;
            document.getElementById('det-desc').innerText = s.desc;
            document.getElementById('start-btn').style.display = 'block';
            renderStages();
        }

        function renderStages() {
            const grid = document.getElementById('grid'); grid.innerHTML = '';
            // 解禁判定
            if(NORMAL_STAGES.every(id => userData.cleared.includes(id))) 
                ['HA','HB','HC'].forEach(id => !userData.unlocked.includes(id) && userData.unlocked.push(id));
            if(['HA','HB','HC'].every(id => userData.cleared.includes(id)))
                ['UA','UB'].forEach(id => !userData.unlocked.includes(id) && userData.unlocked.push(id));
            if(['UA','UB'].every(id => userData.cleared.includes(id)))
                !userData.unlocked.includes('CO') && userData.unlocked.push('CO');

            Object.keys(STAGES).forEach(id => {
                if(STAGES[id].secret && !userData.unlocked.includes(id)) return;
                const btn = document.createElement('div');
                btn.className = `mode-btn unlocked ${userData.cleared.includes(id) ? 'cleared' : ''} ${selectedId === id ? 'selected' : ''}`;
                btn.style.setProperty('--c', STAGES[id].color);
                btn.innerHTML = `${STAGES[id].ultimate ? "CENTRAL ORE" : STAGES[id].name}<br><span class="diff-stars">${"★".repeat(STAGES[id].stars > 10 ? 10 : STAGES[id].stars)}${STAGES[id].stars > 10 ? "+" : ""}</span>`;
                btn.onclick = () => selectStage(id);
                grid.appendChild(btn);
            });
        }

        function executeMission() { if(selectedId) startGame(selectedId); }

        function startGame(id) {
            currentMode = { ...STAGES[id], id: id };
            document.getElementById('overlay').style.display = 'none';
            gameActive = true; score = 0; hp = 100; phase = 1; burstGauge = 0;
            enemies = []; bullets = []; eBullets = []; particles = [];
            showMsg("MISSION START", "#fff"); loop();
        }

        function showMsg(t, color) {
            const m = document.getElementById('msg');
            m.innerText = t; m.style.color = color; m.style.opacity = 1;
            setTimeout(() => m.style.opacity = 0, 2000);
        }

        function openPanel(id) {
            document.getElementById('main-nav').style.display = 'none';
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'stage-select') renderStages();
            if(id === 'shop') document.getElementById('shop-gold').innerText = `GOLD: ${userData.gold}`;
        }

        function backToMain() {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.getElementById('main-nav').style.display = 'block';
        }

        function buy(type, cost) {
            if(userData.gold >= cost) {
                userData.gold -= cost;
                if(type === 'atk') sessionData.atk += 1;
                if(type === 'heal') hp = 100;
                if(type.startsWith('anti_')) sessionData.items.push(type);
                save(); openPanel('shop');
            }
        }

        function setSkin(c) { userData.skin = c; save(); }

        function useBomb() {
            if(userData.bombs > 0 && bombActive <= 0) {
                userData.bombs--; bombActive = 60; eBullets = [];
                enemies.forEach(e => {
                    e.hp -= 1000 * (sessionData.atk/2);
                    createExplosion(e.x, e.y, "#fff");
                });
                showMsg("MAXIMUM BURST!!", "#00ffff");
            }
        }

        function createExplosion(x, y, color) {
            for(let i=0; i<10; i++) particles.push({ x: x, y: y, vx: (Math.random()-0.5)*12, vy: (Math.random()-0.5)*12, life: 25, color: color });
        }

        function update() {
            frame++; if(bombActive > 0) bombActive--;

            // フェーズ管理
            if(phase === 1 && score >= 5000) { phase = 2; showMsg("PHASE 2", "#ff0"); }
            if(phase === 2 && score >= 15000) { phase = 3; showMsg("BOSS DETECTED", "#f00"); }

            // --- ギミック処理 ---
            if(currentMode.gimmick === 'vibrate' && !sessionData.items.includes('anti_vibrate')) { 
                player.x += (Math.random()-0.5)*15; player.y += (Math.random()-0.5)*15; 
            }
            if(currentMode.gimmick === 'wind') player.x += Math.sin(frame/20)*10;
            if(currentMode.gimmick === 'gravity') player.y += 4;
            if(currentMode.gimmick === 'poison' && frame % 60 === 0) hp -= 1;

            // 射撃 (1-way 固定)
            if(isDown && frame % 5 === 0) bullets.push({ x: player.x, y: player.y - 20, p: sessionData.atk });

            // 敵生成
            if(!enemies.some(e => e.isBoss) && frame % 35 === 0) {
                enemies.push({ x: Math.random()*canvas.width, y: -50, hp: 15*currentMode.diff, size: 30, vy: 3 + currentMode.diff/4 });
            }
            if(phase === 3 && !enemies.some(e => e.isBoss)) {
                enemies.push({ x: canvas.width/2, y: -100, hp: currentMode.bossHp, maxHp: currentMode.bossHp, size: 130, vy: 1, isBoss: true });
            }

            // 当たり判定
            bullets.forEach((b, i) => {
                b.y -= 20;
                enemies.forEach((e, ei) => {
                    if(Math.hypot(b.x-e.x, b.y-e.y) < e.size) {
                        e.hp -= b.p; score += 20; bullets.splice(i, 1);
                        if(e.hp <= 0) {
                            createExplosion(e.x, e.y, currentMode.color);
                            if(e.isBoss) finish(true);
                            else {
                                score += 500; userData.gold += Math.floor(10 * currentMode.diff);
                                burstGauge += 10;
                                if(burstGauge >= 100) { burstGauge = 0; userData.bombs++; showMsg("BOMB READY!", "#ff0"); }
                                enemies.splice(ei, 1);
                            }
                        }
                    }
                });
            });

            enemies.forEach(e => {
                e.y += e.vy;
                if(e.isBoss && e.y > 150) e.vy = 0;
                if(e.isBoss && bombActive <= 0) {
                    if(frame % 4 === 0) eBullets.push({ x: e.x, y: e.y, vx: Math.cos(frame*0.25)*8, vy: Math.sin(frame*0.25)*8, size: 8 });
                } else if(Math.random() < 0.04 * currentMode.diff && bombActive <= 0) {
                    eBullets.push({ x: e.x, y: e.y, vx: 0, vy: 6 + currentMode.diff/2, size: 6 });
                }
            });

            eBullets.forEach((eb, i) => {
                eb.x += eb.vx || 0; eb.y += eb.vy;
                if(Math.hypot(eb.x-player.x, eb.y-player.y) < 18) {
                    hp -= 15; eBullets.splice(i, 1);
                    createExplosion(player.x, player.y, "#f00");
                    if(hp <= 0) finish(false);
                }
            });

            particles.forEach((p, i) => { p.x += p.vx; p.y += p.vy; p.life--; if(p.life <= 0) particles.splice(i, 1); });

            // UI
            document.getElementById('hp-fill').style.width = Math.max(0, hp) + "%";
            document.getElementById('gauge-fill').style.width = burstGauge + "%";
            document.getElementById('score-val').innerText = `SCORE: ${score.toString().padStart(6, '0')}`;
            document.getElementById('bomb-stock').innerText = `BOMBS: ${"★".repeat(userData.bombs)}`;
            document.getElementById('gold-val').innerText = `GOLD: ${userData.gold}`;
        }

        function draw() {
            ctx.fillStyle = "rgba(0, 8, 20, 0.4)"; ctx.fillRect(0,0,canvas.width, canvas.height);
            if(bombActive > 0) { ctx.fillStyle = `rgba(255, 255, 255, ${bombActive/60})`; ctx.fillRect(0,0,canvas.width, canvas.height); }
            
            // 霧ギミック (HEATERで無効化)
            if(currentMode.gimmick === 'fog' && !sessionData.items.includes('anti_fog')) {
                if(frame % 20 < 10) return;
            }

            ctx.fillStyle = userData.skin; ctx.beginPath();
            ctx.moveTo(player.x, player.y - 18); ctx.lineTo(player.x + 14, player.y + 12); ctx.lineTo(player.x - 14, player.y + 12);
            ctx.closePath(); ctx.fill();

            enemies.forEach(e => {
                ctx.strokeStyle = e.isBoss ? "#f00" : currentMode.color; ctx.lineWidth = 5;
                ctx.strokeRect(e.x-e.size/2, e.y-e.size/2, e.size, e.size);
                if(e.isBoss) {
                    ctx.fillStyle = "#200"; ctx.fillRect(e.x-70, e.y-95, 140, 12);
                    ctx.fillStyle = "#f00"; ctx.fillRect(e.x-70, e.y-95, 140*(e.hp/e.maxHp), 12);
                }
            });
            ctx.fillStyle = "#0ff"; bullets.forEach(b => ctx.fillRect(b.x-4, b.y, 8, 22));
            eBullets.forEach(eb => { ctx.fillStyle = "#ff00ff"; ctx.beginPath(); ctx.arc(eb.x, eb.y, eb.size, 0, 7); ctx.fill(); });
            particles.forEach(p => { ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, 4, 4); });
        }

        function finish(clear) {
            gameActive = false;
            if(clear) {
                if(!userData.cleared.includes(currentMode.id)) userData.cleared.push(currentMode.id);
                userData.gold += 5000; save();
                if(currentMode.id === 'CO') showEnding();
                else { alert("MISSION SUCCESS!\nGOLD +5000"); location.reload(); }
            } else { alert("MISSION FAILED..."); location.reload(); }
        }

        function showEnding() {
            document.getElementById('ending').style.display = 'flex';
            const msg = "中央線のオレンジが宇宙を包み込む…。すべての路線を制覇したあなたに、最高の敬意を。2026年、南プロジェクト完結。";
            let i = 0; const timer = setInterval(() => {
                document.getElementById('end-text').innerText += msg[i];
                i++; if(i >= msg.length) clearInterval(timer);
            }, 50);
        }

        function loop() { if(!gameActive) return; update(); draw(); requestAnimationFrame(loop); }

        window.onmousedown = (e) => { if(e.button === 0) isDown = true; if(e.button === 2) useBomb(); };
        window.onmouseup = () => isDown = false;
        window.onmousemove = e => { 
            if(currentMode && currentMode.gimmick === 'reverse') {
                player.x = canvas.width - e.clientX; player.y = canvas.height - e.clientY;
            } else {
                player.x = e.clientX; player.y = e.clientY; 
            }
        };
        window.onkeydown = e => { if(e.code === 'Space') useBomb(); };

        renderStages();
    </script>
</body>
