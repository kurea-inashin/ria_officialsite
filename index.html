<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Railway Shooting - ST=KY</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; color: #fff; }
        canvas { display: block; }
        #ui { position: absolute; top: 10px; left: 10px; pointer-events: none; text-shadow: 2px 2px 2px #000; }
        #menu { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; background: rgba(0,0,0,0.8); padding: 20px; border: 2px solid #fff; }
        .btn { padding: 10px 20px; margin: 5px; cursor: pointer; border: none; font-weight: bold; color: #fff; display: block; width: 200px; }
        #boss-hp-bar { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); width: 60%; height: 10px; background: #333; display: none; border: 1px solid #fff; }
        #boss-hp-fill { width: 100%; height: 100%; background: #f00; transition: width 0.2s; }
    </style>
</head>
<body>

<div id="ui">
    <div id="mode-display" style="font-size: 24px;">MODE: ST=KY</div>
    <div>SCORE: <span id="score">0</span></div>
    <div>HP: <span id="hp">100</span></div>
    <div>COINS: <span id="coins">0</span></div>
</div>

<div id="boss-hp-bar"><div id="boss-hp-fill"></div></div>

<div id="menu">
    <h2>路線（モード）選択</h2>
    <button class="btn" onclick="startGame('SOBU')" style="background:#FCCE19; color:#000;">総武線 (Easy)</button>
    <button class="btn" onclick="startGame('SAIKYO')" style="background:#00AC9A;">埼京線 (Normal)</button>
    <button class="btn" onclick="startGame('KEIHIN')" style="background:#00A1E2;">京浜東北線 (Hard)</button>
    <button class="btn" onclick="startGame('KEIYO')" style="background:#C9242F;">ST=KY (Very Hard)</button>
    <button id="extra-btn" class="btn" onclick="startGame('CHUO')" style="background:#F39800; display:none;">中央線 (超鬼むず)</button>
    <p id="msg">全路線クリアで隠し解禁</p>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// --- 定数・データ ---
const MODES = {
    SOBU:   { name: "Easy", color: "#FCCE19", line: "総武線" },
    SAIKYO: { name: "Normal", color: "#00AC9A", line: "埼京線" },
    KEIHIN: { name: "Hard", color: "#00A1E2", line: "京浜東北線" },
    KEIYO:  { name: "ST=KY", color: "#C9242F", line: "ST=KY" },
    CHUO:   { name: "Extra", color: "#F39800", line: "中央線" }
};

// --- ゲーム状態 ---
let gameState = "MENU";
let currentMode = MODES.KEIYO;
let score = 0;
let hp = 100;
let coins = 0;
let clearedModes = JSON.parse(localStorage.getItem('clearedModes') || "[]");

let player = { x: canvas.width/2, y: canvas.height-80, size: 25 };
let bullets = [];
let enemies = [];
let particles = [];
let enemyProjectiles = [];
let boss = null;
let frameCount = 0;

// --- 操作 ---
let mouseX = canvas.width/2;
window.addEventListener('mousemove', e => mouseX = e.clientX);
window.addEventListener('touchmove', e => { e.preventDefault(); mouseX = e.touches[0].clientX; }, {passive:false});
window.addEventListener('mousedown', shoot);
window.addEventListener('touchstart', shoot);

function shoot() {
    if(gameState === "PLAYING") {
        bullets.push({ x: player.x, y: player.y - 20, v: -10 });
    }
}

// --- ゲームループ ---
function startGame(modeKey) {
    currentMode = MODES[modeKey];
    gameState = "PLAYING";
    score = 0; hp = 100; bullets = []; enemies = []; enemyProjectiles = []; boss = null;
    document.getElementById('menu').style.display = 'none';
    document.getElementById('mode-display').innerText = `MODE: ${currentMode.line}`;
    document.getElementById('mode-display').style.color = currentMode.color;
}

function update() {
    if(gameState !== "PLAYING") return;

    frameCount++;
    player.x += (mouseX - player.x) * 0.1; // 滑らかな追従

    // 弾の移動
    bullets.forEach((b, i) => {
        b.y += b.v;
        if(b.y < 0) bullets.splice(i, 1);
    });

    // 敵の生成 (15種類の出現パターンをシミュレート)
    if(frameCount % 40 === 0 && !boss) {
        enemies.push({ 
            x: Math.random() * (canvas.width - 40) + 20, 
            y: -50, 
            hp: currentMode === MODES.CHUO ? 5 : 2,
            type: "zako" 
        });
    }

    // ボス出現 (スコア1000ごと)
    if(score > 0 && score % 1000 === 0 && !boss) {
        boss = { x: canvas.width/2, y: -100, hp: 50, maxHp: 50, phase: 1 };
        document.getElementById('boss-hp-bar').style.display = 'block';
    }

    // 敵・ボスの挙動
    enemies.forEach((en, i) => {
        en.y += 2;
        // 衝突判定
        bullets.forEach((b, bi) => {
            if(Math.hypot(en.x - b.x, en.y - b.y) < 25) {
                en.hp--;
                bullets.splice(bi, 1);
                if(en.hp <= 0) {
                    enemies.splice(i, 1);
                    score += 100;
                    coins += Math.random() > 0.7 ? 1 : 0;
                }
            }
        });
        if(en.y > canvas.height) { enemies.splice(i, 1); hp -= 10; }
    });

    if(boss) {
        if(boss.y < 100) boss.y += 2;
        else {
            boss.x = canvas.width/2 + Math.sin(frameCount/20) * 100;
            if(frameCount % 30 === 0) {
                enemyProjectiles.push({x: boss.x, y: boss.y, vx: Math.sin(frameCount)*5, vy: 5});
            }
        }
        
        bullets.forEach((b, bi) => {
            if(Math.hypot(boss.x - b.x, boss.y - b.y) < 50) {
                boss.hp--;
                bullets.splice(bi, 1);
                document.getElementById('boss-hp-fill').style.width = (boss.hp/boss.maxHp)*100 + "%";
                if(boss.hp <= 0) {
                    score += 1000;
                    finishStage();
                }
            }
        });
    }

    enemyProjectiles.forEach((ep, i) => {
        ep.x += ep.vx || 0;
        ep.y += ep.vy;
        if(Math.hypot(ep.x - player.x, ep.y - player.y) < 20) {
            hp -= 5;
            enemyProjectiles.splice(i, 1);
        }
    });

    if(hp <= 0) gameOver();
    
    document.getElementById('score').innerText = score;
    document.getElementById('hp').innerText = hp;
    document.getElementById('coins').innerText = coins;
}

function finishStage() {
    boss = null;
    document.getElementById('boss-hp-bar').style.display = 'none';
    if(!clearedModes.includes(currentMode.name)) {
        clearedModes.push(currentMode.name);
        localStorage.setItem('clearedModes', JSON.stringify(clearedModes));
    }
    checkExtraUnlock();
    gameState = "MENU";
    document.getElementById('menu').style.display = 'block';
}

function gameOver() {
    alert("GAME OVER! スコア: " + score);
    gameState = "MENU";
    document.getElementById('menu').style.display = 'block';
    document.getElementById('boss-hp-bar').style.display = 'none';
}

function checkExtraUnlock() {
    const keys = ["Easy", "Normal", "Hard", "ST=KY"];
    const all = keys.every(k => clearedModes.includes(k));
    if(all) document.getElementById('extra-btn').style.display = 'block';
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if(gameState === "PLAYING") {
        // 自機 (路線カラー)
        ctx.fillStyle = currentMode.color;
        ctx.beginPath();
        ctx.moveTo(player.x, player.y - player.size);
        ctx.lineTo(player.x - player.size, player.y + player.size);
        ctx.lineTo(player.x + player.size, player.y + player.size);
        ctx.fill();

        // 弾
        ctx.fillStyle = "#fff";
        bullets.forEach(b => ctx.fillRect(b.x-2, b.y, 4, 15));

        // 敵
        ctx.fillStyle = "#f0f";
        enemies.forEach(en => {
            ctx.fillRect(en.x-15, en.y-15, 30, 30);
        });

        // ボス
        if(boss) {
            ctx.fillStyle = "#ff0";
            ctx.beginPath();
            ctx.arc(boss.x, boss.y, 40, 0, Math.PI*2);
            ctx.fill();
        }

        // 敵の弾
        ctx.fillStyle = "#f00";
        enemyProjectiles.forEach(ep => ctx.beginPath() || ctx.arc(ep.x, ep.y, 5, 0, Math.PI*2) || ctx.fill());
    }
    requestAnimationFrame(() => { update(); draw(); });
}

checkExtraUnlock();
draw();
</script>
</body>
</html>
