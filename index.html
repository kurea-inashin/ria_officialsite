z<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>MINAMI PROJECT 2026: ULTIMATE PHASE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+JP:wght@700;900&display=swap');
        
        body { margin: 0; background: #000; color: #fff; font-family: 'Press Start 2P', cursive; overflow: hidden; user-select: none; }
        canvas { display: block; }

        /* --- UI LAYER --- */
        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        #hud { padding: 25px; display: none; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); }
        #score-val { font-size: 22px; color: #0ff; margin-bottom: 10px; }
        .bar-wrap { width: 250px; height: 12px; background: rgba(255,255,255,0.1); border: 2px solid #fff; margin: 5px 0; position: relative; }
        #hp-bar { height: 100%; background: #f05; width: 100%; transition: 0.3s; }
        #bomb-bar { height: 100%; background: #0cf; width: 0%; }
        .hud-stat { font-size: 10px; color: #ffd700; margin-top: 5px; }

        /* OVERLAY SYSTEM */
        #overlay { position: absolute; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        #main-nav { display: flex; gap: 20px; margin-top: 40px; }
        
        .menu-card { 
            width: 180px; height: 240px; border: 3px solid #fff; background: rgba(255,255,255,0.05);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s;
        }
        .menu-card:hover { background: #fff; color: #000; transform: scale(1.05); }
        .menu-card .icon-box { width: 40px; height: 40px; border: 2px solid currentColor; margin-bottom: 20px; }
        .menu-card span { font-size: 10px; text-align: center; }

        .panel { display: none; flex-direction: column; align-items: center; width: 90%; height: 85vh; background: #000; border: 3px solid #fff; padding: 30px; overflow-y: auto; box-sizing: border-box; }
        .active { display: flex; }
        
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; width: 100%; margin: 20px 0; }
        .item-box { 
            border: 2px solid #444; padding: 15px 5px; text-align: center; font-size: 8px; cursor: pointer; 
            position: relative; transition: 0.2s;
        }
        .item-box:hover:not(.locked) { border-color: #fff; background: rgba(255,255,255,0.1); }
        .item-box.locked { opacity: 0.2; cursor: not-allowed; }
        .item-box.cleared::after { content: 'OK'; position: absolute; top: 2px; right: 2px; color: #0f0; }

        /* BRIEFING & MESSAGES */
        #briefing { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 500px; background: #000; border: 4px solid #fff; padding: 30px;
            display: none; flex-direction: column; z-index: 200;
        }
        #msg-layer { position: absolute; top: 45%; width: 100%; text-align: center; pointer-events: none; z-index: 20; display: none; }
        #msg-txt { font-size: 30px; color: #f00; text-shadow: 0 0 15px #f00; }

        button { padding: 12px 24px; border: 2px solid #fff; background: none; color: #fff; font-family: 'Press Start 2P'; font-size: 10px; cursor: pointer; margin: 5px; }
        button:hover { background: #fff; color: #000; }
    </style>
</head>
<body>

    <div class="ui-layer">
        <div id="hud">
            <div id="score-val">SCORE: 000000</div>
            <div class="bar-wrap"><div id="hp-bar"></div></div>
            <div class="bar-wrap"><div id="bomb-bar"></div></div>
            <div id="bomb-stock" class="hud-stat">BOMBS: </div>
            <div id="gold-stat" class="hud-stat" style="color:#ffd700;">CREDITS: 0</div>
        </div>
    </div>

    <div id="msg-layer"><div id="msg-txt">WARNING</div></div>

    <div id="overlay">
        <h1 style="font-size:28px; letter-spacing:8px;">MINAMI PROJECT 2026</h1>
        <div id="main-nav">
            <div class="menu-card" onclick="openPanel('stage-select')"><span>MISSION</span></div>
            <div class="menu-card" onclick="openPanel('shop')"><span>HANGAR</span></div>
            <div class="menu-card" onclick="openPanel('manual')"><span>MANUAL</span></div>
        </div>

        <div id="stage-select" class="panel">
            <h2>SELECT SECTOR</h2>
            <div class="grid" id="stage-grid"></div>
            <button onclick="backToMain()">CLOSE</button>
        </div>

        <div id="shop" class="panel">
            <h2 id="shop-credits" style="color:#ffd700;">CREDITS: 0</h2>
            <div class="grid" id="shop-grid"></div>
            <button onclick="backToMain()">CLOSE</button>
        </div>

        <div id="manual" class="panel">
            <h2>MANUAL</h2>
            <div style="font-family:'Noto Sans JP'; font-size:14px; line-height:2; color:#ccc;">
                ・【移動】マウス【攻撃】クリック<br>
                ・【道中】Phase 1 (通常敵) -> Phase 2 (精鋭部隊) -> BOSS<br>
                ・【報酬】クリア時の残りHPが多いほどボーナス加算
            </div>
            <button onclick="backToMain()">OK</button>
        </div>
    </div>

    <div id="briefing">
        <h2 id="br-title"></h2>
        <p id="br-desc" style="font-family:'Noto Sans JP'; font-size:12px; margin:20px 0;"></p>
        <button onclick="document.getElementById('briefing').style.display='none'">CANCEL</button>
        <button id="br-engage" style="color:#0f0;">ENGAGE</button>
    </div>

    <canvas id="game"></canvas>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;

        let gameActive = false, score = 0, hp = 100, frame = 0, charge = 0, invul = 0;
        let bullets = [], eBullets = [], enemies = [], particles = [];
        let player = { x: canvas.width/2, y: canvas.height/2, tx: canvas.width/2, ty: canvas.height/2 };
        let isDown = false, currentStg = null, bossObj = null, subPhase = 1;

        const SAVE_KEY = "minami_v2_ultimate";
        let userData = JSON.parse(localStorage.getItem(SAVE_KEY)) || {
            gold: 0, bombs: 2, cleared: [], skin: '#fff', licenses: ['#fff']
        };

        const STAGES = {
            'SB':{n:'ST=SB',c:'#ccaa00',d:1,r:2000,bh:1000,g:'VIB',s:false,desc:'総武線：激しい揺れ。'},
            'KT':{n:'ST=KT',c:'#0088cc',d:1.2,r:3000,bh:1500,g:'WTR',s:false,desc:'京浜東北：水圧。'},
            'SK':{n:'ST=SK',c:'#008844',d:1.5,r:4000,bh:2000,g:'FOG',s:false,desc:'埼京：霧。'},
            'KY':{n:'ST=KY',c:'#aa0022',d:2,r:5000,bh:3000,g:'WND',s:false,desc:'京葉：強風。'},
            'PK':{n:'ST=PK',c:'#cc5588',d:2.5,r:6500,bh:4000,g:'REV',s:false,desc:'各停：反転。'},
            'JB':{n:'ST=JB',c:'#006666',d:3,r:8000,bh:5000,g:'JAM',s:false,desc:'常磐：妨害。'},
            'S1':{n:'ST=S1',c:'#6600cc',d:3.5,r:10000,bh:6500,g:'WRP',s:false,desc:'地下1：ワープ。'},
            'S2':{n:'ST=S2',c:'#cc00cc',d:4,r:13000,bh:8000,g:'PSN',s:false,desc:'地下2：毒。'},
            'S3':{n:'ST=S3',c:'#00cccc',d:5,r:18000,bh:12000,g:'GRV',s:false,desc:'地下3：重力。'},
            'F1':{n:'F15-A',c:'#778',d:7,r:30000,bh:20000,g:'SPD',s:true,desc:'F15部隊：超高速。'},
            'F2':{n:'F15-B',c:'#778',d:9,r:40000,bh:25000,g:'SPD',s:true,desc:'F15部隊：乱舞。'},
            'F3':{n:'F15-C',c:'#778',d:12,r:55000,bh:35000,g:'SPD',s:true,desc:'F15部隊：死闘。'},
            'F4':{n:'F15-D',c:'#778',d:15,r:75000,bh:50000,g:'SPD',s:true,desc:'F15部隊：限界。'},
            'F5':{n:'F15-E',c:'#b0c',d:20,r:100000,bh:80000,g:'SPD',s:true,desc:'F15隊長：終焉。'},
            'CO':{n:'ST=CO',c:'#f60',d:40,r:500000,bh:200000,g:'ULT',s:true,desc:'中央線：超鬼むず。'}
        };

        const WEAPONS = [
            {id:'#fff', n:'DEFAULT', cost:0, p:2, type:'std'},
            {id:'#0f0', n:'V-SPREAD', cost:5000, p:1.5, type:'spread'},
            {id:'#0ff', n:'RAPID', cost:10000, p:1.2, type:'fast'},
            {id:'#ff0', n:'HEAVY', cost:15000, p:5, type:'std'},
            {id:'#f0f', n:'WAVE', cost:20000, p:2, type:'wave'},
            {id:'#00f', n:'LASER', cost:30000, p:8, type:'std'},
            {id:'#f80', n:'C-ORANGE', cost:50000, p:4, type:'spread'},
            {id:'#a02', n:'KY-RED', cost:80000, p:15, type:'std'},
            {id:'#000', n:'VOID', cost:150000, p:25, type:'std'},
            {id:'#fff2', n:'ZENITH', cost:300000, p:10, type:'all'}
        ];

        function save() { 
            localStorage.setItem(SAVE_KEY, JSON.stringify(userData)); 
            document.getElementById('gold-stat').innerText = `CREDITS: ${userData.gold}`;
            document.getElementById('bomb-stock').innerText = `BOMBS: ${"★".repeat(userData.bombs)}`;
            document.getElementById('shop-credits').innerText = `CREDITS: ${userData.gold}`;
        }

        function openPanel(id) {
            document.getElementById('main-nav').style.display='none';
            document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id==='stage-select') renderStages();
            if(id==='shop') renderShop();
        }
        function backToMain() {
            document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
            document.getElementById('main-nav').style.display='flex';
        }

        function renderStages() {
            const grid = document.getElementById('stage-grid'); grid.innerHTML = '';
            const clearedN = Object.keys(STAGES).filter(k=>!STAGES[k].s && userData.cleared.includes(k)).length;
            const unlock = clearedN >= 9;
            Object.keys(STAGES).forEach((id, i) => {
                const s = STAGES[id]; const lock = s.s && !unlock;
                const box = document.createElement('div');
                box.className = `item-box ${lock?'locked':''} ${userData.cleared.includes(id)?'cleared':''}`;
                box.style.color = lock?'#222':s.c; box.style.borderColor = lock?'#222':s.c;
                box.innerHTML = `${i+1}<br>${s.n}`;
                if(!lock) box.onclick = () => {
                    currentStg = { ...s, id: id };
                    document.getElementById('br-title').innerText = s.n;
                    document.getElementById('br-desc').innerText = s.desc;
                    document.getElementById('briefing').style.display = 'flex';
                    document.getElementById('br-engage').onclick = startGame;
                };
                grid.appendChild(box);
            });
        }

        function renderShop() {
            const grid = document.getElementById('shop-grid'); grid.innerHTML = '';
            WEAPONS.forEach(w => {
                const owned = userData.licenses.includes(w.id);
                const box = document.createElement('div');
                box.className = 'item-box'; box.style.color = w.id==='#000'?'#fff':w.id;
                box.innerHTML = `${w.n}<br>${owned?'EQUIP':w.cost+'G'}`;
                box.onclick = () => {
                    if(!owned && userData.gold >= w.cost) { userData.gold-=w.cost; userData.licenses.push(w.id); save(); renderShop(); }
                    else if(owned) { userData.skin = w.id; save(); alert("SYSTEM EQUIPPED"); }
                };
                grid.appendChild(box);
            });
        }

        function startGame() {
            document.getElementById('briefing').style.display='none';
            document.getElementById('overlay').style.display='none';
            document.getElementById('hud').style.display='block';
            gameActive=true; score=0; hp=100; frame=0; charge=0; invul=0; subPhase=1;
            bullets=[]; eBullets=[]; enemies=[]; particles=[]; bossObj=null;
            flash("PHASE 1: INFILTRATION", 2000);
            loop();
        }

        function flash(t, d) {
            const l = document.getElementById('msg-layer');
            const txt = document.getElementById('msg-txt');
            txt.innerText = t; l.style.display = 'block';
            setTimeout(() => l.style.display = 'none', d);
        }

        function finish(clear) {
            gameActive = false;
            let bonus = clear ? Math.floor(hp * 20) : 0;
            if(clear) {
                if(!userData.cleared.includes(currentStg.id)) userData.cleared.push(currentStg.id);
                userData.gold += currentStg.r + bonus;
            }
            save();
            flash(clear ? `MISSION CLEAR\nBONUS: +${bonus}` : "FAILED", 3000);
            setTimeout(() => location.reload(), 3000);
        }

        function update() {
            frame++; if(invul>0) invul--;
            
            //道中フェーズ管理
            if(subPhase === 1 && score > 8000) { subPhase = 2; flash("PHASE 2: ELITE GUARD", 2000); }
            if(subPhase === 2 && score > 20000 && !bossObj) {
                subPhase = 3; flash("WARNING: BOSS APPROACHING", 3000);
                bossObj = { x: canvas.width/2, y: -200, hp: currentStg.bh, size: 160, vy: 1, p2: false };
                enemies.push(bossObj);
            }

            // Move
            let mv = (currentStg.g==='GRV'?0.05:(currentStg.g==='SPD'?0.4:0.2));
            let tx = (currentStg.g==='REV'?canvas.width-player.tx:player.tx);
            let ty = (currentStg.g==='REV'?canvas.height-player.ty:player.ty);
            player.x += (tx-player.x)*mv; player.y += (ty-player.y)*mv;
            if(currentStg.g==='WND') player.x -= 3;
            if(currentStg.g==='PSN' && frame%60===0) hp -= 0.5;

            // Shoot
            if(isDown && frame % (userData.skin==='#0ff'?3:6) === 0) {
                let w = WEAPONS.find(v=>v.id===userData.skin);
                if(w.type==='spread') {
                    for(let a=-0.3; a<=0.3; a+=0.3) bullets.push({x:player.x,y:player.y-20,vx:a*10,vy:-25,p:w.p});
                } else if(w.type==='wave') {
                    bullets.push({x:player.x,y:player.y-20,vx:Math.sin(frame/2)*10,vy:-25,p:w.p});
                } else {
                    bullets.push({x:player.x,y:player.y-20,vx:0,vy:-25,p:w.p});
                }
            }

            // Spawn
            if(subPhase < 3 && frame % (subPhase===1?25:15) === 0) {
                enemies.push({ x: Math.random()*canvas.width, y: -50, hp: (subPhase===1?20:60)*currentStg.d, size: (subPhase===1?35:50), vy: 3+currentStg.d, elite: subPhase===2 });
            }

            // Logic
            bullets.forEach((b,i) => {
                b.x += b.vx || 0; b.y += b.vy;
                enemies.forEach((e,ei) => {
                    if(Math.hypot(b.x-e.x, b.y-e.y) < e.size) {
                        e.hp -= b.p; bullets.splice(i,1);
                        if(e.hp<=0) {
                            if(e===bossObj) finish(true);
                            else { 
                                for(let j=0;j<5;j++) particles.push({x:e.x,y:e.y,vx:(Math.random()-0.5)*10,vy:(Math.random()-0.5)*10,a:1,c:currentStg.c});
                                enemies.splice(ei,1); score += (e.elite?1500:500); userData.gold+=20; charge+=10;
                                if(charge>=100){charge=0;userData.bombs++;}
                                save();
                            }
                        }
                    }
                });
            });

            enemies.forEach(e => {
                e.y += e.vy; if(e===bossObj && e.y>150) e.vy=0;
                if(e===bossObj && !e.p2 && e.hp < currentStg.bh/2) { e.p2=true; flash("BOSS PHASE 2: OVERDRIVE", 2000); }
                let rate = (e===bossObj?(e.p2?0.2:0.1):(e.elite?0.1:0.05)) * currentStg.d;
                if(Math.random()<rate) {
                    if(e===bossObj && e.p2) {
                        for(let a=0;a<Math.PI*2;a+=Math.PI/6) eBullets.push({x:e.x,y:e.y,vx:Math.cos(a)*8,vy:Math.sin(a)*8});
                    } else {
                        eBullets.push({x:e.x,y:e.y,vx:0,vy:6*currentStg.d});
                    }
                }
            });

            eBullets.forEach((eb,i) => {
                eb.x += eb.vx||0; eb.y += eb.vy;
                if(invul<=0 && Math.hypot(eb.x-player.x, eb.y-player.y)<20) {
                    if(userData.bombs>0){ userData.bombs--; invul=120; eBullets=[]; flash("AUTO BOMB", 1000); save(); }
                    else { hp-=10; eBullets.splice(i,1); if(hp<=0) finish(false); }
                }
                if(eb.y > canvas.height) eBullets.splice(i,1);
            });

            particles.forEach((p,i)=>{ p.x+=p.vx; p.y+=p.vy; p.a-=0.02; if(p.a<=0) particles.splice(i,1); });

            document.getElementById('hp-bar').style.width = hp+"%";
            document.getElementById('bomb-bar').style.width = charge+"%";
            document.getElementById('score-val').innerText = `SCORE: ${score.toString().padStart(6,'0')}`;
        }

        function draw() {
            ctx.fillStyle="#000"; ctx.fillRect(0,0,canvas.width,canvas.height);
            particles.forEach(p=>{ ctx.fillStyle=`rgba(255,255,255,${p.a})`; ctx.fillRect(p.x,p.y,3,3); });
            if(invul%4<2) {
                ctx.fillStyle=userData.skin==='#000'?'#444':userData.skin; ctx.beginPath();
                ctx.moveTo(player.x,player.y-30); ctx.lineTo(player.x+20,player.y+15); ctx.lineTo(player.x-20,player.y+15); ctx.fill();
            }
            enemies.forEach(e=>{
                ctx.strokeStyle=e.elite?'#f0f':currentStg.c; ctx.lineWidth=e===bossObj?5:2;
                ctx.strokeRect(e.x-e.size/2, e.y-e.size/2, e.size, e.size);
                if(e===bossObj) {
                    ctx.fillStyle="#222"; ctx.fillRect(e.x-80,e.y-100,160,10);
                    ctx.fillStyle="#f00"; ctx.fillRect(e.x-80,e.y-100,160*(e.hp/currentStg.bh),10);
                }
            });
            bullets.forEach(b=>{ ctx.fillStyle=userData.skin; ctx.fillRect(b.x-2,b.y,4,15); });
            eBullets.forEach(eb=>{ ctx.fillStyle="#f0f"; ctx.beginPath(); ctx.arc(eb.x,eb.y,6,0,7); ctx.fill(); });
        }

        function loop() { if(gameActive){ update(); draw(); requestAnimationFrame(loop); } }
        window.onmousedown=()=>isDown=true; window.onmouseup=()=>isDown=false;
        window.onmousemove=e=>{ player.tx=e.clientX; player.ty=e.clientY; };
        save();
    </script>
</body>
</html>
