<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ST-PROJECT: RAIL-BLAST Preview</title>
    <style>
        body { margin: 0; background: #001F3F; color: white; font-family: 'Arial', sans-serif; overflow: hidden; }
        #game-container { position: relative; width: 400px; height: 600px; margin: 20px auto; border: 2px solid #00aaff; background: #001226; overflow: hidden; }
        canvas { display: block; background: #001F3F; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .stat { position: absolute; font-size: 14px; font-weight: bold; color: #00d4ff; text-shadow: 0 0 5px #000; }
        #score { top: 10px; left: 10px; }
        #hp-bar-container { top: 30px; left: 10px; width: 100px; height: 8px; border: 1px solid #fff; }
        #hp-bar { width: 100%; height: 100%; background: #E60012; transition: width 0.2s; }
        #stock-area { position: absolute; bottom: 10px; right: 10px; pointer-events: auto; }
        .item-slot { width: 50px; height: 50px; border: 2px solid #ff8c00; background: rgba(255, 140, 0, 0.2); display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 5px; }
        .item-slot:hover { background: rgba(255, 140, 0, 0.4); }
        #msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; pointer-events: none; opacity: 0; transition: 0.5s; font-size: 24px; color: #ff8c00; font-weight: bold; }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    <div id="ui-layer">
        <div id="score" class="stat">SCORE: 000000</div>
        <div id="hp-bar-container"><div id="hp-bar"></div></div>
        <div id="msg">ORANGE BURST!</div>
        <div id="stock-area">
            <div class="item-slot" onclick="activateBurst()" title="必殺技アイテム">
                <span style="font-size: 10px;">必殺技</span>
            </div>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const msgEl = document.getElementById('msg');

    let player = { x: 200, y: 500, size: 20, speed: 5 };
    let bullets = [];
    let enemies = [];
    let score = 0;
    let burstActive = false;

    // 操作系 (マウス/指)
    canvas.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        player.x = e.clientX - rect.left;
        player.y = e.clientY - rect.top;
    });

    // 必殺技: 中央線オレンジバースト
    function activateBurst() {
        if (burstActive) return;
        burstActive = true;
        msgEl.style.opacity = "1";
        
        // 全弾・全敵消去エフェクト
        setTimeout(() => {
            enemies = [];
            msgEl.style.opacity = "0";
            burstActive = false;
        }, 1000);
    }

    // メインループ
    function update() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 背景描画
        ctx.fillStyle = '#001F3F';
        ctx.fillRect(0,0, canvas.width, canvas.height);

        // 自機描画
        ctx.fillStyle = '#00d4ff';
        ctx.beginPath();
        ctx.moveTo(player.x, player.y - 15);
        ctx.lineTo(player.x - 15, player.y + 15);
        ctx.lineTo(player.x + 15, player.y + 15);
        ctx.fill();

        // バースト演出 (オレンジの衝撃波)
        if (burstActive) {
            ctx.strokeStyle = '#ff8c00';
            ctx.lineWidth = 10;
            ctx.beginPath();
            ctx.arc(player.x, player.y, 100 + (Math.random() * 200), 0, Math.PI * 2);
            ctx.stroke();
        }

        // 自動射撃
        if (Date.now() % 10 === 0) {
            bullets.push({x: player.x, y: player.y - 20});
        }

        // 弾の移動・描画
        ctx.fillStyle = '#fff';
        bullets.forEach((b, i) => {
            b.y -= 10;
            ctx.fillRect(b.x - 2, b.y, 4, 10);
            if (b.y < 0) bullets.splice(i, 1);
        });

        // 敵の生成（テスト用）
        if (Math.random() < 0.05) {
            enemies.push({x: Math.random() * canvas.width, y: -20, color: '#E60012'}); // ST-KYカラー
        }

        // 敵の描画
        enemies.forEach((en, i) => {
            en.y += 2;
            ctx.fillStyle = en.color;
            ctx.fillRect(en.x - 10, en.y, 20, 20);
            if (en.y > canvas.height) enemies.splice(i, 1);
            
            // 当たり判定
            bullets.forEach((b, bi) => {
                if (Math.abs(b.x - en.x) < 15 && Math.abs(b.y - en.y) < 15) {
                    enemies.splice(i, 1);
                    bullets.splice(bi, 1);
                    score += 100;
                    scoreEl.innerText = `SCORE: ${score.toString().padStart(6, '0')}`;
                }
            });
        });

        requestAnimationFrame(update);
    }

    update();
</script>
</body>
</html>
