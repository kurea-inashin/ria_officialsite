<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MINAMI SHOOTING PROJECT 2026</title>
    <style>
        /* --- 全体デザイン (ダークブルー基調) --- */
        body { 
            background: #000814; 
            color: #fff; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            width: 800px;
            height: 600px;
            border: 4px solid #003366;
            box-shadow: 0 0 30px #00d4ff;
            background: #000;
        }

        canvas { display: block; }

        /* --- 左上：カウンターHUD --- */
        #hud-left {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(0, 20, 40, 0.8);
            padding: 12px;
            border-radius: 8px;
            border-left: 5px solid #00d4ff;
            font-family: 'Courier New', monospace;
            z-index: 10;
        }
        .hp-bar-bg { width: 120px; height: 12px; background: #333; border-radius: 6px; margin-top: 5px; overflow: hidden; }
        #hp-bar-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #ff416c, #ff4b2b); transition: 0.3s; }

        /* --- 右下：アイテムスロット --- */
        #hud-right {
            position: absolute;
            bottom: 15px;
            right: 15px;
            display: flex;
            gap: 12px;
            z-index: 10;
        }
        .slot {
            width: 60px;
            height: 60px;
            background: rgba(0, 51, 102, 0.9);
            border: 2px solid #00d4ff;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            cursor: pointer;
            transition: 0.2s;
        }
        .slot:hover { transform: scale(1.1); background: #00d4ff; color: #000; }

        /* --- メニュー・オーバーレイ --- */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 8, 20, 0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .active { display: flex; }
        
        h1 { color: #00d4ff; text-shadow: 0 0 15px #00d4ff; margin-bottom: 30px; }
        .btn {
            padding: 12px 35px;
            margin: 8px;
            background: #001f3f;
            border: 2px solid #00d4ff;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            border-radius: 25px;
            transition: 0.3s;
        }
        .btn:hover { background: #00d4ff; color: #000; box-shadow: 0 0 20px #00d4ff; }
        
        /* ステージ選択時の強調 */
        .stage-btn.selected { border-color: #fff; box-shadow: 0 0 15px #fff; }

        footer { margin-top: 15px; font-size: 10px; color: #444; text-transform: uppercase; }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <div id="hud-left">
        SCORE: <span id="score-val">000000</span><br>
        HP: <div class="hp-bar-bg"><div id="hp-bar-fill"></div></div>
        COIN: 🪙 <span id="coin-val">0</span>
    </div>

    <div id="hud-right">
        <div class="slot" onclick="toggleScreen('shop-screen')"><span>🛒</span>SHOP</div>
        <div class="slot" id="weapon-slot"><span>🔫</span>NORMAL</div>
        <div class="slot" onclick="useHeal()"><span>🧪</span>HEAL<br><span id="heal-count">0</span></div>
    </div>

    <div id="menu-screen" class="overlay active">
        <h1>MINAMI SHOOTING 2026</h1>
        <div id="stage-select-area">
            </div>
        <button class="btn" onclick="startGame()" style="margin-top: 20px;">MISSION START</button>
        <button class="btn" onclick="toggleScreen('help-screen')">HOW TO PLAY</button>
    </div>

    <div id="help-screen" class="overlay">
        <h2>PLAY GUIDE</h2>
        <p>移動: WASD / 矢印キー</p>
        <p>射撃: SPACE / 左クリック</p>
        <p>セーブ: ステージクリア時に自動保存</p>
        <button class="btn" onclick="toggleScreen('menu-screen')">BACK</button>
    </div>

    <div id="shop-screen" class="overlay">
        <h2>ITEM SHOP</h2>
        <p>所持コイン: <span id="shop-coin">0</span>🪙</p>
        <button class="btn" onclick="buyItem('wide', 500)">WIDE SHOT (500🪙)</button>
        <button class="btn" onclick="buyItem('heal', 200)">HEAL POTION (200🪙)</button>
        <button class="btn" onclick="buyItem('skin', 1000)">ORANGE SKIN (1000🪙)</button>
        <button class="btn" onclick="toggleScreen('menu-screen')">BACK</button>
    </div>
</div>

<footer>© 2026 MINAMI SHOOTING GAME PROJECT. All Rights Reserved.</footer>

<script>
/**
 * --- GAME LOGIC ---
 */
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// ステージデータ
const STAGE_CONFIG = {
    "ST=KY 01": { color: "#ff0000", line: "京葉線", bg: "#100", speed: 2 },
    "ST=KY 04": { color: "#00ff00", line: "埼京線", bg: "#010", speed: 4 },
    "ST=KY 07": { color: "#00aaff", line: "京浜東北線", bg: "#001", speed: 5 },
    "ST=KY EX-01": { color: "#cd7f32", line: "銅", bg: "#110", speed: 7 },
    "ST=KY UNKNOWN": { color: "rainbow", line: "中央線/超鬼むず", bg: "#000", speed: 10 }
};

let game = {
    state: 'menu',
    score: 0,
    hp: 100,
    coins: 0,
    currentStage: "ST=KY 01",
    unlockedCount: 9, 
    noMissClearedCount: 0,
    inventory: { weapon: 'NORMAL', heals: 1 },
    player: { x: 400, y: 550, size: 20, color: "#fff", speed: 6 },
    bullets: [],
    enemies: [],
    enemyBullets: [],
    keys: {},
    frame: 0
};

// セーブ・ロード
function save() {
    localStorage.setItem('minami_game_2026', JSON.stringify({
        coins: game.coins,
        unlockedCount: game.unlockedCount,
        noMiss: game.noMissClearedCount
    }));
}
function load() {
    const data = JSON.parse(localStorage.getItem('minami_game_2026'));
    if (data) {
        game.coins = data.coins || 0;
        game.unlockedCount = data.unlockedCount || 9;
        game.noMissClearedCount = data.noMiss || 0;
    }
}

// 画面切り替え
function toggleScreen(id) {
    document.querySelectorAll('.overlay').forEach(el => el.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if (id === 'shop-screen') document.getElementById('shop-coin').innerText = game.coins;
}

// ショップ機能
function buyItem(type, price) {
    if (game.coins >= price) {
        game.coins -= price;
        if (type === 'wide') game.inventory.weapon = 'WIDE';
        if (type === 'heal') game.inventory.heals++;
        if (type === 'skin') game.player.color = "#ff8c00"; // 中央線オレンジ
        updateUI();
        save();
        alert("購入完了！");
    } else {
        alert("コインが足りません！");
    }
}

function useHeal() {
    if (game.inventory.heals > 0 && game.hp < 100) {
        game.inventory.heals--;
        game.hp = Math.min(100, game.hp + 40);
        updateUI();
    }
}

function updateUI() {
    document.getElementById('score-val').innerText = game.score.toString().padStart(6, '0');
    document.getElementById('coin-val').innerText = game.coins;
    document.getElementById('hp-bar-fill').style.width = game.hp + "%";
    document.getElementById('heal-count').innerText = game.inventory.heals;
    document.getElementById('weapon-slot').innerText = game.inventory.weapon;
}

// ゲーム開始
function startGame() {
    game.state = 'playing';
    game.hp = 100;
    game.score = 0;
    game.bullets = [];
    game.enemies = [];
    game.enemyBullets = [];
    document.getElementById('menu-screen').classList.remove('active');
}

// メインループ
function mainLoop() {
    if (game.state === 'playing') {
        update();
        draw();
    }
    game.frame++;
    requestAnimationFrame(mainLoop);
}

function update() {
    // プレイヤー移動
    if (game.keys['ArrowLeft'] || game.keys['a']) game.player.x -= game.player.speed;
    if (game.keys['ArrowRight'] || game.keys['d']) game.player.x += game.player.speed;
    if (game.keys['ArrowUp'] || game.keys['w']) game.player.y -= game.player.speed;
    if (game.keys['ArrowDown'] || game.keys['s']) game.player.y += game.player.speed;

    // 画面外防止
    game.player.x = Math.max(20, Math.min(780, game.player.x));
    game.player.y = Math.max(20, Math.min(580, game.player.y));

    // 射撃 (30フレームごと)
    if (game.frame % 10 === 0) {
        game.bullets.push({ x: game.player.x, y: game.player.y, vy: -10 });
        if (game.inventory.weapon === 'WIDE') {
            game.bullets.push({ x: game.player.x, y: game.player.y, vy: -10, vx: -2 });
            game.bullets.push({ x: game.player.x, y: game.player.y, vy: -10, vx: 2 });
        }
    }

    // 敵生成
    if (game.frame % 40 === 0) {
        game.enemies.push({ x: Math.random() * 760 + 20, y: -20, hp: 3 });
    }

    // 更新処理
    game.bullets.forEach((b, i) => {
        b.y += b.vy; b.x += (b.vx || 0);
        if (b.y < 0) game.bullets.splice(i, 1);
    });

    game.enemies.forEach((e, i) => {
        e.y += 2;
        // 敵の弾
        if (game.frame % 60 === 0) {
            game.enemyBullets.push({ x: e.x, y: e.y, vy: 4 });
        }
        // 当たり判定
        game.bullets.forEach((b, bi) => {
            if (Math.hypot(e.x - b.x, e.y - b.y) < 20) {
                e.hp--;
                game.bullets.splice(bi, 1);
                if (e.hp <= 0) {
                    game.enemies.splice(i, 1);
                    game.score += 100;
                    game.coins += 5;
                    updateUI();
                }
            }
        });
        if (e.y > 600) game.enemies.splice(i, 1);
    });

    game.enemyBullets.forEach((eb, i) => {
        eb.y += eb.vy;
        if (Math.hypot(eb.x - game.player.x, eb.y - game.player.y) < 15) {
            game.hp -= 10;
            game.enemyBullets.splice(i, 1);
            updateUI();
            if (game.hp <= 0) gameOver();
        }
        if (eb.y > 600) game.enemyBullets.splice(i, 1);
    });
}

function draw() {
    const config = STAGE_CONFIG[game.currentStage] || {bg: "#000", color: "#fff"};
    ctx.fillStyle = config.bg;
    ctx.fillRect(0, 0, 800, 600);

    // ギミック：UNKNOWNの虹色境界線
    if (config.color === "rainbow") {
        ctx.strokeStyle = `hsl(${game.frame % 360}, 100%, 50%)`;
        ctx.lineWidth = 10;
        ctx.strokeRect(0, 0, 800, 600);
    }

    // プレイヤー描画
    ctx.fillStyle = game.player.color;
    ctx.shadowBlur = 15; ctx.shadowColor = game.player.color;
    ctx.fillRect(game.player.x - 15, game.player.y - 15, 30, 30);

    // 弾
    ctx.fillStyle = "#0ff";
    game.bullets.forEach(b => ctx.fillRect(b.x - 2, b.y - 5, 4, 10));

    // 敵
    ctx.fillStyle = "#f0f";
    game.enemies.forEach(e => ctx.fillRect(e.x - 15, e.y - 15, 30, 30));

    // 敵弾
    let eColor = config.color === "rainbow" ? `hsl(${(game.frame + 180) % 360}, 100%, 50%)` : config.color;
    ctx.fillStyle = eColor;
    game.enemyBullets.forEach(eb => {
        ctx.beginPath(); ctx.arc(eb.x, eb.y, 6, 0, Math.PI*2); ctx.fill();
    });
    ctx.shadowBlur = 0;
}

function gameOver() {
    game.state = 'menu';
    alert("MISSION FAILED\nSCORE: " + game.score);
    save();
    location.reload();
}

// 入力イベント
window.addEventListener('keydown', e => game.keys[e.key] = true);
window.addEventListener('keyup', e => game.keys[e.key] = false);

// 初期化実行
load();
updateUI();
mainLoop();

</script>
</body>
</html>
