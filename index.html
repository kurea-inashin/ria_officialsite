<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MINAMI SHOOTING PROJECT 2026</title>
    <style>
        /* --- 全体デザイン --- */
        body { 
            background-color: #000814; /* 深い宇宙の青 */
            color: #fff; 
            font-family: 'Segoe UI', 'Helvetica Neue', sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh;
            overflow: hidden; /* 画面からはみ出さない */
        }

        #game-container {
            position: relative;
            width: 800px;
            height: 600px;
            border: 4px solid #003366; /* 鉄をイメージした濃い青 */
            box-shadow: 0 0 30px #00d4ff; /* ゲーミング発光 */
            background-color: #000;
            overflow: hidden;
        }

        canvas {
            display: block;
        }

        /* --- UI (HUD) --- */
        .hud {
            position: absolute;
            color: #fff;
            font-family: 'Courier New', monospace; /* レトロ感 */
            font-size: 14px;
            pointer-events: none; /* ゲーム操作を邪魔しない */
            z-index: 10;
        }

        /* 左上：カウンター類 */
        #hud-left {
            top: 15px;
            left: 15px;
            background: rgba(0, 20, 40, 0.8);
            padding: 10px;
            border-radius: 8px;
            border-left: 5px solid #00d4ff;
        }

        .hp-bar-bg {
            width: 150px;
            height: 12px;
            background-color: #333;
            border-radius: 6px;
            margin-top: 5px;
            overflow: hidden;
        }

        #hp-bar-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #ff416c, #ff4b2b); /* 体力ゲージ */
            transition: width 0.3s ease;
        }

        /* 右下：アイテムスロット */
        #hud-right {
            bottom: 15px;
            right: 15px;
            display: flex;
            gap: 10px;
        }

        .item-slot {
            width: 60px;
            height: 60px;
            background: rgba(0, 51, 102, 0.9);
            border: 2px solid #00d4ff;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.2s, transform 0.2s;
            pointer-events: auto; /* クリック可能 */
        }

        .item-slot:hover {
            background: rgba(0, 212, 255, 0.3);
            transform: scale(1.05);
        }

        .item-slot .icon {
            font-size: 24px;
            margin-bottom: 2px;
        }

        .item-slot .count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ff4b2b;
            color: #fff;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 12px;
        }

        /* --- メニュー画面・ショップ画面 --- */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 8, 20, 0.95);
            display: none; /* 通常は非表示 */
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .overlay.active {
            display: flex;
        }

        h1, h2 {
            color: #00d4ff;
            text-shadow: 0 0 15px #00d4ff;
            margin-bottom: 30px;
        }

        .btn {
            padding: 12px 30px;
            margin: 10px;
            background: transparent;
            border: 2px solid #00d4ff;
            color: #00d4ff;
            font-size: 18px;
            cursor: pointer;
            border-radius: 25px;
            transition: background 0.3s, color 0.3s, box-shadow 0.3s;
            width: 300px;
            text-align: center;
        }

        .btn:hover {
            background: #00d4ff;
            color: #000;
            box-shadow: 0 0 20px #00d4ff;
        }

        /* ショップのアイテムグリッド */
        .shop-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        /* フッター */
        footer {
            margin-top: 15px;
            font-size: 12px;
            color: #444;
            letter-spacing: 2px;
        }

    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <div id="hud-left" class="hud">
        SCORE: <span id="score-val">000000</span><br>
        HP: 
        <div class="hp-bar-bg">
            <div id="hp-bar-fill"></div>
        </div>
        COIN: 🪙 <span id="coin-val">0</span>
    </div>

    <div id="hud-right" class="hud">
        <div class="item-slot" onclick="openShop()">
            <span class="icon">🛒</span>
            <span>SHOP</span>
        </div>
        <div class="item-slot" id="weapon-slot">
            <span class="icon">🔫</span>
            <span id="weapon-name">NORMAL</span>
        </div>
        <div class="item-slot" id="heal-slot" onclick="useHeal()">
            <span class="icon">🧪</span>
            <span>HEAL</span>
            <div class="count" id="heal-count">1</div>
        </div>
    </div>

    <div id="menu-screen" class="overlay active">
        <h1>MINAMI SHOOTING 2026</h1>
        <button class="btn" onclick="startKyStage()">MISSION START (京葉線エリア)</button>
        <button class="btn" onclick="showHelp()">HOW TO PLAY</button>
        <div style="font-size: 10px; color: #555; margin-top: 50px;">
            ST=KY PROTOTYPE V1.0 | DATA AUTOSAVED
        </div>
    </div>

    <div id="shop-screen" class="overlay">
        <h2>ITEM SHOP</h2>
        <p>所持コイン: <span id="shop-coin-val">0</span> 🪙</p>
        <div class="shop-grid">
            <button class="btn" onclick="buyItem('wide', 500)">WIDE SHOT (500🪙)</button>
            <button class="btn" onclick="buyItem('heal', 200)">REPAIR KIT (200🪙)</button>
            <button class="btn" onclick="buyItem('skin', 1000)">ORANGE SKIN (1000🪙)</button>
        </div>
        <button class="btn" onclick="closeShop()">BACK TO MENU</button>
    </div>
</div>

<footer>© 2026 MINAMI SHOOTING GAME PROJECT.</footer>

<script>
/**
 * --- GAME LOGIC ( "真面目な"実装 ) ---
 */
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// 画面解像度
const WIDTH = 800;
const HEIGHT = 600;

// ゲームの状態管理
const STATE = {
    MENU: 'menu',
    PLAYING: 'playing',
    SHOP: 'shop',
    GAMEOVER: 'gameover'
};

// --- セーブデータ構造 ---
let savedData = {
    coins: 0,
    weapon: 'normal',
    heals: 1,
    skin: '#fff', // 自機の色
    unlockedKy: 1 // どこまで京葉線ステージが進んだか
};

// ローカルストレージからロード
function loadGame() {
    const data = localStorage.getItem('minami_shooting_save');
    if (data) {
        savedData = JSON.parse(data);
    }
}

// ローカルストレージにセーブ
function saveGame() {
    localStorage.setItem('minami_shooting_save', JSON.stringify(savedData));
}

// 京葉線（赤）のギミック定義（エグい）
const GIMMICK_KY = {
    color: '#ff0000',
    enemySpeed: 3,
    spawnRate: 60, // 60フレームに1回
    bossHp: 50,
    special: () => {
        // 京葉線スペシャル：敵が3連続で突進
        if (game.frame % 180 === 0) {
            for (let i = 0; i < 3; i++) {
                game.enemies.push({
                    x: WIDTH * Math.random(),
                    y: -50 - (i * 40),
                    hp: 2,
                    type: 'rush' // 高速突進タイプ
                });
            }
        }
    }
};

// ゲーム全体のメインオブジェクト
let game = {
    state: STATE.MENU,
    frame: 0,
    score: 0,
    hp: 100,
    coins: savedData.coins,
    player: {
        x: WIDTH / 2,
        y: HEIGHT - 80,
        size: 20,
        speed: 7
    },
    bullets: [],
    enemies: [],
    enemyBullets: [],
    keys: {} // キー入力の状態
};

// UI更新
function updateUi() {
    document.getElementById('score-val').innerText = game.score.toString().padStart(6, '0');
    document.getElementById('coin-val').innerText = game.coins;
    document.getElementById('hp-bar-fill').style.width = game.hp + "%";
    document.getElementById('heal-count').innerText = savedData.heals;
    document.getElementById('weapon-name').innerText = savedData.weapon.toUpperCase();
    
    // ショップ画面のコイン表示
    if (game.state === STATE.SHOP) {
        document.getElementById('shop-coin-val').innerText = game.coins;
    }
}

// 画面切り替え
function toggleScreen(screenId) {
    // 全てのオーバーレイを非表示
    document.querySelectorAll('.overlay').forEach(el => el.classList.remove('active'));
    
    // 指定された画面を表示
    if (screenId) {
        document.getElementById(screenId).classList.add('active');
    }
}

// --- メニュー操作 ---
function startKyStage() {
    game.state = STATE.PLAYING;
    game.hp = 100;
    game.score = 0;
    game.coins = savedData.coins;
    game.bullets = [];
    game.enemies = [];
    game.enemyBullets = [];
    toggleScreen(null); // ゲーム画面へ
    updateUi();
}

function showHelp() {
    alert("【操作方法】\n移動: マウスまたはWASDキー\n射撃: クリックまたはスペースキー\n\n京葉線（赤）エリアの全10ステージを制覇せよ。\n敵を倒してコインを稼ぎ、ショップで強化！");
}

// --- ショップ操作 ---
function openShop() {
    if (game.state === STATE.PLAYING) return; // プレイ中は開けない
    game.state = STATE.SHOP;
    updateUi();
    toggleScreen('shop-screen');
}

function closeShop() {
    game.state = STATE.MENU;
    toggleScreen('menu-screen');
}

function buyItem(itemType, price) {
    if (game.coins >= price) {
        game.coins -= price;
        savedData.coins = game.coins; // セーブデータに反映

        if (itemType === 'wide') {
            savedData.weapon = 'wide';
        } else if (itemType === 'heal') {
            savedData.heals++;
        } else if (itemType === 'skin') {
            savedData.skin = '#ff8c00'; // 中央線オレンジスキン
        }

        saveGame(); // 即座にセーブ
        updateUi();
        alert("購入しました！");
    } else {
        alert("コインが足りません！のら。");
    }
}

// --- ゲーム中のアイテム使用 ---
function useHeal() {
    if (game.state !== STATE.PLAYING) return;
    
    if (savedData.heals > 0 && game.hp < 100) {
        savedData.heals--;
        game.hp = Math.min(100, game.hp + 50); // HPを50回復
        saveGame();
        updateUi();
    }
}

// --- 入力処理 ---
window.addEventListener('keydown', e => game.keys[e.key] = true);
window.addEventListener('keyup', e => game.keys[e.key] = false);

// マウス移動
canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    game.player.x = e.clientX - rect.left;
    //game.player.y = e.clientY - rect.top; // 上下移動は制限してもいい
});

// マウスクリック（射撃）
canvas.addEventListener('mousedown', playerShoot);
// スペースキー（射撃）
window.addEventListener('keydown', e => { if (e.key === ' ') playerShoot(); });

function playerShoot() {
    if (game.state !== STATE.PLAYING) return;

    // ノーマルショット
    game.bullets.push({ x: game.player.x, y: game.player.y - 20, vy: -15 });

    // ワイドショット（ショップで購入）
    if (savedData.weapon === 'wide') {
        game.bullets.push({ x: game.player.x, y: game.player.y - 15, vy: -14, vx: -3 });
        game.bullets.push({ x: game.player.x, y: game.player.y - 15, vy: -14, vx: 3 });
    }
}

// --- メインループ ---
function mainLoop() {
    if (game.state === STATE.PLAYING) {
        update();
        draw();
    } else if (game.state === STATE.MENU || game.state === STATE.SHOP) {
        // メニュー背景の描画（何か動かしてもいい）
        ctx.fillStyle = '#000814';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);
    }
    
    game.frame++;
    requestAnimationFrame(mainLoop);
}

// --- アップデート（計算） ---
function update() {
    // 敵の生成（京葉線ギミック準拠）
    if (game.frame % GIMMICK_KY.spawnRate === 0) {
        game.enemies.push({
            x: WIDTH * Math.random(),
            y: -30,
            hp: 3,
            type: 'normal'
        });
    }

    // 京葉線スペシャルギミック起動
    GIMMICK_KY.special();

    // 自機弾の移動
    game.bullets.forEach((b, i) => {
        b.y += b.vy;
        b.x += (b.vx || 0);
        if (b.y < -20) game.bullets.splice(i, 1); // 画面外
    });

    // 敵の移動と射撃
    game.enemies.forEach((e, i) => {
        if (e.type === 'normal') {
            e.y += GIMMICK_KY.enemySpeed;
            // 京葉線ギミック：たまに弾を撃つ
            if (game.frame % 120 === 0 && Math.random() < 0.3) {
                game.enemyBullets.push({ x: e.x, y: e.y + 15, vy: 5 });
            }
        } else if (e.type === 'rush') {
            e.y += GIMMICK_KY.enemySpeed * 2.5; // 高速突進
        }

        // 画面外
        if (e.y > HEIGHT + 50) game.enemies.splice(i, 1);
    });

    // 敵弾の移動
    game.enemyBullets.forEach((eb, i) => {
        eb.y += eb.vy;
        if (eb.y > HEIGHT + 20) game.enemyBullets.splice(i, 1);
    });

    // --- 当たり判定（真面目な実装） ---

    // 1. 自機弾 -> 敵
    game.bullets.forEach((b, bi) => {
        game.enemies.forEach((e, ei) => {
            if (Math.hypot(b.x - e.x, b.y - e.y) < 25) { // 半径25px
                e.hp--;
                game.bullets.splice(bi, 1); // 弾消滅
                if (e.hp <= 0) {
                    game.score += 100;
                    game.coins += 2; // 京葉線エリアはコイン渋め
                    game.enemies.splice(ei, 1); // 敵消滅
                    updateUi();
                    
                    // ステージクリア判定（スコア5000でクリアとする）
                    if (game.score >= 5000) {
                        endStage(true);
                    }
                }
            }
        });
    });

    // 2. 敵弾 -> 自機
    game.enemyBullets.forEach((eb, bi) => {
        if (Math.hypot(eb.x - game.player.x, eb.y - game.player.y) < 20) {
            game.hp -= 15; // 京葉線の弾は痛い
            game.enemyBullets.splice(bi, 1);
            updateUi();
            if (game.hp <= 0) {
                endStage(false); // ゲームオーバー
            }
        }
    });

    // 3. 敵本体 -> 自機（衝突）
    game.enemies.forEach((e, ei) => {
        if (Math.hypot(e.x - game.player.x, e.y - game.player.y) < 30) {
            game.hp -= 30; // 衝突は大ダメージ
            game.enemies.splice(ei, 1);
            updateUi();
            if (game.hp <= 0) {
                endStage(false);
            }
        }
    });
}

// ステージ終了処理
function endStage(isClear) {
    game.state = STATE.MENU;
    
    // データ保存
    savedData.coins = game.coins;
    if (isClear) {
        alert("STAGE CLEAR!\n京葉線エリア「済」マーク点灯！\nコインを保存しましたのら。");
        savedData.clearedKy = 1; // 済マーク（本来は配列管理）
    } else {
        alert("GAME OVER...\nコインは保存されますのら。");
    }
    
    saveGame();
    updateUi();
    toggleScreen('menu-screen');
}

// --- 描画（真面目な実装） ---
function draw() {
    // 画面クリア
    ctx.fillStyle = '#000810'; // 宇宙の濃紺
    ctx.fillRect(0, 0, WIDTH, HEIGHT);

    // 京葉線エリアの背景演出（赤い粒子）
    for (let i = 0; i < 5; i++) {
        ctx.fillStyle = 'rgba(255, 0, 0, 0.2)';
        ctx.fillRect(WIDTH * Math.random(), HEIGHT * Math.random(), 2, 2);
    }

    // 自機の描画（セーブデータのスキン色）
    ctx.fillStyle = savedData.skin;
    ctx.shadowBlur = 15;
    ctx.shadowColor = GIMMICK_KY.color; // 京葉線（赤）の光
    ctx.fillRect(game.player.x - 15, game.player.y - 15, 30, 30);
    ctx.shadowBlur = 0; // 光リセット

    // 自機弾の描画
    ctx.fillStyle = '#0ff'; // 水色の弾
    game.bullets.forEach(b => {
        ctx.fillRect(b.x - 2, b.y - 10, 4, 15);
    });

    // 敵の描画
    game.enemies.forEach(e => {
        ctx.fillStyle = GIMMICK_KY.color; // 京葉線の敵は赤い
        if (e.type === 'rush') ctx.fillStyle = '#fff'; // 突進は白
        ctx.fillRect(e.x - 15, e.y - 15, 30, 30);
    });

    // 敵弾の描画
    ctx.fillStyle = '#ff4b2b'; // オレンジがかった赤
    game.enemyBullets.forEach(eb => {
        ctx.beginPath();
        ctx.arc(eb.x, eb.y, 6, 0, Math.PI * 2);
        ctx.fill();
    });
}

// --- ゲーム開始 ---
loadGame(); // セーブデータロード
updateUi(); // UI初期化
mainLoop(); // ループ開始

</script>
</body>
</html>
