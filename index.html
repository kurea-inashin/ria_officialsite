<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Minami Project 2026: Burst Finale - Visual & Mission Evolved</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+JP:wght@700;900&display=swap');
        
        body { margin: 0; background: #000; color: #fff; font-family: 'Press Start 2P', cursive; overflow: hidden; user-select: none; }
        canvas { display: block; }

        /* HUD デザインの洗練 */
        #hud { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; }
        #score-val { font-size: 24px; text-shadow: 0 0 10px #0ff; color: #0ff; margin-bottom: 10px; }
        .bar-label { font-size: 8px; margin-top: 10px; color: #aaa; letter-spacing: 1px; }
        .bar-container { width: 250px; height: 12px; background: rgba(255,255,255,0.05); border: 1px solid #fff; border-radius: 6px; overflow: hidden; margin-bottom: 5px; box-shadow: 0 0 8px rgba(255,255,255,0.2); }
        #hp-fill { height: 100%; background: linear-gradient(90deg, #ff0055, #00ffaa); width: 100%; transition: width 0.3s; }
        #gauge-fill { height: 100%; background: #fff; width: 0%; transition: width 0.1s; box-shadow: 0 0 10px #fff; }

        /* パネル共通デザイン */
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 10, 20, 0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 20; backdrop-filter: blur(8px); }
        .panel { display: none; flex-direction: column; align-items: center; width: 90%; max-height: 85vh; overflow-y: auto; }
        .active { display: flex; }
        
        /* ボタンデザイン */
        .nav-btn { 
            padding: 15px 30px; border: 2px solid #0ff; background: rgba(0, 255, 255, 0.05); color: #0ff; 
            cursor: pointer; font-family: 'Press Start 2P'; font-size: 10px; margin: 10px; transition: 0.3s;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.1);
        }
        .nav-btn:hover { background: #0ff; color: #000; box-shadow: 0 0 25px #0ff; transform: scale(1.05); }

        /* ステージグリッドとクリアマーク */
        .mode-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; width: 100%; max-width: 1000px; }
        .mode-btn { 
            width: 100%; padding: 20px 10px; border: 1px solid #333; background: #000; color: #444; 
            cursor: pointer; text-align: center; font-size: 9px; transition: 0.3s; position: relative;
        }
        .mode-btn.unlocked { border-color: var(--c); color: var(--c); box-shadow: inset 0 0 10px var(--c); }
        .mode-btn.cleared::after { content: '✔ MISSION CLEAR'; font-size: 7px; position: absolute; top: 5px; right: 5px; color: #0f0; background: #000; }

        /* ステージ説明（ブリーフィング）パネル */
        #briefing-box { 
            background: rgba(0, 20, 40, 0.95); border: 2px solid #0ff; padding: 25px; 
            margin-top: 20px; width: 100%; max-width: 800px; font-family: 'Noto Sans JP'; 
            display: none; border-radius: 10px; box-shadow: 0 0 30px rgba(0, 255, 255, 0.2);
        }
        .brief-title { font-size: 18px; color: #0ff; margin-bottom: 10px; border-bottom: 1px solid #0ff; padding-bottom: 5px; font-family: 'Press Start 2P'; }
        .brief-text { font-size: 14px; line-height: 1.6; color: #ddd; margin-bottom: 20px; }

        #ending { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; flex-direction: column; align-items: center; justify-content: center; text-align: center; font-family: 'Noto Sans JP'; padding: 40px; }
        .status-msg { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 32px; opacity: 0; transition: 0.4s; pointer-events: none; z-index: 50; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="hud">
        <div id="score-val">SCORE: 000000</div>
        <div class="bar-label">SYSTEM STABILITY</div>
        <div class="bar-container"><div id="hp-fill"></div></div>
        <div class="bar-label">BURST ENERGY</div>
        <div class="bar-container"><div id="gauge-fill"></div></div>
        <div id="bomb-stock" style="color:#ff0; font-size:14px; margin-top:5px;">BOMBS: </div>
        <div id="gold-val" style="color:#ffd700; font-size:12px; margin-top:5px;">CREDITS: 0</div>
    </div>

    <div id="overlay">
        <h1 style="font-size:26px; margin-bottom:40px; color:#fff; text-shadow: 0 0 20px #0ff;">MINAMI PROJECT 2026</h1>
        
        <div id="main-nav" style="display: flex; flex-direction: column; align-items: center;">
            <button class="nav-btn" onclick="openPanel('stage-select')">SELECT MISSION</button>
            <button class="nav-btn" onclick="openPanel('garage')">GARAGE</button>
            <button class="nav-btn" onclick="openPanel('shop')">TECH SHOP</button>
        </div>

        <div id="stage-select" class="panel">
            <h2 style="font-size:14px; color:#0ff; margin-bottom:20px;">STRATEGIC MAP</h2>
            <div class="mode-grid" id="grid"></div>
            
            <div id="briefing-box">
                <div id="brief-title" class="brief-title"></div>
                <div id="brief-text" class="brief-text"></div>
                <div style="display: flex; justify-content: center;">
                    <button id="start-btn" class="nav-btn" style="border-color:#0f0; color:#0f0;">LAUNCH MISSION</button>
                    <button class="nav-btn" style="border-color:#f00; color:#f00;" onclick="document.getElementById('briefing-box').style.display='none'">CLOSE</button>
                </div>
            </div>
            
            <button class="nav-btn" style="margin-top:20px;" onclick="backToMain()">RETURN</button>
        </div>

        <div id="garage" class="panel">
            <h2 style="font-size:14px; color:#0ff;">UNIT CALIBRATION</h2>
            <div id="garage-list" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; width: 100%; max-width: 800px;"></div>
            <button class="nav-btn" style="margin-top:30px;" onclick="backToMain()">RETURN</button>
        </div>

        <div id="shop" class="panel">
            <div id="shop-gold-display" style="color:#ffd700; font-size:20px; margin-bottom:20px;"></div>
            <div id="weapon-shop" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:20px;"></div>
            <button class="nav-btn" onclick="backToMain()">RETURN</button>
        </div>
    </div>

    <div id="ending">
        <h2 style="font-size:32px; color:#ff6600; margin-bottom:30px;">MISSION ACCOMPLISHED</h2>
        <p id="end-text" style="font-size:18px; line-height:2.5; max-width:800px; color:#fff;"></p>
        <button class="nav-btn" onclick="location.reload()" style="margin-top:40px;">REBOOT SYSTEM</button>
    </div>

    <div id="msg" class="status-msg"></div>
    <canvas id="game"></canvas>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;

        // --- ロジック変数を継承 ---
        let gameActive = false, score = 0, hp = 100, frame = 0, phase = 1, burstGauge = 0, bombActive = 0;
        let bullets = [], eBullets = [], enemies = [], particles = [];
        let player = { x: canvas.width/2, y: canvas.height/2 };
        let currentMode = null;

        let sessionData = { atk: 2, items: [], hasBit: false };
        const NORMAL_STAGES = ['SB', 'KT', 'SK', 'KY', 'PK', 'JB', 'S1', 'S2', 'S3'];

        let userData = JSON.parse(localStorage.getItem('minami_2026_v9')) || {
            gold: 0, bombs: 1, unlocked: [...NORMAL_STAGES], cleared: [], skin: '#fff'
        };

        // ステージ詳細説明の追加
        const STAGES = {
            'SB': { name: 'ST=SB', color: '#ccaa00', stars: 1, diff: 1, bossHp: 500, score1: 5000, score2: 12000, gimmick: 'vibrate', info: '【総武緩行】激しい機体振動が予想される。広範囲攻撃で着実に敵を撃破せよ。' },
            'KT': { name: 'ST=KT', color: '#0088cc', stars: 1, diff: 1.2, bossHp: 700, score1: 7000, score2: 15000, gimmick: 'water', info: '【京浜東北】高圧水流エリア。機動力が低下するため、ドローンによる自動火力が鍵となる。' },
            'SK': { name: 'ST=SK', color: '#008844', stars: 2, diff: 1.5, bossHp: 900, score1: 8000, score2: 20000, gimmick: 'fog', info: '【埼京】深霧によるシステム浸食を確認。長期戦は危険。短期決戦を推奨する。' },
            'KY': { name: 'ST=KY', color: '#aa0022', stars: 2, diff: 2.0, bossHp: 1200, score1: 10000, score2: 25000, gimmick: 'wind', info: '【京葉】強風により機体が流される。姿勢制御アバターの運用を強く推奨。' },
            'PK': { name: 'ST=PK', color: '#cc5588', stars: 3, diff: 2.2, bossHp: 1500, score1: 12000, score2: 30000, gimmick: 'reverse', info: '【電磁界】制御信号が反転する極限地帯。精神的な適応能力が試される。' },
            'JB': { name: 'ST=JB', color: '#006666', stars: 3, diff: 2.5, bossHp: 1800, score1: 15000, score2: 35000, gimmick: 'jamming', info: '【妨害電波】敵弾の速度が不規則に変化する。予測回避を徹底せよ。' },
            'S1': { name: 'ST=S1', color: '#6600cc', stars: 4, diff: 3.0, bossHp: 2200, score1: 18000, score2: 45000, gimmick: 'warp', info: '【空間歪曲】弾丸が空間を飛び越える。目前の着弾に最大限の警戒を。' },
            'S2': { name: 'ST=S2', color: '#cc00cc', stars: 4, diff: 3.5, bossHp: 2800, score1: 20000, score2: 55000, gimmick: 'poison', info: '【猛毒】腐食ガスが装甲を蝕む。HPが常に低下するため、TECH SHOPでの修復準備を。' },
            'S3': { name: 'ST=S3', color: '#00cccc', stars: 5, diff: 4.0, bossHp: 3500, score1: 25000, score2: 70000, gimmick: 'gravity', info: '【超重力】強大な慣性により制動が困難。敵の包囲網を突破するのは至難の業だ。' },
            'HA': { name: 'ST=HA', color: '#CD7F32', stars: 6, diff: 6, bossHp: 6500, secret: true, info: '【高難度:銅】敵の出力が大幅に強化された戦闘試験場。' },
            'HB': { name: 'ST=HB', color: '#C0C0C0', stars: 7, diff: 8, bossHp: 8500, secret: true, info: '【高難度:銀】敵主力艦隊との接触ポイント。総力を挙げた迎撃が必要。' },
            'HC': { name: 'ST=HC', color: '#FFD700', stars: 8, diff: 12, bossHp: 12000, secret: true, info: '【高難度:金】究極の弾幕。ここを越えた者のみが最終領域へと導かれる。' },
            'CO': { name: 'ST=CO', color: '#ff6600', stars: 30, diff: 60, bossHp: 150000, secret: true, ultimate: true, info: '【中央特快】物語の終焉。オレンジ色の閃光と共に、すべてを終わらせろ。' }
        };

        // 特化型アバターの展開
        const WEAPONS = [
            { id: '#fff', name: 'WHITE (STD)', info: '標準型アバター。' },
            { id: '#0f0', name: 'GREEN (RAPID)', info: '連射速度に特化。手数で敵を圧倒する。' },
            { id: '#0ff', name: 'CYAN (WIDE)', info: '3方向への広範囲射撃が可能。' },
            { id: '#ff0', name: 'YELLOW (SNAKE)', info: '蛇行する追尾弾を放つ特殊型。' },
            { id: '#aa0022', name: 'RED (BURST)', info: '単発の威力が極めて高い重攻撃型。' },
            { id: '#4444ff', name: 'BLUE (DEFENDER)', info: '【高難度攻略用】被弾時のHP減少を20%軽減する。', special: 'def' },
            { id: '#ff8800', name: 'ORANGE (STABILIZER)', info: '【ギミック無効】風、振動の影響を完全に遮断する。', special: 'stable' },
            { id: '#9900ff', name: 'VIOLET (PHANTOM)', info: '【最終決戦用】弾速が極めて速く、全ての敵を貫く。', special: 'pierce' }
        ];

        function save() { localStorage.setItem('minami_2026_v9', JSON.stringify(userData)); refreshHUD(); }
        function refreshHUD() {
            document.getElementById('gold-val').innerText = `CREDITS: ${userData.gold}`;
            document.getElementById('bomb-stock').innerText = `BOMBS: ${"★".repeat(userData.bombs)}`;
            document.getElementById('shop-gold-display').innerText = `CREDITS: ${userData.gold}`;
        }

        function renderStages() {
            const grid = document.getElementById('grid'); grid.innerHTML = '';
            if(NORMAL_STAGES.every(id => userData.cleared.includes(id))) 
                ['HA','HB','HC'].forEach(id => !userData.unlocked.includes(id) && userData.unlocked.push(id));
            if(['HA','HB','HC'].every(id => userData.cleared.includes(id)))
                !userData.unlocked.includes('CO') && userData.unlocked.push('CO');

            Object.keys(STAGES).forEach(id => {
                if(STAGES[id].secret && !userData.unlocked.includes(id)) return;
                const btn = document.createElement('div');
                btn.className = `mode-btn unlocked ${userData.cleared.includes(id) ? 'cleared' : ''}`;
                btn.style.setProperty('--c', STAGES[id].color);
                btn.innerHTML = `<b>${STAGES[id].name}</b><br><span style="color:#ff0">★${STAGES[id].stars}</span>`;
                btn.onclick = () => showBriefing(id);
                grid.appendChild(btn);
            });
        }

        function showBriefing(id) {
            const s = STAGES[id];
            document.getElementById('briefing-box').style.display = 'block';
            document.getElementById('brief-title').innerText = `MISSION: ${s.name}`;
            document.getElementById('brief-title').style.color = s.color;
            document.getElementById('brief-text').innerText = s.info + `\n\n獲得予定報酬: ${s.ultimate ? '150000' : '5000'} CREDITS`;
            document.getElementById('start-btn').onclick = () => startGame(id);
        }

        function renderGarage() {
            const list = document.getElementById('garage-list'); list.innerHTML = '';
            WEAPONS.forEach(w => {
                const btn = document.createElement('div');
                btn.className = 'nav-btn';
                btn.style.borderColor = w.id;
                btn.style.fontSize = '8px';
                btn.innerHTML = `<b>${w.name}</b><br><span style="color:#ccc; font-family:'Noto Sans JP'">${w.info}</span>`;
                btn.onclick = () => { userData.skin = w.id; save(); showMsg("SKIN EQUIPPED", w.id); };
                list.appendChild(btn);
            });
        }

        function openPanel(id) {
            document.getElementById('main-nav').style.display = 'none';
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'stage-select') renderStages();
            if(id === 'garage') renderGarage();
            if(id === 'shop') renderShop();
        }

        function renderShop() {
            const shop = document.getElementById('weapon-shop'); shop.innerHTML = '';
            const upgrades = [
                { id: 'atk', name: 'FIREPOWER UP', cost: 1000 },
                { id: 'heal', name: 'QUICK REPAIR', cost: 500 },
                { id: 'bit', name: 'DRONE BIT', cost: 3000 },
                { id: 'shield', name: 'AUTO-SHIELD', cost: 2000 }
            ];
            upgrades.forEach(u => {
                const btn = document.createElement('button');
                btn.className = 'nav-btn';
                btn.innerHTML = `${u.name}<br>${u.cost}G`;
                btn.disabled = userData.gold < u.cost;
                btn.onclick = () => {
                    userData.gold -= u.cost;
                    if(u.id === 'atk') sessionData.atk += 1;
                    if(u.id === 'heal') hp = 100;
                    if(u.id === 'bit') sessionData.hasBit = true;
                    save(); renderShop();
                };
                shop.appendChild(btn);
            });
        }

        function backToMain() {
            document.getElementById('briefing-box').style.display = 'none';
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.getElementById('main-nav').style.display = 'flex';
        }

        function showMsg(t, color) {
            const m = document.getElementById('msg');
            m.innerText = t; m.style.color = color; m.style.opacity = 1;
            setTimeout(() => m.style.opacity = 0, 2000);
        }

        function startGame(id) {
            currentMode = { ...STAGES[id], id: id };
            document.getElementById('overlay').style.display = 'none';
            gameActive = true; score = 0; hp = 100; phase = 1; burstGauge = 0;
            enemies = []; bullets = []; eBullets = []; particles = [];
            player.x = canvas.width/2; player.y = canvas.height/2;
            showMsg("ENGAGING...", "#0ff");
            loop();
        }

        function useBomb() {
            if(userData.bombs > 0 && bombActive <= 0) {
                userData.bombs--; bombActive = 60; eBullets = [];
                enemies.forEach(e => { e.hp -= 2000; createExplosion(e.x, e.y, "#fff"); });
                showMsg("BURST ACTIVATED!!", "#fff");
            }
        }

        function createExplosion(x, y, color) {
            for(let i=0; i<10; i++) particles.push({ x: x, y: y, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10, life: 20, color: color });
        }

        function update() {
            frame++;
            if(bombActive > 0) bombActive--;

            // ギミック制御（アバター能力の反映）
            const skin = WEAPONS.find(w => w.id === userData.skin);
            let skipGimmick = (skin && skin.special === 'stable');

            if(currentMode.gimmick === 'vibrate' && !skipGimmick) { player.x += (Math.random()-0.5)*10; player.y += (Math.random()-0.5)*10; }
            if(currentMode.gimmick === 'wind' && !skipGimmick) player.x -= 3;
            if(currentMode.gimmick === 'poison' && frame % 60 === 0) hp -= 2;

            // 射撃（アバターの種類展開）
            if(isDown && frame % 5 === 0) {
                const s = userData.skin; const a = sessionData.atk;
                if(s === '#0f0') { if(frame%3===0) bullets.push({ x: player.x, y: player.y-20, p: a*0.7, vy: -30, vx: 0, w: 4 }); }
                else if(s === '#0ff') { [-5,0,5].forEach(vx => bullets.push({ x: player.x, y: player.y-20, p: a, vy: -20, vx: vx, w: 6 })); }
                else if(s === '#ff0') { bullets.push({ x: player.x, y: player.y-20, p: a, vy: -15, vx: Math.sin(frame*0.2)*10, w: 6 }); }
                else if(s === '#aa0022') { bullets.push({ x: player.x, y: player.y-25, p: a*3, vy: -12, vx: 0, w: 25 }); }
                else if(s === '#9900ff') { bullets.push({ x: player.x, y: player.y-20, p: a*2, vy: -40, vx: 0, w: 8 }); }
                else { bullets.push({ x: player.x, y: player.y-20, p: a, vy: -20, vx: 0, w: 6 }); }
            }

            // ドローンビット
            if(sessionData.hasBit && frame % 15 === 0) {
                let bx = player.x + Math.cos(frame*0.1)*60; let by = player.y + Math.sin(frame*0.1)*60;
                bullets.push({ x: bx, y: by, p: 1.5, vy: -25, vx: 0, w: 4 });
            }

            // フェーズ移行
            if(phase === 1 && score >= currentMode.score1) { phase = 2; showMsg("PHASE 2", "#ff0"); }
            if(phase === 2 && score >= currentMode.score2) { phase = 3; showMsg("BOSS APPROACHING", "#f00"); }

            // 敵生成
            if(!enemies.some(e => e.isBoss) && frame % 30 === 0) {
                enemies.push({ x: Math.random()*canvas.width, y: -50, hp: 15*currentMode.diff, size: 30, vy: 3 + currentMode.diff/2 });
            }
            if(phase === 3 && !enemies.some(e => e.isBoss)) {
                enemies.push({ x: canvas.width/2, y: -100, hp: currentMode.bossHp, maxHp: currentMode.bossHp, size: 140, vy: 1, isBoss: true });
            }

            // 衝突判定
            bullets.forEach((b, i) => {
                b.y += b.vy; b.x += b.vx;
                if(b.y < -50) bullets.splice(i, 1);
                enemies.forEach((e, ei) => {
                    if(Math.hypot(b.x-e.x, b.y-e.y) < e.size) {
                        e.hp -= b.p; score += 10; bullets.splice(i, 1);
                        if(e.hp <= 0) {
                            createExplosion(e.x, e.y, currentMode.color);
                            if(e.isBoss) finish(true);
                            else {
                                score += 500; userData.gold += 15;
                                burstGauge += 10; if(burstGauge >= 100) { burstGauge = 0; userData.bombs++; showMsg("BOMB RECHARGED", "#ff0"); }
                                enemies.splice(ei, 1);
                            }
                        }
                    }
                });
            });

            eBullets.forEach((eb, i) => {
                eb.y += eb.vy; eb.x += eb.vx || 0;
                if(Math.hypot(eb.x-player.x, eb.y-player.y) < 18) {
                    let dmg = (skin && skin.special === 'def') ? 12 : 15;
                    hp -= dmg; eBullets.splice(i, 1);
                    if(hp <= 0) finish(false);
                }
                if(eb.y > canvas.height + 50) eBullets.splice(i, 1);
            });

            enemies.forEach(e => {
                e.y += e.vy; if(e.isBoss && e.y > 150) e.vy = 0;
                if(Math.random() < 0.05 * currentMode.diff && bombActive <= 0) {
                    eBullets.push({ x: e.x, y: e.y, vx: e.isBoss ? Math.cos(frame*0.2)*8 : 0, vy: 7 + currentMode.diff });
                }
            });

            particles.forEach((p, i) => { p.x += p.vx; p.y += p.vy; p.life--; if(p.life <= 0) particles.splice(i, 1); });

            document.getElementById('hp-fill').style.width = hp + "%";
            document.getElementById('gauge-fill').style.width = burstGauge + "%";
            document.getElementById('score-val').innerText = `SCORE: ${score.toString().padStart(6, '0')}`;
        }

        function draw() {
            ctx.fillStyle = "#000a1a"; ctx.fillRect(0,0,canvas.width, canvas.height);
            if(bombActive > 0) { ctx.fillStyle = "rgba(255,255,255,0.3)"; ctx.fillRect(0,0,canvas.width, canvas.height); }

            ctx.fillStyle = userData.skin; ctx.beginPath();
            ctx.moveTo(player.x, player.y - 20); ctx.lineTo(player.x + 18, player.y + 15); ctx.lineTo(player.x - 18, player.y + 15);
            ctx.fill();

            enemies.forEach(e => { 
                ctx.strokeStyle = currentMode.color; ctx.lineWidth = 3; 
                ctx.strokeRect(e.x-e.size/2, e.y-e.size/2, e.size, e.size);
                if(e.isBoss) {
                    ctx.fillStyle = "#333"; ctx.fillRect(e.x-70, e.y-90, 140, 5);
                    ctx.fillStyle = "#f00"; ctx.fillRect(e.x-70, e.y-90, 140*(e.hp/e.maxHp), 5);
                }
            });
            bullets.forEach(b => { ctx.fillStyle = userData.skin; ctx.fillRect(b.x-b.w/2, b.y, b.w, 20); });
            eBullets.forEach(eb => { ctx.fillStyle = "#f0f"; ctx.beginPath(); ctx.arc(eb.x, eb.y, 8, 0, 7); ctx.fill(); });
            particles.forEach(p => { ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, 4, 4); });
        }

        function finish(clear) {
            gameActive = false;
            if(clear) {
                if(!userData.cleared.includes(currentMode.id)) userData.cleared.push(currentMode.id);
                userData.gold += currentMode.ultimate ? 150000 : 5000; save();
                if(currentMode.id === 'CO') showEnding();
                else { alert("MISSION SUCCESS!"); location.reload(); }
            } else { alert("MISSION FAILED..."); location.reload(); }
        }

        function showEnding() {
            document.getElementById('ending').style.display = 'flex';
            const msg = "中央線のオレンジが宇宙を包み込む…。すべての路線を制覇したあなたに、最高の敬意を。2026年、南プロジェクト完結。";
            let i = 0; const timer = setInterval(() => {
                document.getElementById('end-text').innerText += msg[i];
                i++; if(i >= msg.length) clearInterval(timer);
            }, 50);
        }

        function loop() { if(!gameActive) return; update(); draw(); requestAnimationFrame(loop); }

        let isDown = false;
        window.onmousedown = (e) => { if(e.button === 0) isDown = true; if(e.button === 2) useBomb(); };
        window.onmouseup = () => isDown = false;
        window.onmousemove = e => { player.x = e.clientX; player.y = e.clientY; };
        window.onkeydown = e => { if(e.code === 'Space') useBomb(); };

        refreshHUD();
    </script>
</body>
</html>
