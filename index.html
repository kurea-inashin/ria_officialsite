<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>MINAMI PROJECT 2026: PRECISION EDITION</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+JP:wght@700&display=swap');
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #020202; color: #fff; 
            font-family: 'Press Start 2P', cursive; 
            overflow: hidden; 
        }

        /* 画面中央配置（1200x900固定） */
        #viewport {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 1200px;
            height: 900px;
            background: #000;
            overflow: hidden;
            border: 2px solid #444;
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        canvas { display: block; image-rendering: pixelated; }

        /* --- HUD --- */
        .hud {
            position: absolute; inset: 0; padding: 30px;
            pointer-events: none; z-index: 100; display: none;
        }
        .hud-top { display: flex; justify-content: space-between; font-size: 20px; color: #0ff; }
        .hud-bottom { position: absolute; bottom: 30px; left: 30px; font-size: 16px; }
        .hp-bar-bg { width: 300px; height: 12px; border: 2px solid #fff; margin-top: 10px; background: #200; }
        #hp-fill { height: 100%; background: #f05; width: 100%; transition: 0.1s; }

        /* --- MENUS --- */
        #overlay {
            position: absolute; inset: 0;
            background: #000; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 200;
        }
        .title { font-size: 48px; margin-bottom: 10px; color: #fff; text-shadow: 4px 4px #f05; }
        .guide { font-size: 10px; color: #888; margin-bottom: 50px; line-height: 2; text-align: center; }
        .menu-row { display: flex; gap: 40px; }
        .card {
            width: 240px; height: 320px; border: 5px solid #fff;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; background: #000; transition: 0.2s;
        }
        .card:hover { background: #fff; color: #000; transform: translateY(-10px); }
        .card b { font-size: 60px; margin-bottom: 30px; }

        .panel {
            display: none; position: absolute; inset: 20px;
            background: #000; border: 8px solid #fff; padding: 50px;
            z-index: 300; overflow-y: auto; flex-direction: column;
        }
        .panel.active { display: flex; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; margin-top: 30px; }
        .node { border: 2px solid #333; padding: 20px 5px; text-align: center; cursor: pointer; font-size: 10px; }
        .node:hover { border-color: #fff; background: #111; }
        .node.cleared { border-color: #0f0; color: #0f0; }

        #alert {
            position: absolute; top: 40%; width: 100%; text-align: center;
            font-size: 50px; color: #f00; display: none; z-index: 500;
            font-family: 'Noto Sans JP'; font-weight: 700;
        }

        .copyright {
            position: absolute; bottom: 20px; font-size: 10px; color: #444;
        }
    </style>
</head>
<body>

    <div id="viewport">
        <div id="alert">WARNING</div>

        <div id="hud" class="hud">
            <div class="hud-top">
                <div id="score-txt">SCORE: 00000000</div>
                <div id="credit-txt" style="color:#ffd700;">CREDITS: 0</div>
            </div>
            <div class="hud-bottom">
                <div>UNIT HP</div>
                <div class="hp-bar-bg"><div id="hp-fill"></div></div>
                <div id="bomb-txt" style="margin-top:15px; color:#0cf;">BOMBS: ★ ★</div>
            </div>
        </div>

        <div id="overlay">
            <h1 class="title">MINAMI PROJECT 2026</h1>
            <div class="guide">
                [ HOW TO PLAY ]<br>
                MOUSE: MOVE UNIT / CLICK: FIRE CANNON<br>
                DEFEAT ENEMIES TO GET CREDITS & SCORE<br>
                AUTO-BOMB TRIGGERS ON HIT IF STOCK EXISTS
            </div>
            
            <div class="menu-row">
                <div class="card" onclick="ui.open('panel-m')"><b>M</b><span>MISSION</span></div>
                <div class="card" onclick="ui.open('panel-s')"><b>H</b><span>HANGAR</span></div>
            </div>

            <div class="copyright">© 2026 MINAMI PROJECT. ALL RIGHTS RESERVED.</div>
        </div>

        <div id="panel-m" class="panel">
            <h2>SELECT SECTOR</h2>
            <div id="m-list" class="grid"></div>
            <button onclick="ui.close()" style="margin-top:40px; padding:20px; font-family:'Press Start 2P'; cursor:pointer;">BACK</button>
        </div>

        <div id="panel-s" class="panel">
            <h2 id="s-wallet" style="color:#ffd700;">CREDITS: 0</h2>
            <div id="s-list" style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-top:30px;"></div>
            <button onclick="ui.close()" style="margin-top:40px; padding:20px; font-family:'Press Start 2P'; cursor:pointer;">BACK</button>
        </div>

        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 1200; canvas.height = 900;

        // --- STAGE DATA ---
        const SECTORS = [
            { id:'SB', n:'ST=SB', c:'#ccaa00', d:1.0, len:100000, g:'VIB' },
            { id:'KT', n:'ST=KT', c:'#0088cc', d:1.2, len:120000, g:'WTR' },
            { id:'SK', n:'ST=SK', c:'#008844', d:1.5, len:140000, g:'FOG' },
            { id:'KY', n:'ST=KY', c:'#aa0022', d:2.0, len:300000, g:'WND' },
            { id:'PK', n:'ST=PK', c:'#cc5588', d:2.2, len:90000, g:'REV' },
            { id:'JB', n:'ST=JB', c:'#006666', d:3.0, len:200000, g:'JAM' },
            { id:'S1', n:'ST=S1', c:'#6600cc', d:4.0, len:150000, g:'WRP' },
            { id:'S2', n:'ST=S2', c:'#cc00cc', d:5.5, len:180000, g:'PSN' },
            { id:'S3', n:'ST=S3', c:'#00cccc', d:7.0, len:200000, g:'GRV' },
            { id:'F1', n:'F15-A', c:'#778', d:10.0, len:100000, g:'SPD' },
            { id:'F2', n:'F15-B', c:'#778', d:15.0, len:120000, g:'SPD' },
            { id:'F3', n:'F15-G', c:'#778', d:20.0, len:140000, g:'SPD' },
            { id:'F4', n:'F15-D', c:'#778', d:30.0, len:160000, g:'SPD' },
            { id:'F5', n:'F15-E', c:'#b0c', d:50.0, len:200000, g:'SPD' },
            { id:'CO', n:'ST=CO', c:'#ff6600', d:100.0, len:2000000, g:'ULT' }
        ];

        const SHOP = [
            { id:'stab', n:'STABILIZER', cost:100000, d:'VIB/GRV 無効' },
            { id:'wind', n:'AERO-DEF', cost:200000, d:'WND/WTR 無効' },
            { id:'hull', n:'ULT-HULL', cost:800000, d:'PSN/ULT 防護' },
            { id:'bomb', n:'BOMB STOCK', cost:40000, d:'緊急回避+1' }
        ];

        let state = JSON.parse(localStorage.getItem('MINAMI_V6')) || { gold: 0, bombs: 2, cleared: [], gears: [] };
        const save = () => {
            localStorage.setItem('MINAMI_V6', JSON.stringify(state));
            document.getElementById('credit-txt').innerText = `CREDITS: ${state.gold.toLocaleString()}`;
            document.getElementById('s-wallet').innerText = `CREDITS: ${state.gold.toLocaleString()}`;
            document.getElementById('bomb-txt').innerText = `BOMBS: ${"★ ".repeat(state.bombs)}`;
        };

        const ui = {
            open: (id) => {
                document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
                document.getElementById(id).classList.add('active');
                if(id==='panel-m') ui.renderM();
                if(id==='panel-s') ui.renderS();
            },
            close: () => document.querySelectorAll('.panel').forEach(p => p.classList.remove('active')),
            renderM: () => {
                const g = document.getElementById('m-list'); g.innerHTML = '';
                SECTORS.forEach(s => {
                    const n = document.createElement('div');
                    n.className = `node ${state.cleared.includes(s.id) ? 'cleared' : ''}`;
                    n.style.borderColor = s.c;
                    n.innerHTML = s.n;
                    n.onclick = () => engine.start(s);
                    g.appendChild(n);
                });
            },
            renderS: () => {
                const l = document.getElementById('s-list'); l.innerHTML = '';
                SHOP.forEach(i => {
                    const has = state.gears.includes(i.id);
                    const n = document.createElement('div');
                    n.className = `node ${has && i.id!=='bomb' ? 'cleared' : ''}`;
                    n.style.padding = '20px';
                    n.innerHTML = `<b>${i.n}</b><br><br>${i.d}<br><br>${has && i.id!=='bomb' ? 'OWNED' : i.cost.toLocaleString() + ' G'}`;
                    n.onclick = () => {
                        if(state.gold >= i.cost) {
                            if(i.id==='bomb') state.bombs++;
                            else if(!has) state.gears.push(i.id);
                            state.gold -= i.cost; save(); ui.renderS();
                        }
                    };
                    l.appendChild(n);
                });
            }
        };

        // --- GAME ENGINE ---
        let running = false, score = 0, hp = 100, frame = 0, curS;
        let pX, pY, tX, tY, firing = false;
        let bullets = [], enemies = [], coins = [], fx = [];

        const engine = {
            start: (s) => {
                curS = s; ui.close();
                document.getElementById('overlay').style.display = 'none';
                document.getElementById('hud').style.display = 'block';
                running = true; score = 0; hp = 100; frame = 0;
                bullets = []; enemies = []; coins = []; fx = [];
                pX = 600; pY = 800; tX = 600; tY = 800;
                engine.loop();
            },
            loop: () => {
                if(!running) return;
                frame++;
                ctx.fillStyle = '#000'; ctx.fillRect(0,0,1200,900);

                // --- GIMMICKS ---
                let l = 0.2;
                if(curS.g==='GRV' && !state.gears.includes('stab')) l = 0.05;
                pX += (tX - pX) * l; pY += (tY - pY) * l;
                if(curS.g==='WND' && !state.gears.includes('wind')) pX -= 5;
                if(curS.g==='VIB' && !state.gears.includes('stab')) { pX += Math.sin(frame)*10; }
                if(curS.g==='PSN' && !state.gears.includes('hull') && frame % 60 === 0) hp -= 2;
                if(curS.g==='ULT' && !state.gears.includes('hull') && frame % 60 === 0) hp -= 5;

                // --- DRAW PLAYER (SMALL) ---
                ctx.fillStyle = '#fff';
                ctx.beginPath(); ctx.moveTo(pX, pY-25); ctx.lineTo(pX+20, pY+15); ctx.lineTo(pX-20, pY+15); ctx.fill();

                // --- SHOOT ---
                if(firing && frame % 6 === 0) bullets.push({x:pX, y:pY-25});
                bullets.forEach((b, i) => {
                    b.y -= 25; ctx.fillStyle = '#0ff'; ctx.fillRect(b.x-2, b.y, 4, 15);
                    enemies.forEach((e, ei) => {
                        if(Math.hypot(b.x-e.x, b.y-e.y) < 30) {
                            e.hp -= 10; bullets.splice(i,1);
                            if(e.hp <= 0) {
                                score += 1000;
                                for(let c=0; c<3; c++) coins.push({x:e.x, y:e.y, vx:(Math.random()-0.5)*15, vy:(Math.random()-0.5)*15});
                                enemies.splice(ei,1);
                            }
                        }
                    });
                    if(b.y < 0) bullets.splice(i,1);
                });

                // --- ENEMIES (SMALLER) ---
                if(frame % 25 === 0 && score < curS.len) enemies.push({x:Math.random()*1200, y:-50, hp:30*curS.d});
                enemies.forEach((e, i) => {
                    e.y += 5 * curS.d;
                    ctx.strokeStyle = curS.c; ctx.lineWidth = 4;
                    ctx.strokeRect(e.x-20, e.y-20, 40, 40);
                    if(Math.hypot(e.x-pX, e.y-pY) < 35) {
                        if(state.bombs > 0) {
                            state.bombs--; enemies = []; engine.notify("AUTO-BOMB"); save();
                        } else { hp -= 20; enemies.splice(i,1); }
                    }
                    if(e.y > 950) enemies.splice(i,1);
                });

                // --- COINS (MAGNETIC & DISPLAYED) ---
                coins.forEach((c, i) => {
                    let d = Math.hypot(c.x-pX, c.y-pY);
                    if(d < 250) { c.vx += (pX-c.x)*0.1; c.vy += (pY-c.y)*0.1; }
                    c.x += c.vx || 0; c.y += c.vy || 0;
                    if(c.vx) c.vx *= 0.9; if(c.vy) c.vy *= 0.9;
                    c.y += 2;
                    ctx.fillStyle = '#ffd700'; ctx.beginPath(); ctx.arc(c.x, c.y, 8, 0, 7); ctx.fill();
                    if(d < 30) { state.gold += 100; score += 200; save(); coins.splice(i,1); }
                });

                // --- HUD UPDATE ---
                document.getElementById('score-txt').innerText = `SCORE: ${score.toString().padStart(8,'0')}`;
                document.getElementById('hp-fill').style.width = hp + "%";

                if(hp <= 0) { running = false; alert("MISSION FAILED"); location.reload(); }
                if(score >= curS.len && enemies.length === 0) {
                    if(!state.cleared.includes(curS.id)) state.cleared.push(curS.id);
                    save(); running = false; alert("MISSION CLEAR"); location.reload();
                }

                requestAnimationFrame(engine.loop);
            },
            notify: (m) => {
                const a = document.getElementById('alert'); a.innerText = m; a.style.display = 'block';
                setTimeout(()=>a.style.display='none', 1500);
            }
        };

        // INPUTS
        canvas.addEventListener('mousemove', (e) => {
            const b = canvas.getBoundingClientRect();
            let mx = (e.clientX - b.left) * (1200 / b.width);
            let my = (e.clientY - b.top) * (900 / b.height);
            if(running && curS.g==='REV') { tX = 1200-mx; tY = 900-my; }
            else { tX = mx; tY = my; }
        });
        window.onmousedown = () => firing = true; window.onmouseup = () => firing = false;
        save();
    </script>
</body>
</html>
