<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Minami Project 2026: The Eternal Rail</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+JP:wght@700;900&display=swap');
        
        body { margin: 0; background: #000; color: #fff; font-family: 'Press Start 2P', cursive; overflow: hidden; user-select: none; }
        canvas { display: block; }

        /* HUD: ステータス表示 */
        #hud { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; }
        #score-val { font-size: 24px; text-shadow: 0 0 10px #00ffff; margin-bottom: 10px; }
        .bar-label { font-size: 8px; margin-top: 10px; color: #aaa; }
        .bar-container { width: 250px; height: 14px; background: rgba(255,255,255,0.1); border: 2px solid #fff; border-radius: 7px; overflow: hidden; margin-bottom: 5px; }
        #hp-fill { height: 100%; background: linear-gradient(90deg, #ff0055, #00ffaa); width: 100%; transition: width 0.3s; }
        #gauge-fill { height: 100%; background: #00ccff; width: 0%; transition: width 0.1s; }
        #bomb-stock { color: #ffff00; font-size: 14px; margin-top: 5px; }
        #gold-val { color:#ffd700; font-size:12px; margin-top:5px; }

        /* Menu System */
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,15,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 20; backdrop-filter: blur(8px); }
        .panel { display: none; flex-direction: column; align-items: center; width: 95%; max-height: 90vh; overflow-y: auto; }
        .active { display: flex; }
        .nav-btn { padding: 15px 30px; border: 3px solid #fff; background: rgba(255,255,255,0.1); color: #fff; cursor: pointer; font-family: 'Press Start 2P'; font-size: 11px; margin: 10px; transition: 0.2s; }
        .nav-btn:hover { background: #fff; color: #000; transform: scale(1.05); }

        /* Stage Grid & Clear Mark */
        .mode-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; width: 100%; max-width: 1000px; padding: 20px; }
        .mode-btn { width: 100%; box-sizing: border-box; padding: 15px; border: 2px solid #333; background: #000; color: #444; cursor: pointer; text-align: left; font-size: 9px; transition: 0.3s; position: relative; }
        .mode-btn.unlocked { border-color: var(--c); color: var(--c); }
        .mode-btn.cleared { border-style: double; border-width: 6px; box-shadow: inset 0 0 10px var(--c); }
        .mode-btn.cleared::after { content: '✔ MISSION CLEAR'; font-size: 8px; position: absolute; top: 5px; right: 5px; color: #0f0; font-weight: bold; background: #000; padding: 2px; }

        /* Briefing Panel */
        #briefing-panel { background: rgba(0, 10, 30, 0.95); border: 4px solid #0088ff; padding: 30px; max-width: 700px; box-shadow: 0 0 40px rgba(0, 136, 255, 0.6); }
        .brief-title { font-size: 22px; margin-bottom: 20px; border-bottom: 2px solid #00ffff; padding-bottom: 10px; text-align: center; }
        .brief-info { font-family: 'Noto Sans JP'; font-size: 14px; line-height: 1.8; color: #ddd; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 5px; margin-bottom: 25px; }
        .brief-stat { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 10px; color: #ffaa00; }

        /* Copyright Notice */
        #copyright { position: absolute; bottom: 15px; width: 100%; text-align: center; font-size: 10px; color: rgba(255,255,255,0.4); pointer-events: none; z-index: 25; }

        .status-msg { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 32px; opacity: 0; transition: 0.4s; pointer-events: none; z-index: 50; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="hud">
        <div id="score-val">SCORE: 000000</div>
        <div class="bar-label">SYSTEM STABILITY (HP)</div>
        <div class="bar-container"><div id="hp-fill"></div></div>
        <div class="bar-label">BOMB CHARGE</div>
        <div class="bar-container"><div id="gauge-fill"></div></div>
        <div id="bomb-stock">BOMBS: </div>
        <div id="gold-val">GOLD: 0</div>
    </div>

    <div id="overlay">
        <h1 style="font-size:28px; margin-bottom:40px; text-shadow: 0 0 15px #0088ff;">MINAMI PROJECT 2026</h1>
        
        <div id="main-nav" style="display: flex; flex-direction: column; align-items: center;">
            <button class="nav-btn" onclick="openPanel('stage-select')">SELECT MISSION</button>
            <button class="nav-btn" onclick="openPanel('garage')">GARAGE</button>
            <button class="nav-btn" onclick="openPanel('shop')">TECH SHOP</button>
        </div>

        <div id="stage-select" class="panel">
            <h2 style="font-size:16px; color:#0ff;">STRATEGIC MAP</h2>
            <div class="mode-grid" id="grid"></div>
            <button class="nav-btn" style="margin-top:20px;" onclick="backToMain()">RETURN</button>
        </div>

        <div id="briefing-panel" class="panel">
            <div id="briefing">
                <div id="brief-title" class="brief-title">MISSION BRIEFING</div>
                <div class="brief-stat">
                    <span>LEVEL: <span id="brief-stars"></span></span>
                    <span>REWARD: <span id="brief-reward"></span> GOLD</span>
                </div>
                <div id="brief-desc" class="brief-info"></div>
                <div style="display: flex; justify-content: space-evenly;">
                    <button id="start-btn" class="nav-btn" style="border-color: #0f0; background: rgba(0,255,0,0.1);">LAUNCH</button>
                    <button class="nav-btn" onclick="openPanel('stage-select')" style="border-color: #f00;">CANCEL</button>
                </div>
            </div>
        </div>

        <div id="garage" class="panel">
            <h2>GARAGE</h2>
            <div id="garage-list" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;"></div>
            <button class="nav-btn" style="margin-top:30px;" onclick="backToMain()">RETURN</button>
        </div>

        <div id="shop" class="panel">
            <div id="shop-gold-display" style="color:#ffd700; font-size:20px; margin-bottom:20px;"></div>
            <div id="weapon-shop" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:20px;"></div>
            <button class="nav-btn" onclick="backToMain()">RETURN</button>
        </div>

        <div id="copyright">© 2026 MINAMI PROJECT. ALL RIGHTS RESERVED.</div>
    </div>

    <div id="msg" class="status-msg"></div>
    <canvas id="game"></canvas>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;

        let gameActive = false, score = 0, hp = 100, frame = 0, burstGauge = 0, bombActive = 0;
        let bullets = [], eBullets = [], enemies = [], particles = [];
        let player = { x: canvas.width/2, y: canvas.height/2, targetX: canvas.width/2, targetY: canvas.height/2 };
        let currentMode = null, isDown = false;

        const SAVE_KEY = 'minami_2026_vFinal';
        const NORMAL_STAGES = ['SB', 'KT', 'SK', 'KY', 'PK', 'JB', 'S1', 'S2', 'S3'];

        let userData = JSON.parse(localStorage.getItem(SAVE_KEY)) || {
            gold: 0, bombs: 2, unlocked: [...NORMAL_STAGES], cleared: [], skin: '#fff', licenses: ['#fff']
        };

        const STAGES = {
            'SB': { name: 'ST=SB', color: '#ccaa00', stars: 1, diff: 1, reward: 2000, bossHp: 500, score2: 12000, gimmick: 'vibrate', hint: '【総武緩行】激しい震動が発生。広範囲をカバーする攻撃を推奨。' },
            'KT': { name: 'ST=KT', color: '#0088cc', stars: 1, diff: 1.2, reward: 2500, bossHp: 700, score2: 15000, gimmick: 'water', hint: '【京浜東北】水圧エリア。機体移動が低下。貫通弾による速攻が有効。' },
            'SK': { name: 'ST=SK', color: '#008844', stars: 2, diff: 1.5, reward: 3500, bossHp: 900, score2: 20000, gimmick: 'fog', hint: '【埼京】濃霧エリア。視界が極端に悪いため、自動追尾弾の使用を推奨。' },
            'KY': { name: 'ST=KY', color: '#aa0022', stars: 2, diff: 2.0, reward: 4500, bossHp: 1200, score2: 25000, gimmick: 'wind', hint: '【京葉】強風。機体が左に流される。中央を維持する制御が必要。' },
            'PK': { name: 'ST=PK', color: '#cc5588', stars: 3, diff: 2.2, reward: 5500, bossHp: 1500, score2: 30000, gimmick: 'reverse', hint: '【電磁界】制御異常。入力が完全に反転する。細心の注意を払え。' },
            'JB': { name: 'ST=JB', color: '#006666', stars: 3, diff: 2.5, reward: 6500, bossHp: 1800, score2: 35000, gimmick: 'jamming', hint: '【妨害電波】弾速の変化に注意。回避タイミングが不規則。' },
            'S1': { name: 'ST=S1', color: '#6600cc', stars: 4, diff: 3.0, reward: 8000, bossHp: 2200, score2: 45000, gimmick: 'warp', hint: '【空間歪曲】弾丸のワープ現象を確認。目前の着弾に警戒せよ。' },
            'S2': { name: 'ST=S2', color: '#cc00cc', stars: 4, diff: 3.5, reward: 9000, bossHp: 2800, score2: 55000, gimmick: 'poison', hint: '【猛毒】装甲腐食ガス。HPが常時低下。短期決戦で挑め。' },
            'S3': { name: 'ST=S3', color: '#00cccc', stars: 5, diff: 4.0, reward: 12000, bossHp: 3500, score2: 70000, gimmick: 'gravity', hint: '【超重力】強大な慣性。ブレーキが効かないため予測回避が必須。' },
            'HA': { name: 'ST=HA', color: '#CD7F32', stars: 6, diff: 6, reward: 18000, bossHp: 6500, secret: true, hint: '【高難度】敵出力強化。圧倒的弾幕を回避せよ。' },
            'HB': { name: 'ST=HB', color: '#C0C0C0', stars: 7, diff: 8, reward: 25000, bossHp: 8500, secret: true, hint: '【高難度】敵主力艦隊。総力を挙げて迎え撃て。' },
            'HC': { name: 'ST=HC', color: '#FFD700', stars: 8, diff: 12, reward: 35000, bossHp: 12000, secret: true, hint: '【黄金】究極の試練。ここを越えれば最終領域へ。' },
            'CO': { name: 'ST=CO', color: '#ff6600', stars: 30, diff: 60, reward: 150000, secret: true, hint: '【中央特快】物語の終焉。オレンジ色の閃光と共にすべてを終わらせろ。' }
        };

        const WEAPONS = [
            { id: '#fff', name: 'WHITE [STD]', cost: 0, p: 2 },
            { id: '#0f0', name: 'GREEN [SAIKYO]', cost: 2000, p: 1.5 },
            { id: '#0ff', name: 'CYAN [KEIHIN]', cost: 4000, p: 1.8 },
            { id: '#ff0', name: 'YELLOW [SOBU]', cost: 6000, p: 1.2 },
            { id: '#aa0022', name: 'RED [KEIYO]', cost: 8000, p: 5.0 }
        ];

        function save() { localStorage.setItem(SAVE_KEY, JSON.stringify(userData)); refreshHUD(); }
        function refreshHUD() {
            document.getElementById('gold-val').innerText = `GOLD: ${userData.gold}`;
            document.getElementById('bomb-stock').innerText = `BOMBS: ${"★".repeat(userData.bombs)}`;
            document.getElementById('shop-gold-display').innerText = `GOLD: ${userData.gold}`;
        }

        function renderStages() {
            const grid = document.getElementById('grid'); grid.innerHTML = '';
            if(NORMAL_STAGES.every(id => userData.cleared.includes(id))) ['HA','HB','HC'].forEach(id => !userData.unlocked.includes(id) && userData.unlocked.push(id));
            if(['HA','HB','HC'].every(id => userData.cleared.includes(id))) !userData.unlocked.includes('CO') && userData.unlocked.push('CO');
            Object.keys(STAGES).forEach(id => {
                if(STAGES[id].secret && !userData.unlocked.includes(id)) return;
                const s = STAGES[id];
                const btn = document.createElement('div');
                btn.className = `mode-btn unlocked ${userData.cleared.includes(id) ? 'cleared' : ''}`;
                btn.style.setProperty('--c', s.color);
                btn.innerHTML = `<b>${s.name}</b><br><span style="color:#ff0">★${s.stars}</span>`;
                btn.onclick = () => openBriefing(id);
                grid.appendChild(btn);
            });
        }

        function openBriefing(id) {
            const s = STAGES[id];
            document.getElementById('brief-title').innerText = `MISSION: ${s.name}`;
            document.getElementById('brief-title').style.color = s.color;
            document.getElementById('brief-stars').innerText = "★".repeat(s.stars);
            document.getElementById('brief-reward').innerText = s.reward;
            document.getElementById('brief-desc').innerText = s.hint;
            document.getElementById('start-btn').onclick = () => startGame(id);
            openPanel('briefing-panel');
        }

        function renderGarage() {
            const list = document.getElementById('garage-list'); list.innerHTML = '';
            WEAPONS.forEach(w => {
                const isOwned = userData.licenses.includes(w.id);
                const btn = document.createElement('button');
                btn.className = 'nav-btn';
                btn.style.borderColor = isOwned ? w.id : '#222';
                btn.innerHTML = isOwned ? w.name : 'LOCKED';
                if(isOwned) btn.onclick = () => { userData.skin = w.id; save(); showMsg("EQUIPPED", w.id); };
                list.appendChild(btn);
            });
        }

        function renderShop() {
            const shopList = document.getElementById('weapon-shop'); shopList.innerHTML = '';
            WEAPONS.forEach(w => {
                if(w.cost === 0) return;
                const isOwned = userData.licenses.includes(w.id);
                const btn = document.createElement('button');
                btn.className = 'nav-btn';
                btn.style.borderColor = isOwned ? '#333' : w.id;
                btn.innerHTML = isOwned ? `SOLD OUT` : `${w.name}<br>${w.cost}G`;
                btn.disabled = isOwned || userData.gold < w.cost;
                btn.onclick = () => { userData.gold -= w.cost; userData.licenses.push(w.id); save(); renderShop(); };
                shopList.appendChild(btn);
            });
        }

        function openPanel(id) {
            document.getElementById('main-nav').style.display = 'none';
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'stage-select') renderStages();
            if(id === 'garage') renderGarage();
            if(id === 'shop') renderShop();
        }

        function backToMain() {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.getElementById('main-nav').style.display = 'flex';
        }

        function showMsg(t, color) {
            const m = document.getElementById('msg');
            m.innerText = t; m.style.color = color; m.style.opacity = 1;
            setTimeout(() => m.style.opacity = 0, 2000);
        }

        function startGame(id) {
            currentMode = { ...STAGES[id], id: id };
            document.getElementById('overlay').style.display = 'none';
            gameActive = true; score = 0; hp = 100; frame = 0; burstGauge = 0;
            enemies = []; bullets = []; eBullets = []; particles = [];
            player.x = canvas.width/2; player.y = canvas.height/2;
            loop();
        }

        function finish(clear) {
            gameActive = false;
            if(clear) {
                if(!userData.cleared.includes(currentMode.id)) userData.cleared.push(currentMode.id);
                userData.gold += currentMode.reward;
                save();
                alert(`MISSION SUCCESS!\nGOLD +${currentMode.reward}`);
            } else alert("MISSION FAILED...");
            location.reload();
        }

        function update() {
            frame++;
            if(bombActive > 0) bombActive--;

            // --- ギミックロジック ---
            let moveSpeed = 0.2;
            let tx = player.targetX, ty = player.targetY;
            if(currentMode.gimmick === 'reverse') { tx = canvas.width - tx; ty = canvas.height - ty; }
            if(currentMode.gimmick === 'gravity') moveSpeed = 0.05;
            if(currentMode.gimmick === 'water') moveSpeed = 0.1;

            player.x += (tx - player.x) * moveSpeed;
            player.y += (ty - player.y) * moveSpeed;

            if(currentMode.gimmick === 'wind') player.x -= 3.5;
            if(currentMode.gimmick === 'vibrate') { player.x += (Math.random()-0.5)*12; player.y += (Math.random()-0.5)*12; }
            if(currentMode.gimmick === 'poison' && frame % 60 === 0) hp -= 2;

            // --- 射撃 ---
            if(isDown && frame % 5 === 0) {
                const s = userData.skin;
                let power = WEAPONS.find(w => w.id === s).p;
                if(s === '#0ff') { // CYAN: 3方向
                    [-5, 0, 5].forEach(vx => bullets.push({ x: player.x, y: player.y-20, p: power, vy: -20, vx: vx, w: 8 }));
                } else if(s === '#ff0') { // YELLOW: 追尾(蛇行)
                    bullets.push({ x: player.x, y: player.y-20, p: power, vy: -15, vx: Math.sin(frame*0.2)*12, w: 8 });
                } else if(s === '#aa0022') { // RED: 巨大
                    bullets.push({ x: player.x, y: player.y-25, p: power, vy: -12, vx: 0, w: 25 });
                } else { // STD, GREEN
                    bullets.push({ x: player.x, y: player.y-20, p: power, vy: (s==='#0f0'?-30:-20), vx: 0, w: 6 });
                }
            }

            // --- 敵生成 ---
            if(!enemies.some(e => e.isBoss) && frame % 25 === 0) {
                enemies.push({ x: Math.random()*canvas.width, y: -50, hp: 15*currentMode.diff, size: 30, vy: 3 + currentMode.diff/2 });
            }
            if(score >= currentMode.score2 && !enemies.some(e => e.isBoss)) {
                enemies.push({ x: canvas.width/2, y: -120, hp: currentMode.bossHp, maxHp: currentMode.bossHp, size: 140, vy: 1, isBoss: true });
            }

            // --- 衝突判定 ---
            bullets.forEach((b, i) => {
                b.y += b.vy; b.x += b.vx;
                if(b.y < -50) bullets.splice(i, 1);
                enemies.forEach((e, ei) => {
                    if(Math.hypot(b.x-e.x, b.y-e.y) < e.size) {
                        e.hp -= b.p; bullets.splice(i, 1);
                        if(e.hp <= 0) {
                            if(e.isBoss) finish(true);
                            else { score += 500; enemies.splice(ei, 1); burstGauge += 10; if(burstGauge>=100){ burstGauge=0; userData.bombs++; } }
                        }
                    }
                });
            });

            enemies.forEach(e => {
                e.y += e.vy; if(e.isBoss && e.y > 150) e.vy = 0;
                let bSpd = (currentMode.gimmick === 'jamming') ? (5 + Math.sin(frame*0.1)*4) : (7 + currentMode.diff);
                if(Math.random() < 0.05 * currentMode.diff && bombActive <= 0) {
                    eBullets.push({ x: e.x, y: e.y, vx: e.isBoss ? Math.cos(frame*0.2)*bSpd : 0, vy: bSpd });
                }
            });

            eBullets.forEach((eb, i) => {
                eb.x += eb.vx || 0; eb.y += eb.vy;
                if(currentMode.gimmick === 'warp' && frame % 100 === 0 && eb.y > 200) eb.y += 150;
                if(Math.hypot(eb.x-player.x, eb.y-player.y) < 20) { hp -= 15; eBullets.splice(i, 1); if(hp <= 0) finish(false); }
                if(eb.y > canvas.height + 50) eBullets.splice(i, 1);
            });

            document.getElementById('hp-fill').style.width = Math.max(0, hp) + "%";
            document.getElementById('gauge-fill').style.width = burstGauge + "%";
            document.getElementById('score-val').innerText = `SCORE: ${score.toString().padStart(6, '0')}`;
        }

        function draw() {
            ctx.fillStyle = "#001"; ctx.fillRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = userData.skin; ctx.beginPath();
            ctx.moveTo(player.x, player.y - 20); ctx.lineTo(player.x + 18, player.y + 15); ctx.lineTo(player.x - 18, player.y + 15);
            ctx.fill();
            enemies.forEach(e => { ctx.strokeStyle = currentMode.color; ctx.lineWidth=3; ctx.strokeRect(e.x-e.size/2, e.y-e.size/2, e.size, e.size); });
            bullets.forEach(b => { ctx.fillStyle = userData.skin; ctx.fillRect(b.x-b.w/2, b.y, b.w, 20); });
            eBullets.forEach(eb => { ctx.fillStyle = "#f0f"; ctx.beginPath(); ctx.arc(eb.x, eb.y, 8, 0, Math.PI*2); ctx.fill(); });
        }

        function loop() { if(!gameActive) return; update(); draw(); requestAnimationFrame(loop); }

        window.onmousedown = () => isDown = true;
        window.onmouseup = () => isDown = false;
        window.onmousemove = e => { player.targetX = e.clientX; player.targetY = e.clientY; };
        
        refreshHUD();
    </script>
</body>
</html>
