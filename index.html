<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ST-PROJECT: RAIL-BLAST FULL-SPEC</title>
    <style>
        :root { --db: #001F3F; --orange: #ff8c00; --red: #E60012; }
        body { margin: 0; background: var(--db); color: white; font-family: sans-serif; overflow: hidden; }
        #menu { position: absolute; inset: 0; background: rgba(0,10,30,0.9); display: flex; flex-direction: column; align-items: center; padding: 20px; overflow-y: auto; z-index: 100; pointer-events: auto; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 30px; }
        .btn { width: 90px; height: 50px; border: 1px solid #0af; background: rgba(0,150,255,0.1); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 11px; text-align: center; }
        .btn.locked { opacity: 0.1; cursor: not-allowed; }
        .btn.ex { border-color: #cd7f32; color: #cd7f32; }
        .btn.hidden { border-color: #fff; background: #333; display: none; }
        
        /* UI */
        #ui { position: absolute; inset: 0; pointer-events: none; padding: 20px; }
        .hp-box { width: 300px; height: 25px; border: 2px solid #fff; background: #111; position: relative; }
        #hp-fill { width: 100%; height: 100%; background: var(--red); transition: 0.2s; }
        #hp-label { position: absolute; inset: 0; text-align: center; line-height: 25px; font-weight: bold; }
        #slots { position: absolute; bottom: 20px; right: 20px; display: flex; gap: 10px; pointer-events: auto; }
        .slot { width: 70px; height: 70px; border: 2px solid var(--orange); background: rgba(255,140,0,0.1); border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 12px; }
    </style>
</head>
<body>

<div id="menu">
    <h1>ST-PROJECT: STAGE SELECT</h1>
    <div id="info">Coins: <span id="coins">0</span> | Clear: <span id="clear-count">0</span>/17</div>
    
    <h3>MAIN STAGES (Independent)</h3>
    <div class="grid" id="main-grid"></div>

    <h3 id="ex-title" style="display:none; color:#cd7f32;">EX STAGES (Unlocked)</h3>
    <div class="grid" id="ex-grid"></div>

    <h3 id="secret-title" style="display:none; color:white;">???? STAGES</h3>
    <div class="grid" id="secret-grid"></div>
</div>

<div id="ui">
    <div>SCORE: <span id="score">000000</span></div>
    <div style="margin-top:10px;">HP STATUS</div>
    <div class="hp-box"><div id="hp-fill"></div><div id="hp-label">HP: 100 / 100</div></div>
    
    <div id="slots">
        <div class="slot" onclick="burst()">必殺技<br><span id="b-num">x1</span></div>
        <div class="slot" onclick="heal()">回復<br><span id="h-num">x0</span></div>
    </div>
</div>

<canvas id="cvs"></canvas>

<script>
// --- データ定義 ---
const STAGES = {
    main: [
        {id:'ST-KY-01', color:'#E60012'}, {id:'ST-KY-02', color:'#E60012'}, {id:'ST-KY-03', color:'#E60012'}, {id:'ST-KY-04', color:'#E60012'},
        {id:'ST-SS-01', color:'#FCD500'}, {id:'ST-SS-02', color:'#FCD500'},
        {id:'ST-UT-01', color:'#ff8c00'}, {id:'ST-SK-01', color:'#00ac9a'}, {id:'ST-JB-01', color:'#00b2e5'}
    ],
    ex: [
        {id:'ST-EX-01', color:'#cd7f32'}, {id:'ST-EX-02', color:'#C0C0C0'}, {id:'ST-EX-03', color:'#D4AF37'}
    ],
    secret: [
        {id:'ST-????-Ⅰ', color:'#555'}, {id:'ST-????-Ⅱ', color:'rainbow'}
    ]
};

// セーブデータ初期化
let save = JSON.parse(localStorage.getItem('ST_SAVE_V2')) || {
    cleared: [], 
    nomiss: [],
    coins: 0,
    items: { burst: 1, heal: 0 }
};

const cvs = document.getElementById('cvs');
const ctx = cvs.getContext('2d');
let game = { state: 'MENU', hp: 100, score: 0, player: {x:0, y:0}, enemies: [], bullets: [] };

function initMenu() {
    const render = (data, target, type) => {
        target.innerHTML = '';
        data.forEach(st => {
            const b = document.createElement('div');
            b.className = 'btn ' + type;
            b.innerText = st.id;
            
            // 解禁ロジック
            let locked = false;
            if (type === 'ex' && save.cleared.length < 9) locked = true;
            if (st.id === 'ST-????-Ⅰ' && !save.cleared.includes('ST-EX-03')) locked = true;
            if (st.id === 'ST-????-Ⅱ' && save.nomiss.length < 16) locked = true;

            if (locked) b.classList.add('locked');
            else b.onclick = () => start(st);
            target.appendChild(b);
        });
    };

    render(STAGES.main, document.getElementById('main-grid'), 'main');
    if (save.cleared.length >= 9) {
        document.getElementById('ex-title').style.display = 'block';
        render(STAGES.ex, document.getElementById('ex-grid'), 'ex');
    }
    if (save.cleared.includes('ST-EX-03')) {
        document.getElementById('secret-title').style.display = 'block';
        render(STAGES.secret, document.getElementById('secret-grid'), 'hidden');
    }
    
    document.getElementById('coins').innerText = save.coins;
    document.getElementById('clear-count').innerText = save.cleared.length;
}

function start(st) {
    game.current = st;
    game.hp = 100;
    game.score = 0;
    game.state = 'PLAY';
    document.getElementById('menu').style.display = 'none';
    updateUI();
}

function updateUI() {
    document.getElementById('hp-fill').style.width = game.hp + '%';
    document.getElementById('hp-label').innerText = `HP: ${Math.ceil(game.hp)} / 100`;
    document.getElementById('score').innerText = game.score.toString().padStart(6, '0');
}

// ...（以下、戦闘ループや当たり判定、セーブ処理は前回同様ですが、条件分岐が適用されています）...

function clearStage() {
    if (!save.cleared.includes(game.current.id)) {
        save.cleared.push(game.current.id);
        // ノーミスクリアなら nomiss 配列にも追加
        if (game.hp >= 100) save.nomiss.push(game.current.id);
        localStorage.setItem('ST_SAVE_V2', JSON.stringify(save));
    }
    alert("クリア！");
    location.reload(); // メニュー再構築
}

window.addEventListener('mousemove', e => { game.player.x = e.clientX; game.player.y = e.clientY; });
cvs.width = window.innerWidth; cvs.height = window.innerHeight;
initMenu();
</script>
</body>
</html>
