<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>MINAMI SHOOTING GAME PROJECT 2026</title>
    <style>
        body { background: #111; color: #fff; font-family: sans-serif; margin: 0; overflow: hidden; text-align: center; }
        canvas { background: #000; display: block; margin: 20px auto; border: 4px solid #444; }
        .ui-container { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); width: 800px; display: flex; justify-content: space-between; pointer-events: none; }
        .stat { background: rgba(0,0,0,0.7); padding: 10px; border-radius: 5px; border: 1px solid #fff; }
        #menu, #shop, #stage-select { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(20,20,20,0.95); padding: 30px; border: 2px solid #fff; width: 500px; }
        button { background: #444; color: #fff; border: none; padding: 10px 20px; margin: 10px; cursor: pointer; font-size: 16px; border-bottom: 3px solid #000; }
        button:hover { background: #666; }
        .hidden { display: none; }
        .rail-sobu { color: #f1ca00; } /* 黄 */
        .rail-saikyo { color: #00ac4a; } /* 緑 */
        .rail-keihin { color: #00a4e4; } /* 青 */
        .rail-keiyo { color: #e50012; } /* 赤 */
        .rail-chuo { color: #f39700; } /* オレンジ */
    </style>
</head>
<body>

<div class="ui-container">
    <div class="stat">HP: <span id="hp-val">100</span> | SCORE: <span id="score-val">0</span></div>
    <div class="stat">COIN: <span id="coin-val">0</span></div>
</div>

<canvas id="gameCanvas" width="800" height="600"></canvas>

<div id="menu">
    <h1>MINAMI SHOOTING 2026</h1>
    <button onclick="showStageSelect()">STAGE SELECT</button><br>
    <button onclick="showShop()">SHOP</button><br>
    <button onclick="alert('操作方法: 矢印キーで移動 / スペースキーで射撃\n全モードクリアで隠しステージ解禁！')">HOW TO PLAY</button>
</div>

<div id="stage-select" class="hidden">
    <h2>STAGE SELECT</h2>
    <div id="stage-list"></div>
    <button onclick="showMenu()">BACK</button>
</div>

<div id="shop" class="hidden">
    <h2>SHOP</h2>
    <p>所持コイン: <span id="shop-coin">0</span></p>
    <button onclick="buyItem('atk')">攻撃力UP (50枚)</button>
    <button onclick="buyItem('hp')">回復リペア (30枚)</button><br>
    <button onclick="showMenu()">BACK</button>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// --- ゲーム設定・セーブデータ ---
let saveData = {
    coins: 0,
    clearedStages: [], // 例: "ST=KY 01"
    atkLevel: 1
};

// ローカルストレージから読み込み
if (localStorage.getItem('minami_shooting_save')) {
    saveData = JSON.parse(localStorage.getItem('minami_shooting_save'));
}

function saveGame() {
    localStorage.setItem('minami_shooting_save', JSON.stringify(saveData));
    updateUI();
}

// --- ステージ定義 ---
const stages = [
    { id: "ST=KY 01", color: "#f1ca00", difficulty: "Easy" },
    { id: "ST=KY 02", color: "#f1ca00", difficulty: "Easy" },
    { id: "ST=KY 03", color: "#f1ca00", difficulty: "Easy" },
    { id: "ST=KY 04", color: "#00ac4a", difficulty: "Normal" },
    { id: "ST=KY 05", color: "#00ac4a", difficulty: "Normal" },
    { id: "ST=KY 06", color: "#00ac4a", difficulty: "Normal" },
    { id: "ST=KY 07", color: "#00a4e4", difficulty: "Hard" },
    { id: "ST=KY 08", color: "#00a4e4", difficulty: "Hard" },
    { id: "ST=KY 09", color: "#00a4e4", difficulty: "Hard" },
    { id: "EX-FRONT", color: "#e50012", difficulty: "Expert", hidden: true },
    { id: "EX-BACK", color: "#e50012", difficulty: "Expert", hidden: true },
    { id: "TRUE-FINAL", color: "#f39700", difficulty: "Inferno", hidden: true }
];

// --- UI制御 ---
function updateUI() {
    document.getElementById('coin-val').innerText = saveData.coins;
    document.getElementById('shop-coin').innerText = saveData.coins;
}

function showMenu() {
    document.querySelectorAll('>div').forEach(el => el.classList.add('hidden'));
    document.getElementById('menu').classList.remove('hidden');
}

function showStageSelect() {
    document.getElementById('menu').classList.add('hidden');
    const list = document.getElementById('stage-list');
    list.innerHTML = '';
    
    // 全モードクリアチェック（真ステージ解禁条件）
    const normalCleared = stages.filter(s => !s.hidden).every(s => saveData.clearedStages.includes(s.id));

    stages.forEach(s => {
        let canPlay = !s.hidden || (s.id.includes('EX') && normalCleared) || (s.id === 'TRUE-FINAL' && saveData.clearedStages.length >= 11);
        
        if (canPlay) {
            const btn = document.createElement('button');
            btn.innerText = s.id;
            btn.style.color = s.color;
            btn.onclick = () => startGame(s);
            list.appendChild(btn);
        }
    });
    document.getElementById('stage-select').classList.remove('hidden');
}

function showShop() {
    document.getElementById('menu').classList.add('hidden');
    document.getElementById('shop').classList.remove('hidden');
}

function buyItem(type) {
    if (type === 'atk' && saveData.coins >= 50) {
        saveData.coins -= 50;
        saveData.atkLevel++;
        alert('攻撃力がアップしました！');
    } else if (type === 'hp' && saveData.coins >= 30) {
        saveData.coins -= 30;
        alert('HPを回復しました！');
    } else {
        alert('コインが足りません');
    }
    saveGame();
}

// --- ゲーム本体の簡易エンジン ---
let gameState = "MENU";
let player = { x: 400, y: 500, hp: 100, score: 0 };
let currentStage = null;

function startGame(stage) {
    currentStage = stage;
    gameState = "PLAYING";
    document.getElementById('stage-select').classList.add('hidden');
    player.hp = 100;
    player.score = 0;
    // ここでゲームループ開始
    requestAnimationFrame(update);
}

function update() {
    if (gameState !== "PLAYING") return;

    // 描画
    ctx.fillStyle = "#000";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // プレイヤー描画（簡易）
    ctx.fillStyle = "#fff";
    ctx.fillRect(player.x - 15, player.y - 15, 30, 30);
    
    // ステージ情報の表示
    ctx.fillStyle = currentStage.color;
    ctx.font = "20px Arial";
    ctx.fillText("Stage: " + currentStage.id, 20, 40);

    // ※ ここに本来の敵や弾の処理が入ります。
    // 簡易クリア処理（テスト用）
    if (player.score > 500) {
        winStage();
        return;
    }
    
    player.score++;
    document.getElementById('score-val').innerText = player.score;

    requestAnimationFrame(update);
}

function winStage() {
    alert(currentStage.id + " クリア！コインを獲得しました。");
    saveData.coins += 100;
    if (!saveData.clearedStages.includes(currentStage.id)) {
        saveData.clearedStages.push(currentStage.id);
    }
    gameState = "MENU";
    saveGame();
    showMenu();
}

// 初期化
updateUI();
</script>

</body>
</html>
