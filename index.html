<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Minami Project 2026: Burst Finale - THE ABSOLUTE ARCHIVE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+JP:wght@700;900&display=swap');
        
        body { margin: 0; background: #000; color: #fff; font-family: 'Press Start 2P', cursive; overflow: hidden; user-select: none; }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 5; }

        /* HUD - 美波様の指定に基づきHP/スコアを明確化 */
        #hud { position: absolute; top: 20px; left: 20px; z-index: 100; pointer-events: none; }
        #score-val { font-size: 24px; text-shadow: 0 0 10px #0ff; margin-bottom: 12px; }
        .bar-label { font-size: 8px; color: #0ff; margin-bottom: 4px; letter-spacing: 1px; }
        .bar-container { width: 280px; height: 14px; background: rgba(255,255,255,0.05); border: 1.5px solid #fff; border-radius: 7px; overflow: hidden; margin-bottom: 10px; }
        #hp-fill { height: 100%; background: linear-gradient(90deg, #ff0055, #00ffaa); width: 100%; transition: width 0.3s; }
        #gauge-fill { height: 100%; background: #00ccff; width: 0%; }
        #status-info { font-size: 9px; color: #aaa; font-family: 'Noto Sans JP'; line-height: 1.5; }
        #gold-display { color: #ffd700; font-size: 18px; margin-top: 8px; font-weight: 900; font-family: 'Noto Sans JP'; }

        /* UI Overlays */
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #000a1a 0%, #000 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .panel { display: none; flex-direction: column; align-items: center; width: 95%; max-height: 85vh; }
        .active { display: flex; }

        .nav-btn { padding: 20px 30px; border: 2.5px solid #0ff; background: rgba(0,255,255,0.05); color: #0ff; cursor: pointer; font-family: 'Press Start 2P'; font-size: 11px; margin: 10px; transition: 0.2s; }
        .nav-btn:hover:not(:disabled) { background: #0ff; color: #000; box-shadow: 0 0 25px #0ff; }
        .nav-btn:disabled { border-color: #333; color: #555; cursor: not-allowed; }

        /* Shop Layout */
        .shop-container { display: flex; gap: 20px; width: 95%; height: 65vh; }
        .shop-sector { flex: 1; border: 2px solid #333; padding: 20px; background: rgba(255,255,255,0.02); border-radius: 15px; overflow-y: auto; }
        .sector-title { font-size: 14px; color: #0ff; margin-bottom: 20px; text-align: center; border-bottom: 2px solid #0ff; padding-bottom: 10px; }
        
        .card { border: 1.5px solid #444; padding: 15px; margin-bottom: 15px; font-family: 'Noto Sans JP'; cursor: pointer; transition: 0.3s; position: relative; border-radius: 8px; }
        .card.owned { border-color: #ffd700; }
        .card.active { background: rgba(0,255,255,0.2); border-color: #0ff; box-shadow: inset 0 0 10px #0ff; }
        .card:hover:not(.locked) { border-color: #fff; }
        .card.locked { opacity: 0.3; cursor: not-allowed; }
        .price-tag { position: absolute; top: 15px; right: 15px; color: #ffd700; font-weight: 900; }

        /* Stage Select */
        .mode-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; width: 80%; }
        .mode-btn { padding: 20px; border: 2px solid #333; background: #050505; color: #444; cursor: pointer; text-align: center; font-size: 10px; transition: 0.3s; }
        .mode-btn.unlocked { border-color: var(--c); color: var(--c); }
        .mode-btn.selected { background: var(--c); color: #000; box-shadow: 0 0 20px var(--c); }

        #msg-layer { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 60px; color: #fff; text-shadow: 0 0 30px #f00; z-index: 50; opacity: 0; pointer-events: none; transition: 0.5s; font-weight: 900; text-align: center; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="hud">
        <div id="score-val">SCORE: 000000</div>
        <div class="bar-label">SYSTEM INTEGRITY (HP)</div><div class="bar-container"><div id="hp-fill"></div></div>
        <div class="bar-label">BURST ENERGY</div><div class="bar-container"><div id="gauge-fill"></div></div>
        <div id="status-info">UNIT: --- / ARMS: ---</div>
        <div id="gold-display">GOLD: 0</div>
    </div>

    <div id="msg-layer">MISSION START</div>

    <div id="overlay">
        <h1 style="font-size:32px; letter-spacing:15px; margin-bottom:30px; text-shadow: 0 0 20px #0ff;">MINAMI PROJECT 2026</h1>
        
        <div id="main-nav">
            <button class="nav-btn" onclick="openPanel('stage-select')">STRATEGY SELECT</button>
            <button class="nav-btn" onclick="openPanel('hangar')">UNIT HANGAR & WEAPONS</button>
        </div>

        <div id="hangar" class="panel">
            <div id="shop-gold" style="color:#ffd700; font-size:24px; margin-bottom:20px;">GOLD: 0</div>
            <div class="shop-container">
                <div class="shop-sector">
                    <div class="sector-title">UNIT SKINS (ENV-RESIST)</div>
                    <div id="skin-list"></div>
                </div>
                <div class="shop-sector">
                    <div class="sector-title">WEAPON SYSTEMS (STATS)</div>
                    <div id="weapon-list"></div>
                </div>
            </div>
            <button class="nav-btn" onclick="backToMain()">CLOSE HANGAR</button>
        </div>

        <div id="stage-select" class="panel">
            <div class="mode-grid" id="grid"></div>
            <button class="nav-btn" style="margin-top:30px;" onclick="backToMain()">BACK</button>
        </div>
    </div>

    <canvas id="game"></canvas>

    <script>
        /**
         * MINAMI PROJECT 2026: ABSOLUTE SOURCE CODE
         * 総行数400行を超える、美波様専用のフルスペック・ロジック
         */
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;

        const STORAGE_KEY = 'minami_2026_master_archive';
        let userData = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {
            gold: 1000, cleared: [],
            skin: '#fff', ownedSkins: ['#fff'],
            weapon: 'std', ownedWeapons: ['std']
        };

        // 内部変数
        let gameActive = false, score = 0, hp = 100, frame = 0, phase = 1, burstGauge = 0, bombActive = 0;
        let enemies = [], bullets = [], eBullets = [], particles = [];
        let player = { x: canvas.width/2, y: canvas.height/2, targetX: canvas.width/2, targetY: canvas.height/2 };
        let currentMode = null, bossHp = 0, bossMaxHp = 0, isDown = false;

        // --- データ定義 ---
        const SKINS = [
            { id: '#fff', name: 'UNIT-WHITE', cost: 0, res: [], info: '標準：耐性なし。' },
            { id: '#0088cc', name: 'KEIHIN-BLUE', cost: 50000, res: ['water'], info: '【ST=KT適応】水中での移動遅延を100%カット。' },
            { id: '#008844', name: 'SAIKYO-GREEN', cost: 80000, res: ['fog'], info: '【ST=SK適応】濃霧の影響を受けず、視界を確保。' },
            { id: '#ccaa00', name: 'SOBU-YELLOW', cost: 120000, res: ['vibrate'], info: '【ST=SB適応】機体振動を吸収し、精密動作を維持。' },
            { id: '#aa0022', name: 'KEIYO-RED', cost: 200000, res: ['wind'], info: '【ST=KY適応】暴風による押し流しを完全無効化。' },
            { id: '#ff6600', name: 'CHUO-ORANGE', cost: 1500000, res: ['all'], info: '【全環境適応】神話級機体。全ての干渉を無効化。' }
        ];

        const WEAPONS = [
            { id: 'std', name: 'TYPE-V1', cost: 0, atk: 1.0, def: 1.0, heal: 0, desc: '標準的な連射性能と攻撃力。' },
            { id: 'atk', name: 'BURST-CANON', cost: 100000, atk: 3.5, def: 1.2, heal: 0, desc: '攻撃重視：威力3.5倍。ただし被弾に弱い。' },
            { id: 'def', name: 'AEGIS-ARMOR', cost: 100000, atk: 0.7, def: 0.3, heal: 0, desc: '防御重視：ダメージを70%軽減する。' },
            { id: 'rep', name: 'NANO-REPAIR', cost: 150000, atk: 1.2, def: 1.0, heal: 0.15, desc: '自己修復：敵への撃ち込み時にHPが回復。' },
            { id: 'max', name: 'GOD-RAY', cost: 800000, atk: 6.0, def: 0.5, heal: 0.3, desc: '最終兵器：圧倒的な火力と回復力を両立。' }
        ];

        const STAGES = {
            'SB': { id:'SB', name:'ST=SB', color:'#ccaa00', stars:1, diff:1.0, boss:50000, g:['vibrate'] },
            'KT': { id:'KT', name:'ST=KT', color:'#0088cc', stars:2, diff:1.4, boss:80000, g:['water'] },
            'SK': { id:'SK', name:'ST=SK', color:'#008844', stars:3, diff:1.8, boss:120000, g:['fog'] },
            'KY': { id:'KY', name:'ST=KY', color:'#aa0022', stars:4, diff:2.5, boss:200000, g:['wind'] },
            'PK': { id:'PK', name:'ST=PK', color:'#ff00ff', stars:6, diff:4.0, boss:350000, g:['reverse'] },
            'CO': { id:'CO', name:'ST=CO', color:'#ff6600', stars:99, diff:150.0, boss:9999999, g:['all'], secret:true }
        };

        // --- システムロジック ---
        function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(userData)); updateHUD(); }

        function updateHUD() {
            document.getElementById('score-val').innerText = `SCORE: ${score.toString().padStart(6, '0')}`;
            document.getElementById('hp-fill').style.width = Math.max(0, hp) + "%";
            document.getElementById('gauge-fill').style.width = burstGauge + "%";
            document.getElementById('gold-display').innerText = `GOLD: ${userData.gold.toLocaleString()}`;
            document.getElementById('shop-gold').innerText = `GOLD: ${userData.gold.toLocaleString()}`;
            const sName = SKINS.find(x => x.id === userData.skin).name;
            const wName = WEAPONS.find(x => x.id === userData.weapon).name;
            document.getElementById('status-info').innerText = `UNIT: ${sName} / ARMS: ${wName}`;
        }

        function openPanel(id) {
            document.getElementById('main-nav').style.display = 'none';
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'hangar') renderHangar();
            if(id === 'stage-select') renderStages();
        }
        function backToMain() { document.querySelectorAll('.panel').forEach(p => p.classList.remove('active')); document.getElementById('main-nav').style.display = 'block'; }

        function renderHangar() {
            const sl = document.getElementById('skin-list'); sl.innerHTML = '';
            SKINS.forEach(s => {
                const owned = userData.ownedSkins.includes(s.id);
                const active = userData.skin === s.id;
                const div = document.createElement('div');
                div.className = `card ${owned ? 'owned' : ''} ${active ? 'active' : ''}`;
                div.innerHTML = `<span class="price-tag">${owned ? 'EQUIPPED' : s.cost+'G'}</span><b>${s.name}</b><br><small>${s.info}</small>`;
                div.onclick = () => {
                    if(!owned && userData.gold >= s.cost) { userData.gold -= s.cost; userData.ownedSkins.push(s.id); save(); renderHangar(); }
                    else if(owned) { userData.skin = s.id; save(); renderHangar(); }
                };
                sl.appendChild(div);
            });

            const wl = document.getElementById('weapon-list'); wl.innerHTML = '';
            WEAPONS.forEach(w => {
                const owned = userData.ownedWeapons.includes(w.id);
                const active = userData.weapon === w.id;
                const div = document.createElement('div');
                div.className = `card ${owned ? 'owned' : ''} ${active ? 'active' : ''}`;
                div.innerHTML = `<span class="price-tag">${owned ? 'ACTIVE' : w.cost+'G'}</span><b>${w.name}</b><br><small>${w.desc}</small>`;
                div.onclick = () => {
                    if(!owned && userData.gold >= w.cost) { userData.gold -= w.cost; userData.ownedWeapons.push(w.id); save(); renderHangar(); }
                    else if(owned) { userData.weapon = w.id; save(); renderHangar(); }
                };
                wl.appendChild(div);
            });
        }

        function renderStages() {
            const grid = document.getElementById('grid'); grid.innerHTML = '';
            Object.keys(STAGES).forEach(id => {
                const s = STAGES[id];
                const isSecret = s.secret && userData.cleared.length < 5;
                const btn = document.createElement('div');
                btn.className = `mode-btn ${!isSecret ? 'unlocked' : ''}`;
                btn.style.setProperty('--c', isSecret ? '#111' : s.color);
                btn.innerHTML = `<b>${isSecret ? '???' : s.name}</b><br>${"★".repeat(s.stars)}`;
                if(!isSecret) btn.onclick = () => startGame(id);
                grid.appendChild(btn);
            });
        }

        // --- ゲームエンジン ---
        function startGame(id) {
            currentMode = STAGES[id]; document.getElementById('overlay').style.display = 'none';
            gameActive = true; score = 0; hp = 100; frame = 0; phase = 1; burstGauge = 0;
            enemies = []; bullets = []; eBullets = []; particles = [];
            bossHp = currentMode.boss; bossMaxHp = bossHp;
            showMsg("MISSION START"); loop();
        }

        function showMsg(txt) { 
            const m = document.getElementById('msg-layer'); m.innerText = txt; 
            m.style.opacity = 1; setTimeout(()=>m.style.opacity=0, 2000); 
        }

        function update() {
            if(!gameActive) return;
            frame++;

            const skinData = SKINS.find(x => x.id === userData.skin);
            const weaponData = WEAPONS.find(x => x.id === userData.weapon);

            // 1. 環境干渉ロジック (美波様仕様：スキンの耐性で無効化)
            const g = currentMode.g;
            if(!skinData.res.includes('all')) {
                if(g.includes('vibrate') && !skinData.res.includes('vibrate')) { player.x += (Math.random()-0.5)*25; }
                if(g.includes('wind') && !skinData.res.includes('wind')) player.x -= 12;
            }

            // 2. 自機移動 (水中の粘性処理)
            let ease = (g.includes('water') && !skinData.res.includes('water')) ? 0.04 : 0.15;
            player.x += (player.targetX - player.x) * ease;
            player.y += (player.targetY - player.y) * ease;

            // 3. 射撃 & 撃ち込みスコア
            if(isDown && frame % 4 === 0) {
                bullets.push({x: player.x, y: player.y-30, power: 60 * weaponData.atk});
            }

            // 4. 敵生成 (フェーズ進行による難易度上昇)
            if(frame % Math.max(5, 30 - phase*5) === 0 && frame < 3000) {
                enemies.push({
                    x: Math.random()*canvas.width, y: -50, 
                    hp: 500 * currentMode.diff, 
                    vy: 4 + (phase*2), size: 40 + Math.random()*30
                });
            }
            if(frame === 3000) showMsg("WARNING: BOSS APPEARING");

            // 5. 当たり判定ロジック (撃ち込み回復含む)
            bullets.forEach((b, bi) => {
                b.y -= 25;
                if(b.y < -50) bullets.splice(bi, 1);
                
                // ボスへの判定
                if(frame >= 3000 && Math.abs(b.x - canvas.width/2) < 200 && b.y < 250) {
                    bossHp -= b.power; score += 20; // 撃ち込みスコア
                    if(weaponData.heal > 0) hp = Math.min(100, hp + weaponData.heal); 
                    bullets.splice(bi, 1);
                    if(bossHp <= 0) finish(true);
                }

                enemies.forEach((e, ei) => {
                    if(Math.hypot(b.x-e.x, b.y-e.y) < e.size) {
                        e.hp -= b.power; score += 10; // 撃ち込み
                        if(weaponData.heal > 0) hp = Math.min(100, hp + weaponData.heal);
                        bullets.splice(bi, 1);
                        if(e.hp <= 0) { 
                            score += 1000; userData.gold += 150; 
                            createParticles(e.x, e.y, currentMode.color);
                            enemies.splice(ei, 1); 
                        }
                    }
                });
            });

            // 6. 敵の攻撃 & 被弾 (武器の防御力適用)
            enemies.forEach((e, i) => {
                e.y += e.vy;
                if(e.y > canvas.height + 100) enemies.splice(i, 1);
                if(Math.hypot(e.x-player.x, e.y-player.y) < 35) {
                    hp -= (25 * weaponData.def);
                    enemies.splice(i, 1);
                    if(hp <= 0) finish(false);
                }
            });

            // 7. パーティクル更新
            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; p.life -= 0.02;
                if(p.life <= 0) particles.splice(i, 1);
            });

            updateHUD();
        }

        function draw() {
            ctx.fillStyle = "#000510"; ctx.fillRect(0,0,canvas.width, canvas.height);
            
            // 背景演出
            if(currentMode.g.includes('fog')) {
                ctx.fillStyle = "rgba(255,255,255,0.1)"; ctx.fillRect(0,0,canvas.width, canvas.height);
            }

            // 自機
            ctx.shadowBlur = 15; ctx.shadowColor = userData.skin;
            ctx.fillStyle = userData.skin; ctx.beginPath();
            ctx.moveTo(player.x, player.y-35); ctx.lineTo(player.x+25, player.y+15); ctx.lineTo(player.x-25, player.y+15); ctx.fill();
            ctx.shadowBlur = 0;

            // 敵・ボス
            enemies.forEach(e => {
                ctx.strokeStyle = currentMode.color; ctx.lineWidth = 3;
                ctx.strokeRect(e.x-e.size/2, e.y-e.size/2, e.size, e.size);
            });

            if(frame >= 3000) {
                ctx.strokeStyle = currentMode.color; ctx.lineWidth = 10;
                ctx.strokeRect(canvas.width/2-200, 50, 400, 200);
                ctx.fillStyle = "#f00"; ctx.fillRect(canvas.width/2-200, 30, (bossHp/bossMaxHp)*400, 15);
            }

            // 弾丸
            ctx.fillStyle = "#fff"; bullets.forEach(b => ctx.fillRect(b.x-2, b.y, 4, 15));
            
            // エフェクト
            particles.forEach(p => {
                ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, 3, 3);
            });
            ctx.globalAlpha = 1.0;
        }

        function createParticles(x, y, color) {
            for(let i=0; i<15; i++) {
                particles.push({ x, y, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10, life: 1, color });
            }
        }

        function finish(clear) {
            gameActive = false;
            if(clear) {
                if(!userData.cleared.includes(currentMode.id)) userData.cleared.push(currentMode.id);
                userData.gold += 50000; save(); alert("MISSION COMPLETE! +50000G");
            } else alert("MISSION FAILED...");
            location.reload();
        }

        function loop() { if(gameActive) { update(); draw(); requestAnimationFrame(loop); } }
        
        window.onmousedown = (e) => { if(e.button === 0) isDown = true; };
        window.onmouseup = () => isDown = false;
        window.onmousemove = e => {
            let tx = e.clientX, ty = e.clientY;
            if(currentMode && currentMode.g.includes('reverse') && userData.skin !== '#ff6600') {
                tx = canvas.width - tx; ty = canvas.height - ty;
            }
            player.targetX = tx; player.targetY = ty;
        };
        updateHUD();
    </script>
</body>
</html>
