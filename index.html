<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Minami Project 2026: The Final Resonance</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+JP:wght@300&display=swap');
body { margin: 0; background: #000510; color: #fff; font-family: 'Press Start 2P', cursive; overflow: hidden; }
#bg-canvas { position: fixed; top: 0; left: 0; z-index: 1; }
#game-canvas { position: fixed; top: 0; left: 0; z-index: 5; pointer-events: none; }
#menu { position: relative; width: 100%; height: 100vh; background: rgba(0, 10, 30, 0.75); display: flex; flex-direction: column; align-items: center; z-index: 10; overflow-y: auto; backdrop-filter: blur(12px); }
#hud { position: fixed; top: 20px; left: 20px; z-index: 100; visibility: hidden; }
#score-display { font-size: 16px; margin-bottom: 5px; }
#hp-container { width: 200px; height: 10px; border: 1px solid #fff; position: relative; }
#hp-bar { height: 100%; background: #fff; width: 100%; transition: 0.1s; }
h1 { font-size: 16px; margin: 30px 0; color: #00d4ff; }
.section-title { font-size: 10px; margin: 25px 0 15px; color: #446688; border-bottom: 1px solid #1a334d; width: 85%; text-align: center; }
.grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 95%; max-width: 650px; margin-bottom: 30px; }
.btn { background: rgba(255,255,255,0.03); border: 1px solid #2a4a6a; padding: 12px 5px; cursor: pointer; text-align: center; border-radius: 4px; font-size: 8px; transition: 0.2s; color: #fff; }
.btn:hover { background: rgba(255,255,255,0.12); transform: translateY(-2px); }
.equipped { border-color: #00ffcc !important; box-shadow: 0 0 12px rgba(0,255,204,0.4); }
.status-text { font-size: 6px; display: block; margin-top: 6px; }
.perfect-text { color: #00ffcc; }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<canvas id="game-canvas"></canvas>

<div id="hud">
<div id="score-display">SCORE: <span id="s-val">0</span></div>
<div id="hp-container"><div id="hp-bar"></div></div>
</div>

<div id="menu">
<h1>MINAMI PROJECT 2026</h1>
<div class="section-title">SELECT STAGE</div>
<div id="stage-grid" class="grid"></div>
</div>

<script>

// 背景
const bg = document.getElementById('bg-canvas');
const bctx = bg.getContext('2d');
let w,h;
function res(){ w=bg.width=window.innerWidth; h=bg.height=window.innerHeight; }
window.onresize=res; res();
let t=0;
function drawBg(){
bctx.fillStyle='#000818'; bctx.fillRect(0,0,w,h);
t+=0.012;
for(let i=0;i<3;i++){
bctx.beginPath();
bctx.strokeStyle=`rgba(0,140,255,${0.15-i*0.04})`;
for(let x=0;x<w;x+=10){
let y=h*0.55+Math.sin(x*0.006+t+i)*70*Math.cos(t*0.4);
bctx.lineTo(x,y);
}
bctx.stroke();
}
requestAnimationFrame(drawBg);
}
drawBg();

// セーブ
let save = JSON.parse(localStorage.getItem('minami_project_vFinal') || '{"coins":0,"owned":["Default"],"skin":"Default","items":[],"cleared":[],"perfect":[]}');

// 旧データ互換（= → ー）
save.cleared = save.cleared.map(s=>s.replace("=","ー"));
save.perfect = save.perfect.map(s=>s.replace("=","ー"));

// ★ STー表記に変更済み
const modes = {
'STーSB':{color:'#ffff00',diff:1.0},
'STーKT':{color:'#0088ff',diff:1.2},
'STーSK':{color:'#00ff44',diff:1.4},
'STーKY':{color:'#ff0044',diff:1.6},
'STーPK':{color:'#ff0044',diff:1.8},
'STーJB':{color:'#00ff44',diff:2.1},
'STーHM':{color:'#0088ff',diff:2.4},
'STーKS':{color:'#ffff00',diff:2.7},
'STーTY':{color:'#0088ff',diff:3.0},
'STーHA':{color:'#ffff00',diff:4.0},
'STーHB':{color:'#00ff44',diff:5.5},
'STーHC':{color:'#ff0044',diff:7.0},
'STーCO':{color:'#ff6600',diff:15.0}
};

function updateUI(){
const grid=document.getElementById('stage-grid');
grid.innerHTML='';

const mainStages=[
'STーSB','STーKT','STーSK','STーKY','STーPK',
'STーJB','STーHM','STーKS','STーTY'
];
const nextStages=['STーHA','STーHB','STーHC'];

const allMainCleared=mainStages.every(s=>save.cleared.includes(s));
const allNoDamage=[...mainStages,...nextStages].every(s=>save.perfect.includes(s));

Object.keys(modes).forEach(id=>{
if(nextStages.includes(id)&&!allMainCleared)return;
if(id==='STーCO'&&!allNoDamage)return;

const b=document.createElement('div');
b.className='btn';
b.style.color=b.style.borderColor=modes[id].color;

let status='';
if(save.perfect.includes(id)) status='<span class="status-text perfect-text">PERFECT(100%)</span>';
else if(save.cleared.includes(id)) status='<span class="status-text">CLEARED</span>';

b.innerHTML=id+status;
b.onclick=()=>startGame(id);
grid.appendChild(b);
});
}
updateUI();

// ゲーム
const canvas=document.getElementById('game-canvas');
const ctx=canvas.getContext('2d');
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let active=false,hp=100,score=0,player={x:0,y:0},enemies=[],bullets=[],current=null;

function startGame(id){
current=id;hp=100;score=0;enemies=[];bullets=[];
document.getElementById('menu').style.display='none';
document.getElementById('hud').style.visibility='visible';
active=true;loop();
}

window.onmousemove=e=>{player.x=e.clientX;player.y=e.clientY;}
let shoot=false;
window.onmousedown=()=>shoot=true;
window.onmouseup=()=>shoot=false;

function loop(){
if(!active)return;
ctx.clearRect(0,0,w,h);

// 自機
ctx.fillStyle="#fff";
ctx.beginPath();
ctx.moveTo(player.x,player.y-15);
ctx.lineTo(player.x+10,player.y+10);
ctx.lineTo(player.x-10,player.y+10);
ctx.fill();

// 弾
if(shoot&&Math.random()<0.45) bullets.push({x:player.x,y:player.y-15});
bullets.forEach((b,i)=>{
b.y-=14;
ctx.fillRect(b.x-1,b.y,2,9);
if(b.y<0)bullets.splice(i,1);
});

// 敵
if(Math.random()<(0.045*modes[current].diff))
enemies.push({x:Math.random()*w,y:-30,hp:Math.ceil(modes[current].diff*0.8)});

enemies.forEach((e,i)=>{
e.y+=(2.5+modes[current].diff*0.4);
ctx.strokeStyle=modes[current].color;
ctx.strokeRect(e.x-15,e.y-15,30,30);

if(Math.hypot(e.x-player.x,e.y-player.y)<25){hp-=15;enemies.splice(i,1);}

bullets.forEach((b,bi)=>{
if(Math.hypot(e.x-b.x,e.y-b.y)<22){
e.hp-=1;bullets.splice(bi,1);
if(e.hp<=0){enemies.splice(i,1);score+=100;}
}
});

if(score>=(modes[current].diff*2500)) end(true);
if(e.y>h+50) enemies.splice(i,1);
});

// CO暗転
if(current==="STーCO"){
ctx.fillStyle="rgba(0,0,0,0.03)";
ctx.fillRect(0,0,w,h);
}

document.getElementById('hp-bar').style.width=hp+"%";
document.getElementById('s-val').innerText=score.toLocaleString();

if(hp<=0) end(false);
requestAnimationFrame(loop);
}

function end(win){
active=false;
if(win){
if(!save.cleared.includes(current)) save.cleared.push(current);
if(hp>=100&&!save.perfect.includes(current)) save.perfect.push(current);
}
localStorage.setItem('minami_project_vFinal',JSON.stringify(save));
location.reload();
}

</script>
</body>
</html>
