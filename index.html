<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Minami Project 2026: Metal Edition - Revive</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+JP:wght@300;700&display=swap');
        
        body { margin: 0; background: #000810; color: #e0e0e0; font-family: 'Press Start 2P', cursive; overflow: hidden; transition: background 0.6s ease; }
        canvas { display: block; }

        /* HUD */
        #hud { position: absolute; top: 30px; left: 30px; z-index: 10; pointer-events: none; }
        #score-val { font-size: 26px; color: #fff; margin-bottom: 10px; text-shadow: 0 0 8px rgba(255,255,255,0.5); }
        #hp-bar { width: 240px; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
        #hp-fill { height: 100%; background: #fff; width: 100%; transition: width 0.3s ease; }

        /* メニュー */
        #menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 20; overflow-y: auto; padding: 20px 0; }
        h1 { font-size: 18px; margin-bottom: 20px; letter-spacing: 4px; color: #fff; }

        .mode-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        
        .mode-btn { 
            width: 150px; height: 60px; background: rgba(0,0,0,0.5); 
            cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); position: relative; border-radius: 4px;
            border: 2px solid #334;
        }
        .m-id { font-size: 10px; margin-bottom: 5px; font-weight: bold; }
        .m-stars { font-size: 6px; opacity: 0.8; }
        .m-status { font-size: 7px; margin-top: 3px; font-weight: bold; }

        /* ステージカラー */
        .SB { border-color: #ccaa00; color: #ccaa00; } 
        .KT { border-color: #0088cc; color: #0088cc; } 
        .SK { border-color: #008844; color: #008844; } 
        .KY { border-color: #aa0022; color: #aa0022; } 
        .PK { border-color: #cc5588; color: #cc5588; }
        .JB { border-color: #006666; color: #006666; }
        /* 新規追加 */
        .HM { border-color: #9932cc; color: #9932cc; } /* 半蔵門パープル */
        .KS { border-color: #808080; color: #808080; } /* 日比谷グレー */
        .TY { border-color: #00bfff; color: #00bfff; } /* 東西スカイ */

        .HA { border-color: #CD7F32; color: #CD7F32; display: none; } 
        .HB { border-color: #C0C0C0; color: #C0C0C0; display: none; } 
        .HC { border-color: #FFD700; color: #FFD700; display: none; } 
        .CO { border: 3px solid #cc6600; color: #cc6600; display: none; grid-column: span 3; width: 100%; }

        .mode-btn:hover { transform: scale(1.05); background: rgba(255,255,255,0.1); }
        .cleared { background: rgba(255,255,255,0.15) !important; }

        /* カスタムエリア */
        #custom-area { border-top: 1px solid #334; padding-top: 20px; text-align: center; font-family: 'Noto Sans JP'; }
        .c-input { background: #111; border: 1px solid #444; color: #fff; padding: 5px; margin: 5px; width: 80px; font-size: 10px; }
        #custom-btn { background: #444; color: #fff; border: none; padding: 10px 20px; cursor: pointer; font-family: 'Press Start 2P'; font-size: 10px; }

        #guide { max-width: 600px; margin: 20px; font-family: 'Noto Sans JP'; font-size: 11px; color: #88a0b0; text-align: center; }
    </style>
</head>
<body>
    <div id="hud">
        <div id="score-val">000000</div>
        <div id="hp-bar"><div id="hp-fill"></div></div>
    </div>

    <div id="menu">
        <h1>MINAMI PROJECT 2026</h1>
        <div class="mode-grid" id="grid">
            <div id="btn-SB" class="mode-btn SB" onclick="start('SB')"><span class="m-id">STーSB</span><span class="m-stars">★☆☆☆☆</span><div class="m-status" id="st-SB"></div></div>
            <div id="btn-KT" class="mode-btn KT" onclick="start('KT')"><span class="m-id">STーKT</span><span class="m-stars">★☆☆☆☆</span><div class="m-status" id="st-KT"></div></div>
            <div id="btn-SK" class="mode-btn SK" onclick="start('SK')"><span class="m-id">STーSK</span><span class="m-stars">★★☆☆☆</span><div class="m-status" id="st-SK"></div></div>
            <div id="btn-KY" class="mode-btn KY" onclick="start('KY')"><span class="m-id">STーKY</span><span class="m-stars">★★★☆☆</span><div class="m-status" id="st-KY"></div></div>
            <div id="btn-PK" class="mode-btn PK" onclick="start('PK')"><span class="m-id">STーPK</span><span class="m-stars">★★★☆☆</span><div class="m-status" id="st-PK"></div></div>
            <div id="btn-JB" class="mode-btn JB" onclick="start('JB')"><span class="m-id">STーJB</span><span class="m-stars">★★★★☆</span><div class="m-status" id="st-JB"></div></div>
            <div id="btn-HM" class="mode-btn HM" onclick="start('HM')"><span class="m-id">STーHM</span><span class="m-stars">★★★★☆</span><div class="m-status" id="st-HM"></div></div>
            <div id="btn-KS" class="mode-btn KS" onclick="start('KS')"><span class="m-id">STーKS</span><span class="m-stars">★★★★☆</span><div class="m-status" id="st-KS"></div></div>
            <div id="btn-TY" class="mode-btn TY" onclick="start('TY')"><span class="m-id">STーTY</span><span class="m-stars">★★★★★</span><div class="m-status" id="st-TY"></div></div>
            <div id="btn-HA" class="mode-btn HA" onclick="start('HA')"><span class="m-id">STーHA</span><span class="m-stars">★★★★★</span><div class="m-status" id="st-HA"></div></div>
            <div id="btn-HB" class="mode-btn HB" onclick="start('HB')"><span class="m-id">STーHB</span><span class="m-stars">★★★★★★</span><div class="m-status" id="st-HB"></div></div>
            <div id="btn-HC" class="mode-btn HC" onclick="start('HC')"><span class="m-id">STーHC</span><span class="m-stars">★★★★★★★</span><div class="m-status" id="st-HC"></div></div>
            <div id="btn-CO" class="mode-btn CO" onclick="start('CO')"><span class="m-id">ULTIMATE: STーCO</span><span class="m-stars">★★★★★★★★★★</span><div class="m-status" id="st-CO"></div></div>
        </div>

        <div id="custom-area">
            <div>--- CUSTOM RESONANCE ---</div>
            <input type="number" id="c-target" class="c-input" placeholder="目標スコア" value="5000">
            <input type="color" id="c-color" class="c-input" value="#ffffff">
            <button id="custom-btn" onclick="startCustom()">DEPLOY</button>
        </div>

        <div id="guide">
            全ノーマル記録更新で深淵へ。無傷の共鳴は「COMPLETE」と刻まれます。
        </div>
    </div>
    <canvas id="game"></canvas>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;

        let gameActive = false, score = 0, hp = 100, frame = 0, initialHp = 100;
        let bullets = [], eBullets = [], enemies = [], ripples = [];
        let player = { x: canvas.width/2, y: canvas.height/2 };
        let currentMode = null;

        const config = {
            SB: { color: '#ccaa00', spawn: 0.05, hp: 2, target: 3000, g: 'warp' },
            KT: { color: '#0088cc', spawn: 0.1, hp: 2, target: 5000, g: 'dash' },
            SK: { color: '#008844', spawn: 0.08, hp: 5, target: 7000, g: 'shield' },
            KY: { color: '#aa0022', spawn: 0.12, hp: 3, target: 8000, g: 'wind' },
            PK: { color: '#cc5588', spawn: 0.12, hp: 3, target: 8000, g: 'none' },
            JB: { color: '#006666', spawn: 0.15, hp: 5, target: 10000, g: 'none' },
            HM: { color: '#9932cc', spawn: 0.16, hp: 6, target: 12000, g: 'warp' },
            KS: { color: '#808080', spawn: 0.18, hp: 7, target: 15000, g: 'dash' },
            TY: { color: '#00bfff', spawn: 0.20, hp: 8, target: 18000, g: 'shield' },
            HA: { color: '#CD7F32', spawn: 0.22, hp: 12, target: 20000, g: 'mix' },
            HB: { color: '#C0C0C0', spawn: 0.25, hp: 15, target: 25000, g: 'mix' },
            HC: { color: '#FFD700', spawn: 0.3, hp: 20, target: 30000, g: 'mix' },
            CO: { color: '#cc6600', spawn: 1.0, hp: 80, target: 373000, g: 'rush' }
        };

        const normalStages = ['SB','KT','SK','KY','PK','JB','HM','KS','TY'];
        const hiddenStages = ['HA','HB','HC'];

        function init() {
            const clData = JSON.parse(localStorage.getItem('minami_cleared_v2') || '{}');
            Object.keys(clData).forEach(id => {
                const b = document.getElementById(`btn-${id}`);
                if(b) {
                    b.classList.add('cleared');
                    document.getElementById(`st-${id}`).innerText = clData[id];
                }
            });
            if(normalStages.every(s => clData[s])) {
                hiddenStages.forEach(id => document.getElementById(`btn-${id}`).style.display = 'flex');
            }
            if([...normalStages, ...hiddenStages].every(s => clData[s])) {
                document.getElementById('btn-CO').style.display = 'flex';
            }
        }

        function start(id) {
            currentMode = { ...config[id], id: id };
            setupGame();
        }

        function startCustom() {
            currentMode = {
                id: 'CUSTOM',
                color: document.getElementById('c-color').value,
                spawn: 0.15, hp: 5, 
                target: parseInt(document.getElementById('c-target').value),
                g: 'mix'
            };
            setupGame();
        }

        function setupGame() {
            score = 0; hp = 100; frame = 0; enemies = []; bullets = []; eBullets = []; ripples = [];
            document.getElementById('menu').style.display = 'none';
            document.body.style.background = currentMode.color + "33";
            gameActive = true; loop();
        }

        window.addEventListener('mousemove', e => { 
            player.x = e.clientX; player.y = e.clientY; 
        });
        let isDown = false; 
        window.addEventListener('mousedown', () => isDown = true); 
        window.addEventListener('mouseup', () => isDown = false);

        function update() {
            frame++;
            if(isDown && frame % 4 === 0) bullets.push({x: player.x, y: player.y-10, vy: -18, size: 4});
            bullets.forEach((b, i) => { b.y += b.vy; if(b.y < -30) bullets.splice(i, 1); });

            if(Math.random() < currentMode.spawn) {
                enemies.push({ 
                    x: Math.random()*canvas.width, y: -50, hp: currentMode.hp, 
                    vx: (Math.random()-0.5)*4, vy: 3, 
                    type: currentMode.g === 'mix' ? ['warp','dash','shield'][Math.floor(Math.random()*3)] : currentMode.g
                });
            }

            enemies.forEach((e, i) => {
                if(e.type === 'warp') { if(frame % 80 < 30) { e.y += 0.5; e.inv = true; } else { e.y += 6; e.inv = false; } }
                else if(e.type === 'dash') { e.y += (e.y < 150) ? 1 : 15; }
                else if(e.type === 'rush') { e.y += 6; e.x += Math.cos(frame/10)*8; }
                else { e.y += 4; }

                bullets.forEach((b, bi) => {
                    if(Math.hypot(e.x-b.x, e.y-b.y) < 25 && !e.inv) {
                        e.hp--; bullets.splice(bi, 1);
                        if(e.hp <= 0) { score += 100; enemies.splice(i, 1); if(score >= currentMode.target) finish(true); }
                    }
                });
                if(Math.random() < 0.03) eBullets.push({x: e.x, y: e.y, vy: 8, vx: (e.type === 'rush' ? Math.sin(frame)*5 : 0)});
                if(e.y > canvas.height + 50) enemies.splice(i, 1);
            });

            eBullets.forEach((eb, i) => {
                eb.y += eb.vy; eb.x += eb.vx;
                if(Math.hypot(eb.x-player.x, eb.y-player.y) < 15) {
                    hp -= 10; eBullets.splice(i,1); ripples.push({x: player.x, y: player.y, r: 5, a: 1});
                    if(hp <= 0) finish(false);
                }
                if(eb.y > canvas.height) eBullets.splice(i, 1);
            });

            ripples.forEach((r, i) => { r.r += 4; r.a -= 0.04; if(r.a <= 0) ripples.splice(i, 1); });
            document.getElementById('hp-fill').style.width = hp + "%";
            document.getElementById('score-val').innerText = score.toString().padStart(6, '0');
        }

        function draw() {
            ctx.fillStyle = "rgba(0, 8, 16, 0.4)"; ctx.fillRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.moveTo(player.x, player.y-15);
            ctx.bezierCurveTo(player.x+10, player.y+5, player.x+10, player.y+15, player.x, player.y+15);
            ctx.bezierCurveTo(player.x-10, player.y+15, player.x-10, player.y+5, player.x, player.y-15); ctx.fill();
            ripples.forEach(r => { ctx.strokeStyle = `rgba(0,223,255,${r.a})`; ctx.beginPath(); ctx.arc(r.x, r.y, r.r, 0, Math.PI*2); ctx.stroke(); });
            ctx.fillStyle = "#fff"; bullets.forEach(b => ctx.fillRect(b.x-b.size/2, b.y, b.size, b.size*2));
            ctx.fillStyle = "#ff00ff"; eBullets.forEach(eb => { ctx.beginPath(); ctx.arc(eb.x, eb.y, 4, 0, Math.PI*2); ctx.fill(); });
            ctx.strokeStyle = currentMode.color; ctx.lineWidth = 2;
            enemies.forEach(e => {
                if(e.inv) ctx.setLineDash([2, 4]); else ctx.setLineDash([]);
                ctx.strokeRect(e.x-15, e.y-15, 30, 30);
                if(e.type === 'shield') { ctx.beginPath(); ctx.arc(e.x, e.y, 25, 0, Math.PI*2); ctx.stroke(); }
            });
            ctx.setLineDash([]);
        }

        function finish(isClear) {
            gameActive = false;
            if(isClear) {
                const status = (hp >= 100) ? "COMPLETE" : "CLEAR";
                if(currentMode.id !== 'CUSTOM') {
                    let clData = JSON.parse(localStorage.getItem('minami_cleared_v2') || '{}');
                    // すでにCOMPLETEなら上書きしない
                    if(clData[currentMode.id] !== "COMPLETE") {
                        clData[currentMode.id] = status;
                        localStorage.setItem('minami_cleared_v2', JSON.stringify(clData));
                    }
                }
                alert("RESONANCE RESULT: " + status);
            } else { 
                alert("RESONANCE FAILED"); 
            }
            location.reload();
        }

        function loop() { if(!gameActive) return; update(); draw(); requestAnimationFrame(loop); }
        init();
    </script>
</body>
</html>
