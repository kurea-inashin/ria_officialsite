<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Minami Project 2026: The Complete Rail-Shooter</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+JP:wght@700;900&display=swap');
        
        body { margin: 0; background: #000; color: #fff; font-family: 'Press Start 2P', cursive; overflow: hidden; user-select: none; }
        canvas { display: block; background: radial-gradient(circle, #000510 0%, #000 100%); }

        /* HUD */
        #hud { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; }
        .hud-item { margin-bottom: 15px; text-shadow: 2px 2px 5px #000; }
        .bar-container { width: 250px; height: 14px; background: rgba(255,255,255,0.1); border: 2px solid #fff; border-radius: 7px; overflow: hidden; margin-top: 5px; }
        #hp-fill { height: 100%; background: linear-gradient(90deg, #ff0055, #00ffaa); width: 100%; transition: width 0.3s cubic-bezier(0.17, 0.67, 0.83, 0.67); }
        #gold-display { color: #ffd700; font-size: 18px; display: flex; align-items: center; }

        /* UI Overlays */
        #overlay { position: absolute; inset: 0; background: rgba(0,0,15,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 20; backdrop-filter: blur(8px); }
        .panel { display: none; flex-direction: column; align-items: center; width: 90%; max-height: 85vh; overflow-y: auto; }
        .active { display: flex; }

        h1 { font-size: 32px; color: #00ccff; text-shadow: 0 0 20px #00ccff; margin-bottom: 40px; }
        h2 { font-family: 'Noto Sans JP'; font-weight: 900; margin-bottom: 20px; }

        .nav-btn { 
            padding: 15px 30px; border: 3px solid #fff; background: rgba(255,255,255,0.05); color: #fff; 
            font-family: 'Press Start 2P'; font-size: 11px; cursor: pointer; margin: 10px; transition: 0.2s; 
            position: relative; overflow: hidden;
        }
        .nav-btn:hover:not(:disabled) { background: #fff; color: #000; box-shadow: 0 0 20px #fff; transform: scale(1.05); }
        .nav-btn:disabled { border-color: #444; color: #666; cursor: not-allowed; }

        /* 資金不足時のエラーアニメーション */
        .insufficient-error { border-color: #ff0000 !important; color: #ff0000 !important; animation: shake 0.3s linear; }
        @keyframes shake { 0%{transform:translateX(0)} 25%{transform:translateX(8px)} 50%{transform:translateX(-8px)} 75%{transform:translateX(8px)} 100%{transform:translateX(0)} }

        #shop-status-text { height: 24px; font-size: 10px; color: #0ff; margin-bottom: 10px; }

        /* ステージグリッド */
        .stage-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; width: 100%; max-width: 600px; }
        .stage-btn { padding: 20px; border: 2px solid var(--c); color: var(--c); background: #000; cursor: pointer; text-align: left; }
        .stage-btn:hover { background: var(--c); color: #000; }
        .stage-btn.cleared::after { content: ' [CLEAR]'; font-size: 8px; vertical-align: middle; }

        /* ガレージ */
        .skin-selector { display: flex; gap: 15px; margin-bottom: 30px; }
        .skin-dot { width: 40px; height: 40px; border: 3px solid #fff; cursor: pointer; transition: 0.2s; }
        .skin-dot:hover { transform: scale(1.2); }
        .skin-dot.selected { border-color: #0ff; outline: 2px solid #0ff; }

        /* 武器選択 */
        #weapon-modal { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #000520; border: 4px solid #fff; padding: 40px; z-index: 100; box-shadow: 0 0 50px #0055ff;
            width: 380px; text-align: center; border-radius: 15px;
        }
        select { 
            background: #000; color: #fff; font-family: 'Press Start 2P'; padding: 12px; width: 100%; 
            border: 2px solid #fff; margin: 20px 0; font-size: 10px; outline: none;
        }

        .status-popup { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 40px; opacity: 0; pointer-events: none; z-index: 50; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="hud">
        <div id="score-val" class="hud-item">SCORE: 000000</div>
        <div class="hud-item">
            <span style="font-size:8px;">ARMOR STABILITY</span>
            <div class="bar-container"><div id="hp-fill"></div></div>
        </div>
        <div id="gold-display" class="hud-item">GOLD: 0</div>
    </div>

    <div id="overlay">
        <h1>MINAMI PROJECT 2026</h1>
        
        <div id="main-nav">
            <button class="nav-btn" onclick="openPanel('stage-select')">MISSION START</button><br>
            <button class="nav-btn" onclick="openPanel('shop')">TECH SHOP</button><br>
            <button class="nav-btn" onclick="openPanel('garage')">GARAGE</button>
        </div>

        <div id="stage-select" class="panel">
            <h2>SELECT MISSION</h2>
            <div class="stage-grid" id="grid"></div>
            <button class="nav-btn" onclick="backToMain()" style="margin-top:30px;">BACK</button>
        </div>

        <div id="shop" class="panel">
            <h2>TECH SHOP</h2>
            <div id="shop-status-text">WELCOME, OPERATOR. SELECT UPGRADES.</div>
            <div id="shop-items" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; width: 100%; max-width: 600px;"></div>
            <button class="nav-btn" onclick="backToMain()" style="margin-top:30px;">BACK</button>
        </div>

        <div id="garage" class="panel">
            <h2>GARAGE</h2>
            <div id="skin-preview" style="width:60px; height:60px; border:3px solid #fff; margin-bottom:30px; position:relative;"></div>
            <div class="skin-selector" id="skin-list"></div>
            <button class="nav-btn" onclick="backToMain()" style="margin-top:30px;">BACK</button>
        </div>
    </div>

    <div id="weapon-modal">
        <h3 id="modal-st-name" style="margin-bottom:10px;">STAGE</h3>
        <p style="font-size:8px; color:#aaa; margin-bottom:20px;">EQUIPMENT SELECTION</p>
        <select id="w-sel"></select>
        <div style="display:flex; justify-content: space-around;">
            <button class="nav-btn" id="launch-btn">LAUNCH</button>
            <button class="nav-btn" onclick="document.getElementById('weapon-modal').style.display='none'">CANCEL</button>
        </div>
    </div>

    <div id="msg" class="status-popup"></div>
    <canvas id="game"></canvas>

    <script>
        /**
         * MINAMI PROJECT 2026: CORE ENGINE
         */
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // セーブデータの読み込み
        let userData = JSON.parse(localStorage.getItem('minami_2026_complete')) || {
            gold: 1000, 
            cleared: [], 
            unlockedWeapons: ['NORMAL'], 
            skin: '#ffffff'
        };

        const STAGES = {
            'SB': { name: 'ST=SB', line: '総武線', color: '#ffff00', diff: 1.0, desc: '標準訓練空域' },
            'KT': { name: 'ST=KT', line: '京浜東北線', color: '#00ccff', diff: 1.4, desc: '高速迎撃任務' },
            'SK': { name: 'ST=SK', line: '埼京線', color: '#00cc44', diff: 1.8, desc: '高密度密集地帯' },
            'KY': { name: 'ST=KY', line: '京葉線', color: '#ff0033', diff: 2.2, desc: '最終防衛ライン' },
            'CO': { name: 'ST=CO', line: '中央線', color: '#ff6600', diff: 50.0, desc: '超鬼むず・深淵', secret: true }
        };

        const WEAPONS = {
            'NORMAL': { name: 'TYPE-A: RAPID', price: 0, power: 1.5, speed: 15 },
            'WIDE': { name: 'TYPE-B: WIDE', price: 3000, power: 1.0, speed: 12 },
            'BEAM': { name: 'TYPE-C: BEAM', price: 6000, power: 2.5, speed: 25 },
            'HOMING': { name: 'TYPE-D: MISSILE', price: 10000, power: 4.0, speed: 10 },
            'RAILGUN': { name: 'TYPE-E: RAIL', price: 20000, power: 15.0, speed: 40 },
            'BLADE': { name: 'TYPE-X: BLADE', price: 35000, power: 8.0, speed: 0 }
        };

        const SKINS = ['#ffffff', '#ff0000', '#00ff00', '#00ffff', '#ffff00', '#ff00ff', '#ff6600'];

        let gameActive = false, score = 0, hp = 100, frame = 0;
        let pX = canvas.width/2, pY = canvas.height/2;
        let bullets = [], enemies = [], eBullets = [], particles = [];
        let currentStage = null, selectedWeapon = 'NORMAL';

        function save() {
            localStorage.setItem('minami_2026_complete', JSON.stringify(userData));
        }

        // --- UIシステム ---
        function openPanel(id) {
            document.getElementById('main-nav').style.display = 'none';
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'stage-select') renderStages();
            if(id === 'shop') renderShop();
            if(id === 'garage') renderGarage();
        }

        function backToMain() {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.getElementById('main-nav').style.display = 'block';
        }

        function renderStages() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            // 通常ステージ全クリアで中央線解放
            const normalCleared = ['SB','KT','SK','KY'].every(id => userData.cleared.includes(id));
            
            Object.keys(STAGES).forEach(id => {
                if(STAGES[id].secret && !normalCleared) return;
                const btn = document.createElement('div');
                btn.className = `stage-btn ${userData.cleared.includes(id) ? 'cleared' : ''}`;
                btn.style.setProperty('--c', STAGES[id].color);
                btn.innerHTML = `<div style="font-size:12px;">${STAGES[id].name}</div><div style="font-size:8px; margin-top:5px;">${STAGES[id].line}</div>`;
                btn.onclick = () => showWeaponModal(id);
                grid.appendChild(btn);
            });
        }

        function renderShop() {
            const container = document.getElementById('shop-items');
            container.innerHTML = '';
            document.getElementById('gold-display').innerText = `GOLD: ${userData.gold}`;
            
            Object.keys(WEAPONS).forEach(wKey => {
                if(wKey === 'NORMAL') return;
                const btn = document.createElement('button');
                btn.className = 'nav-btn';
                const isOwned = userData.unlockedWeapons.includes(wKey);
                btn.innerHTML = isOwned ? `${wKey}<br><span style="color:#0f0">PURCHASED</span>` : `${wKey}<br><span style="color:#ffd700">${WEAPONS[wKey].price}G</span>`;
                btn.disabled = isOwned;
                btn.onclick = () => buyWeapon(wKey, btn);
                container.appendChild(btn);
            });
        }

        function buyWeapon(wKey, btnElement) {
            const price = WEAPONS[wKey].price;
            if(userData.gold >= price) {
                userData.gold -= price;
                userData.unlockedWeapons.push(wKey);
                save();
                renderShop();
                document.getElementById('shop-status-text').innerText = `ACQUIRED ${wKey} SYSTEM.`;
                document.getElementById('shop-status-text').style.color = "#0f0";
            } else {
                btnElement.classList.add('insufficient-error');
                document.getElementById('shop-status-text').innerText = `!! INSUFFICIENT FUNDS !!`;
                document.getElementById('shop-status-text').style.color = "#f00";
                setTimeout(() => {
                    btnElement.classList.remove('insufficient-error');
                    document.getElementById('shop-status-text').style.color = "#0ff";
                    document.getElementById('shop-status-text').innerText = `WELCOME, OPERATOR. SELECT UPGRADES.`;
                }, 1000);
            }
        }

        function renderGarage() {
            const list = document.getElementById('skin-list');
            list.innerHTML = '';
            document.getElementById('skin-preview').style.background = userData.skin;
            
            SKINS.forEach(color => {
                const dot = document.createElement('div');
                dot.className = `skin-dot ${userData.skin === color ? 'selected' : ''}`;
                dot.style.background = color;
                dot.onclick = () => {
                    userData.skin = color;
                    document.getElementById('skin-preview').style.background = color;
                    save();
                    renderGarage();
                };
                list.appendChild(dot);
            });
        }

        function showWeaponModal(id) {
            currentStage = STAGES[id];
            currentStage.id = id;
            document.getElementById('modal-st-name').innerText = currentStage.name;
            document.getElementById('modal-st-name').style.color = currentStage.color;
            const sel = document.getElementById('w-sel');
            sel.innerHTML = '';
            userData.unlockedWeapons.forEach(w => {
                const opt = document.createElement('option');
                opt.value = w;
                opt.innerText = WEAPONS[w].name;
                sel.appendChild(opt);
            });
            document.getElementById('weapon-modal').style.display = 'block';
            document.getElementById('launch-btn').onclick = () => {
                selectedWeapon = sel.value;
                document.getElementById('weapon-modal').style.display = 'none';
                startGame();
            };
        }

        // --- ゲームエンジン ---
        function startGame() {
            document.getElementById('overlay').style.display = 'none';
            gameActive = true;
            score = 0;
            hp = 100;
            frame = 0;
            bullets = [];
            enemies = [];
            eBullets = [];
            particles = [];
            showPopup("MISSION START", "#fff");
            updateLoop();
        }

        function showPopup(txt, color) {
            const m = document.getElementById('msg');
            m.innerText = txt;
            m.style.color = color;
            m.style.opacity = 1;
            setTimeout(() => m.style.opacity = 0, 2000);
        }

        function update() {
            frame++;
            
            // 攻撃システム
            if(isDown && frame % 6 === 0) {
                const w = WEAPONS[selectedWeapon];
                if(selectedWeapon === 'NORMAL') {
                    bullets.push({x: pX, y: pY - 20, vx: 0, vy: -w.speed, power: w.power, color: '#fff'});
                } else if(selectedWeapon === 'WIDE') {
                    [-4, 0, 4].forEach(vx => bullets.push({x: pX, y: pY - 20, vx: vx, vy: -w.speed, power: w.power, color: '#0f0'}));
                } else if(selectedWeapon === 'BEAM') {
                    bullets.push({x: pX, y: pY - 20, vx: 0, vy: -w.speed, power: w.power, color: '#0ff', beam: true});
                } else if(selectedWeapon === 'HOMING') {
                    bullets.push({x: pX, y: pY, vx: (Math.random()-0.5)*10, vy: -5, power: w.power, color: '#ff0', homing: true});
                } else if(selectedWeapon === 'RAILGUN') {
                    if(frame % 30 === 0) bullets.push({x: pX, y: pY - 500, vx: 0, vy: 0, power: w.power, color: '#fff', rail: true, life: 15});
                } else if(selectedWeapon === 'BLADE') {
                    bullets.push({x: pX, y: pY, vx: 0, vy: 0, power: w.power, color: 'rgba(0,255,255,0.3)', blade: true, life: 2});
                }
            }

            // 敵生成（難易度diffに依存）
            if(frame % Math.max(2, Math.floor(30 / currentStage.diff)) === 0) {
                enemies.push({
                    x: Math.random() * canvas.width,
                    y: -50,
                    hp: 10 * currentStage.diff,
                    maxHp: 10 * currentStage.diff,
                    size: 25 + Math.random() * 20,
                    vy: 2 + (Math.random() * currentStage.diff)
                });
            }

            // 弾道計算
            bullets.forEach((b, i) => {
                if(b.homing) {
                    let target = enemies[0];
                    if(target) {
                        let angle = Math.atan2(target.y - b.y, target.x - b.x);
                        b.vx += Math.cos(angle) * 0.8;
                        b.vy += Math.sin(angle) * 0.8;
                    } else b.vy -= 0.5;
                    b.x += b.vx; b.y += b.vy;
                } else if(b.rail || b.blade) {
                    b.life--;
                    if(b.life <= 0) bullets.splice(i, 1);
                    if(b.blade) { b.x = pX; b.y = pY; }
                } else {
                    b.x += b.vx; b.y += b.vy;
                }
                if(b.y < -100 || b.y > canvas.height + 100 || b.x < -100 || b.x > canvas.width + 100) bullets.splice(i, 1);

                // 敵との衝突
                enemies.forEach((e, ei) => {
                    let dist = Math.hypot(b.x - e.x, b.y - e.y);
                    let hit = b.rail ? (Math.abs(b.x - e.x) < 40) : (dist < e.size + (b.blade ? 60 : 0));
                    if(hit) {
                        e.hp -= b.power;
                        if(!b.beam && !b.rail && !b.blade) bullets.splice(i, 1);
                        if(e.hp <= 0) {
                            createExplosion(e.x, e.y, currentStage.color);
                            score += Math.floor(100 * currentStage.diff);
                            userData.gold += Math.floor(5 * currentStage.diff);
                            enemies.splice(ei, 1);
                        }
                    }
                });
            });

            // 敵の挙動と自機への攻撃
            enemies.forEach((e, i) => {
                e.y += e.vy;
                if(Math.random() < 0.01 * currentStage.diff) {
                    eBullets.push({x: e.x, y: e.y, vx: (pX - e.x) * 0.02, vy: 5});
                }
                if(e.y > canvas.height + 50) enemies.splice(i, 1);
                if(Math.hypot(e.x - pX, e.y - pY) < e.size + 10) {
                    hp -= 0.5;
                    if(frame % 10 === 0) createExplosion(pX, pY, "#f00");
                }
            });

            // 敵弾の計算
            eBullets.forEach((eb, i) => {
                eb.x += eb.vx; eb.y += eb.vy;
                if(Math.hypot(eb.x - pX, eb.y - pY) < 15) {
                    hp -= 10;
                    createExplosion(pX, pY, "#f00");
                    eBullets.splice(i, 1);
                }
                if(eb.y > canvas.height) eBullets.splice(i, 1);
            });

            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; p.life--;
                if(p.life <= 0) particles.splice(i, 1);
            });

            // クリア判定（一定スコアでクリア）
            if(score >= 10000 * currentStage.diff) {
                endGame(true);
            }
            if(hp <= 0) {
                endGame(false);
            }

            // HUD更新
            document.getElementById('hp-fill').style.width = hp + "%";
            document.getElementById('score-val').innerText = `SCORE: ${score.toString().padStart(6, '0')}`;
            document.getElementById('gold-display').innerText = `GOLD: ${userData.gold}`;
        }

        function createExplosion(x, y, color) {
            for(let i=0; i<10; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10,
                    life: 20, color: color
                });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 自機描画
            ctx.shadowBlur = 15; ctx.shadowColor = userData.skin;
            ctx.fillStyle = userData.skin;
            ctx.beginPath();
            ctx.moveTo(pX, pY - 20);
            ctx.lineTo(pX + 15, pY + 15);
            ctx.lineTo(pX - 15, pY + 15);
            ctx.closePath();
            ctx.fill();
            ctx.shadowBlur = 0;

            // 弾
            bullets.forEach(b => {
                ctx.fillStyle = b.color;
                if(b.rail) {
                    ctx.globalAlpha = b.life / 15;
                    ctx.fillRect(b.x - 20, 0, 40, canvas.height);
                    ctx.globalAlpha = 1.0;
                } else if(b.blade) {
                    ctx.beginPath(); ctx.arc(b.x, b.y, 70, 0, Math.PI*2); ctx.fill();
                } else {
                    ctx.fillRect(b.x - 3, b.y - 10, 6, 20);
                }
            });

            // 敵
            enemies.forEach(e => {
                ctx.strokeStyle = currentStage.color;
                ctx.lineWidth = 3;
                ctx.strokeRect(e.x - e.size/2, e.y - e.size/2, e.size, e.size);
                // HPゲージ
                ctx.fillStyle = "#444"; ctx.fillRect(e.x - 20, e.y - e.size - 5, 40, 4);
                ctx.fillStyle = "#f00"; ctx.fillRect(e.x - 20, e.y - e.size - 5, 40 * (e.hp/e.maxHp), 4);
            });

            // 敵弾
            eBullets.forEach(eb => {
                ctx.fillStyle = "#ff00ff";
                ctx.beginPath(); ctx.arc(eb.x, eb.y, 6, 0, Math.PI*2); ctx.fill();
            });

            // エフェクト
            particles.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life / 20;
                ctx.fillRect(p.x, p.y, 4, 4);
                ctx.globalAlpha = 1.0;
            });
        }

        function endGame(success) {
            gameActive = false;
            if(success) {
                if(!userData.cleared.includes(currentStage.id)) userData.cleared.push(currentStage.id);
                userData.gold += 1000;
                save();
                showPopup("MISSION ACCOMPLISHED", "#0f0");
            } else {
                showPopup("MISSION FAILED", "#f00");
            }
            setTimeout(() => {
                document.getElementById('overlay').style.display = 'flex';
                backToMain();
            }, 2000);
        }

        function updateLoop() {
            if(!gameActive) return;
            update();
            draw();
            requestAnimationFrame(updateLoop);
        }

        // 入力管理
        let isDown = false;
        window.onmousemove = e => { pX = e.clientX; pY = e.clientY; };
        window.onmousedown = e => { if(e.button === 0) isDown = true; };
        window.onmouseup = () => isDown = false;
        window.ontouchstart = e => { isDown = true; pX = e.touches[0].clientX; pY = e.touches[0].clientY; };
        window.ontouchmove = e => { pX = e.touches[0].clientX; pY = e.touches[0].clientY; };
        window.ontouchend = () => isDown = false;

        // 初期表示
        document.getElementById('gold-display').innerText = `GOLD: ${userData.gold}`;
    </script>
</body>
</html>
