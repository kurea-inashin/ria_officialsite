<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ST-PROJECT: RAIL-BLAST TRUE-COMPLETE</title>
    <style>
        :root {
            --keiyo-red: #E60012;      /* 京葉線 */
            --keihin-blue: #00B2E5;   /* 京浜東北線 */
            --sobu-yellow: #FCD500;   /* 総武線 */
            --saikyo-green: #00AC9A;  /* 埼京線 */
            --chuou-orange: #F39700;  /* 中央線 (隠し/超鬼むず) */
            --dark-bg: #001226;
        }
        body { margin: 0; background: var(--dark-bg); color: white; font-family: 'Arial', sans-serif; overflow: hidden; user-select: none; }
        
        /* UI Screens */
        .screen { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; background: rgba(0,10,30,0.98); z-index: 100; padding: 40px; overflow-y: auto; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin: 20px 0; }
        
        /* Stage Buttons */
        .btn { width: 110px; height: 55px; border: 2px solid #555; background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 12px; font-weight: bold; transition: 0.2s; }
        .btn:hover:not(.locked) { transform: scale(1.05); border-color: #fff; }
        .btn.locked { opacity: 0.1; cursor: not-allowed; }
        .btn.cleared { border-color: #0f0; box-shadow: 0 0 10px rgba(0,255,0,0.3); }
        .btn.nomiss { background: rgba(0, 255, 0, 0.2); border-width: 3px; }

        /* HUD & HP */
        #hud { position: absolute; inset: 0; pointer-events: none; padding: 25px; }
        .hp-group { width: 350px; margin-top: 10px; }
        .hp-label { font-size: 18px; font-weight: bold; margin-bottom: 5px; color: #0af; }
        .hp-bar-bg { width: 100%; height: 28px; border: 2px solid #fff; background: #000; position: relative; }
        #hp-fill { width: 100%; height: 100%; background: var(--keiyo-red); transition: width 0.1s; }
        #hp-text { position: absolute; inset: 0; text-align: center; line-height: 28px; font-weight: bold; font-size: 16px; text-shadow: 1px 1px 2px #000; }
        
        #shop-btn { position: absolute; top: 25px; right: 25px; pointer-events: auto; padding: 12px 24px; background: var(--chuou-orange); border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 4px; }
        #slots { position: absolute; bottom: 25px; right: 25px; display: flex; gap: 15px; pointer-events: auto; }
        .slot { width: 80px; height: 80px; border: 3px solid var(--chuou-orange); background: rgba(243, 151, 0, 0.15); border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 13px; cursor: pointer; }
        
        #msg { position: absolute; top: 40%; width: 100%; text-align: center; font-size: 70px; font-weight: bold; color: var(--chuou-orange); pointer-events: none; opacity: 0; }
        canvas { display: block; filter: blur(0px); }
    </style>
</head>
<body>

<div id="menu" class="screen">
    <h1>ST-PROJECT: RAIL-BLAST</h1>
    <div id="stats">COINS: <span id="coin-val">0</span> | TOTAL CLEAR: <span id="clear-val">0</span> / 17</div>
    
    <h3>MAIN LINE (Independent Selection)</h3>
    <div class="grid" id="main-grid"></div>

    <h3 id="ex-title" style="display:none; color:silver;">EX STAGES (Cleared 9/9 Only)</h3>
    <div class="grid" id="ex-grid"></div>

    <h3 id="secret-title" style="display:none; color:var(--chuou-orange);">ULTIMATE HIDDEN LINE</h3>
    <div class="grid" id="secret-grid"></div>
    
    <button id="shop-btn" onclick="toggleShop(true)">OPEN SHOP</button>
</div>

<div id="shop" class="screen" style="display:none;">
    <h2>ITEM SHOP</h2>
    <div style="margin-bottom:20px;">Your Coins: <span id="shop-coin">0</span></div>
    <div class="grid">
        <div class="btn" style="height:80px;" onclick="buy('burst')">ORANGE BURST<br>(500 Coins)</div>
        <div class="btn" style="height:80px;" onclick="buy('repair')">REPAIR KIT<br>(200 Coins)</div>
    </div>
    <button class="btn" style="margin-top:20px;" onclick="toggleShop(false)">BACK TO MENU</button>
</div>

<div id="hud">
    <div id="score-label" style="font-size:24px;">SCORE: 000000</div>
    <div class="hp-group">
        <div class="hp-label">HP STATUS</div>
        <div class="hp-bar-bg">
            <div id="hp-fill"></div>
            <div id="hp-text">HP: 100 / 100</div>
        </div>
    </div>
    <div id="slots">
        <div class="slot" onclick="useBurst()">BURST<br><span id="b-num">x1</span></div>
        <div class="slot" onclick="useRepair()">REPAIR<br><span id="r-num">x0</span></div>
    </div>
</div>

<div id="msg">ORANGE BURST!</div>
<canvas id="c"></canvas>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const colors = {
    red: '#E60012', blue: '#00B2E5', yellow: '#FCD500', green: '#00AC9A', orange: '#F39700'
};

const STAGE_DATA = [
    {id:'ST-KY-01', c:colors.red}, {id:'ST-KY-02', c:colors.red}, {id:'ST-KY-03', c:colors.red}, {id:'ST-KY-04', c:colors.red},
    {id:'ST-SS-01', c:colors.yellow}, {id:'ST-SS-02', c:colors.yellow},
    {id:'ST-SK-01', c:colors.green}, {id:'ST-JB-01', c:'#00B2E5'}, {id:'ST-QU-01', c:colors.blue},
    {id:'ST-EX-01', c:'#cd7f32', type:'ex'}, {id:'ST-EX-02', c:'#C0C0C0', type:'ex'}, {id:'ST-EX-03', c:'#D4AF37', type:'ex'},
    {id:'ST-????-Ⅰ', c:'#fff', type:'secret'}, {id:'ST-????-Ⅱ', c:colors.orange, type:'secret'}
];

let save = JSON.parse(localStorage.getItem('ST_FINAL_SAVE')) || { coins: 0, cleared: [], nomiss: [], stock: { burst: 1, repair: 0 } };
let g = { active: false, hp: 100, score: 0, px: 0, py: 0, enemies: [], p_bullets: [], e_bullets: [], stage: null };

function init() {
    renderGrid('main-grid', STAGE_DATA.filter(s => !s.type));
    if (save.cleared.length >= 9) {
        document.getElementById('ex-title').style.display = 'block';
        renderGrid('ex-grid', STAGE_DATA.filter(s => s.type === 'ex'));
    }
    if (save.cleared.includes('ST-EX-03')) {
        document.getElementById('secret-title').style.display = 'block';
        renderGrid('secret-grid', STAGE_DATA.filter(s => s.type === 'secret'));
    }
    document.getElementById('coin-val').innerText = save.coins;
    document.getElementById('clear-val').innerText = save.cleared.length;
    updateStockUI();
}

function renderGrid(id, data) {
    const container = document.getElementById(id); container.innerHTML = '';
    data.forEach(st => {
        const d = document.createElement('div');
        d.className = 'btn';
        if (st.type === 'ex') d.classList.add('ex');
        if (save.nomiss.includes(st.id)) d.classList.add('nomiss');
        else if (save.cleared.includes(st.id)) d.classList.add('cleared');
        d.innerText = st.id;
        
        let locked = (st.type === 'ex' && save.cleared.length < 9) || 
                     (st.id === 'ST-????-Ⅰ' && !save.cleared.includes('ST-EX-03')) ||
                     (st.id === 'ST-????-Ⅱ' && save.nomiss.length < 16);
        
        if (locked) d.classList.add('locked');
        else d.onclick = () => start(st);
        container.appendChild(d);
    });
}

function start(st) {
    g.stage = st; g.hp = 100; g.score = 0; g.active = true;
    g.enemies = []; g.p_bullets = []; g.e_bullets = [];
    document.getElementById('menu').style.display = 'none';
}

// Shooting Engine with Enemy Attacks
function loop() {
    if (g.active) {
        ctx.fillStyle = '#001226'; ctx.fillRect(0,0,canvas.width,canvas.height);
        
        // Player
        ctx.fillStyle = '#00d4ff'; ctx.beginPath();
        ctx.moveTo(g.px, g.py-20); ctx.lineTo(g.px-20, g.py+20); ctx.lineTo(g.px+20, g.py+20); ctx.fill();

        // Player Bullets
        if (Date.now() % 7 === 0) g.p_bullets.push({x: g.px, y: g.py-30});
        ctx.fillStyle = 'white';
        g.p_bullets.forEach((b, i) => {
            b.y -= 15; ctx.fillRect(b.x-2, b.y, 4, 12);
            if (b.y < 0) g.p_bullets.splice(i, 1);
        });

        // Enemies & Enemy Attacks
        if (Math.random() < 0.05) g.enemies.push({x: Math.random()*canvas.width, y: -50, lastShot: 0});
        g.enemies.forEach((en, i) => {
            en.y += 2.5;
            ctx.fillStyle = g.stage.c;
            ctx.fillRect(en.x-25, en.y, 50, 50);

            // Enemy Shooting (Attack Logic)
            if (Date.now() - en.lastShot > 1500) {
                g.e_bullets.push({x: en.x, y: en.y+30});
                en.lastShot = Date.now();
            }

            // Hit by Player
            g.p_bullets.forEach((pb, pbi) => {
                if (Math.abs(pb.x-en.x)<30 && Math.abs(pb.y-en.y)<30) {
                    g.enemies.splice(i,1); g.p_bullets.splice(pbi,1);
                    g.score += 100; save.coins += 2; updateHUD();
                }
            });
            if (en.y > canvas.height) g.enemies.splice(i,1);
        });

        // Enemy Bullets (Enemy Attacks)
        ctx.fillStyle = '#FF4444';
        g.e_bullets.forEach((eb, i) => {
            eb.y += 6;
            ctx.beginPath(); ctx.arc(eb.x, eb.y, 6, 0, Math.PI*2); ctx.fill();
            // Player Hit
            if (Math.abs(eb.x-g.px)<20 && Math.abs(eb.y-g.py)<20) {
                g.hp -= 10; g.e_bullets.splice(i,1); updateHUD();
                if (g.hp <= 0) { g.active = false; alert('MISSION FAILED'); location.reload(); }
            }
            if (eb.y > canvas.height) g.e_bullets.splice(i,1);
        });

        if (g.score >= 3000) {
            if (!save.cleared.includes(g.stage.id)) save.cleared.push(g.stage.id);
            if (g.hp >= 100 && !save.nomiss.includes(g.stage.id)) save.nomiss.push(g.stage.id);
            saveGame(); alert('STAGE CLEAR!'); location.reload();
        }
    }
    requestAnimationFrame(loop);
}

// Support Functions
function updateHUD() {
    document.getElementById('hp-fill').style.width = g.hp + '%';
    document.getElementById('hp-text').innerText = `HP: ${Math.max(0, Math.ceil(g.hp))} / 100`;
    document.getElementById('score-label').innerText = `SCORE: ${g.score.toString().padStart(6, '0')}`;
}
function updateStockUI() {
    document.getElementById('b-num').innerText = 'x' + save.stock.burst;
    document.getElementById('r-num').innerText = 'x' + save.stock.repair;
}
function saveGame() { localStorage.setItem('ST_FINAL_SAVE', JSON.stringify(save)); }
function toggleShop(s) { document.getElementById('shop').style.display = s?'flex':'none'; document.getElementById('shop-coin').innerText = save.coins; }
function buy(t) { 
    let p = t==='burst'?500:200; 
    if(save.coins>=p){ save.coins-=p; save.stock[t]++; saveGame(); toggleShop(true); updateStockUI(); }
}
function useBurst() {
    if (save.stock.burst > 0 && g.active) {
        save.stock.burst--; g.enemies = []; g.e_bullets = []; 
        document.getElementById('msg').style.opacity = 1;
        setTimeout(()=>document.getElementById('msg').style.opacity = 0, 1000);
        updateStockUI(); saveGame();
    }
}
function useRepair() {
    if (save.stock.repair > 0 && g.active) {
        g.hp = Math.min(100, g.hp + 50); save.stock.repair--; updateHUD(); updateStockUI(); saveGame();
    }
}
window.addEventListener('mousemove', e => { g.px = e.clientX; g.py = e.clientY; });
function res() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', res); res();
init(); loop();
</script>
</body>
</html>
