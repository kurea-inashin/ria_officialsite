<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Minami Project 2026: Chromatic Resonance</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+JP:wght@300;700&display=swap');
        
        body { 
            margin: 0; 
            background: radial-gradient(circle at center, #001220 0%, #000810 100%); 
            color: #e0e0e0; 
            font-family: 'Noto Sans JP', sans-serif;
            overflow: hidden;
        }
        canvas { display: block; position: absolute; top: 0; left: 0; }

        /* HUD: ゲーム中の情報表示 */
        #hud { 
            position: absolute; top: 30px; left: 30px; z-index: 10; 
            pointer-events: none; display: none; 
        }
        #score-display { font-family: 'Press Start 2P'; font-size: 20px; color: #fff; margin-bottom: 10px; }
        #hp-bar-container { width: 200px; height: 10px; background: rgba(255,255,255,0.1); border-radius: 5px; overflow: hidden; }
        #hp-fill { width: 100%; height: 100%; background: #fff; transition: width 0.2s; }
        #boss-hud { 
            position: absolute; top: 30px; left: 50%; transform: translateX(-50%); 
            width: 400px; text-align: center; display: none; z-index: 10;
        }

        /* メニュー UI */
        .layer { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,5,10,0.85); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 20; 
            backdrop-filter: blur(8px);
        }
        .hidden { display: none !important; }

        h1 { font-family: 'Press Start 2P'; font-size: 24px; letter-spacing: 6px; color: #fff; margin-bottom: 40px; }
        
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        
        .mode-btn { 
            width: 180px; height: 70px; background: rgba(255,255,255,0.05); 
            cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 1px solid rgba(255,255,255,0.1); border-radius: 4px; transition: 0.3s;
        }
        .mode-btn:hover { background: rgba(255,255,255,0.15); border-color: #fff; transform: translateY(-3px); }

        /* 路線別ハイライト */
        .SB { border-left: 6px solid #f1ca00; color: #f1ca00; }
        .KT { border-left: 6px solid #00a4e4; color: #00a4e4; }
        .SK { border-left: 6px solid #00ac4a; color: #00ac4a; }
        .KY { border-left: 6px solid #e50012; color: #e50012; }
        .CO { border: 2px solid #f39700; color: #f39700; grid-column: span 3; width: 100%; }

        .cleared::after { content: "COMPLETE"; font-family: 'Press Start 2P'; font-size: 8px; color: #00a4e4; margin-top: 5px; }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="hud">
        <div id="score-display">SCORE: <span id="score-val">0</span></div>
        <div id="hp-bar-container"><div id="hp-fill"></div></div>
    </div>

    <div id="boss-hud">
        <div style="font-size: 10px; font-family: 'Press Start 2P'; margin-bottom: 5px;">BOSS RESONANCE</div>
        <div style="width: 100%; height: 4px; background: rgba(255,255,255,0.2);">
            <div id="boss-hp-fill" style="width: 100%; height: 100%; background: #ff4d4d;"></div>
        </div>
    </div>

    <div id="layer-home" class="layer">
        <h1>MINAMI PROJECT 2026</h1>
        <div class="grid">
            <div class="mode-btn" onclick="openStageSelect()">STAGE SELECT</div>
            <div class="mode-btn" onclick="alert('COMING SOON: SHOP')">SHOP</div>
            <div class="mode-btn" onclick="alert('マウスで移動、クリックで発射')">HOW TO PLAY</div>
        </div>
    </div>

    <div id="layer-stage" class="layer hidden">
        <h1 style="font-size: 16px;">SELECT STAGE</h1>
        <div id="stage-grid" class="grid"></div>
        <div class="mode-btn" onclick="backToHome()" style="margin-top: 20px; height: 40px;">BACK</div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // ゲーム状態
        let gameActive = false;
        let score = 0, hp = 100;
        let player = { x: canvas.width/2, y: canvas.height * 0.8 };
        let bullets = [], enemies = [], eBullets = [], ripples = [];
        let currentStage = null;
        let boss = { active: false, hp: 0, max: 0, x: 0, y: -100 };

        // セーブデータ
        let saveData = JSON.parse(localStorage.getItem('minami_resonance_save')) || { cleared: [] };

        const STAGES = [
            { id: "ST=SB", name: "総武イエロー", color: "#f1ca00", class: "SB" },
            { id: "ST=KT", name: "京浜ブルー", color: "#00a4e4", class: "KT" },
            { id: "ST=SK", name: "埼京グリーン", color: "#00ac4a", class: "SK" },
            { id: "ST=KY", name: "京葉レッド", color: "#e50012", class: "KY" },
            { id: "ST=CO", name: "中央オレンジ", color: "#f39700", class: "CO", hidden: true }
        ];

        function openStageSelect() {
            const grid = document.getElementById('stage-grid');
            grid.innerHTML = '';
            const allCleared = STAGES.filter(s=>!s.hidden).every(s => saveData.cleared.includes(s.id));

            STAGES.forEach(s => {
                if(s.hidden && !allCleared) return;
                const btn = document.createElement('div');
                btn.className = `mode-btn ${s.class} ${saveData.cleared.includes(s.id) ? 'cleared' : ''}`;
                btn.innerHTML = `<span style="font-size:10px;">${s.id}</span><span style="font-size:11px;">${s.name}</span>`;
                btn.onclick = () => initGame(s);
                grid.appendChild(btn);
            });
            showLayer('layer-stage');
        }

        function showLayer(id) {
            document.querySelectorAll('.layer').forEach(l => l.classList.add('hidden'));
            if(id) document.getElementById(id).classList.remove('hidden');
        }

        function backToHome() { showLayer('layer-home'); }

        // --- ゲームエンジン ---
        function initGame(stage) {
            currentStage = stage;
            showLayer(null);
            document.getElementById('hud').style.display = 'block';
            document.getElementById('boss-hud').style.display = 'block';
            
            gameActive = true;
            score = 0; hp = 100;
            bullets = []; enemies = []; eBullets = []; ripples = [];
            boss = { active: true, hp: 2000, max: 2000, x: canvas.width/2, y: -100 };
            
            loop();
        }

        window.addEventListener('mousemove', e => {
            player.x = e.clientX;
            player.y = e.clientY;
        });

        window.addEventListener('mousedown', () => {
            if(gameActive) bullets.push({ x: player.x, y: player.y - 15, vy: -15 });
        });

        function loop() {
            if(!gameActive) return;
            ctx.fillStyle = "rgba(0, 8, 16, 0.3)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // ボス出現
            if(boss.active) {
                if(boss.y < 150) boss.y += 2;
                boss.x = canvas.width/2 + Math.sin(Date.now()/500) * 150;
                
                // ボス描画
                ctx.strokeStyle = currentStage.color;
                ctx.lineWidth = 4;
                ctx.strokeRect(boss.x-50, boss.y-30, 100, 60);
                
                // 攻撃
                if(Math.random() < 0.05) {
                    eBullets.push({ x: boss.x, y: boss.y + 30, vx: (Math.random()-0.5)*10, vy: 6 });
                }
            }

            // プレイヤー弾
            bullets.forEach((b, i) => {
                b.y += b.vy;
                ctx.fillStyle = "#fff";
                ctx.fillRect(b.x-2, b.y, 4, 12);
                if(boss.active && Math.hypot(b.x-boss.x, b.y-boss.y) < 50) {
                    boss.hp -= 20;
                    bullets.splice(i, 1);
                    if(boss.hp <= 0) win();
                }
                if(b.y < -20) bullets.splice(i, 1);
            });

            // 敵弾
            eBullets.forEach((eb, i) => {
                eb.x += eb.vx; eb.y += eb.vy;
                ctx.fillStyle = "#ff4d4d";
                ctx.beginPath(); ctx.arc(eb.x, eb.y, 5, 0, Math.PI*2); ctx.fill();
                if(Math.hypot(eb.x-player.x, eb.y-player.y) < 15) {
                    hp -= 5;
                    eBullets.splice(i, 1);
                    ripples.push({ x: player.x, y: player.y, r: 5, a: 1 });
                    if(hp <= 0) die();
                }
            });

            // 自機（雫）
            ctx.fillStyle = "#fff";
            ctx.beginPath();
            ctx.moveTo(player.x, player.y-15);
            ctx.bezierCurveTo(player.x+10, player.y+5, player.x+10, player.y+15, player.x, player.y+15);
            ctx.bezierCurveTo(player.x-10, player.y+15, player.x-10, player.y+5, player.x, player.y-15);
            ctx.fill();

            // 波紋演出
            ripples.forEach((r, i) => {
                ctx.strokeStyle = `rgba(255,255,255,${r.a})`;
                ctx.beginPath(); ctx.arc(r.x, r.y, r.r, 0, Math.PI*2); ctx.stroke();
                r.r += 2; r.a -= 0.02;
                if(r.a <= 0) ripples.splice(i, 1);
            });

            // UI更新
            document.getElementById('hp-fill').style.width = hp + "%";
            document.getElementById('boss-hp-fill').style.width = (boss.hp/boss.max*100) + "%";
            document.getElementById('score-val').innerText = score;

            requestAnimationFrame(loop);
        }

        function win() {
            gameActive = false;
            saveData.cleared.push(currentStage.id);
            saveData.cleared = [...new Set(saveData.cleared)];
            localStorage.setItem('minami_resonance_save', JSON.stringify(saveData));
            alert("RESONANCE SUCCESSFUL");
            location.reload();
        }

        function die() {
            gameActive = false;
            alert("RESONANCE FAILED");
            location.reload();
        }
    </script>
</body>
</html>
