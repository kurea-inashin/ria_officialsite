<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>MINAMI SHOOTING PROJECT 2026 - FINAL</title>
    <style>
        body { background: #000814; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
        #game-container { position: relative; width: 800px; height: 600px; border: 4px solid #003366; box-shadow: 0 0 30px #00d4ff; background: #000; }
        canvas { display: block; }

        /* UIカウンター */
        #hud { position: absolute; top: 15px; left: 15px; background: rgba(0, 20, 40, 0.8); padding: 10px; border-left: 5px solid #00d4ff; pointer-events: none; }
        .hp-bar { width: 100px; height: 10px; background: #333; margin-top: 5px; }
        #hp-fill { width: 100%; height: 100%; background: #ff416c; transition: 0.2s; }

        /* オーバーレイ */
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 8, 20, 0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; overflow-y: auto; }
        .active { display: flex; }
        
        /* ステージグリッド */
        .stage-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin: 20px; }
        .stage-btn { padding: 15px; border: 2px solid #00d4ff; background: #001f3f; color: #fff; cursor: pointer; text-align: center; border-radius: 8px; transition: 0.3s; }
        .stage-btn:hover { background: #00d4ff; color: #000; transform: scale(1.05); }
        .locked { opacity: 0.3; cursor: not-allowed; border-color: #444; }

        .btn { padding: 10px 25px; background: #003366; border: 2px solid #00d4ff; color: #fff; cursor: pointer; border-radius: 20px; margin: 5px; }
        footer { position: absolute; bottom: 5px; font-size: 10px; color: #336699; }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    
    <div id="hud">
        SCORE: <span id="score-val">0</span><br>
        HP: <div class="hp-bar"><div id="hp-fill"></div></div>
        COIN: 🪙 <span id="coin-val">0</span>
    </div>

    <div id="menu-screen" class="overlay active">
        <h1 style="color: #00d4ff;">MINAMI SHOOTING 2026</h1>
        <button class="btn" onclick="showStageSelect()">MISSION START</button>
        <button class="btn" onclick="toggleScreen('shop-screen')">ITEM SHOP</button>
        <footer>© 2026 MINAMI SHOOTING GAME PROJECT.</footer>
    </div>

    <div id="stage-screen" class="overlay">
        <h2>SELECT STAGE</h2>
        <div class="stage-grid" id="stage-list"></div>
        <button class="btn" onclick="toggleScreen('menu-screen')">BACK</button>
    </div>

    <div id="shop-screen" class="overlay">
        <h2>SHOP</h2>
        <button class="btn" onclick="buy('wide', 500)">WIDE SHOT (500🪙)</button>
        <button class="btn" onclick="buy('heal', 200)">HEAL POTION (200🪙)</button>
        <button class="btn" onclick="toggleScreen('menu-screen')">BACK</button>
    </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let game = {
    state: 'menu',
    score: 0, hp: 100, coins: 0,
    unlocked: 9, // 初期開放数
    clearedStages: [], noMissStages: [],
    currentStage: null,
    inventory: { weapon: 'NORMAL', heals: 0 },
    player: { x: 400, y: 550, size: 20, speed: 6 },
    entities: { bullets: [], enemies: [], eBullets: [], effects: [] },
    keys: {}, frame: 0
};

// ステージ定義
function getStageData(id) {
    const n = parseInt(id.split(' ')[1]);
    if (id.includes('UNKNOWN')) return { name: id, color: 'rainbow', diff: 15, goal: 5000 };
    if (id.includes('EX')) return { name: id, color: id === 'ST=KY EX-01' ? '#cd7f32' : id === 'ST=KY EX-02' ? '#c0c0c0' : '#ffd700', diff: 10, goal: 3000 };
    return { name: id, color: n < 4 ? '#ff0000' : n < 7 ? '#00ff00' : '#00aaff', diff: n, goal: 500 + n * 100 };
}

function showStageSelect() {
    toggleScreen('stage-screen');
    const list = document.getElementById('stage-list');
    list.innerHTML = '';
    
    // 1-9ステージ
    for(let i=1; i<=9; i++) createStageBtn(`ST=KY 0${i}`, list);
    
    // 隠し開放条件（9個クリア）
    if (game.clearedStages.length >= 9) {
        ['EX-01', 'EX-02', 'EX-03'].forEach(ex => createStageBtn(`ST=KY ${ex}`, list));
    }
    
    // 最終開放条件（全12個をノーミスクリア）
    if (game.noMissStages.length >= 12) {
        createStageBtn(`ST=KY UNKNOWN`, list);
    }
}

function createStageBtn(id, container) {
    const btn = document.createElement('div');
    btn.className = 'stage-btn';
    btn.innerText = id;
    btn.onclick = () => { game.currentStage = getStageData(id); startLevel(); };
    container.appendChild(btn);
}

function toggleScreen(id) {
    document.querySelectorAll('.overlay').forEach(el => el.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function startLevel() {
    game.state = 'playing';
    game.hp = 100; game.score = 0;
    game.entities = { bullets: [], enemies: [], eBullets: [], effects: [] };
    document.getElementById('stage-screen').classList.remove('active');
}

function update() {
    if (game.state !== 'playing') return;
    
    // 自機移動
    if (game.keys['ArrowLeft'] || game.keys['a']) game.player.x -= game.player.speed;
    if (game.keys['ArrowRight'] || game.keys['d']) game.player.x += game.player.speed;
    if (game.keys['ArrowUp'] || game.keys['w']) game.player.y -= game.player.speed;
    if (game.keys['ArrowDown'] || game.keys['s']) game.player.y += game.player.speed;

    // 攻撃
    if (game.frame % 10 === 0) {
        game.entities.bullets.push({x: game.player.x, y: game.player.y, vx: 0, vy: -12});
        if (game.inventory.weapon === 'WIDE') {
            game.entities.bullets.push({x: game.player.x, y: game.player.y, vx: -3, vy: -10});
            game.entities.bullets.push({x: game.player.x, y: game.player.y, vx: 3, vy: -10});
        }
    }

    // 敵生成 & ギミック
    if (game.frame % Math.max(10, 50 - game.currentStage.diff * 2) === 0) {
        const type = Math.random();
        let e = { x: Math.random()*760+20, y: -20, hp: 2 + game.currentStage.diff, speed: 2, type: 'norm' };
        if (type > 0.8) e.type = 'beam';   // ビーム敵
        if (type < 0.2) e.type = 'shield'; // バリア敵
        game.entities.enemies.push(e);
    }

    // 敵更新
    game.entities.enemies.forEach((e, i) => {
        // ギミック：急加速・停止
        if (game.frame % 100 < 20) e.y += 8; 
        else if (game.frame % 100 > 80) e.y += 0;
        else e.y += 2;

        if (e.type === 'beam' && game.frame % 120 === 0) {
            game.entities.effects.push({x: e.x, y: 0, w: 4, h: 600, life: 30, color: 'rgba(255,0,0,0.3)'}); // 予兆
            setTimeout(() => {
                game.entities.eBullets.push({x: e.x, y: 0, w: 40, h: 600, isBeam: true, life: 20});
            }, 500);
        }

        // 当たり判定
        game.entities.bullets.forEach((b, bi) => {
            if (Math.abs(e.x - b.x) < 20 && Math.abs(e.y - b.y) < 20) {
                e.hp--; game.entities.bullets.splice(bi, 1);
                if (e.hp <= 0) {
                    game.score += 100; game.coins += 2;
                    game.entities.enemies.splice(i, 1);
                    // ギミック：爆発
                    game.entities.effects.push({x: e.x, y: e.y, r: 50, life: 15});
                }
            }
        });
        if (e.y > 600) game.entities.enemies.splice(i, 1);
    });

    // 敵弾更新
    game.entities.eBullets.forEach((eb, i) => {
        if (eb.isBeam) {
            eb.life--;
            if (Math.abs(eb.x - game.player.x) < eb.w/2) game.hp -= 2;
            if (eb.life <= 0) game.entities.eBullets.splice(i, 1);
        } else {
            eb.y += 5;
            if (Math.hypot(eb.x-game.player.x, eb.y-game.player.y) < 15) {
                game.hp -= 10; game.entities.eBullets.splice(i, 1);
            }
        }
    });

    if (game.score >= game.currentStage.goal) win();
    if (game.hp <= 0) die();
    updateUI();
}

function draw() {
    ctx.fillStyle = '#000814'; ctx.fillRect(0,0,800,600);
    const color = game.currentStage.color === 'rainbow' ? `hsl(${game.frame%360},100%,50%)` : game.currentStage.color;
    
    // エフェクト（ビーム予兆・爆発）
    game.entities.effects.forEach((ef, i) => {
        ctx.fillStyle = ef.color || 'rgba(255,255,0,0.5)';
        if (ef.r) { ctx.beginPath(); ctx.arc(ef.x, ef.y, ef.r*(1-ef.life/15), 0, Math.PI*2); ctx.fill(); }
        else { ctx.fillRect(ef.x-ef.w/2, ef.y, ef.w, ef.h); }
        ef.life--; if (ef.life<=0) game.entities.effects.splice(i, 1);
    });

    // 自機
    ctx.fillStyle = '#fff'; ctx.shadowBlur = 15; ctx.shadowColor = '#0ff';
    ctx.fillRect(game.player.x-15, game.player.y-15, 30, 30);

    // 敵
    ctx.fillStyle = color;
    game.entities.enemies.forEach(e => {
        ctx.fillRect(e.x-15, e.y-15, 30, 30);
        if (e.type === 'shield') { ctx.strokeStyle = '#fff'; ctx.strokeRect(e.x-20, e.y-20, 40, 40); }
    });

    // 弾
    ctx.fillStyle = '#0ff';
    game.entities.bullets.forEach(b => ctx.fillRect(b.x-2, b.y-10, 4, 20));
    game.entities.eBullets.forEach(eb => {
        if (eb.isBeam) { ctx.fillStyle = 'rgba(255,255,255,0.8)'; ctx.fillRect(eb.x-eb.w/2, eb.y, eb.w, eb.h); }
        else { ctx.beginPath(); ctx.arc(eb.x, eb.y, 6, 0, Math.PI*2); ctx.fill(); }
    });
    ctx.shadowBlur = 0;
}

function win() {
    alert("STAGE CLEAR!");
    if (!game.clearedStages.includes(game.currentStage.name)) game.clearedStages.push(game.currentStage.name);
    if (game.hp === 100) game.noMissStages.push(game.currentStage.name);
    game.state = 'menu';
    toggleScreen('menu-screen');
}

function die() {
    alert("MISSION FAILED...");
    game.state = 'menu';
    toggleScreen('menu-screen');
}

function updateUI() {
    document.getElementById('score-val').innerText = game.score;
    document.getElementById('coin-val').innerText = game.coins;
    document.getElementById('hp-fill').style.width = game.hp + "%";
}

window.addEventListener('keydown', e => game.keys[e.key] = true);
window.addEventListener('keyup', e => game.keys[e.key] = false);

function loop() { update(); draw(); game.frame++; requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
