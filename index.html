<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>MINAMI SHOOTING GAME PROJECT 2026</title>
<style>
body{
    margin:0;
    background:#071a2f;
    color:white;
    font-family:sans-serif;
    text-align:center;
}
canvas{
    background:#0d2b4d;
    display:none;
    margin:auto;
    border:2px solid #1e90ff;
}
.menu{
    padding:20px;
}
button{
    padding:10px 20px;
    margin:5px;
    background:#1e90ff;
    border:none;
    color:white;
    cursor:pointer;
}
button.locked{
    background:gray;
}
#ui{
    position:absolute;
    top:10px;
    left:10px;
    text-align:left;
}
.footer{
    margin-top:20px;
    font-size:12px;
}
</style>
</head>
<body>

<div class="menu" id="menu">
<h1>MINAMI SHOOTING GAME PROJECT 2026</h1>
<div id="stageSelect"></div>
</div>

<canvas id="game" width="800" height="600"></canvas>
<div id="ui"></div>

<div class="footer">
© 2026 MINAMI SHOOTING GAME PROJECT
All Rights Reserved.
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player, bullets, enemies, enemyBullets;
let score=0, hp=4, coin=0;
let currentStage=1;
let stageUnlocked=[true,true,true,true,true,true,true,true,true,false,false,false,false];
let stageNoMissClear=[false,false,false,false,false,false,false,false,false,false,false,false,false];
let noMiss=true;

let mouseX=400, mouseY=500;
let mouseDown=false;
let fireCooldown=0;

const stageData=[
{level:2,target:5000},
{level:3,target:8000},
{level:4,target:11000},
{level:5,target:15000},
{level:6,target:18000},
{level:7,target:22000},
{level:8,target:26000},
{level:9,target:30000},
{level:10,target:35000},
{level:12,target:45000},
{level:14,target:60000},
{level:16,target:80000},
{level:20,target:120000}
];

function initPlayer(){
player={x:400,y:500,size:15,speed:5};
}

function spawnEnemy(){
let level=stageData[currentStage-1].level;
enemies.push({
x:Math.random()*760+20,
y:-20,
size:15,
hp:level,
speed:1+level*0.15,
cool:0
});
}

function drawPlayer(){
ctx.fillStyle="cyan";
ctx.fillRect(player.x,player.y,player.size,player.size);
}

function drawUI(){
document.getElementById("ui").innerHTML=
"SCORE: "+score+
"<br>HP: "+hp+
"<br>COIN: "+coin;
}

function update(){
ctx.clearRect(0,0,800,600);

player.x = mouseX - player.size/2;
player.y = mouseY - player.size/2;

drawPlayer();

// ===== 自動連射 =====
if(mouseDown){
    if(fireCooldown<=0){
        bullets.push({
            x:player.x+player.size/2-2,
            y:player.y
        });
        fireCooldown=15-Math.min(stageData[currentStage-1].level,10);
    }
}
if(fireCooldown>0) fireCooldown--;

// ===== プレイヤー弾 =====
bullets.forEach((b,i)=>{
b.y-=8;
ctx.fillStyle="yellow";
ctx.fillRect(b.x,b.y,5,10);
if(b.y<0) bullets.splice(i,1);
});

// ===== 敵 =====
enemies.forEach((e,ei)=>{
e.y+=e.speed;
ctx.fillStyle="red";
ctx.fillRect(e.x,e.y,e.size,e.size);

if(e.cool<=0){
enemyBullets.push({x:e.x+7,y:e.y+15});
e.cool=60-stageData[currentStage-1].level;
}
e.cool--;

bullets.forEach((b,bi)=>{
if(b.x<e.x+e.size && b.x+5>e.x && b.y<e.y+e.size && b.y+10>e.y){
e.hp--;
bullets.splice(bi,1);
if(e.hp<=0){
score+=100*stageData[currentStage-1].level;
coin+=5;
enemies.splice(ei,1);
}
}
});

if(e.y>600) enemies.splice(ei,1);
});

// ===== 敵弾 =====
enemyBullets.forEach((b,bi)=>{
b.y+=5;
ctx.fillStyle="white";
ctx.fillRect(b.x,b.y,4,8);

if(b.x<player.x+player.size &&
b.x+4>player.x &&
b.y<player.y+player.size &&
b.y+8>player.y){
hp--;
noMiss=false;
enemyBullets.splice(bi,1);
if(hp<=0) endGame(false);
}
});

if(Math.random()<0.02) spawnEnemy();

drawUI();

if(score>=stageData[currentStage-1].target){
endGame(true);
}

requestAnimationFrame(update);
}

function startStage(n){
currentStage=n;
score=0; hp=4; bullets=[]; enemies=[]; enemyBullets=[];
noMiss=true;
document.getElementById("menu").style.display="none";
canvas.style.display="block";
initPlayer();
update();
}

function endGame(clear){
canvas.style.display="none";
document.getElementById("menu").style.display="block";

if(clear){
alert("STAGE CLEAR!");
stageNoMissClear[currentStage-1]=noMiss;

// 9面クリアでシークレット解放
if(stageUnlocked.slice(0,9).every(v=>v)){
stageUnlocked[9]=true;
stageUnlocked[10]=true;
stageUnlocked[11]=true;
}

// 全ノーミスでFINAL解放
if(stageNoMissClear.slice(0,12).every(v=>v)){
stageUnlocked[12]=true;
}
}else{
alert("GAME OVER");
}
createStageButtons();
}

function createStageButtons(){
let html="";
for(let i=1;i<=13;i++){
let locked=!stageUnlocked[i-1];
html+=`<button class="${locked?'locked':''}"
${locked?'disabled':''}
onclick="startStage(${i})">
STAGE ${i}
</button>`;
}
document.getElementById("stageSelect").innerHTML=html;
}

canvas.addEventListener("mousemove",e=>{
const rect=canvas.getBoundingClientRect();
mouseX=e.clientX-rect.left;
mouseY=e.clientY-rect.top;
});

canvas.addEventListener("mousedown",()=>{mouseDown=true;});
canvas.addEventListener("mouseup",()=>{mouseDown=false;});

createStageButtons();
</script>
</body>
</html>
