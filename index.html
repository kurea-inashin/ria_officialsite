<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Minami Project 2026: Metal Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+JP:wght@300;700&display=swap');
        
        body { margin: 0; background: #000810; color: #e0e0e0; font-family: 'Press Start 2P', cursive; overflow: hidden; }
        canvas { display: block; }

        /* HUD */
        #hud { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; }
        #hp-bar { width: 200px; height: 10px; background: rgba(255,255,255,0.1); border: 1px solid #fff; margin-top: 5px; }
        #hp-fill { height: 100%; background: #00ff00; width: 100%; transition: width 0.3s; }
        #coin-display { color: #ffd700; font-size: 14px; margin-top: 5px; }

        /* メインメニュー層 */
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 20; }
        .panel { display: none; flex-direction: column; align-items: center; width: 80%; max-height: 80vh; overflow-y: auto; }
        .active { display: flex; }

        h1 { font-size: 18px; color: #fff; margin-bottom: 30px; text-shadow: 0 0 10px #0088ff; }
        .main-nav { display: flex; gap: 20px; margin-bottom: 40px; }
        .nav-btn { padding: 15px 25px; border: 2px solid #fff; background: none; color: #fff; cursor: pointer; font-family: 'Press Start 2P'; font-size: 10px; }
        .nav-btn:hover { background: #fff; color: #000; }

        /* ステージセレクト */
        .mode-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .mode-btn { width: 140px; padding: 10px; border: 2px solid #444; background: #111; color: #888; cursor: pointer; text-align: center; }
        .mode-btn.unlocked { border-color: var(--c); color: var(--c); }
        .mode-btn.unlocked:hover { background: var(--c); color: #000; box-shadow: 0 0 15px var(--c); }

        /* ショップ */
        .shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; }
        .shop-item { padding: 15px; border: 1px solid #555; background: rgba(255,255,255,0.05); cursor: pointer; }
        .shop-item:hover { background: rgba(255,255,255,0.1); }

        /* 説明書 */
        #guide-text { font-family: 'Noto Sans JP'; font-size: 14px; line-height: 1.8; color: #ccc; text-align: left; max-width: 600px; }
        
        .status-msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 30px; pointer-events: none; opacity: 0; transition: 0.5s; }
    </style>
</head>
<body>

    <div id="hud">
        <div id="score-val">SCORE: 000000</div>
        <div id="hp-bar"><div id="hp-fill"></div></div>
        <div id="coin-display">COINS: 0</div>
    </div>

    <div id="overlay">
        <h1>MINAMI PROJECT 2026</h1>
        
        <div class="main-nav" id="main-nav">
            <button class="nav-btn" onclick="openPanel('stage-select')">STAGE SELECT</button>
            <button class="nav-btn" onclick="openPanel('shop')">SHOP</button>
            <button class="nav-btn" onclick="openPanel('how-to')">HOW TO PLAY</button>
        </div>

        <div id="stage-select" class="panel">
            <div class="mode-grid" id="grid">
                </div>
            <button class="nav-btn" style="margin-top:20px;" onclick="backToMain()">BACK</button>
        </div>

        <div id="shop" class="panel">
            <div id="shop-coins" style="color:#ffd700; margin-bottom:20px;"></div>
            <div class="shop-grid">
                <div class="shop-item" onclick="buyItem('atk')">ATK UP (500C)<br><small>攻撃力上昇</small></div>
                <div class="shop-item" onclick="buyItem('heal')">HP RECOVER (200C)<br><small>HP全回復</small></div>
                <div class="shop-item" onclick="buyItem('special')">BOMB (1000C)<br><small>必殺技ストック</small></div>
                <div class="shop-item" onclick="buyItem('aura_blue')">BLUE AURA (2000C)<br><small>青のオーラを纏う</small></div>
            </div>
            <button class="nav-btn" style="margin-top:20px;" onclick="backToMain()">BACK</button>
        </div>

        <div id="how-to" class="panel">
            <div id="guide-text">
                <h3>■ 操作方法</h3>
                ・マウス移動：自機の操縦<br>
                ・左クリック：ショット（想いの放流）<br>
                ・右クリック/スペース：必殺技（所持時のみ）<br><br>
                <h3>■ ゲームの仕組み</h3>
                各ステージは3つのフェーズで構成されます。第3フェーズの最後に現れるボスを撃破すればクリアです。
                敵を倒すとコインが手に入り、ショップで強化が可能です。
            </div>
            <button class="nav-btn" style="margin-top:20px;" onclick="backToMain()">BACK</button>
        </div>
    </div>

    <div id="msg" class="status-msg">PHASE 1</div>
    <canvas id="game"></canvas>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;

        // --- ゲーム状態管理 ---
        let gameActive = false, score = 0, hp = 100, frame = 0, phase = 1, phaseKills = 0;
        let bullets = [], eBullets = [], enemies = [], coins = [], particles = [];
        let player = { x: canvas.width/2, y: canvas.height/2 };
        let currentMode = null;

        // --- セーブデータ (Local Storage) ---
        let userData = JSON.parse(localStorage.getItem('minami_save_2026')) || {
            coins: 0,
            atkLevel: 1,
            unlocked: ['SB'],
            cleared: [],
            aura: 'none',
            bombs: 0
        };

        const save = () => localStorage.setItem('minami_save_2026', JSON.stringify(userData));

        // --- ステージ定義 (全15ステージ) ---
        const STAGES = {
            'SB': { name: 'ST=SB', color: '#ccaa00', stars: '★', difficulty: 1, bossHp: 50 },
            'KT': { name: 'ST=KT', color: '#0088cc', stars: '★', difficulty: 1.2, bossHp: 60 },
            'SK': { name: 'ST=SK', color: '#008844', stars: '★★', difficulty: 1.5, bossHp: 80 },
            'KY': { name: 'ST=KY', color: '#aa0022', stars: '★★★', difficulty: 2, bossHp: 100 },
            'PK': { name: 'ST=PK', color: '#cc5588', stars: '★★★', difficulty: 2.2, bossHp: 120 },
            'JB': { name: 'ST=JB', color: '#006666', stars: '★★★★', difficulty: 2.5, bossHp: 150 },
            'S1': { name: 'ST=S1', color: '#6600cc', stars: '★★★★', difficulty: 2.8, bossHp: 180 },
            'S2': { name: 'ST=S2', color: '#cc00cc', stars: '★★★★★', difficulty: 3, bossHp: 200 },
            'S3': { name: 'ST=S3', color: '#00cccc', stars: '★★★★★', difficulty: 3.5, bossHp: 250 },
            // 隠し（表）
            'HA': { name: 'ST=HA', color: '#CD7F32', stars: '★★★★★★', difficulty: 4.5, bossHp: 400, type: 'hidden' },
            'HB': { name: 'ST=HB', color: '#C0C0C0', stars: '★★★★★★★', difficulty: 5.5, bossHp: 600, type: 'hidden' },
            'HC': { name: 'ST=HC', color: '#FFD700', stars: '★★★★★★★★', difficulty: 7, bossHp: 800, type: 'hidden' },
            // 隠し（裏）
            'UA': { name: 'ST=UA', color: '#444444', stars: '★★★★★★★★★', difficulty: 9, bossHp: 1200, type: 'hidden_back' },
            'UB': { name: 'ST=UB', color: '#ffffff', stars: '★★★★★★★★★', difficulty: 11, bossHp: 1500, type: 'hidden_back' },
            // 隠し（真）
            'CO': { name: 'ST=CO', color: '#cc6600', stars: '★★★★★★★★★★', difficulty: 15, bossHp: 3000, type: 'ultimate' }
        };

        // --- UI 操作 ---
        function openPanel(id) {
            document.getElementById('main-nav').style.display = 'none';
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'stage-select') renderStages();
            if(id === 'shop') document.getElementById('shop-coins').innerText = `BALANCE: ${userData.coins} C`;
        }

        function backToMain() {
            document.getElementById('main-nav').style.display = 'flex';
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        }

        function renderStages() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            Object.keys(STAGES).forEach(id => {
                const s = STAGES[id];
                const btn = document.createElement('div');
                const isUnlocked = userData.unlocked.includes(id);
                btn.className = `mode-btn ${isUnlocked ? 'unlocked' : ''}`;
                btn.style.setProperty('--c', s.color);
                btn.innerHTML = `<div>${s.name}</div><div style="font-size:7px;">${s.stars}</div>`;
                if(isUnlocked) btn.onclick = () => startGame(id);
                grid.appendChild(btn);
            });
        }

        function buyItem(type) {
            if(type === 'atk' && userData.coins >= 500) { userData.coins -= 500; userData.atkLevel++; }
            if(type === 'heal' && userData.coins >= 200) { userData.coins -= 200; hp = 100; }
            if(type === 'aura_blue' && userData.coins >= 2000) { userData.coins -= 2000; userData.aura = 'cyan'; }
            save();
            openPanel('shop');
        }

        // --- ゲームロジック ---
        function startGame(id) {
            currentMode = { ...STAGES[id], id: id };
            document.getElementById('overlay').style.display = 'none';
            gameActive = true;
            score = 0; hp = 100; phase = 1; phaseKills = 0;
            enemies = []; bullets = []; eBullets = []; coins = [];
            showMsg("PHASE 1");
            loop();
        }

        function showMsg(t) {
            const m = document.getElementById('msg');
            m.innerText = t; m.style.opacity = 1;
            setTimeout(() => m.style.opacity = 0, 2000);
        }

        function spawnEnemy(isBoss = false) {
            const e = {
                x: Math.random() * canvas.width,
                y: -50,
                hp: isBoss ? currentMode.bossHp : 2 * currentMode.difficulty,
                maxHp: isBoss ? currentMode.bossHp : 2 * currentMode.difficulty,
                isBoss: isBoss,
                vx: (Math.random() - 0.5) * 2,
                vy: isBoss ? 1 : 2 + Math.random() * 2,
                size: isBoss ? 60 : 20
            };
            enemies.push(e);
        }

        function update() {
            frame++;
            // 自機移動
            if(currentMode.id === 'KY' && userData.aura !== 'cyan') player.x += Math.sin(frame/10)*5; // ギミック：風

            // ショット
            if(isDown && frame % 5 === 0) {
                bullets.push({ x: player.x, y: player.y - 15, power: userData.atkLevel });
            }

            // 敵生成
            if(!enemies.some(e => e.isBoss) && frame % 60 === 0) {
                if(phase < 3 || (phase === 3 && phaseKills < 10)) spawnEnemy();
            }

            // フェーズ進行
            if(phase < 3 && phaseKills >= 10) {
                phase++; phaseKills = 0;
                showMsg("PHASE " + phase);
            } else if(phase === 3 && phaseKills >= 10 && !enemies.some(e => e.isBoss)) {
                spawnEnemy(true);
                showMsg("BOSS ALERT");
            }

            // 当たり判定・移動
            bullets.forEach((b, i) => {
                b.y -= 15;
                enemies.forEach((e, ei) => {
                    if(Math.hypot(b.x - e.x, b.y - e.y) < e.size) {
                        e.hp -= b.power;
                        bullets.splice(i, 1);
                        if(e.hp <= 0) {
                            if(e.isBoss) finish(true);
                            userData.coins += 10;
                            phaseKills++;
                            enemies.splice(ei, 1);
                        }
                    }
                });
            });

            enemies.forEach(e => {
                e.x += e.vx; e.y += e.vy;
                if(e.isBoss && e.y > 100) e.vy = 0;
                if(Math.random() < 0.02 * currentMode.difficulty) {
                    eBullets.push({ x: e.x, y: e.y, vx: 0, vy: 5 });
                }
            });

            eBullets.forEach((eb, i) => {
                eb.y += eb.vy;
                if(Math.hypot(eb.x - player.x, eb.y - player.y) < 15) {
                    hp -= 10; eBullets.splice(i, 1);
                    if(hp <= 0) finish(false);
                }
            });

            document.getElementById('hp-fill').style.width = hp + "%";
            document.getElementById('coin-display').innerText = `COINS: ${userData.coins}`;
        }

        function draw() {
            ctx.fillStyle = "rgba(0, 8, 20, 0.3)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // プレイヤー & オーラ
            if(userData.aura !== 'none') {
                ctx.strokeStyle = userData.aura;
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(player.x, player.y, 25 + Math.sin(frame/5)*5, 0, Math.PI*2);
                ctx.stroke();
            }
            ctx.fillStyle = "#fff";
            ctx.beginPath(); ctx.arc(player.x, player.y, 10, 0, Math.PI*2); ctx.fill();

            // 敵
            enemies.forEach(e => {
                ctx.strokeStyle = e.isBoss ? "#ff0000" : currentMode.color;
                ctx.strokeRect(e.x - e.size/2, e.y - e.size/2, e.size, e.size);
                // ボスHPバー
                if(e.isBoss) {
                    ctx.fillStyle = "#440000"; ctx.fillRect(e.x-30, e.y-45, 60, 5);
                    ctx.fillStyle = "#ff0000"; ctx.fillRect(e.x-30, e.y-45, 60 * (e.hp/e.maxHp), 5);
                }
            });

            // 弾
            ctx.fillStyle = "#0ff"; bullets.forEach(b => ctx.fillRect(b.x-2, b.y, 4, 10));
            ctx.fillStyle = "#f0f"; eBullets.forEach(eb => ctx.beginPath() || ctx.arc(eb.x, eb.y, 4, 0, Math.PI*2) || ctx.fill());
        }

        function finish(clear) {
            gameActive = false;
            if(clear) {
                alert("STAGE CLEAR!");
                if(!userData.cleared.includes(currentMode.id)) {
                    userData.cleared.push(currentMode.id);
                    // 次のステージ解禁ロジック
                    const keys = Object.keys(STAGES);
                    const nextIdx = keys.indexOf(currentMode.id) + 1;
                    if(keys[nextIdx]) userData.unlocked.push(keys[nextIdx]);
                }
            } else {
                alert("GAME OVER");
            }
            save();
            location.reload();
        }

        function loop() { if(!gameActive) return; update(); draw(); requestAnimationFrame(loop); }

        let isDown = false;
        window.addEventListener('mousedown', () => isDown = true);
        window.addEventListener('mouseup', () => isDown = false);
        window.addEventListener('mousemove', e => { player.x = e.clientX; player.y = e.clientY; });

        renderStages();
    </script>
</body>
</html>
