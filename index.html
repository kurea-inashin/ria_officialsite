<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Minami Project 2026: The Eternal Rail - Refined</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+JP:wght@700;900&display=swap');
        
        body { margin: 0; background: #000; color: #fff; font-family: 'Press Start 2P', cursive; overflow: hidden; user-select: none; }
        canvas { display: block; }

        /* HUD */
        #hud { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; }
        #score-val { font-size: 24px; text-shadow: 0 0 10px #00ffff; margin-bottom: 10px; }
        .bar-label { font-size: 8px; margin-top: 10px; color: #aaa; }
        .bar-container { width: 250px; height: 14px; background: rgba(255,255,255,0.1); border: 2px solid #fff; border-radius: 7px; overflow: hidden; margin-bottom: 5px; }
        #hp-fill { height: 100%; background: linear-gradient(90deg, #ff0055, #00ffaa); width: 100%; transition: width 0.3s; }
        #bomb-stock { color: #ffff00; font-size: 14px; margin-top: 5px; }
        #gold-val { color:#ffd700; font-size:12px; margin-top:5px; }

        /* Menu System */
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,15,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 20; backdrop-filter: blur(8px); }
        .panel { display: none; flex-direction: column; align-items: center; width: 95%; max-height: 90vh; overflow-y: auto; }
        .active { display: flex; }
        .nav-btn { padding: 15px 30px; border: 3px solid #fff; background: rgba(255,255,255,0.1); color: #fff; cursor: pointer; font-family: 'Press Start 2P'; font-size: 11px; margin: 10px; transition: 0.2s; }
        .nav-btn:hover { background: #fff; color: #000; transform: scale(1.05); }

        .guide { font-size: 10px; color: #888; text-align: center; margin-bottom: 20px; line-height: 2; }

        /* Stage Grid */
        .mode-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; width: 100%; max-width: 1000px; padding: 20px; }
        .mode-btn { width: 100%; box-sizing: border-box; padding: 15px; border: 2px solid #333; background: #000; color: #444; cursor: pointer; text-align: left; font-size: 9px; transition: 0.3s; position: relative; }
        .mode-btn.unlocked { border-color: var(--c); color: var(--c); }
        .mode-btn.cleared { border-style: double; border-width: 6px; box-shadow: inset 0 0 10px var(--c); }
        .mode-btn.cleared::after { content: '✔ CLEAR'; font-size: 8px; position: absolute; top: 5px; right: 5px; color: #0f0; background: #000; padding: 2px; }

        /* Copyright */
        #copyright { position: absolute; bottom: 15px; width: 100%; text-align: center; font-size: 10px; color: rgba(255,255,255,0.4); pointer-events: none; z-index: 25; }
        .status-msg { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 32px; opacity: 0; transition: 0.4s; pointer-events: none; z-index: 50; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="hud" style="display:none;">
        <div id="score-val">SCORE: 000000</div>
        <div class="bar-label">SYSTEM STABILITY (HP)</div>
        <div class="bar-container"><div id="hp-fill"></div></div>
        <div id="bomb-stock">BOMBS: </div>
        <div id="gold-val">GOLD: 0</div>
    </div>

    <div id="overlay">
        <h1 style="font-size:28px; margin-bottom:10px; text-shadow: 0 0 15px #0088ff;">MINAMI PROJECT 2026</h1>
        <div class="guide">
            MOUSE: MOVE UNIT / LEFT-CLICK: FIRE<br>
            AUTO-BOMB TRIGGERS ON HIT (IF STOCK EXISTS)
        </div>
        
        <div id="main-nav" style="display: flex; flex-direction: column; align-items: center;">
            <button class="nav-btn" onclick="openPanel('stage-select')">SELECT MISSION</button>
            <button class="nav-btn" onclick="openPanel('garage')">GARAGE</button>
            <button class="nav-btn" onclick="openPanel('shop')">TECH SHOP</button>
        </div>

        <div id="stage-select" class="panel">
            <h2 style="font-size:16px; color:#0ff;">STRATEGIC MAP</h2>
            <div class="mode-grid" id="grid"></div>
            <button class="nav-btn" style="margin-top:20px;" onclick="backToMain()">RETURN</button>
        </div>

        <div id="briefing-panel" class="panel">
            <div id="briefing" style="background: rgba(0, 10, 30, 0.95); border: 4px solid #0088ff; padding: 30px; max-width: 700px;">
                <div id="brief-title" style="font-size: 22px; margin-bottom: 20px; border-bottom: 2px solid #00ffff; padding-bottom: 10px; text-align: center;">MISSION BRIEFING</div>
                <div id="brief-desc" style="font-family: 'Noto Sans JP'; font-size: 14px; line-height: 1.8; color: #ddd; margin-bottom: 25px;"></div>
                <div style="display: flex; justify-content: space-evenly;">
                    <button id="start-btn" class="nav-btn" style="border-color: #0f0;">LAUNCH</button>
                    <button class="nav-btn" onclick="openPanel('stage-select')" style="border-color: #f00;">CANCEL</button>
                </div>
            </div>
        </div>

        <div id="garage" class="panel">
            <h2>GARAGE</h2>
            <div id="garage-list" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;"></div>
            <button class="nav-btn" style="margin-top:30px;" onclick="backToMain()">RETURN</button>
        </div>

        <div id="shop" class="panel">
            <div id="shop-gold-display" style="color:#ffd700; font-size:20px; margin-bottom:20px;"></div>
            <div id="weapon-shop" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:20px;"></div>
            <button class="nav-btn" onclick="backToMain()">RETURN</button>
        </div>

        <div id="copyright">© 2026 MINAMI PROJECT. ALL RIGHTS RESERVED.</div>
    </div>

    <div id="msg" class="status-msg"></div>
    <canvas id="game"></canvas>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;

        let gameActive = false, score = 0, hp = 100, frame = 0;
        let bullets = [], eBullets = [], enemies = [];
        let player = { x: canvas.width/2, y: canvas.height/2, targetX: canvas.width/2, targetY: canvas.height/2 };
        let currentMode = null, isDown = false;

        const SAVE_KEY = 'minami_2026_rail_v2';
        const NORMAL_STAGES = ['SB', 'KT', 'SK', 'KY', 'PK', 'JB', 'S1', 'S2', 'S3'];

        let userData = JSON.parse(localStorage.getItem(SAVE_KEY)) || {
            gold: 0, bombs: 2, unlocked: [...NORMAL_STAGES], cleared: [], skin: '#fff', licenses: ['#fff']
        };

        const STAGES = {
            'SB': { name: 'ST=SB', color: '#ccaa00', stars: 1, diff: 1, reward: 2000, bossHp: 500, score2: 12000, gimmick: 'vibrate', hint: '【総武緩行】激しい震動が発生。' },
            'KT': { name: 'ST=KT', color: '#0088cc', stars: 1, diff: 1.2, reward: 2500, bossHp: 700, score2: 15000, gimmick: 'water', hint: '【京浜東北】水圧エリア。移動低下。' },
            'SK': { name: 'ST=SK', color: '#008844', stars: 2, diff: 1.5, reward: 3500, bossHp: 900, score2: 20000, gimmick: 'fog', hint: '【埼京】濃霧エリア。' },
            'KY': { name: 'ST=KY', color: '#aa0022', stars: 2, diff: 2.0, reward: 4500, bossHp: 1200, score2: 25000, gimmick: 'wind', hint: '【京葉】強風。' },
            'PK': { name: 'ST=PK', color: '#cc5588', stars: 3, diff: 2.2, reward: 5500, bossHp: 1500, score2: 30000, gimmick: 'reverse', hint: '【電磁界】操作反転。' },
            'JB': { name: 'ST=JB', color: '#006666', stars: 3, diff: 2.5, reward: 6500, bossHp: 1800, score2: 35000, gimmick: 'jamming', hint: '【妨害電波】弾速変化。' },
            'S1': { name: 'ST=S1', color: '#6600cc', stars: 4, diff: 3.0, reward: 8000, bossHp: 2200, score2: 45000, gimmick: 'warp', hint: '【空間歪曲】弾丸ワープ。' },
            'S2': { name: 'ST=S2', color: '#cc00cc', stars: 4, diff: 3.5, reward: 9000, bossHp: 2800, score2: 55000, gimmick: 'poison', hint: '【猛毒】常時ダメージ。' },
            'S3': { name: 'ST=S3', color: '#00cccc', stars: 5, diff: 4.0, reward: 12000, bossHp: 3500, score2: 70000, gimmick: 'gravity', hint: '【超重力】慣性増大。' },
            'CO': { name: 'ST=CO', color: '#ff6600', stars: 30, diff: 60, reward: 150000, secret: true, hint: '【中央特快】最終領域。' }
        };

        const WEAPONS = [
            { id: '#fff', name: 'WHITE [STD]', cost: 0, p: 2 },
            { id: '#0f0', name: 'GREEN [SAIKYO]', cost: 5000, p: 1.5 },
            { id: '#0ff', name: 'CYAN [KEIHIN]', cost: 8000, p: 1.8 },
            { id: '#aa0022', name: 'RED [KEIYO]', cost: 15000, p: 5.0 },
            { id: 'bomb', name: 'BOMB STOCK', cost: 2000, p: 0 } // ショップでボムを補充
        ];

        function save() { localStorage.setItem(SAVE_KEY, JSON.stringify(userData)); refreshHUD(); }
        function refreshHUD() {
            document.getElementById('gold-val').innerText = `GOLD: ${userData.gold}`;
            document.getElementById('bomb-stock').innerText = `BOMBS: ${"★".repeat(userData.bombs)}`;
            document.getElementById('shop-gold-display').innerText = `GOLD: ${userData.gold}`;
        }

        function renderStages() {
            const grid = document.getElementById('grid'); grid.innerHTML = '';
            if(NORMAL_STAGES.every(id => userData.cleared.includes(id))) !userData.unlocked.includes('CO') && userData.unlocked.push('CO');
            Object.keys(STAGES).forEach(id => {
                if(STAGES[id].secret && !userData.unlocked.includes(id)) return;
                const s = STAGES[id];
                const btn = document.createElement('div');
                btn.className = `mode-btn unlocked ${userData.cleared.includes(id) ? 'cleared' : ''}`;
                btn.style.setProperty('--c', s.color);
                btn.innerHTML = `<b>${s.name}</b><br><span style="color:#ff0">★${s.stars}</span>`;
                btn.onclick = () => openBriefing(id);
                grid.appendChild(btn);
            });
        }

        function openBriefing(id) {
            const s = STAGES[id];
            document.getElementById('brief-title').innerText = `MISSION: ${s.name}`;
            document.getElementById('brief-title').style.color = s.color;
            document.getElementById('brief-desc').innerText = s.hint + `\n報酬: ${s.reward} GOLD`;
            document.getElementById('start-btn').onclick = () => startGame(id);
            openPanel('briefing-panel');
        }

        function renderShop() {
            const shopList = document.getElementById('weapon-shop'); shopList.innerHTML = '';
            WEAPONS.forEach(w => {
                const isOwned = w.id !== 'bomb' && userData.licenses.includes(w.id);
                const btn = document.createElement('button');
                btn.className = 'nav-btn';
                btn.style.borderColor = isOwned ? '#333' : (w.id === 'bomb' ? '#ff0' : w.id);
                btn.innerHTML = isOwned ? `SOLD OUT` : `${w.name}<br>${w.cost}G`;
                btn.disabled = (isOwned || userData.gold < w.cost);
                btn.onclick = () => {
                    userData.gold -= w.cost;
                    if(w.id === 'bomb') userData.bombs++;
                    else userData.licenses.push(w.id);
                    save(); renderShop();
                };
                shopList.appendChild(btn);
            });
        }

        function openPanel(id) {
            document.getElementById('main-nav').style.display = 'none';
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'stage-select') renderStages();
            if(id === 'garage') renderGarage();
            if(id === 'shop') renderShop();
        }

        function renderGarage() {
            const list = document.getElementById('garage-list'); list.innerHTML = '';
            WEAPONS.forEach(w => {
                if(w.id === 'bomb') return;
                const isOwned = userData.licenses.includes(w.id);
                const btn = document.createElement('button');
                btn.className = 'nav-btn';
                btn.style.borderColor = isOwned ? w.id : '#222';
                btn.innerHTML = isOwned ? w.name : 'LOCKED';
                if(isOwned) btn.onclick = () => { userData.skin = w.id; save(); showMsg("EQUIPPED", w.id); };
                list.appendChild(btn);
            });
        }

        function backToMain() {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.getElementById('main-nav').style.display = 'flex';
        }

        function showMsg(t, color) {
            const m = document.getElementById('msg');
            m.innerText = t; m.style.color = color; m.style.opacity = 1;
            setTimeout(() => m.style.opacity = 0, 2000);
        }

        function startGame(id) {
            currentMode = { ...STAGES[id], id: id };
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('hud').style.display = 'block';
            gameActive = true; score = 0; hp = 100; frame = 0;
            enemies = []; bullets = []; eBullets = [];
            player.x = canvas.width/2; player.y = canvas.height/2;
            loop();
        }

        function finish(clear) {
            gameActive = false;
            if(clear) {
                if(!userData.cleared.includes(currentMode.id)) userData.cleared.push(currentMode.id);
                userData.gold += currentMode.reward;
                save();
                alert(`MISSION SUCCESS!\nGOLD +${currentMode.reward}`);
            } else alert("MISSION FAILED...");
            location.reload();
        }

        function update() {
            frame++;
            let moveSpeed = 0.2;
            let tx = player.targetX, ty = player.targetY;
            
            // ギミック
            if(currentMode.gimmick === 'reverse') { tx = canvas.width - tx; ty = canvas.height - ty; }
            if(currentMode.gimmick === 'gravity') moveSpeed = 0.05;
            if(currentMode.gimmick === 'water') moveSpeed = 0.1;
            player.x += (tx - player.x) * moveSpeed;
            player.y += (ty - player.y) * moveSpeed;
            if(currentMode.gimmick === 'wind') player.x -= 3.5;
            if(currentMode.gimmick === 'vibrate') { player.x += (Math.random()-0.5)*10; player.y += (Math.random()-0.5)*10; }
            if(currentMode.gimmick === 'poison' && frame % 60 === 0) hp -= 2;

            // 射撃 (小型化弾)
            if(isDown && frame % 6 === 0) {
                const s = userData.skin;
                let power = WEAPONS.find(w => w.id === s).p;
                bullets.push({ x: player.x, y: player.y-15, p: power, vy: -18, w: 4 });
            }

            // 敵生成 (小型化)
            if(!enemies.some(e => e.isBoss) && frame % 30 === 0) {
                enemies.push({ x: Math.random()*canvas.width, y: -30, hp: 15*currentMode.diff, size: 20, vy: 3 + currentMode.diff/2 });
            }
            if(score >= currentMode.score2 && !enemies.some(e => e.isBoss)) {
                enemies.push({ x: canvas.width/2, y: -100, hp: currentMode.bossHp, maxHp: currentMode.bossHp, size: 80, vy: 1, isBoss: true });
            }

            // 衝突とボム
            bullets.forEach((b, i) => {
                b.y += b.vy;
                if(b.y < -50) bullets.splice(i, 1);
                enemies.forEach((e, ei) => {
                    if(Math.hypot(b.x-e.x, b.y-e.y) < e.size) {
                        e.hp -= b.p; bullets.splice(i, 1);
                        if(e.hp <= 0) {
                            if(e.isBoss) finish(true);
                            else { score += 500; userData.gold += 10; enemies.splice(ei, 1); }
                        }
                    }
                });
            });

            eBullets.forEach((eb, i) => {
                eb.y += eb.vy;
                if(Math.hypot(eb.x-player.x, eb.y-player.y) < 15) {
                    if(userData.bombs > 0) {
                        userData.bombs--; eBullets = []; enemies = enemies.filter(en => en.isBoss);
                        showMsg("AUTO-BOMB!", "#ff0"); save();
                    } else { hp -= 20; eBullets.splice(i, 1); if(hp <= 0) finish(false); }
                }
                if(eb.y > canvas.height + 50) eBullets.splice(i, 1);
            });

            enemies.forEach(e => {
                e.y += e.vy; if(e.isBoss && e.y > 150) e.vy = 0;
                if(Math.random() < 0.04 * currentMode.diff) eBullets.push({ x: e.x, y: e.y, vy: 6 + currentMode.diff });
            });

            document.getElementById('hp-fill').style.width = Math.max(0, hp) + "%";
            document.getElementById('score-val').innerText = `SCORE: ${score.toString().padStart(6, '0')}`;
        }

        function draw() {
            ctx.fillStyle = "#001"; ctx.fillRect(0,0,canvas.width, canvas.height);
            // 自機小型化
            ctx.fillStyle = userData.skin; ctx.beginPath();
            ctx.moveTo(player.x, player.y - 12); ctx.lineTo(player.x + 10, player.y + 8); ctx.lineTo(player.x - 10, player.y + 8);
            ctx.fill();
            // 敵小型化
            enemies.forEach(e => { ctx.strokeStyle = currentMode.color; ctx.lineWidth=2; ctx.strokeRect(e.x-e.size/2, e.y-e.size/2, e.size, e.size); });
            bullets.forEach(b => { ctx.fillStyle = userData.skin; ctx.fillRect(b.x-b.w/2, b.y, b.w, 12); });
            eBullets.forEach(eb => { ctx.fillStyle = "#f0f"; ctx.beginPath(); ctx.arc(eb.x, eb.y, 5, 0, Math.PI*2); ctx.fill(); });
        }

        function loop() { if(!gameActive) return; update(); draw(); requestAnimationFrame(loop); }
        window.onmousedown = () => isDown = true;
        window.onmouseup = () => isDown = false;
        window.onmousemove = e => { player.targetX = e.clientX; player.targetY = e.clientY; };
        refreshHUD();
    </script>
</body>
</html>
