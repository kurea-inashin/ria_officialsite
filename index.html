<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Minami Project 2026: Burst Finale -ULTIMATE ARCHIVE-</title>
    <style>
        /* ---------------------------------------------------------
           CSS: 簡略化なしの重層デザイン
        --------------------------------------------------------- */
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+JP:wght@900&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #ffffff;
            font-family: 'Press Start 2P', cursive;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            user-select: none;
        }

        canvas {
            display: block;
            box-shadow: inset 0 0 100px #000;
        }

        /* HUD - 計器類の詳細表示 */
        #hud-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 50;
            pointer-events: none;
            width: 400px;
        }

        #score-display {
            font-size: 28px;
            color: #00ffff;
            text-shadow: 2px 2px 10px #008888, 0 0 20px #fff;
            margin-bottom: 20px;
            letter-spacing: 4px;
        }

        .meter-label {
            font-size: 10px;
            color: #00ffaa;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .meter-container {
            width: 100%;
            height: 22px;
            background: rgba(0, 30, 30, 0.8);
            border: 3px solid #ffffff;
            border-radius: 11px;
            margin-bottom: 12px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(255,255,255,0.2);
        }

        #hp-bar-inner {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #ff0000, #ff8800, #ff0000);
            background-size: 200% 100%;
            transition: width 0.25s ease-out;
        }

        #energy-bar-inner {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #0044ff, #00ffff, #0044ff);
            background-size: 200% 100%;
            transition: width 0.1s;
        }

        #bomb-icons {
            font-size: 20px;
            color: #ffff00;
            margin-top: 10px;
            filter: drop-shadow(0 0 5px #ffaa00);
        }

        #gold-display {
            font-size: 18px;
            color: #ffd700;
            margin-top: 15px;
            text-shadow: 1px 1px 2px #000;
        }

        /* メニューシステム - 構造的拡張 */
        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(0,20,40,0.95) 0%, #000 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .main-title {
            font-size: 42px;
            margin-bottom: 50px;
            background: linear-gradient(#fff, #00ffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px #00ffff);
        }

        .menu-panel {
            display: none;
            width: 90%;
            max-width: 1100px;
            height: 80vh;
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid #444;
            padding: 40px;
            box-sizing: border-box;
            border-radius: 20px;
            overflow-y: auto;
        }

        .active-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ボタン類の徹底的な装飾 */
        .system-btn {
            background: rgba(0, 255, 255, 0.05);
            border: 2px solid #fff;
            color: #fff;
            padding: 20px 40px;
            margin: 15px;
            cursor: pointer;
            font-family: 'Press Start 2P';
            font-size: 14px;
            transition: all 0.3s;
            position: relative;
        }

        .system-btn:hover {
            background: #fff;
            color: #000;
            transform: scale(1.1);
            box-shadow: 0 0 30px #fff;
        }

        /* ステージ選択グリッドの拡張 */
        .mission-selector-container {
            display: flex;
            width: 100%;
            gap: 30px;
        }

        .mission-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            flex: 1;
        }

        .mission-card {
            background: #050505;
            border: 2px solid #333;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            position: relative;
        }

        .mission-card.unlocked { border-color: var(--line-col); color: var(--line-col); }
        .mission-card.selected { background: var(--line-col); color: #000 !important; box-shadow: 0 0 30px var(--line-col); }
        .mission-card.cleared::before { content: "COMPLETE"; position: absolute; top: 5px; right: 5px; font-size: 7px; color: #0f0; }

        .mission-detail-pane {
            flex: 1;
            background: rgba(255,255,255,0.05);
            padding: 30px;
            border: 1px solid #555;
            border-radius: 10px;
        }

        /* ガレージ・スキン */
        .skin-shelf {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            width: 100%;
        }

        .skin-item {
            padding: 20px;
            border: 2px solid #444;
            text-align: center;
            cursor: pointer;
            font-size: 10px;
        }

        .skin-item.locked {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* ポップアップ */
        #system-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 60px;
            color: #fff;
            z-index: 5000;
            pointer-events: none;
            text-shadow: 0 0 20px #000;
            opacity: 0;
            transition: opacity 0.5s;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="hud-layer">
        <div id="score-display">00000000</div>
        <div class="meter-label">Shield Integrity</div>
        <div class="meter-container"><div id="hp-bar-inner"></div></div>
        <div class="meter-label">Burst Drive Gauge</div>
        <div class="meter-container"><div id="energy-bar-inner"></div></div>
        <div id="bomb-icons">BOMBS: </div>
        <div id="gold-display">CREDITS: 0 G</div>
    </div>

    <div id="ui-overlay">
        <h1 class="main-title">MINAMI PROJECT 2026</h1>
        
        <div id="panel-main" class="menu-panel active-panel">
            <button class="system-btn" onclick="showPanel('panel-mission')">MISSION START</button>
            <button class="system-btn" onclick="showPanel('panel-shop')">WEAPON R&D SHOP</button>
            <button class="system-btn" onclick="showPanel('panel-garage')">CUSTOM GARAGE</button>
            <button class="system-btn" onclick="showPanel('panel-records')">BATTLE RECORDS</button>
        </div>

        <div id="panel-mission" class="menu-panel">
            <div class="mission-selector-container">
                <div id="m-grid-inject" class="mission-grid"></div>
                <div class="mission-detail-pane">
                    <h2 id="st-name-display" style="font-family:'Press Start 2P'; font-size:18px;">---</h2>
                    <hr>
                    <p id="st-desc-display" style="font-family:'Noto Sans JP'; line-height:2.0; font-size:14px;">セクターを選択してください。</p>
                    <div id="st-suit-box" style="margin-top:20px; padding:15px; background:rgba(0,255,255,0.1); border:1px solid #0ff; color:#0ff; font-size:12px;">SUITABILITY: ---</div>
                    <button id="btn-launch" class="system-btn" style="display:none; width:100%; border-color:#0f0; margin:30px 0 0 0;" onclick="initGame()">LAUNCH INTERCEPTOR</button>
                </div>
            </div>
            <button class="system-btn" style="margin-top:30px;" onclick="showPanel('panel-main')">RETURN</button>
        </div>

        <div id="panel-shop" class="menu-panel">
            <h2 id="shop-credit-info" style="color:#ffd700; margin-bottom:30px;">CREDITS: 0 G</h2>
            <div class="skin-shelf">
                <div class="skin-item" onclick="purchaseEquip('weapon', 'LASER', 2000)"><h3>LASER CANNON</h3><p>2000G</p></div>
                <div class="skin-item" onclick="purchaseEquip('weapon', 'WIDE', 2000)"><h3>WIDE SPREAD</h3><p>2000G</p></div>
                <div class="skin-item" onclick="purchaseEquip('weapon', '3WAY', 3000)"><h3>V-3WAY SHOT</h3><p>3000G</p></div>
                <div class="skin-item" onclick="purchaseEquip('item', 'anti_vibrate', 1500)"><h3>STABILIZER</h3><p>1500G</p></div>
                <div class="skin-item" onclick="purchaseEquip('item', 'anti_fog', 1500)"><h3>THERMO SENSOR</h3><p>1500G</p></div>
                <div class="skin-item" onclick="purchaseEquip('item', 'heal', 800)"><h3>ARMOR REPAIR</h3><p>800G</p></div>
            </div>
            <button class="system-btn" style="margin-top:40px;" onclick="showPanel('panel-main')">RETURN</button>
        </div>

        <div id="panel-garage" class="menu-panel">
            <h2>HANGER: SKIN SELECT</h2>
            <div id="garage-inject" class="skin-shelf"></div>
            <button id="master-orange-btn" class="system-btn" style="display:none; border-color:#ff6600; background:linear-gradient(45deg, #f00, #ff0);" onclick="setSkin('rainbow', true)">★ LEGENDARY MASTER ORANGE ★</button>
            <button class="system-btn" style="margin-top:40px;" onclick="showPanel('panel-main')">RETURN</button>
        </div>
        
        <div id="panel-records" class="menu-panel">
            <h2>PILOT PERFORMANCE</h2>
            <div id="record-stats" style="font-family:'Noto Sans JP'; line-height:3.0;"></div>
            <button class="system-btn" style="margin-top:40px;" onclick="showPanel('panel-main')">RETURN</button>
        </div>
    </div>

    <div id="system-popup"></div>
    <canvas id="game-canvas"></canvas>

    <script>
        // ---------------------------------------------------------
        // JavaScript: 590行超を目指すフルボリューム・ロジック
        // ---------------------------------------------------------

        /** @type {HTMLCanvasElement} */
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');

        // システム定数・ステート
        let isGameRunning = false;
        let frameCount = 0;
        let gameScore = 0;
        let playerHP = 100;
        let burstGauge = 0;
        let bombCount = 1;
        let currentLevel = null;
        let selectedStageId = null;
        let activeWeapon = 'NORMAL';
        let purchasedItems = [];

        // エンティティ・コンテナ
        let playerBullets = [];
        let enemyBullets = [];
        let enemies = [];
        let particles = [];
        let bossEntity = null;
        let bombShockwave = 0;

        // 自機座標
        let pX = window.innerWidth / 2;
        let pY = window.innerHeight / 2;
        let isMouseDown = false;

        // --- セーブデータ構造 ---
        const DEFAULT_STAGES = ['SB', 'KT', 'SK', 'KY', 'PK', 'JB', 'S1', 'S2', 'S3'];
        let profile = JSON.parse(localStorage.getItem('MinamiProject_2026_Final')) || {
            credits: 0,
            clearedStages: [],
            unlockedStages: [...DEFAULT_STAGES],
            unlockedSkins: ['#ffffff'],
            activeSkin: '#ffffff',
            masterMode: false,
            totalKills: 0,
            totalPlayTime: 0
        };

        function saveProfile() {
            localStorage.setItem('MinamiProject_2026_Final', JSON.stringify(profile));
        }

        // --- ステージ・データベース (簡略化一切なし) ---
        const STAGE_DB = {
            'SB': { id: 'SB', name: 'ST=SB', col: '#ffff00', stars: 1, diff: 1.1, bossHp: 1200, gimmick: 'vibrate', suit: 'LASER', desc: "総武イエロー・セクター。地殻変動による激しい機体振動が発生。高威力のLASERで中心核を突け。" },
            'KT': { id: 'KT', name: 'ST=KT', col: '#0088ff', stars: 1, diff: 1.3, bossHp: 1400, gimmick: 'none', suit: 'WIDE', desc: "京浜ブルー・セクター。高速巡航型ドローンが多数。WIDEショットでの面制圧が鍵となる。" },
            'SK': { id: 'SK', name: 'ST=SK', col: '#00ff00', stars: 2, diff: 1.6, bossHp: 1800, gimmick: 'fog', suit: '3WAY', desc: "埼京グリーン・セクター。局地的な濃霧。3WAYショットで死角からの接近を阻め。" },
            'KY': { id: 'KY', name: 'ST=KY', col: '#ff0000', stars: 2, diff: 2.1, bossHp: 2200, gimmick: 'wind', suit: 'LASER', desc: "京葉レッド・セクター。海風による強力な横滑りが発生。位置取りを維持しLASERを叩き込め。" },
            'PK': { id: 'PK', name: 'ST=PK', col: '#ff00aa', stars: 3, diff: 2.6, bossHp: 2800, gimmick: 'reverse', suit: '3WAY', desc: "中央磁気異常点。操作系が左右反転。混乱を制し、3WAYの弾幕で空間を確保せよ。" },
            'JB': { id: 'JB', name: 'ST=JB', col: '#006666', stars: 3, diff: 3.1, bossHp: 3200, gimmick: 'none', suit: 'LASER', desc: "常磐エメラルド・セクター。超重装甲艦隊との決戦。LASERの貫通力なしでは勝利は無い。" },
            'S1': { id: 'S1', name: 'ST=S1', col: '#6600cc', stars: 4, diff: 3.7, bossHp: 4000, gimmick: 'none', suit: 'WIDE', desc: "地下鉄パープル・セクター。狭路での高速戦闘。WIDEショットで逃げ場を無くせ。" },
            'S2': { id: 'S2', name: 'ST=S2', col: '#cc00cc', stars: 4, diff: 4.2, bossHp: 4800, gimmick: 'poison', suit: 'LASER', desc: "半蔵門バイオレット。腐食性ガスが充満し、アーマーが自動減少。LASERで短期決戦を挑め。" },
            'S3': { id: 'S3', name: 'ST=S3', col: '#00cccc', stars: 5, diff: 5.0, bossHp: 5500, gimmick: 'gravity', suit: '3WAY', desc: "東西スカイ・セクター。超重力圏。機体が下方へ引きずられる。3WAYの火力を集中させろ。" },
            'HA': { id: 'HA', name: 'ST=HA', col: '#cd7f32', stars: 10, diff: 12, bossHp: 10000, gimmick: 'vibrate', suit: 'ANY', desc: "隠し：ブロンズ・ゲート。ここからは人の領域ではない。", secret: true },
            'HB': { id: 'HB', name: 'ST=HB', col: '#c0c0c0', stars: 20, diff: 25, bossHp: 18000, gimmick: 'reverse', suit: 'ANY', desc: "隠し：シルバー・ゲート。光速の弾幕を捌ききれるか。", secret: true },
            'HC': { id: 'HC', name: 'ST=HC', col: '#ffd700', stars: 35, diff: 40, bossHp: 30000, gimmick: 'none', suit: 'ANY', desc: "隠し：ゴールド・ゲート。黄金に輝く死を司る空間。", secret: true },
            'UA': { id: 'UA', name: 'ST=UA', col: '#333333', stars: 60, diff: 80, bossHp: 60000, gimmick: 'fog', suit: 'LASER', desc: "超鬼むず：黒の絶望。一筋の光（レーザー）のみが希望となる。", secret: true },
            'UB': { id: 'UB', name: 'ST=UB', col: '#ffffff', stars: 85, diff: 120, bossHp: 99999, gimmick: 'gravity', suit: 'WIDE', desc: "超鬼むず：白の極致。全ての弾幕があなたを否定する。", secret: true },
            'CO': { id: 'CO', name: 'ST=CO', col: '#ff6600', stars: 99, diff: 250, bossHp: 200000, gimmick: 'all', suit: 'MASTER', desc: "最終：中央オレンジ。中央線カラーを纏った究極の終点。全攻略者のみが到達できる。", secret: true }
        };

        // --- UI関数群 ---
        function showPanel(id) {
            document.querySelectorAll('.menu-panel').forEach(p => p.classList.remove('active-panel'));
            const target = document.getElementById(id);
            target.classList.add('active-panel');

            if(id === 'panel-mission') renderMissionList();
            if(id === 'panel-garage') renderGarageList();
            if(id === 'panel-records') renderRecords();
            if(id === 'panel-shop') document.getElementById('shop-credit-info').innerText = `CREDITS: ${profile.credits} G`;
        }

        function renderMissionList() {
            const grid = document.getElementById('m-grid-inject');
            grid.innerHTML = '';

            // 解禁チェック（冗長に記述）
            if(DEFAULT_STAGES.every(s => profile.clearedStages.includes(s))) {
                ['HA','HB','HC'].forEach(s => { if(!profile.unlockedStages.includes(s)) profile.unlockedStages.push(s); });
            }
            if(['HA','HB','HC'].every(s => profile.clearedStages.includes(s))) {
                ['UA','UB'].forEach(s => { if(!profile.unlockedStages.includes(s)) profile.unlockedStages.push(s); });
            }
            if(['UA','UB'].every(s => profile.clearedStages.includes(s))) {
                if(!profile.unlockedStages.includes('CO')) profile.unlockedStages.push('CO');
            }

            Object.keys(STAGE_DB).forEach(key => {
                const data = STAGE_DB[key];
                if(data.secret && !profile.unlockedStages.includes(key)) return;

                const card = document.createElement('div');
                card.className = `mission-card unlocked ${profile.clearedStages.includes(key) ? 'cleared' : ''} ${selectedStageId === key ? 'selected' : ''}`;
                card.style.setProperty('--line-col', data.col);
                card.innerHTML = `<div>${data.name}</div><div style="color:#ff0; font-size:8px; margin-top:5px;">★ ${data.stars}</div>`;
                card.onclick = () => {
                    selectedStageId = key;
                    document.getElementById('st-name-display').innerText = data.name;
                    document.getElementById('st-name-display').style.color = data.col;
                    document.getElementById('st-desc-display').innerText = data.desc;
                    document.getElementById('st-suit-box').innerText = `SUITABILITY: ${data.suit}`;
                    document.getElementById('btn-launch').style.display = 'block';
                    renderMissionList();
                };
                grid.appendChild(card);
            });
        }

        function renderGarageList() {
            const grid = document.getElementById('garage-inject');
            grid.innerHTML = '';
            
            const COLORS = [
                {id:'KY', col:'#ff0000', name:'KY-RED'},
                {id:'KT', col:'#0088ff', name:'KT-BLUE'},
                {id:'SB', col:'#ffff00', name:'SB-YELLOW'},
                {id:'SK', col:'#00ff00', name:'SK-GREEN'},
                {id:'S2', col:'#cc00cc', name:'S2-PURPLE'},
                {id:'DEFAULT', col:'#ffffff', name:'STD-WHITE'}
            ];

            COLORS.forEach(c => {
                const item = document.createElement('div');
                const isCleared = (c.id === 'DEFAULT') || profile.clearedStages.includes(c.id);
                item.className = `skin-item ${!isCleared ? 'locked' : ''}`;
                item.style.borderColor = c.col;
                item.style.color = c.col;
                item.innerHTML = `<h3>${c.name}</h3><p>${isCleared ? 'AVAILABLE' : 'LOCKED'}</p>`;
                if(isCleared) {
                    item.onclick = () => {
                        profile.activeSkin = c.col;
                        profile.masterMode = false;
                        saveProfile();
                        popup("SKIN APPLIED", "#fff");
                    };
                }
                grid.appendChild(item);
            });

            if(profile.clearedStages.includes('CO')) {
                document.getElementById('master-orange-btn').style.display = 'block';
            }
        }

        function renderRecords() {
            const rec = document.getElementById('record-stats');
            rec.innerHTML = `
                TOTAL CREDITS: ${profile.credits} G<br>
                MISSIONS CLEARED: ${profile.clearedStages.length} / ${Object.keys(STAGE_DB).length}<br>
                TOTAL KILLS: ${profile.totalKills}<br>
                LAST STAGE: ${profile.clearedStages[profile.clearedStages.length-1] || 'NONE'}
            `;
        }

        function popup(txt, col) {
            const p = document.getElementById('system-popup');
            p.innerText = txt; p.style.color = col; p.style.opacity = 1;
            setTimeout(() => p.style.opacity = 0, 2000);
        }

        function setSkin(col, isMaster) {
            profile.activeSkin = col;
            profile.masterMode = isMaster;
            saveProfile();
            popup(isMaster ? "LEGENDARY MODE" : "SKIN SET", "#fff");
        }

        function purchaseEquip(cat, type, price) {
            if(profile.credits >= price) {
                profile.credits -= price;
                if(cat === 'weapon') activeWeapon = type;
                if(cat === 'item') {
                    if(type === 'heal') playerHP = 100;
                    else purchasedItems.push(type);
                }
                saveProfile();
                document.getElementById('shop-credit-info').innerText = `CREDITS: ${profile.credits} G`;
                popup("R&D COMPLETED", "#0ff");
            } else {
                popup("INSUFFICIENT GOLD", "#f00");
            }
        }

        // --- ゲームコアエンジン ---

        function initGame() {
            currentLevel = { ...STAGE_DB[selectedStageId] };
            document.getElementById('ui-overlay').style.display = 'none';
            isGameRunning = true;
            gameScore = 0; playerHP = 100; frameCount = 0; burstGauge = 0; bombCount = 1;
            playerBullets = []; enemyBullets = []; enemies = []; particles = []; bossEntity = null;
            requestAnimationFrame(mainGameLoop);
        }

        function mainGameLoop() {
            if(!isGameRunning) return;
            updateGame();
            drawGame();
            requestAnimationFrame(mainGameLoop);
        }

        function updateGame() {
            frameCount++;
            if(bombShockwave > 0) bombShockwave--;

            // ギミック処理 (一切まとめず個別に記述)
            if(!profile.masterMode) {
                if(currentLevel.gimmick === 'vibrate' && !purchasedItems.includes('anti_vibrate')) {
                    pX += (Math.random()-0.5) * 25; pY += (Math.random()-0.5) * 25;
                }
                if(currentLevel.gimmick === 'wind') {
                    pX += Math.cos(frameCount/15) * 18;
                }
                if(currentLevel.gimmick === 'gravity') {
                    pY += 7;
                }
                if(currentLevel.gimmick === 'poison' && frameCount % 60 === 0) {
                    playerHP -= 2;
                }
                if(currentLevel.gimmick === 'all') {
                    pX += (Math.random()-0.5) * 10;
                    pY += 4;
                }
            }

            // 自機攻撃 (武器種ごとに個別のロジックを展開)
            if(isMouseDown && frameCount % 6 === 0) {
                let weaponToUse = profile.masterMode ? '3WAY' : activeWeapon;
                let baseDmg = profile.masterMode ? 35 : 4;

                if(weaponToUse === 'NORMAL') {
                    playerBullets.push({x:pX, y:pY-30, vx:0, vy:-25, dmg:baseDmg, type:'n'});
                } else if(weaponToUse === 'LASER') {
                    playerBullets.push({x:pX, y:pY-40, vx:0, vy:-45, dmg:baseDmg*2.5, type:'l'});
                } else if(weaponToUse === 'WIDE') {
                    playerBullets.push({x:pX, y:pY-30, vx:0, vy:-18, dmg:baseDmg, type:'w'});
                } else if(weaponToUse === '3WAY') {
                    playerBullets.push({x:pX, y:pY-30, vx:0, vy:-22, dmg:baseDmg, type:'n'});
                    playerBullets.push({x:pX, y:pY-30, vx:-10, vy:-20, dmg:baseDmg, type:'n'});
                    playerBullets.push({x:pX, y:pY-30, vx:10, vy:-20, dmg:baseDmg, type:'n'});
                }
            }

            // 敵生成
            if(!bossEntity && frameCount % Math.max(2, Math.floor(35 - currentLevel.diff)) === 0) {
                enemies.push({
                    x: Math.random() * window.innerWidth, y: -60,
                    hp: 40 * currentLevel.diff, maxHp: 40 * currentLevel.diff,
                    size: 45, vy: 4 + (currentLevel.diff / 3),
                    col: currentLevel.col, isBoss: false
                });
            }

            // ボス出現
            if(gameScore >= 25000 && !bossEntity) {
                bossEntity = {
                    x: window.innerWidth / 2, y: -200,
                    hp: currentLevel.bossHp, maxHp: currentLevel.bossHp,
                    size: 200, vy: 1.2, isBoss: true, col: '#ff0000'
                };
                enemies.push(bossEntity);
                popup("BOSS INCOMING", "#f00");
            }

            // 衝突・移動・演算 (詳細にループ)
            playerBullets.forEach((b, bi) => {
                b.x += b.vx; b.y += b.vy;
                if(b.y < -100) playerBullets.splice(bi, 1);
                
                enemies.forEach((e, ei) => {
                    let dist = Math.hypot(b.x - e.x, b.y - e.y);
                    if(dist < e.size) {
                        e.hp -= b.dmg;
                        gameScore += 30;
                        if(b.type !== 'l') playerBullets.splice(bi, 1);
                        if(e.hp <= 0) {
                            createExplosion(e.x, e.y, e.col, e.isBoss ? 8 : 2);
                            if(e.isBoss) {
                                missionComplete();
                            } else {
                                enemies.splice(ei, 1);
                                profile.totalKills++;
                                profile.credits += Math.floor(20 * currentLevel.diff);
                                burstGauge += 15;
                                if(burstGauge >= 100) { burstGauge = 0; bombCount++; popup("BOMB RELOADED", "#ff0"); }
                            }
                        }
                    }
                });
            });

            enemies.forEach(e => {
                e.y += e.vy;
                if(e.isBoss && e.y > 200) e.vy = 0;
                
                // 敵弾発射ロジック
                let rate = 0.03 * currentLevel.diff;
                if(e.isBoss) rate = 0.15;
                if(Math.random() < rate && bombShockwave <= 0) {
                    if(e.isBoss) {
                        for(let i=0; i<12; i++) {
                            let angle = (frameCount/10) + (Math.PI*2/12) * i;
                            enemyBullets.push({x:e.x, y:e.y, vx:Math.cos(angle)*8, vy:Math.sin(angle)*8});
                        }
                    } else {
                        enemyBullets.push({x:e.x, y:e.y, vx:0, vy:9});
                    }
                }
            });

            enemyBullets.forEach((eb, ebi) => {
                eb.x += eb.vx; eb.y += eb.vy;
                if(Math.hypot(eb.x - pX, eb.y - pY) < 18) {
                    playerHP -= 20;
                    enemyBullets.splice(ebi, 1);
                    if(playerHP <= 0) gameOver();
                }
                if(eb.y > window.innerHeight + 100) enemyBullets.splice(ebi, 1);
            });

            particles.forEach((p, pi) => {
                p.x += p.vx; p.y += p.vy; p.life--;
                if(p.life <= 0) particles.splice(pi, 1);
            });

            // HUD更新
            document.getElementById('hp-bar-inner').style.width = playerHP + "%";
            document.getElementById('energy-bar-inner').style.width = burstGauge + "%";
            document.getElementById('score-display').innerText = gameScore.toString().padStart(8, '0');
            document.getElementById('bomb-icons').innerText = "BOMBS: " + "✪".repeat(bombCount);
            document.getElementById('gold-display').innerText = `CREDITS: ${profile.credits} G`;
        }

        function drawGame() {
            // 背景
            ctx.fillStyle = "rgba(0, 5, 15, 0.4)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if(bombShockwave > 0) {
                ctx.fillStyle = `rgba(255, 255, 255, ${bombShockwave/60})`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            // 霧
            if(currentLevel.gimmick === 'fog' && !purchasedItems.includes('anti_fog') && !profile.masterMode) {
                ctx.fillStyle = "rgba(200, 200, 200, 0.6)";
                if(frameCount % 12 < 6) ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            // 自機描画 (一切妥協なし)
            let sCol = profile.masterMode ? `hsl(${(frameCount*12)%360}, 100%, 50%)` : profile.activeSkin;
            ctx.shadowBlur = 30; ctx.shadowColor = sCol;
            ctx.fillStyle = sCol;
            ctx.beginPath();
            ctx.moveTo(pX, pY - 40);
            ctx.lineTo(pX + 30, pY + 25);
            ctx.lineTo(pX, pY + 10);
            ctx.lineTo(pX - 30, pY + 25);
            ctx.closePath();
            ctx.fill();
            ctx.shadowBlur = 0;

            // 敵描画
            enemies.forEach(e => {
                ctx.strokeStyle = e.isBoss ? (frameCount%10<5?"#fff":"#f00") : e.col;
                ctx.lineWidth = e.isBoss ? 12 : 5;
                ctx.strokeRect(e.x - e.size/2, e.y - e.size/2, e.size, e.size);
                if(e.isBoss) {
                    ctx.fillStyle = "#333"; ctx.fillRect(e.x - 150, e.y - 180, 300, 20);
                    ctx.fillStyle = "#f00"; ctx.fillRect(e.x - 150, e.y - 180, 300 * (e.hp/e.maxHp), 20);
                }
            });

            // 弾描画 (個別)
            playerBullets.forEach(b => {
                ctx.fillStyle = "#00ffff";
                if(b.type === 'l') { ctx.fillRect(b.x-5, b.y, 10, 80); }
                else if(b.type === 'w') { ctx.fillRect(b.x-40, b.y, 80, 10); }
                else { ctx.fillRect(b.x-4, b.y, 8, 30); }
            });

            ctx.fillStyle = "#ff00ff";
            enemyBullets.forEach(eb => {
                ctx.beginPath(); ctx.arc(eb.x, eb.y, 10, 0, Math.PI*2); ctx.fill();
            });

            particles.forEach(p => {
                ctx.fillStyle = p.c;
                ctx.fillRect(p.x, p.y, 4, 4);
            });
        }

        function createExplosion(x, y, c, power) {
            for(let i=0; i<30*power; i++) {
                particles.push({
                    x, y, vx:(Math.random()-0.5)*20*power, vy:(Math.random()-0.5)*20*power,
                    life: 40, c: c
                });
            }
        }

        function executeBomb() {
            if(bombCount > 0 && bombShockwave <= 0) {
                bombCount--;
                bombShockwave = 60;
                enemyBullets = [];
                enemies.forEach(e => {
                    e.hp -= 3000 * (profile.masterMode ? 10 : 1);
                });
                popup("BURST DRIVE", "#0ff");
            }
        }

        function missionComplete() {
            isGameRunning = false;
            if(!profile.clearedStages.includes(currentLevel.id)) {
                profile.clearedStages.push(currentLevel.id);
            }
            profile.credits += (currentLevel.stars * 10000);
            saveProfile();
            alert("MISSION SUCCESS!\n報酬: " + (currentLevel.stars * 10000) + " G");
            location.reload();
        }

        function gameOver() {
            isGameRunning = false;
            alert("PILOT DOWN... MISSION FAILED.");
            location.reload();
        }

        // イベント
        window.addEventListener('mousedown', e => { if(e.button===0) isMouseDown=true; if(e.button===2) executeBomb(); });
        window.addEventListener('mouseup', () => isMouseDown=false);
        window.addEventListener('mousemove', e => {
            if(isGameRunning && currentLevel.gimmick === 'reverse' && !profile.masterMode) {
                pX = window.innerWidth - e.clientX; pY = window.innerHeight - e.clientY;
            } else { pX = e.clientX; pY = e.clientY; }
        });
        window.addEventListener('keydown', e => { if(e.code === 'Space') executeBomb(); });
        window.addEventListener('resize', () => { canvas.width=window.innerWidth; canvas.height=window.innerHeight; });
        
        // 初回起動
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        showPanel('panel-main');

    </script>
</body>
</html>
