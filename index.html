<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Minami Project 2026: Burst Finale</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+JP:wght@700;900&display=swap');
        
        body { margin: 0; background: #000; color: #fff; font-family: 'Press Start 2P', cursive; overflow: hidden; user-select: none; }
        canvas { display: block; }

        /* HUD */
        #hud { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; }
        #score-val { font-size: 24px; text-shadow: 0 0 10px #0ff; margin-bottom: 10px; }
        .bar-container { width: 250px; height: 14px; background: rgba(255,255,255,0.1); border: 2px solid #fff; border-radius: 7px; overflow: hidden; margin-bottom: 5px; }
        #hp-fill { height: 100%; background: linear-gradient(90deg, #f05, #0fa); width: 100%; transition: width 0.3s; }
        #gauge-fill { height: 100%; background: #fff; width: 0%; transition: width 0.1s; }

        /* メインメニュー（横並び） */
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 20; backdrop-filter: blur(5px); }
        .nav-row { display: flex; flex-direction: row; justify-content: center; gap: 15px; margin-bottom: 40px; }
        .panel { display: none; flex-direction: column; align-items: center; width: 95%; max-height: 85vh; }
        .active { display: flex; }
        
        .nav-btn { padding: 15px 20px; border: 2px solid #0ff; background: none; color: #0ff; cursor: pointer; font-family: 'Press Start 2P'; font-size: 9px; transition: 0.2s; }
        .nav-btn:hover { background: #0ff; color: #000; box-shadow: 0 0 20px #0ff; }
        .nav-btn:disabled { border-color: #444; color: #444; cursor: not-allowed; }

        /* ステージ選択レイアウト */
        .stage-layout { display: flex; flex-direction: row; gap: 30px; width: 90%; align-items: flex-start; }
        .mode-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; flex: 1; }
        .mode-btn { padding: 15px; border: 1px solid #333; background: #111; color: #555; cursor: pointer; text-align: center; font-size: 8px; position: relative; }
        .mode-btn.unlocked { border-color: var(--c); color: var(--c); }
        .mode-btn.cleared::after { content: '✔'; position: absolute; top: 2px; right: 5px; color: #fff; }
        
        #briefing-panel { flex: 1; background: rgba(0, 20, 40, 0.9); border: 2px solid #0ff; padding: 20px; font-family: 'Noto Sans JP'; border-radius: 8px; min-height: 300px; display: flex; flex-direction: column; }

        /* コピーライト */
        #copyright { position: absolute; bottom: 15px; font-size: 8px; color: #444; letter-spacing: 2px; }

        #ending { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; flex-direction: column; align-items: center; justify-content: center; text-align: center; font-family: 'Noto Sans JP'; padding: 40px; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="hud">
        <div id="score-val">SCORE: 000000</div>
        <div class="bar-container"><div id="hp-fill"></div></div>
        <div class="bar-container"><div id="gauge-fill"></div></div>
        <div id="gold-val" style="color:#ffd700; font-size:14px;">GOLD: 0</div>
    </div>

    <div id="overlay">
        <h1 style="font-size:28px; margin-bottom:50px; color:#fff; letter-spacing:4px;">MINAMI PROJECT 2026</h1>
        
        <div id="main-nav" class="nav-row">
            <button class="nav-btn" onclick="openPanel('stage-select')">MISSION</button>
            <button class="nav-btn" onclick="openPanel('garage')">GARAGE</button>
            <button class="nav-btn" onclick="openPanel('shop')">TECH SHOP</button>
            <button class="nav-btn" onclick="openPanel('guide')">GUIDE</button>
        </div>

        <div id="stage-select" class="panel">
            <div class="stage-layout">
                <div class="mode-grid" id="grid"></div>
                <div id="briefing-panel">
                    <div id="brief-title" style="font-size:18px; color:#0ff; margin-bottom:10px; border-bottom:1px solid #0ff;">MISSION BRIEFING</div>
                    <div id="brief-desc" style="font-size:14px; line-height:1.6; color:#ddd; flex-grow:1;">エリアを選択してください。</div>
                    <button id="launch-btn" class="nav-btn" style="border-color:#0f0; color:#0f0; display:none;">LAUNCH</button>
                </div>
            </div>
            <button class="nav-btn" style="margin-top:20px;" onclick="backToMain()">BACK</button>
        </div>

        <div id="garage" class="panel">
            <h2 id="garage-gold" style="color:#ffd700; font-size:14px; margin-bottom:20px;"></h2>
            <div id="avatar-list" style="display:grid; grid-template-columns: repeat(3, 1fr); gap:15px; width: 90%;"></div>
            <button class="nav-btn" style="margin-top:30px;" onclick="backToMain()">BACK</button>
        </div>

        <div id="shop" class="panel">
            <h2 id="shop-gold" style="color:#ffd700; margin-bottom:20px;"></h2>
            <div class="nav-row">
                <button class="nav-btn" onclick="buy('atk', 1000)">ATK UP (1000G)</button>
                <button class="nav-btn" onclick="buy('heal', 500)">REPAIR (500G)</button>
                <button class="nav-btn" onclick="buy('bit', 3000)">DRONE BIT (3000G)</button>
            </div>
            <button class="nav-btn" onclick="backToMain()">BACK</button>
        </div>

        <div id="guide" class="panel">
            <div style="background:rgba(0,20,40,0.9); border:2px solid #0ff; padding:30px; font-family:'Noto Sans JP'; border-radius:8px; line-height:2;">
                <h2 style="color:#0ff; border-bottom:1px solid #0ff;">操作マニュアル</h2>
                <p>・マウス移動: 機体操作<br>・左クリック: メインショット<br>・右クリック / Space: バーストボム<br>・全ステージクリアで「ST=CO」解禁</p>
            </div>
            <button class="nav-btn" style="margin-top:20px;" onclick="backToMain()">BACK</button>
        </div>

        <div id="copyright">© 2026 MINAMI RAIL-SHOOTING PROJECT.</div>
    </div>

    <div id="ending">
        <h2 style="font-size:32px; color:#ff6600;">MISSION ACCOMPLISHED</h2>
        <p id="end-text" style="font-size:18px; line-height:2.5; max-width:800px; color:#fff;"></p>
        <button class="nav-btn" onclick="location.reload()">REBOOT</button>
    </div>

    <canvas id="game"></canvas>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;

        // --- ロジック継承 ---
        let gameActive = false, score = 0, hp = 100, frame = 0, phase = 1, burstGauge = 0, bombActive = 0;
        let bullets = [], eBullets = [], enemies = [], particles = [];
        let player = { x: canvas.width/2, y: canvas.height/2 };
        let currentMode = null;
        let sessionData = { atk: 2, hasBit: false };

        const STORAGE_KEY = 'minami_2026_v11';
        let userData = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {
            gold: 0, bombs: 1, unlocked: ['SB', 'KT', 'SK', 'KY', 'PK', 'JB', 'S1', 'S2', 'S3'], 
            cleared: [], skin: '#fff', ownedSkins: ['#fff']
        };

        const STAGES = {
            'SB': { name: 'ST=SB', color: '#ccaa00', diff: 1.0, bossHp: 500, score1: 5000, score2: 12000, gimmick: 'vibrate', info: '総武緩行エリア。激しい振動。' },
            'KT': { name: 'ST=KT', color: '#0088cc', diff: 1.2, bossHp: 700, score1: 7000, score2: 15000, gimmick: 'water', info: '京浜東北エリア。速度低下。' },
            'SK': { name: 'ST=SK', color: '#008844', diff: 1.5, bossHp: 900, score1: 8000, score2: 20000, gimmick: 'fog', info: '埼京エリア。HP持続減少。' },
            'KY': { name: 'ST=KY', color: '#aa0022', diff: 2.0, bossHp: 1200, score1: 10000, score2: 25000, gimmick: 'wind', info: '京葉エリア。強風。' },
            'PK': { name: 'ST=PK', color: '#cc5588', diff: 2.2, bossHp: 1500, score1: 12000, score2: 30000, gimmick: 'reverse', info: '電磁障害。操作反転。' },
            'JB': { name: 'ST=JB', color: '#006666', diff: 2.5, bossHp: 1800, score1: 15000, score2: 35000, gimmick: 'jamming', info: 'ジャミング。弾速不安定。' },
            'S1': { name: 'ST=S1', color: '#6600cc', diff: 3.0, bossHp: 2200, score1: 18000, score2: 45000, gimmick: 'warp', info: '空間歪曲。弾のワープ。' },
            'S2': { name: 'ST=S2', color: '#cc00cc', diff: 3.5, bossHp: 2800, score1: 20000, score2: 55000, gimmick: 'poison', info: '猛毒ガス。HP低下。' },
            'S3': { name: 'ST=S3', color: '#00cccc', diff: 4.0, bossHp: 3500, score1: 25000, score2: 70000, gimmick: 'gravity', info: '超重力。強慣性。' },
            'CO': { name: 'ST=CO', color: '#ff6600', diff: 30.0, bossHp: 150000, secret: true, info: '【中央特快】最終決戦。' }
        };

        const AVATARS = [
            { id: '#fff', name: 'STD-W', cost: 0, info: '標準機。' },
            { id: '#0f0', name: 'RAPID-G', cost: 5000, info: '高速連射。' },
            { id: '#0ff', name: 'WIDE-C', cost: 8000, info: '広範囲。' },
            { id: '#aa0022', name: 'BURST-R', cost: 12000, info: '重火力。' },
            { id: '#ff8800', name: 'STEADY-O', cost: 15000, info: 'ギミック耐性。' },
            { id: '#9900ff', name: 'PHANTOM-V', cost: 30000, info: '貫通・高速弾。' }
        ];

        function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(userData)); updateHUD(); }
        function updateHUD() {
            const g = userData.gold;
            document.getElementById('gold-val').innerText = `GOLD: ${g}`;
            document.getElementById('shop-gold').innerText = `GOLD: ${g}`;
            document.getElementById('garage-gold').innerText = `GOLD: ${g}`;
        }

        function openPanel(id) {
            document.getElementById('main-nav').style.display = 'none';
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'stage-select') renderStages();
            if(id === 'garage') renderGarage();
            updateHUD();
        }

        function backToMain() {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.getElementById('main-nav').style.display = 'flex';
        }

        function renderStages() {
            const grid = document.getElementById('grid'); grid.innerHTML = '';
            if(userData.cleared.length >= 9 && !userData.unlocked.includes('CO')) userData.unlocked.push('CO');
            userData.unlocked.forEach(id => {
                const s = STAGES[id];
                const btn = document.createElement('div');
                btn.className = `mode-btn unlocked ${userData.cleared.includes(id) ? 'cleared' : ''}`;
                btn.style.setProperty('--c', s.color);
                btn.innerHTML = `<b>${s.name}</b>`;
                btn.onclick = () => {
                    document.getElementById('brief-title').innerText = s.name;
                    document.getElementById('brief-desc').innerHTML = `${s.info}<br><br>難易度: ★${s.diff.toFixed(1)}`;
                    const lBtn = document.getElementById('launch-btn');
                    lBtn.style.display = 'block'; lBtn.onclick = () => startGame(id);
                };
                grid.appendChild(btn);
            });
        }

        function renderGarage() {
            const list = document.getElementById('avatar-list'); list.innerHTML = '';
            AVATARS.forEach(a => {
                const isOwned = userData.ownedSkins.includes(a.id);
                const btn = document.createElement('button');
                btn.className = 'nav-btn';
                btn.style.borderColor = a.id;
                btn.innerHTML = `<b>${a.name}</b><br>${isOwned ? 'SET' : a.cost+'G'}`;
                if(!isOwned && userData.gold < a.cost) btn.disabled = true;
                btn.onclick = () => {
                    if(!isOwned) {
                        userData.gold -= a.cost; userData.ownedSkins.push(a.id);
                        save(); renderGarage();
                    } else {
                        userData.skin = a.id; save(); alert(a.name + " EQUIPPED");
                    }
                };
                list.appendChild(btn);
            });
        }

        function buy(type, cost) {
            if(userData.gold >= cost) {
                userData.gold -= cost;
                if(type === 'atk') sessionData.atk++;
                if(type === 'heal') hp = 100;
                if(type === 'bit') sessionData.hasBit = true;
                save();
            }
        }

        function startGame(id) {
            currentMode = STAGES[id]; currentMode.id = id;
            document.getElementById('overlay').style.display = 'none';
            gameActive = true; score = 0; hp = 100; phase = 1; burstGauge = 0;
            enemies = []; bullets = []; eBullets = []; particles = [];
            loop();
        }

        function useBomb() {
            if(userData.bombs > 0 && bombActive <= 0) {
                userData.bombs--; bombActive = 60; eBullets = [];
                enemies.forEach(e => { e.hp -= 2000; createExplosion(e.x, e.y, "#fff"); });
            }
        }

        function createExplosion(x, y, color) {
            for(let i=0; i<10; i++) particles.push({ x: x, y: y, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10, life: 20, color: color });
        }

        function update() {
            frame++;
            if(bombActive > 0) bombActive--;

            let red = (userData.skin === '#ff8800') ? 0.3 : 1.0;
            if(currentMode.gimmick === 'vibrate') { player.x += (Math.random()-0.5)*10*red; player.y += (Math.random()-0.5)*10*red; }
            if(currentMode.gimmick === 'wind') player.x -= 3 * red;
            if(currentMode.gimmick === 'poison' && frame % 60 === 0) hp -= 2;

            if(isDown && frame % 5 === 0) {
                const s = userData.skin; const a = sessionData.atk;
                if(s === '#0f0') { if(frame%2===0) bullets.push({ x: player.x, y: player.y-20, p: a, vy: -30, vx: 0, w: 4 }); }
                else if(s === '#0ff') { [-5,0,5].forEach(vx => bullets.push({ x: player.x, y: player.y-20, p: a, vy: -20, vx: vx, w: 6 })); }
                else if(s === '#aa0022') { bullets.push({ x: player.x, y: player.y-25, p: a*4, vy: -12, vx: 0, w: 20 }); }
                else if(s === '#9900ff') { bullets.push({ x: player.x, y: player.y-20, p: a, vy: -50, vx: 0, w: 8 }); }
                else { bullets.push({ x: player.x, y: player.y-20, p: a, vy: -20, vx: 0, w: 6 }); }
            }

            if(sessionData.hasBit && frame % 15 === 0) {
                let bx = player.x + Math.cos(frame*0.1)*60; let by = player.y + Math.sin(frame*0.1)*60;
                bullets.push({ x: bx, y: by, p: 1, vy: -25, vx: 0, w: 4 });
            }

            if(phase === 1 && score >= currentMode.score1) phase = 2;
            if(phase === 2 && score >= currentMode.score2) phase = 3;

            if(!enemies.some(e => e.isBoss) && frame % 30 === 0) {
                enemies.push({ x: Math.random()*canvas.width, y: -50, hp: 15*currentMode.diff, size: 30, vy: 3 + currentMode.diff/2 });
            }
            if(phase === 3 && !enemies.some(e => e.isBoss)) {
                enemies.push({ x: canvas.width/2, y: -100, hp: currentMode.bossHp, maxHp: currentMode.bossHp, size: 140, vy: 1, isBoss: true });
            }

            bullets.forEach((b, i) => {
                b.y += b.vy; b.x += b.vx;
                if(b.y < -50) bullets.splice(i, 1);
                enemies.forEach((e, ei) => {
                    if(Math.hypot(b.x-e.x, b.y-e.y) < e.size) {
                        e.hp -= b.p; score += 10; bullets.splice(i, 1);
                        if(e.hp <= 0) {
                            createExplosion(e.x, e.y, currentMode.color);
                            if(e.isBoss) finish(true);
                            else { score += 500; userData.gold += 50; enemies.splice(ei, 1); burstGauge += 10; if(burstGauge>=100){burstGauge=0; userData.bombs++;} }
                        }
                    }
                });
            });

            eBullets.forEach((eb, i) => {
                eb.y += eb.vy; eb.x += eb.vx || 0;
                if(Math.hypot(eb.x-player.x, eb.y-player.y) < 15) { hp -= 15; eBullets.splice(i, 1); if(hp <= 0) finish(false); }
            });

            enemies.forEach(e => {
                e.y += e.vy; if(e.isBoss && e.y > 150) e.vy = 0;
                if(Math.random() < 0.05 * currentMode.diff && bombActive <= 0) {
                    eBullets.push({ x: e.x, y: e.y, vx: e.isBoss ? Math.cos(frame*0.2)*8 : 0, vy: 7 + currentMode.diff });
                }
            });

            particles.forEach((p, i) => { p.x += p.vx; p.y += p.vy; p.life--; if(p.life <= 0) particles.splice(i, 1); });

            document.getElementById('hp-fill').style.width = hp + "%";
            document.getElementById('gauge-fill').style.width = burstGauge + "%";
            document.getElementById('score-val').innerText = `SCORE: ${score.toString().padStart(6, '0')}`;
        }

        function draw() {
            ctx.fillStyle = "#000a1a"; ctx.fillRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = userData.skin; ctx.beginPath();
            ctx.moveTo(player.x, player.y - 20); ctx.lineTo(player.x + 15, player.y + 15); ctx.lineTo(player.x - 15, player.y + 15);
            ctx.fill();

            enemies.forEach(e => { 
                ctx.strokeStyle = currentMode.color; ctx.lineWidth = 3; 
                ctx.strokeRect(e.x-e.size/2, e.y-e.size/2, e.size, e.size);
                if(e.isBoss) {
                    ctx.fillStyle = "#333"; ctx.fillRect(e.x-70, e.y-90, 140, 5);
                    ctx.fillStyle = "#f00"; ctx.fillRect(e.x-70, e.y-90, 140*(e.hp/e.maxHp), 5);
                }
            });
            bullets.forEach(b => { ctx.fillStyle = userData.skin; ctx.fillRect(b.x-b.w/2, b.y, b.w, 20); });
            eBullets.forEach(eb => { ctx.fillStyle = "#f0f"; ctx.beginPath(); ctx.arc(eb.x, eb.y, 6, 0, 7); ctx.fill(); });
            particles.forEach(p => { ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, 4, 4); });
        }

        function finish(clear) {
            gameActive = false;
            if(clear) {
                if(!userData.cleared.includes(currentMode.id)) userData.cleared.push(currentMode.id);
                userData.gold += 5000; save();
                if(currentMode.id === 'CO') showEnding();
                else { alert("MISSION SUCCESS!"); location.reload(); }
            } else { alert("SYSTEM FAILED"); location.reload(); }
        }

        function showEnding() {
            document.getElementById('ending').style.display = 'flex';
            const msg = "中央線のオレンジが宇宙を包み込む…。すべての路線を制覇したあなたに、最高の敬意を。2026年、南プロジェクト完結。";
            let i = 0; const timer = setInterval(() => {
                document.getElementById('end-text').innerText += msg[i];
                i++; if(i >= msg.length) clearInterval(timer);
            }, 50);
        }

        function loop() { if(!gameActive) return; update(); draw(); requestAnimationFrame(loop); }

        let isDown = false;
        window.onmousedown = (e) => { if(e.button === 0) isDown = true; if(e.button === 2) useBomb(); };
        window.onmouseup = () => isDown = false;
        window.onmousemove = e => { player.x = e.clientX; player.y = e.clientY; };
        window.onkeydown = e => { if(e.code === 'Space') useBomb(); };

        updateHUD();
    </script>
</body>
</html>
