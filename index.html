<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>MINAMI PROJECT 2026: TRUE FULL-SPEC FIXED</title>
    <style>
        /* =========================================
           1. CSS DESIGN & UI
           ========================================= */
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+JP:wght@900&display=swap');
        
        body { margin: 0; background: #000; color: #fff; font-family: 'Press Start 2P', cursive; overflow: hidden; user-select: none; }
        canvas { display: block; background: #000; }

        .ui-root { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; }
        #hud { display: none; padding: 30px; background: linear-gradient(180deg, rgba(0,0,0,0.8), transparent); }
        .score-box { font-size: 24px; color: #0ff; text-shadow: 0 0 15px #0ff; margin-bottom: 15px; }
        
        .bar-container { margin: 10px 0; }
        .bar-label { font-size: 9px; color: #aaa; margin-bottom: 5px; }
        .bar-frame { width: 300px; height: 16px; background: rgba(255,255,255,0.1); border: 2px solid #fff; position: relative; }
        #hp-bar { height: 100%; background: linear-gradient(90deg, #ff0055, #ff88aa); width: 100%; transition: 0.2s; }
        #bomb-bar { height: 100%; background: linear-gradient(90deg, #00ccff, #88ffff); width: 0%; }
        
        .stats-info { font-size: 11px; color: #ffd700; margin-top: 10px; display: flex; gap: 20px; }

        #overlay { position: absolute; inset: 0; background: radial-gradient(circle, #001, #000); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; pointer-events: auto; }
        .title-glitch { font-size: 32px; letter-spacing: 12px; margin-bottom: 60px; text-shadow: 3px 0 #f05, -3px 0 #0cf; }
        
        .nav-menu { display: flex; gap: 30px; }
        .nav-card { 
            width: 220px; height: 280px; border: 4px solid #fff; background: rgba(255,255,255,0.02);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s;
        }
        .nav-card:hover { background: #fff; color: #000; transform: translateY(-15px); }
        .nav-card .box-icon { width: 50px; height: 50px; border: 3px solid currentColor; margin-bottom: 30px; position: relative; }
        .nav-card .box-icon::after { content: ''; position: absolute; inset: 12px; background: currentColor; }
        
        .panel { display: none; flex-direction: column; align-items: center; width: 92%; height: 88%; background: #000; border: 5px solid #fff; padding: 40px; overflow-y: auto; box-sizing: border-box; }
        .panel.active { display: flex; }
        .stage-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; width: 100%; margin: 30px 0; }
        
        .grid-item { border: 2px solid #444; padding: 25px 10px; text-align: center; font-size: 10px; cursor: pointer; position: relative; transition: 0.2s; background: #050505; }
        .grid-item:hover:not(.locked) { border-color: #fff; background: rgba(255,255,255,0.1); }
        .grid-item.locked { opacity: 0.2; cursor: not-allowed; border-style: dashed; }
        .grid-item.cleared::before { content: 'COMPLETE'; position: absolute; top: 5px; right: 5px; color: #0f0; font-size: 7px; }

        #briefing-modal { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 550px; background: #000; border: 6px solid #fff; padding: 40px; display: none; flex-direction: column; z-index: 200; box-shadow: 0 0 100px #000; }
        #msg-layer { position: absolute; top: 40%; width: 100%; text-align: center; pointer-events: none; z-index: 60; display: none; }
        #msg-text { font-size: 36px; color: #f00; text-shadow: 0 0 20px #f00; font-weight: 900; }

        button { padding: 15px 30px; border: 3px solid #fff; background: none; color: #fff; font-family: 'Press Start 2P'; font-size: 11px; cursor: pointer; margin: 10px; transition: 0.1s; }
        button:hover { background: #fff; color: #000; }
    </style>
</head>
<body>

    <div class="ui-root">
        <div id="hud">
            <div id="score-display" class="score-box">SCORE: 000000</div>
            <div class="bar-container">
                <div class="bar-label">SHIELD (HP)</div>
                <div class="bar-frame"><div id="hp-bar"></div></div>
            </div>
            <div class="bar-container">
                <div class="bar-label">BOMB CHARGE</div>
                <div class="bar-frame"><div id="bomb-bar"></div></div>
            </div>
            <div class="stats-info">
                <div id="bomb-count">BOMBS: </div>
                <div id="gold-display" style="color:#ffd700;">CREDITS: 0</div>
            </div>
        </div>
    </div>

    <div id="msg-layer"><div id="msg-text">WARNING</div></div>

    <div id="overlay">
        <h1 class="title-glitch">MINAMI PROJECT 2026</h1>
        <div class="nav-menu" id="main-nav">
            <div class="nav-card" onclick="ui.open('stage-panel')">
                <div class="box-icon" style="color:#0ff;"></div>
                <span>SORTIE</span>
            </div>
            <div class="nav-card" onclick="ui.open('shop-panel')">
                <div class="box-icon" style="color:#ffd700;"></div>
                <span>HANGAR</span>
            </div>
            <div class="nav-card" onclick="ui.open('manual-panel')">
                <div class="box-icon" style="color:#fff;"></div>
                <span>MANUAL</span>
            </div>
        </div>

        <div id="stage-panel" class="panel">
            <h2>SECTOR SELECT</h2>
            <div class="stage-grid" id="stage-list"></div>
            <button onclick="ui.back()">BACK</button>
        </div>

        <div id="shop-panel" class="panel">
            <h2 id="shop-credits" style="color:#ffd700;">CREDITS: 0</h2>
            <div><button onclick="shop.render('weapon')">WEAPONS</button><button onclick="shop.render('support')">SUPPORT</button></div>
            <div class="stage-grid" id="shop-list"></div>
            <button onclick="ui.back()">BACK</button>
        </div>

        <div id="manual-panel" class="panel">
            <h2>MANUAL</h2>
            <div style="font-family:'Noto Sans JP'; line-height:2.5; font-size:15px; color:#bbb; text-align:left;">
                ・【移動】マウス【攻撃】クリック<br>
                ・【ボム】自動発動（被弾時）<br>
                ・【クリア】残りHPでボーナス加算
            </div>
            <button onclick="ui.back()">OK</button>
        </div>
    </div>

    <div id="briefing-modal">
        <h2 id="br-title"></h2>
        <div id="br-desc" style="font-family:'Noto Sans JP'; font-size:14px; color:#ccc; margin:20px 0; border-left:5px solid #fff; padding-left:20px;"></div>
        <div style="font-size:11px; color:#ffd700; margin-bottom:20px;">REWARD: <span id="br-reward"></span> G</div>
        <div style="display:flex; justify-content:space-between;"><button onclick="document.getElementById('briefing-modal').style.display='none'">CANCEL</button><button id="br-start-btn" style="color:#0f0;">LAUNCH</button></div>
    </div>

    <canvas id="game"></canvas>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;

        let gameActive = false, score = 0, hp = 100, frame = 0, charge = 0, invul = 0, currentPhase = 1;
        let player = { x: canvas.width/2, y: canvas.height/2, tx: canvas.width/2, ty: canvas.height/2 };
        let bullets = [], eBullets = [], enemies = [], particles = [], boss = null, isClicking = false, currentStageData = null;

        const STORAGE_KEY = "MINAMI_ULTIMATE_2026_FIXED";
        let user = JSON.parse(localStorage.getItem(STORAGE_KEY)) || { gold: 0, bombs: 2, cleared: [], skin: '#fff', licenses: ['#fff'] };

        const saveUserData = () => {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(user));
            document.getElementById('gold-display').innerText = `CREDITS: ${user.gold}`;
            document.getElementById('bomb-count').innerText = `BOMBS: ${"★".repeat(user.bombs)}`;
            document.getElementById('shop-credits').innerText = `CREDITS: ${user.gold}`;
        };

        const STAGES = {
            'SB': { n: 'ST=SB', c: '#ccaa00', d: 1.0, r: 2500, bh: 1000, g: 'VIB', s: false, desc: '総武線：激しい振動。' },
            'KT': { n: 'ST=KT', c: '#0088cc', d: 1.2, r: 3500, bh: 1500, g: 'WTR', s: false, desc: '京浜東北線：水圧エリア。' },
            'SK': { n: 'ST=SK', c: '#008844', d: 1.5, r: 4500, bh: 2000, g: 'FOG', s: false, desc: '埼京線：視界不良。' },
            'KY': { n: 'ST=KY', c: '#aa0022', d: 2.0, r: 6000, bh: 3000, g: 'WND', s: false, desc: '京葉線：左へ流される強風。' },
            'PK': { n: 'ST=PK', c: '#cc5588', d: 2.5, r: 8000, bh: 4500, g: 'REV', s: false, desc: '各停：左右操作反転。' },
            'JB': { n: 'ST=JB', c: '#006666', d: 3.0, r: 10000, bh: 6000, g: 'JAM', s: false, desc: '常磐線：敵弾の視認困難。' },
            'S1': { n: 'ST=S1', c: '#6600cc', d: 3.5, r: 15000, bh: 8000, g: 'WRP', s: false, desc: '地下1：ワープ現象。' },
            'S2': { n: 'ST=S2', c: '#cc00cc', d: 4.2, r: 20000, bh: 12000, g: 'PSN', s: false, desc: '地下2：腐食ガス。' },
            'S3': { n: 'ST=S3', c: '#00cccc', d: 5.0, r: 30000, bh: 18000, g: 'GRV', s: false, desc: '地下3：重力。' },
            'F1': { n: 'F15-ALPHA', c: '#778', d: 8, r: 50000, bh: 30000, g: 'SPD', s: true, desc: 'F15α：高速戦闘。' },
            'F2': { n: 'F15-BETA', c: '#778', d: 10, r: 70000, bh: 45000, g: 'SPD', s: true, desc: 'F15β：高密度弾幕。' },
            'F3': { n: 'F15-GAMMA', c: '#778', d: 13, r: 100000, bh: 65000, g: 'SPD', s: true, desc: 'F15γ：エース機。' },
            'F4': { n: 'F15-DELTA', c: '#778', d: 16, r: 150000, bh: 90000, g: 'SPD', s: true, desc: 'F15δ：最終防衛。' },
            'F5': { n: 'F15-EPSILON', c: '#b0c', d: 20, r: 250000, bh: 150000, g: 'SPD', s: true, desc: 'F15司令官。' },
            'CO': { n: 'ST=CO', c: '#ff6600', d: 50, r: 1000000, bh: 500000, g: 'ULT', s: true, desc: '中央線：オレンジの地獄。' }
        };

        const WEAPONS = [
            { id: '#fff', n: 'BASIC', cost: 0, p: 2, t: 'std' },
            { id: '#0f0', n: 'V-SPREAD', cost: 8000, p: 1.8, t: 'v' },
            { id: '#0ff', n: 'RAPID', cost: 15000, p: 1.5, t: 'fast' },
            { id: '#ff0', n: 'HEAVY', cost: 25000, p: 6, t: 'std' },
            { id: '#f0f', n: 'WAVE', cost: 40000, p: 2.2, t: 'wave' },
            { id: '#a02', n: 'KY-RED', cost: 200000, p: 25, t: 'std' },
            { id: '#fff2', n: 'ZENITH', cost: 1000000, p: 15, t: 'all' }
        ];

        const ui = {
            open: (id) => {
                document.getElementById('main-nav').style.display = 'none';
                document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
                document.getElementById(id).classList.add('active');
                if(id === 'stage-panel') ui.renderStages();
            },
            back: () => {
                document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
                document.getElementById('main-nav').style.display = 'flex';
            },
            renderStages: () => {
                const list = document.getElementById('stage-list'); list.innerHTML = '';
                const baseCleared = Object.keys(STAGES).filter(k => !STAGES[k].s && user.cleared.includes(k)).length;
                const secretUnlocked = baseCleared >= 9;
                Object.keys(STAGES).forEach((key, idx) => {
                    const s = STAGES[key]; const isLocked = s.s && !secretUnlocked;
                    const item = document.createElement('div');
                    item.className = `grid-item ${isLocked ? 'locked' : ''} ${user.cleared.includes(key) ? 'cleared' : ''}`;
                    item.style.color = isLocked ? '#222' : s.c; item.style.borderColor = isLocked ? '#222' : s.c;
                    item.innerHTML = `${idx + 1}<br>${s.n}`;
                    if(!isLocked) item.onclick = () => {
                        currentStageData = { ...s, id: key };
                        document.getElementById('br-title').innerText = s.n;
                        document.getElementById('br-desc').innerText = s.desc;
                        document.getElementById('br-reward').innerText = s.r;
                        document.getElementById('briefing-modal').style.display = 'flex';
                        document.getElementById('br-start-btn').onclick = engine.start;
                    };
                    list.appendChild(item);
                });
            }
        };

        const shop = {
            render: (mode) => {
                const list = document.getElementById('shop-list'); list.innerHTML = '';
                if(mode === 'weapon') {
                    WEAPONS.forEach(w => {
                        const owned = user.licenses.includes(w.id);
                        const item = document.createElement('div');
                        item.className = 'grid-item'; item.style.color = w.id==='#fff2'?'#fff':w.id;
                        item.innerHTML = `${w.n}<br>${owned ? 'EQUIP' : w.cost + 'G'}`;
                        item.onclick = () => {
                            if(!owned && user.gold >= w.cost) { user.gold -= w.cost; user.licenses.push(w.id); saveUserData(); shop.render('weapon'); }
                            else if(owned) { user.skin = w.id; saveUserData(); alert("EQUIPPED"); }
                        };
                        list.appendChild(item);
                    });
                } else {
                    const box = document.createElement('div'); box.className = 'grid-item'; box.innerHTML = "EXTRA BOMB<br>5000G";
                    box.onclick = () => { if(user.gold >= 5000) { user.gold -= 5000; user.bombs++; saveUserData(); alert("BOMB ADDED"); } };
                    list.appendChild(box);
                }
            }
        };

        const engine = {
            start: () => {
                document.getElementById('briefing-modal').style.display = 'none';
                document.getElementById('overlay').style.display = 'none';
                document.getElementById('hud').style.display = 'block';
                gameActive = true; score = 0; hp = 100; frame = 0; charge = 0; invul = 0;
                currentPhase = 1; bullets = []; eBullets = []; enemies = []; particles = []; boss = null;
                engine.flashMsg("PHASE 1: START", 2000); engine.loop();
            },
            flashMsg: (txt, dur) => {
                const lyr = document.getElementById('msg-layer'); const t = document.getElementById('msg-text');
                t.innerText = txt; lyr.style.display = 'block'; setTimeout(() => lyr.style.display = 'none', dur);
            },
            loop: () => {
                if(!gameActive) return;
                frame++; if(invul > 0) invul--;
                if(currentPhase === 1 && score > 15000) { currentPhase = 2; engine.flashMsg("PHASE 2: ELITE", 2000); }
                if(currentPhase === 2 && score > 40000 && !boss) {
                    currentPhase = 3; engine.flashMsg("BOSS WARNING", 3000);
                    boss = { x: canvas.width/2, y: -200, hp: currentStageData.bh, maxHp: currentStageData.bh, size: 160, vy: 1, p2: false };
                    enemies.push(boss);
                }

                let mv = (currentStageData.g === 'GRV' ? 0.05 : (currentStageData.g === 'SPD' ? 0.45 : 0.2));
                let tx = (currentStageData.g === 'REV' ? canvas.width - player.tx : player.tx);
                let ty = (currentStageData.g === 'REV' ? canvas.height - player.ty : player.ty);
                player.x += (tx - player.x) * mv; player.y += (ty - player.y) * mv;
                if(currentStageData.g === 'WND') player.x -= 3;
                if(currentStageData.g === 'PSN' && frame % 60 === 0) hp -= 0.6;

                if(isClicking && frame % (user.skin === '#0ff' ? 3 : 6) === 0) {
                    const w = WEAPONS.find(v => v.id === user.skin);
                    if(w.t === 'v') { bullets.push({ x: player.x - 10, y: player.y - 20, vx: -3, vy: -25, p: w.p }); bullets.push({ x: player.x + 10, y: player.y - 20, vx: 3, vy: -25, p: w.p }); }
                    else if(w.t === 'all') { for(let a=0; a<Math.PI*2; a+=Math.PI/4) bullets.push({ x: player.x, y: player.y, vx: Math.cos(a)*15, vy: Math.sin(a)*15, p: w.p }); }
                    else bullets.push({ x: player.x, y: player.y - 20, vx: 0, vy: -30, p: w.p });
                }

                if(currentPhase < 3 && frame % (currentPhase === 1 ? 25 : 12) === 0) {
                    enemies.push({ x: Math.random() * canvas.width, y: -50, hp: (currentPhase === 1 ? 25 : 80) * currentStageData.d, size: (currentPhase === 1 ? 40 : 60), vy: 3 + currentStageData.d, elite: currentPhase === 2 });
                }

                bullets.forEach((b, bi) => {
                    b.x += b.vx || 0; b.y += b.vy;
                    enemies.forEach((e, ei) => {
                        if(Math.hypot(b.x - e.x, b.y - e.y) < e.size) {
                            e.hp -= b.p; bullets.splice(bi, 1);
                            if(e.hp <= 0) {
                                if(e === boss) { gameActive = false; const bonus = Math.floor(hp * 50); if(!user.cleared.includes(currentStageData.id)) user.cleared.push(currentStageData.id); user.gold += currentStageData.r + bonus; saveUserData(); engine.flashMsg("CLEAR!", 3000); setTimeout(() => location.reload(), 3000); }
                                else { enemies.splice(ei, 1); score += (e.elite ? 2000 : 500); user.gold += 20; charge += 10; if(charge >= 100) { charge = 0; user.bombs++; } saveUserData(); }
                            }
                        }
                    });
                    if(b.y < -100) bullets.splice(bi, 1);
                });

                enemies.forEach(e => {
                    e.y += e.vy; if(e === boss && e.y > 150) e.vy = 0;
                    if(e === boss && !e.p2 && e.hp < e.maxHp / 2) { e.p2 = true; engine.flashMsg("PHASE 2", 2000); }
                    let rate = (e === boss ? 0.15 : 0.06) * currentStageData.d;
                    if(Math.random() < rate) {
                        if(e === boss && e.p2) { for(let a=0; a<Math.PI*2; a+=Math.PI/6) eBullets.push({ x: e.x, y: e.y, vx: Math.cos(a)*8, vy: Math.sin(a)*8 }); }
                        else eBullets.push({ x: e.x, y: e.y, vx: 0, vy: 6 * currentStageData.d });
                    }
                });

                eBullets.forEach((eb, ebi) => {
                    eb.x += eb.vx || 0; eb.y += eb.vy;
                    if(invul <= 0 && Math.hypot(eb.x - player.x, eb.y - player.y) < 20) {
                        if(user.bombs > 0) { user.bombs--; invul = 150; eBullets = []; saveUserData(); engine.flashMsg("AUTO BOMB", 1000); }
                        else { hp -= 15; if(hp <= 0) { gameActive = false; engine.flashMsg("FAILED", 3000); setTimeout(() => location.reload(), 3000); } }
                    }
                    if(eb.y > canvas.height) eBullets.splice(ebi, 1);
                });

                ctx.fillStyle = "#000"; ctx.fillRect(0,0,canvas.width,canvas.height);
                if(currentStageData.g==='FOG'){ctx.fillStyle="rgba(255,255,255,0.15)";ctx.fillRect(0,0,canvas.width,canvas.height);}
                if(invul%4 < 2) { ctx.fillStyle = user.skin; ctx.beginPath(); ctx.moveTo(player.x, player.y-30); ctx.lineTo(player.x+20, player.y+15); ctx.lineTo(player.x-20, player.y+15); ctx.fill(); }
                enemies.forEach(e => { ctx.strokeStyle = (e===boss && e.p2) ? "#f00" : (e.elite ? "#f0f" : currentStageData.c); ctx.lineWidth = e===boss?5:2; ctx.strokeRect(e.x-e.size/2, e.y-e.size/2, e.size, e.size); if(e===boss){ctx.fillStyle="#222";ctx.fillRect(e.x-100,e.y-120,200,10);ctx.fillStyle="#f00";ctx.fillRect(e.x-100,e.y-120,200*(e.hp/e.maxHp),10);} });
                bullets.forEach(b => { ctx.fillStyle = user.skin; ctx.fillRect(b.x-2, b.y, 4, 15); });
                eBullets.forEach(eb => { ctx.fillStyle = "#f0f"; ctx.beginPath(); ctx.arc(eb.x, eb.y, 6, 0, 7); ctx.fill(); });

                document.getElementById('hp-bar').style.width = hp + "%";
                document.getElementById('bomb-bar').style.width = charge + "%";
                document.getElementById('score-display').innerText = `SCORE: ${score.toString().padStart(6, '0')}`;
                requestAnimationFrame(engine.loop);
            }
        };

        window.onmousedown = () => isClicking = true; window.onmouseup = () => isClicking = false;
        window.onmousemove = e => { player.tx = e.clientX; player.ty = e.clientY; };
        saveUserData();
    </script>
</body>
</html>
