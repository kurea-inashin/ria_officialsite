<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Extreme Shooting: Resonance Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;900&family=Noto+Sans+JP:wght@300&display=swap');
        
        body { margin: 0; overflow: hidden; background: #00040a; font-family: 'Orbitron', 'Noto Sans JP', sans-serif; color: #fff; }
        canvas { display: block; }

        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; padding: 20px; z-index: 5; }
        .hud-label { font-size: 0.5rem; color: #00dfff; font-family: 'Press Start 2P', cursive; }
        #score { font-size: 1.6rem; font-weight: 900; text-shadow: 0 0 15px #00dfff; }
        #hp-container { width: 220px; height: 6px; border: 1px solid #1a3a4a; background: rgba(0,20,30,0.8); margin-top:5px; }
        #hp-bar-fill { height: 100%; background: linear-gradient(90deg, #00dfff, #70e1ff); width: 100%; transition: width 0.3s; }

        .overlay-screen { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: radial-gradient(circle at center, #0a192f 0%, #000 100%); 
            display: flex; flex-direction: column; align-items: center; z-index: 10; padding: 40px 0;
        }
        
        h1 { font-size: 2rem; letter-spacing: 5px; text-shadow: 0 0 20px #00dfff; margin:0; }
        .sub-title { font-size: 0.7rem; color: #70e1ff; margin-bottom: 20px; }

        #unlock-banner {
            background: rgba(255, 255, 255, 0.1); border: 1px solid #fff;
            padding: 10px; margin-bottom: 15px; font-size: 0.5rem; color: #fff; display: none;
            font-family: 'Press Start 2P', cursive;
        }

        .stage-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        
        .menu-btn { 
            width: 240px; padding: 12px; border: 1px solid rgba(255,255,255,0.2); 
            cursor: pointer; font-family: 'Press Start 2P', cursive; font-size: 0.45rem; 
            color: #fff; background: rgba(255,255,255,0.05); transition: 0.2s; position: relative;
        }
        .menu-btn:hover { background: rgba(255,255,255,0.1); border-color: #fff; }
        
        /* クリアマーク */
        .clear-mark { position: absolute; top: -8px; right: -8px; font-size: 1rem; text-shadow: 0 0 5px #000; }

        #hidden-area, #ultimate-area { display: none; margin-top: 20px; text-align:center; }
        #complete-text { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 4rem; font-weight: 900; color: #fff; text-shadow: 0 0 30px #00dfff; 
            display: none; z-index: 100; font-family: 'Orbitron';
        }
    </style>
</head>
<body>

    <div id="complete-text">COMPLETE</div>

    <div id="overlay" class="overlay-screen">
        <h1>RESONANCE SHOOTING</h1>
        <div class="sub-title">Color of Lines Edition</div>

        <div id="unlock-banner">NEW SECTOR UNLOCKED.</div>

        <div class="stage-grid">
            <div id="btn-st1" class="menu-btn" style="border-left: 8px solid #ffd400;" onclick="start('st1')">SOBU: YELLOW</div>
            <div id="btn-st2" class="menu-btn" style="border-left: 8px solid #00b2e5;" onclick="start('st2')">KEIHIN: BLUE</div>
            <div id="btn-st3" class="menu-btn" style="border-left: 8px solid #00a651;" onclick="start('st3')">SAIKYO: GREEN</div>
            <div id="btn-st4" class="menu-btn" style="border-left: 8px solid #da0442;" onclick="start('st4')">KEIYO: RED</div>
        </div>

        <div id="hidden-area">
            <div class="hud-label" style="margin: 15px 0;">- EXPERIMENTAL SECTOR -</div>
            <div class="stage-grid">
                <div id="btn-h1" class="menu-btn" style="color:#00ffff; border-color:#00ffff" onclick="start('h1')">CYAN FLASH</div>
                <div id="btn-h2" class="menu-btn" style="color:#ff00ff; border-color:#ff00ff" onclick="start('h2')">MAGENTA RAIN</div>
            </div>
        </div>

        <div id="ultimate-area">
            <div id="btn-ultimate" class="menu-btn" style="width:500px; color:#f39700; border:2px solid #f39700; background:rgba(243,151,0,0.1)" onclick="start('ultimate')">
                ULTIMATE: CHUO ORANGE (DEATH)
            </div>
        </div>

        <div class="copy-right" style="margin-top:30px; color:#555;">© 2026 RAILWAY RESONANCE</div>
    </div>

    <div id="ui-layer">
        <div class="hud-label">SCORE</div><div id="score">000000</div>
        <div class="hud-label" style="margin-top:10px;">HEART</div><div id="hp-container"><div id="hp-bar-fill"></div></div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;

        let gameActive = false, isClearing = false, score = 0, hp = 100, frame = 0;
        let bullets = [], eBullets = [], enemies = [], particles = [], stars = [];
        let currentMode = null;
        let player = { x: canvas.width/2, y: canvas.height/2 };

        const config = {
            st1: { color: '#ffd400', spawn: 0.05, target: 3000, bSpd: 4, aim: 0 },
            st2: { color: '#00b2e5', spawn: 0.07, target: 5000, bSpd: 5, aim: 0.2 },
            st3: { color: '#00a651', spawn: 0.09, target: 8000, bSpd: 6, aim: 0.4 },
            st4: { color: '#da0442', spawn: 0.12, target: 10000, bSpd: 7, aim: 0.6 },
            h1: { color: '#00ffff', spawn: 0.2, target: 15000, bSpd: 9, aim: 0.8 },
            h2: { color: '#ff00ff', spawn: 0.25, target: 20000, bSpd: 10, aim: 1.0 },
            ultimate: { color: '#f39700', spawn: 0.5, target: 50000, bSpd: 13, aim: 1.5 }
        };

        function init() {
            const cl = JSON.parse(localStorage.getItem('clearedStages') || '[]');
            const pf = JSON.parse(localStorage.getItem('perfectStages') || '[]');
            
            // マークの描画
            Object.keys(config).forEach(key => {
                const btn = document.getElementById(`btn-${key}`);
                if(!btn) return;
                if(pf.includes(key)) btn.innerHTML += '<span class="clear-mark">🌟</span>';
                else if(cl.includes(key)) btn.innerHTML += '<span class="clear-mark">🔵</span>';
            });

            // 解禁ロジック
            if(['st1','st2','st3','st4'].every(s => cl.includes(s) || pf.includes(s))) document.getElementById('hidden-area').style.display = 'block';
            if(['h1','h2'].every(s => cl.includes(s) || pf.includes(s))) document.getElementById('ultimate-area').style.display = 'block';

            stars = []; for(let i=0; i<80; i++) stars.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*1.5+0.5});
        }

        function start(modeKey) {
            currentMode = { ...config[modeKey], key: modeKey };
            score = 0; hp = 100; frame = 0; bullets = []; eBullets = []; enemies = []; particles = [];
            isClearing = false;
            document.getElementById('complete-text').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
            gameActive = true; loop();
        }

        window.addEventListener('mousemove', e => { player.x = e.clientX; player.y = e.clientY; });
        let isDown = false; window.addEventListener('mousedown', () => isDown = true); window.addEventListener('mouseup', () => isDown = false);

        function update() {
            if(isClearing) {
                particles.forEach((p, i) => { p.y += 0.5; p.l -= 0.01; if(p.l <= 0) particles.splice(i,1); });
                return;
            }
            frame++;
            stars.forEach(s => { s.y += s.s * 5; if(s.y > canvas.height) s.y = 0; });

            if(isDown && frame % 4 === 0) {
                bullets.push({x: player.x, y: player.y-10, vx: 0, vy: -20, size: (hp<30?15:6)});
            }

            // 敵生成（ギミック込み）
            if(Math.random() < currentMode.spawn) {
                const tr = Math.random();
                let type = 'normal';
                if(tr < 0.1) type = 'accel'; // 加速弾を撃つ
                else if(tr < 0.2) type = 'divide'; // 分裂する
                else if(tr < 0.3) type = 'sine'; // 蛇行する
                enemies.push({ x: Math.random()*canvas.width, y: -50, hp: 5, type: type, angle: 0 });
            }

            // 敵挙動
            for(let i=enemies.length-1; i>=0; i--) {
                let e = enemies[i];
                e.y += 3;
                if(e.type === 'sine') { e.angle += 0.1; e.x += Math.sin(e.angle)*8; }

                if(Math.random() < 0.02) {
                    let angle = Math.atan2(player.y - e.y, player.x - e.x);
                    eBullets.push({ 
                        x: e.x, y: e.y, 
                        vx: Math.cos(angle)*currentMode.bSpd, 
                        vy: Math.sin(angle)*currentMode.bSpd,
                        accel: (e.type === 'accel')
                    });
                }

                bullets.forEach((b, bi) => {
                    if(Math.hypot(e.x-b.x, e.y-b.y) < 30) {
                        e.hp--; bullets.splice(bi, 1);
                        if(e.hp <= 0) {
                            if(e.type === 'divide') { // 分裂ギミック
                                for(let j=0; j<8; j++) eBullets.push({x:e.x, y:e.y, vx:Math.cos(j)*5, vy:Math.sin(j)*5});
                            }
                            score += 100; enemies.splice(i,1);
                            if(score >= currentMode.target) finish(true);
                        }
                    }
                });
                if(e.y > canvas.height + 50) enemies.splice(i, 1);
            }

            // 敵弾挙動
            for(let i=eBullets.length-1; i>=0; i--) {
                let eb = eBullets[i];
                if(eb.accel && frame % 30 === 0) { eb.vx *= 1.5; eb.vy *= 1.5; } // 加速
                eb.x += eb.vx; eb.y += eb.vy;
                if(Math.hypot(eb.x-player.x, eb.y-player.y) < 8) {
                    hp -= 10; eBullets.splice(i,1);
                    if(hp <= 0) finish(false);
                } else if(eb.y > canvas.height) eBullets.splice(i,1);
            }

            document.getElementById('hp-bar-fill').style.width = hp + "%";
            document.getElementById('score').innerText = score.toString().padStart(6, '0');
        }

        function draw() {
            ctx.fillStyle = "rgba(0, 8, 20, 0.4)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#1e3a5f"; stars.forEach(s => ctx.fillRect(s.x, s.y, s.s, s.s));
            
            if(currentMode.key === 'ultimate') { // 警告エフェクト
                ctx.strokeStyle = `rgba(243, 151, 0, ${Math.sin(frame*0.1)*0.2})`;
                ctx.lineWidth = 10; ctx.strokeRect(0,0,canvas.width,canvas.height);
            }

            ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(player.x, player.y, 8, 0, Math.PI*2); ctx.fill();
            bullets.forEach(b => { ctx.fillStyle = "#00dfff"; ctx.beginPath(); ctx.arc(b.x, b.y, b.size, 0, Math.PI*2); ctx.fill(); });
            eBullets.forEach(eb => { ctx.fillStyle = currentMode.color; ctx.beginPath(); ctx.arc(eb.x, eb.y, 4, 0, Math.PI*2); ctx.fill(); });
            enemies.forEach(e => { ctx.strokeStyle = "#fff"; ctx.strokeRect(e.x-15, e.y-15, 30, 30); });
        }

        function finish(isClear) {
            if(isClear) {
                isClearing = true;
                document.getElementById('complete-text').style.display = 'block';
                setTimeout(() => {
                    let cl = JSON.parse(localStorage.getItem('clearedStages') || '[]');
                    let pf = JSON.parse(localStorage.getItem('perfectStages') || '[]');
                    if(hp >= 100) pf.push(currentMode.key); else cl.push(currentMode.key);
                    localStorage.setItem('clearedStages', JSON.stringify([...new Set(cl)]));
                    localStorage.setItem('perfectStages', JSON.stringify([...new Set(pf)]));
                    location.reload();
                }, 2000);
            } else { alert("GAME OVER"); location.reload(); }
        }

        function loop() { if(!gameActive) return; update(); draw(); requestAnimationFrame(loop); }
        init();
    </script>
</body>
</html>
