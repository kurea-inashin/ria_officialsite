<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>MINAMI PROJECT 2026 - ULTIMATE EDITION</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'MS Gothic', sans-serif; overflow: hidden; user-select: none; }
        canvas { display: block; }
        
        /* 未来感のあるHUDデザイン */
        #hud { 
            position: absolute; 
            top: 50px; /* 位置を下げて余裕を持たせる */
            left: 0; 
            width: 100%; 
            padding: 0 50px; 
            pointer-events: none; 
            z-index: 5; 
            display: flex; 
            justify-content: space-between;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        .bar-container { 
            width: 250px; height: 16px; 
            border: 2px solid #fff; 
            background: rgba(255,255,255,0.1); 
            box-shadow: 0 0 15px rgba(255,255,255,0.2);
            margin-top: 8px;
        }
        #hp-fill { height: 100%; background: linear-gradient(90deg, #ff0000, #ff6666); transition: 0.2s; }
        #gauge-fill { height: 100%; background: linear-gradient(90deg, #ffff00, #fff); }

        /* オーバーレイ表示 */
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; background: radial-gradient(circle, rgba(0,20,40,0.8) 0%, rgba(0,0,0,0.95) 100%); z-index: 10; }
        
        .panel { display: none; padding: 80px 60px; height: 80vh; overflow-y: auto; }
        .panel.active { display: block; animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* ステージ選択のネオン装飾 */
        #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 20px; }
        .mode-btn { 
            border: 1px solid #444; padding: 20px; text-align: center; cursor: pointer; 
            background: rgba(255,255,255,0.05); color: #666; transition: 0.3s; 
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
        }
        .mode-btn.unlocked { color: var(--c); border-color: var(--c); box-shadow: inset 0 0 10px var(--c); }
        .mode-btn.unlocked:hover { background: var(--c); color: #000; box-shadow: 0 0 30px var(--c); }
        .mode-btn.selected { background: var(--c); color: #000; transform: scale(1.1); font-weight: bold; }

        #briefing { border-top: 1px solid #fff; margin-top: 40px; padding-top: 30px; }
        #brief-desc { font-size: 16px; line-height: 2; color: #ddd; letter-spacing: 1px; }

        .nav-btn { 
            background: transparent; color: #fff; border: 1px solid #fff; 
            padding: 15px 40px; cursor: pointer; font-size: 18px; 
            letter-spacing: 4px; transition: 0.3s;
        }
        .nav-btn:hover:not(:disabled) { background: #fff; color: #000; box-shadow: 0 0 20px #fff; }

        #copyright { position: absolute; bottom: 30px; width: 100%; text-align: center; font-size: 14px; color: #444; letter-spacing: 5px; }
        #phase-notice { position: absolute; width: 100%; text-align: center; font-size: 60px; top: 40%; opacity: 0; z-index: 20; color: #fff; text-shadow: 0 0 30px #fff; font-style: italic; pointer-events: none; }
    </style>
</head>
<body>

<div id="hud">
    <div>
        <div style="font-size:14px; letter-spacing:2px;">SHIELD STATUS</div>
        <div class="bar-container"><div id="hp-fill"></div></div>
        <div id="gold-val" style="margin-top:20px; font-size:24px; color:#ffcc00;">GOLD: 0</div>
    </div>
    <div style="text-align: center;">
        <div id="score-val" style="font-size:32px; letter-spacing:8px;">000000</div>
        <div id="bomb-stock" style="margin-top:10px; font-size:28px; color:#00ffff;"></div>
    </div>
    <div style="text-align: right;">
        <div style="font-size:14px; letter-spacing:2px;">CORE ENERGY</div>
        <div class="bar-container"><div id="gauge-fill"></div></div>
    </div>
</div>

<div id="phase-notice"></div>

<div id="overlay">
    <div id="main-nav" style="margin: auto; text-align: center;">
        <h1 style="font-size: 80px; letter-spacing: 25px; margin-bottom: 60px; text-shadow: 0 0 30px #fff;">MINAMI PROJECT</h1>
        <button class="nav-btn" onclick="openPanel('stage-select')">ENGAGE MISSION</button><br><br>
        <button class="nav-btn" onclick="openPanel('shop')">SYSTEM UPGRADE</button><br><br>
        <button class="nav-btn" onclick="openPanel('garage')">BATTLE HANGAR</button>
    </div>

    <div id="stage-select" class="panel">
        <button class="nav-btn" style="font-size:14px; padding:10px 20px;" onclick="backToMain()">RETURN</button>
        <div id="grid" style="margin-top:30px;"></div>
        <div id="briefing">
            <h2 id="brief-title" style="font-size:40px; margin:0;">STATION SELECT</h2>
            <div id="brief-meta" style="font-size:14px; margin:10px 0 20px 0;"></div>
            <p id="brief-desc">領域を選択してください。環境干渉データの解析を開始します。</p>
            <button id="launch-btn" class="nav-btn" style="display:none; margin-top:20px; float:right;">LAUNCH</button>
        </div>
    </div>

    <div id="shop" class="panel">
        <button class="nav-btn" onclick="backToMain()">RETURN</button>
        <h2 id="shop-gold" style="font-size:40px; color:#ffcc00;"></h2>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:30px; margin-top:40px;">
            <button class="nav-btn" onclick="buy('atk', 5000)">ATK MOD (5000G)</button>
            <button class="nav-btn" onclick="buy('heal', 2000)">REPAIR UNIT (2000G)</button>
            <button class="nav-btn" onclick="buy('bit', 15000)">DRONE BIT (15000G)</button>
        </div>
    </div>

    <div id="garage" class="panel">
        <button class="nav-btn" onclick="backToMain()">RETURN</button>
        <h2 id="garage-gold" style="font-size:40px;"></h2>
        <div id="avatar-list" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(200px, 1fr)); gap:25px; margin-top:40px;"></div>
    </div>

    <div id="copyright">© 2026 MINAMI PROJECT. DATA UNIT NO.773</div>
</div>

<canvas id="game"></canvas>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;

    let gameActive = false, score = 0, hp = 100, frame = 0, phase = 1, burstGauge = 0, bombActive = 0;
    let bullets = [], eBullets = [], enemies = [], particles = [], stars = [];
    let player = { x: canvas.width/2, y: canvas.height/2 };
    let currentMode = null, isDown = false;
    let sessionData = { atk: 3, hasBit: false };

    const STORAGE_KEY = 'minami_2026_ultimate';
    let userData = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {
        gold: 0, bombs: 1, cleared: [], skin: '#fff', ownedSkins: ['#fff']
    };

    // 背景の星
    for(let i=0; i<100; i++) stars.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*3});

    const STAGES = {
        'SB': { name: 'ST=SB', color: '#ccaa00', diff: 1.0, star: '★', score1: 3000, score2: 8000, bossHp: 1500, g: ['vibrate'], info: '【基礎戦闘訓練エリア】\nシステムチェックを兼ねた初期演習。緩やかな振動波が機体を揺らすが、深刻な影響はない。まずはこの平穏な空間で、基本となる射撃と回避のプロトコルを完璧に遂行せよ。' },
        'KT': { name: 'ST=KT', color: '#0088cc', diff: 1.5, star: '★', score1: 4000, score2: 10000, bossHp: 2500, g: ['water'], info: '【高密度重粒子・沈黙の海】\n大気中に高密度の重粒子が充満しており、機体挙動に独特の粘性と慣性が発生する。水中にいるかのような抵抗は、回避のタイミングを狂わせる。' },
        'SK': { name: 'ST=SK', color: '#008844', diff: 2.0, star: '★★', score1: 5000, score2: 12000, bossHp: 4000, g: ['fog'], info: '【深緑の遮断領域】\n濃密な電磁スモッグが視界を遮る高難度視認エリア。敵機は霧の向こうから突如として現れる。広角拡散ショットによる制圧こそが生存の鍵だ。' },
        'KY': { name: 'ST=KY', color: '#aa0022', diff: 3.0, star: '★★', score1: 6000, score2: 15000, bossHp: 6000, g: ['wind'], info: '【臨界高度・風神の息吹】\n吹き荒れる超高速の偏西風が、常に機体を左方へと押し流す。微細な操作ミスが致命的な接触を招く。重火力機体による力押しの攻略が試される。' },
        'CO': { name: 'ST=CO', color: '#ff6600', diff: 20.0, star: '★★★★★★★★★★', score1: 50000, score2: 150000, bossHp: 200000, g: ['all'], info: '【真・終焉：オレンジの神話】\n全宇宙のエネルギーが中央に集束する。全ての干渉、全ての難易度がここに結実した。これを超えた先に、ミナミ・プロジェクトの真の完結が待っている。' }
    };

    const AVATARS = [
        { id: '#fff', name: 'STD-W', cost: 0, desc: '標準。' },
        { id: '#0f0', name: 'RAPID-G', cost: 10000, desc: '高連射。' },
        { id: '#0ff', name: 'WIDE-C', cost: 20000, desc: '3WAY。' },
        { id: '#ff0', name: 'SNAKE-Y', cost: 30000, desc: '追従。' },
        { id: '#aa0022', name: 'BURST-R', cost: 50000, desc: '重火力。' },
        { id: '#ff6600', name: 'ORANGE-L', cost: 500000, desc: '神話。' }
    ];

    function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(userData)); updateHUD(); }
    function updateHUD() {
        document.getElementById('gold-val').innerText = `GOLD: ${userData.gold}`;
        document.getElementById('score-val').innerText = score.toString().padStart(6, '0');
        document.getElementById('hp-fill').style.width = hp + "%";
        document.getElementById('gauge-fill').style.width = burstGauge + "%";
        document.getElementById('bomb-stock').innerText = `STOCK: ${"◆".repeat(userData.bombs)}`;
    }

    function openPanel(id) {
        document.getElementById('main-nav').style.display = 'none';
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'stage-select') renderStages();
        if(id === 'garage' || id === 'shop') {
            document.getElementById(id + '-gold').innerText = `GOLD: ${userData.gold}`;
            renderGarage();
        }
    }
    function backToMain() { document.querySelectorAll('.panel').forEach(p => p.classList.remove('active')); document.getElementById('main-nav').style.display = 'block'; }

    function renderStages() {
        const grid = document.getElementById('grid'); grid.innerHTML = '';
        Object.keys(STAGES).forEach(id => {
            const s = STAGES[id];
            const isSecret = id === 'CO' && userData.cleared.length < 4;
            const btn = document.createElement('div');
            btn.className = `mode-btn ${!isSecret ? 'unlocked' : ''} ${userData.cleared.includes(id) ? 'cleared' : ''}`;
            btn.style.setProperty('--c', isSecret ? '#111' : s.color);
            btn.innerHTML = `<b>${isSecret ? 'LOCKED' : s.name}</b>`;
            if(!isSecret) {
                btn.onclick = () => {
                    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    document.getElementById('brief-title').innerText = s.name;
                    document.getElementById('brief-title').style.color = s.color;
                    document.getElementById('brief-meta').innerHTML = `RANK: ${s.star}`;
                    document.getElementById('brief-desc').innerText = s.info;
                    const lBtn = document.getElementById('launch-btn');
                    lBtn.style.display = 'block'; lBtn.style.color = s.color; lBtn.style.borderColor = s.color;
                    lBtn.onclick = () => startGame(id);
                };
            }
            grid.appendChild(btn);
        });
    }

    function renderGarage() {
        const list = document.getElementById('avatar-list'); list.innerHTML = '';
        const unlockMap = { '#0f0':'SK', '#0ff':'KT', '#ff0':'SB', '#aa0022':'KY', '#ff6600':'CO' };
        AVATARS.forEach(a => {
            const owned = userData.ownedSkins.includes(a.id);
            const isLocked = unlockMap[a.id] && !userData.cleared.includes(unlockMap[a.id]);
            const btn = document.createElement('button');
            btn.className = 'nav-btn'; btn.style.borderColor = isLocked ? '#222' : a.id;
            btn.disabled = isLocked;
            btn.innerHTML = isLocked ? `LOCKED` : `<b style="color:${a.id}">${a.name}</b><br>${owned ? (userData.skin===a.id?'EQUIP':'SELECT') : a.cost+'G'}`;
            btn.onclick = () => {
                if(!owned && userData.gold >= a.cost) { userData.gold -= a.cost; userData.ownedSkins.push(a.id); save(); openPanel('garage'); }
                else if(owned) { userData.skin = a.id; save(); openPanel('garage'); }
            };
            list.appendChild(btn);
        });
    }

    function buy(type, cost) {
        if(userData.gold >= cost) {
            userData.gold -= cost;
            if(type === 'atk') sessionData.atk += 2;
            if(type === 'heal') hp = 100;
            if(type === 'bit') sessionData.hasBit = true;
            save(); openPanel('shop');
        }
    }

    function startGame(id) {
        currentMode = STAGES[id]; currentMode.id = id;
        document.getElementById('overlay').style.display = 'none';
        gameActive = true; score = 0; hp = 100; phase = 1; frame = 0; burstGauge = 0;
        enemies = []; bullets = []; eBullets = []; particles = [];
        showPhaseMsg("ENGAGE MISSION"); loop();
    }

    function showPhaseMsg(txt) {
        const el = document.getElementById('phase-notice');
        el.innerText = txt; el.style.opacity = 1;
        setTimeout(() => { el.style.opacity = 0; }, 2000);
    }

    window.onmousemove = (e) => { player.x = e.clientX; player.y = e.clientY; };
    window.onmousedown = () => isDown = true;
    window.onmouseup = () => isDown = false;
    window.onkeydown = (e) => { if(e.code === 'Space') useBomb(); };

    function useBomb() {
        if(userData.bombs > 0 && bombActive <= 0) {
            userData.bombs--; bombActive = 60; eBullets = [];
            enemies.forEach(e => { e.hp -= 3000; for(let i=0;i<20;i++) particles.push({x:e.x, y:e.y, vx:(Math.random()-0.5)*30, vy:(Math.random()-0.5)*30, life:40, color:"#fff"}); });
            showPhaseMsg("MAXIMUM BURST!!");
        }
    }

    function update() {
        frame++;
        if(bombActive > 0) bombActive--;
        stars.forEach(s => { s.y += 2 + s.s; if(s.y > canvas.height) s.y = 0; });

        if(phase === 1 && score >= currentMode.score1) { phase = 2; showPhaseMsg("PHASE 2: INTENSIFY"); }
        if(phase === 2 && score >= currentMode.score2) { phase = 3; showPhaseMsg("WARNING: BOSS DETECTED"); }

        let dX = player.x, dY = player.y;
        let res = (userData.skin === '#ff6600') ? 0.05 : 1.0;
        if(currentMode.g.includes('vibrate')) dX += Math.sin(frame*0.5)*20*res;
        if(currentMode.g.includes('wind')) dX -= 10*res;

        if(isDown && frame % 5 === 0) {
            const s = userData.skin; const a = sessionData.atk;
            ctx.shadowBlur = 15; ctx.shadowColor = s;
            if(s === '#aa0022') bullets.push({x:dX, y:dY-20, p:a*5, vy:-20, vx:0, w:35, c:s});
            else if(s === '#0ff') [-6,0,6].forEach(v => bullets.push({x:dX, y:dY-20, p:a, vy:-30, vx:v, w:10, c:s}));
            else if(s === '#ff6600') [-10,-5,0,5,10].forEach(v => bullets.push({x:dX, y:dY-20, p:a*3, vy:-40, vx:v, w:12, c:s}));
            else bullets.push({x:dX, y:dY-20, p:a, vy:-35, vx:0, w:8, c:s});
        }

        if(phase < 3 && frame % Math.max(5, 30 - currentMode.diff*3) === 0) {
            enemies.push({ x: Math.random()*canvas.width, y: -50, hp: (phase===1?60:200)*currentMode.diff, size: 40, vy: 6 + phase, c: currentMode.color });
        }
        if(phase === 3 && !enemies.some(e => e.isBoss)) {
            enemies.push({ x: canvas.width/2, y: -200, hp: currentMode.bossHp, maxHp: currentMode.bossHp, size: 180, vy: 1, isBoss: true, c: '#f0f' });
        }

        bullets.forEach((b, i) => {
            b.y += b.vy; b.x += b.vx;
            enemies.forEach((e, ei) => {
                if(Math.hypot(b.x-e.x, b.y-e.y) < e.size) {
                    e.hp -= b.p; score += 20; bullets.splice(i, 1);
                    if(e.hp <= 0) {
                        if(e.isBoss) { gameActive = false; if(!userData.cleared.includes(currentMode.id)) userData.cleared.push(currentMode.id); userData.gold += 20000; save(); alert("MISSION COMPLETE"); location.reload(); }
                        else { enemies.splice(ei, 1); score += 500; userData.gold += 100; burstGauge += 4; if(burstGauge>=100){burstGauge=0; userData.bombs++;} }
                    }
                }
            });
            if(b.y < -100) bullets.splice(i, 1);
        });

        enemies.forEach(e => {
            e.y += e.vy; if(e.isBoss && e.y > 180) e.vy = 0;
            if(Math.random() < 0.06 * currentMode.diff * phase && bombActive <= 0) {
                eBullets.push({ x: e.x, y: e.y, vy: 7 + phase, vx: (Math.random()-0.5)*6 });
            }
        });

        eBullets.forEach((eb, i) => {
            eb.y += eb.vy; eb.x += eb.vx;
            if(Math.hypot(eb.x-dX, eb.y-dY) < 25) { hp -= 20; eBullets.splice(i, 1); if(hp<=0){ gameActive=false; alert("CRITICAL DAMAGE: SYSTEM OFFLINE"); location.reload(); } }
            if(eb.y > canvas.height) eBullets.splice(i, 1);
        });

        particles.forEach((p, i) => { p.x += p.vx; p.y += p.vy; p.life--; if(p.life<=0) particles.splice(i, 1); });
        updateHUD();
    }

    function draw() {
        ctx.fillStyle = "#000510"; ctx.fillRect(0,0,canvas.width, canvas.height);
        
        ctx.fillStyle = "#fff";
        stars.forEach(s => ctx.fillRect(s.x, s.y, s.s, s.s));

        if(bombActive > 0) { ctx.fillStyle = "rgba(255,255,255,0.5)"; ctx.fillRect(0,0,canvas.width,canvas.height); }
        
        // 自機（ネオン）
        ctx.shadowBlur = 20; ctx.shadowColor = userData.skin;
        ctx.fillStyle = userData.skin;
        ctx.beginPath(); ctx.moveTo(player.x, player.y-30); ctx.lineTo(player.x-25, player.y+20); ctx.lineTo(player.x+25, player.y+20); ctx.fill();

        // 弾（ネオン）
        bullets.forEach(b => { ctx.shadowColor = b.c; ctx.fillStyle = "#fff"; ctx.fillRect(b.x-b.w/2, b.y, b.w, 20); });

        // 敵
        enemies.forEach(e => {
            ctx.shadowColor = e.c; ctx.fillStyle = e.c;
            ctx.beginPath(); ctx.arc(e.x, e.y, e.size, 0, Math.PI*2); ctx.fill();
            if(e.isBoss) {
                ctx.fillStyle = "rgba(255,0,0,0.3)"; ctx.fillRect(e.x-150, e.y-e.size-30, 300, 15);
                ctx.fillStyle = "#f00"; ctx.fillRect(e.x-150, e.y-e.size-30, (e.hp/e.maxHp)*300, 15);
            }
        });

        // 敵弾
        ctx.shadowBlur = 10; ctx.shadowColor = "#ff00ff";
        eBullets.forEach(eb => { ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(eb.x, eb.y, 10, 0, Math.PI*2); ctx.fill(); });

        particles.forEach(p => { ctx.shadowBlur = 0; ctx.fillStyle = p.color; ctx.globalAlpha = p.life/40; ctx.fillRect(p.x, p.y, 4, 4); });
        ctx.globalAlpha = 1.0; ctx.shadowBlur = 0;
    }

    function loop() { if(gameActive) { update(); draw(); requestAnimationFrame(loop); } }
    updateHUD();
</script>
</body>
</html>
